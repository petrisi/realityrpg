<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 140" width="960" height="140">
  <!-- Background -->
  <rect x="1" y="1" width="958" height="138" rx="8" fill="#ffffff" stroke="#d5dbdb" stroke-width="1.5"/>

  <!-- Title -->
  <text x="480" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#2c3e50">🎓 Campaign 1: The First Year — 12-Session Arc</text>

  <!-- Connecting lines (stress-colored) drawn before nodes so nodes sit on top -->
  <line x1="60"  y1="65" x2="130" y2="65" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="65" x2="200" y2="65" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="65" x2="270" y2="65" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
  <line x1="270" y1="65" x2="340" y2="65" stroke="#82e0aa" stroke-width="3" stroke-linecap="round"/>
  <line x1="340" y1="65" x2="410" y2="65" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
  <line x1="410" y1="65" x2="480" y2="65" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="480" y1="65" x2="550" y2="65" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="550" y1="65" x2="620" y2="65" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
  <line x1="620" y1="65" x2="690" y2="65" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>

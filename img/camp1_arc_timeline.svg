  <text x="130" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S2: Job</text>
  <text x="200" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S3: Friends</text>
  <text x="270" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S4: Love</text>
  <text x="340" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S5: Budget</text>
  <text x="410" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S6: Homesick</text>
  <text x="480" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S7: Health</text>
  <text x="550" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S8: Family</text>
  <text x="620" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S9: Career</text>
  <text x="690" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S10: Emerg.</text>
  <text x="760" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S11: Growth</text>
  <text x="830" y="96" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#5d6d7e">S12: Decision</text>

  <!-- Stress legend at bottom right -->
  <rect x="730" y="108" width="210" height="24" rx="4" fill="#f8f9fa" stroke="#e5e7e9" stroke-width="1"/>
  <circle cx="745" cy="120" r="4" fill="#e74c3c"/><text x="754" y="123" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#5d6d7e">High</text>
  <circle cx="792" cy="120" r="4" fill="#e67e22"/><text x="801" y="123" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#5d6d7e">Med-High</text>
  <circle cx="858" cy="120" r="4" fill="#f39c12"/><text x="867" y="123" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#5d6d7e">Med</text>
  <circle cx="900" cy="120" r="4" fill="#27ae60"/><text x="909" y="123" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#5d6d7e">Low</text>
</svg>
  <line x1="760" y1="65" x2="830" y2="65" stroke="#2980b9" stroke-width="3" stroke-linecap="round"/>
  <line x1="830" y1="65" x2="900" y2="65" stroke="#2980b9" stroke-width="3" stroke-linecap="round"/>

  <!-- Emoji icons above each node (y=48) -->
  <text x="60"  y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">🏠</text>
  <text x="130" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">💼</text>
  <text x="200" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">🤝</text>
  <text x="270" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">💕</text>
  <text x="340" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">💰</text>
  <text x="410" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">🏠</text>
  <text x="480" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">🏥</text>
  <text x="550" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">👨‍👩‍👦</text>
  <text x="620" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">🚀</text>
  <text x="690" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">💸</text>
  <text x="760" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">🌱</text>
  <text x="830" y="48" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14">🎯</text>

  <!-- Node circles (r=12, center y=65) -->

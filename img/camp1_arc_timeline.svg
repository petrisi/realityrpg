  <circle cx="130" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="200" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="270" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="340" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="410" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="480" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="550" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="620" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="690" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="760" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>
  <circle cx="830" cy="65" r="12" fill="#f8f9fa" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- Session numbers inside nodes -->
  <text x="60"  y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">1</text>
  <text x="130" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">2</text>
  <text x="200" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">3</text>
  <text x="270" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">4</text>
  <text x="340" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">5</text>
  <text x="410" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">6</text>
  <text x="480" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">7</text>
  <text x="550" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">8</text>
  <text x="620" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">9</text>
  <text x="690" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">10</text>
  <text x="760" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">11</text>
  <text x="830" y="70" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2c3e50">12</text>


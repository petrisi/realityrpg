<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 900 350" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <!-- Gradient: neutral gray → green -->
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bdc3c7"/>
      <stop offset="25%" stop-color="#7fb069"/>
      <stop offset="50%" stop-color="#5daa3f"/>
      <stop offset="75%" stop-color="#45b976"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Immigration &amp; Citizenship Path</text>

  <!-- ════════════════════════════════════════
       Step 1: Visitor
       ════════════════════════════════════════ -->
  <rect x="40" y="60" width="140" height="90" rx="10" fill="#d5d8dc" stroke="#95a5a6" stroke-width="2" filter="url(#shadow)"/>
  <text x="110" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#2c3e50">🧳 Visitor</text>
  <text x="110" y="105" text-anchor="middle" font-size="11" fill="#5d6d7e">Tourist, business,</text>
  <text x="110" y="120" text-anchor="middle" font-size="11" fill="#5d6d7e">temporary stay</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="105" x2="220" y2="105" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════
       Step 2: Visa
       ════════════════════════════════════════ -->
  <rect x="220" y="60" width="140" height="90" rx="10" fill="#a9dfbf" stroke="#7fb069" stroke-width="2" filter="url(#shadow)"/>
  <text x="290" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#2c3e50">📋 Visa</text>
  <text x="290" y="105" text-anchor="middle" font-size="11" fill="#5d6d7e">TN 35</text>
  <text x="290" y="120" text-anchor="middle" font-size="11" fill="#5d6d7e">6mo – 6yr</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="105" x2="400" y2="105" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════
       Step 3: Green Card
       ════════════════════════════════════════ -->
  <rect x="400" y="60" width="140" height="90" rx="10" fill="#82e0aa" stroke="#5daa3f" stroke-width="2" filter="url(#shadow)"/>
  <text x="470" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#2c3e50">💚 Green Card</text>
  <text x="470" y="105" text-anchor="middle" font-size="11" fill="#5d6d7e">TN 35</text>
  <text x="470" y="120" text-anchor="middle" font-size="11" fill="#5d6d7e">6mo – 3yr wait</text>

  <!-- Arrow 3→4 -->
  <line x1="540" y1="105" x2="580" y2="105" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════
       Step 4: Naturalization
       ════════════════════════════════════════ -->
  <rect x="580" y="60" width="140" height="90" rx="10" fill="#58d68d" stroke="#45b976" stroke-width="2" filter="url(#shadow)"/>
  <text x="650" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#2c3e50">📝 Naturalization</text>
  <text x="650" y="105" text-anchor="middle" font-size="11" fill="#5d6d7e">Civics test TN 35</text>
  <text x="650" y="120" text-anchor="middle" font-size="11" fill="#5d6d7e">3 – 5yr wait</text>

  <!-- Arrow 4→5 -->
  <line x1="720" y1="105" x2="760" y2="105" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- ════════════════════════════════════════
       Step 5: Citizen
       ════════════════════════════════════════ -->
  <rect x="760" y="60" width="100" height="90" rx="10" fill="#27ae60" filter="url(#shadow)"/>
  <text x="810" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">🇺🇸 Citizen</text>
  <text x="810" y="105" text-anchor="middle" font-size="11" fill="#d5f5e3">Full rights</text>
  <text x="810" y="120" text-anchor="middle" font-size="11" fill="#d5f5e3">✅</text>

  <!-- ════════════════════════════════════════
       Bottom note bar
       ════════════════════════════════════════ -->
  <rect x="40" y="180" width="820" height="50" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#7d6608">⚠️ Each step can be denied — failure means deportation or loss of status</text>
  <text x="450" y="218" text-anchor="middle" font-size="11" fill="#9a7d0a">Total timeline from entry to citizenship: approximately 5–15 years</text>

  <!-- ════════════════════════════════════════
       Alternative paths note
       ════════════════════════════════════════ -->
  <rect x="40" y="255" width="820" height="65" rx="10" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#2980b9">📌 Alternative Paths</text>
  <text x="450" y="296" text-anchor="middle" font-size="11" fill="#2c3e50">Asylum (TN 45) · Family Sponsorship (TN 40) · Employment-Based (TN 50) · Diversity Visa Lottery (TN 30)</text>
  <text x="450" y="312" text-anchor="middle" font-size="10" fill="#7f8c8d">Each alternative has its own TN, timeline, and documentation requirements</text>

</svg>
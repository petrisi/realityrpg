<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 700 480" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="480" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Trust Erosion &amp; Repair Cycle</text>
  <text x="350" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Trust builds through rule compliance; erodes through breaches; repair is possible but incomplete</text>

  <!-- TRUST GAUGE — center -->
  <rect x="280" y="65" width="140" height="260" rx="8" fill="white" stroke="#dcdcdc" stroke-width="1.5"/>
  <!-- Gauge fill — green zone (trust building) -->
  <rect x="280" y="245" width="140" height="80" rx="0" fill="#d5f5e3"/>
  <rect x="280" y="205" width="140" height="40" rx="0" fill="#d4efdf"/>
  <rect x="280" y="165" width="140" height="40" rx="0" fill="#fef9e7"/>
  <rect x="280" y="125" width="140" height="40" rx="0" fill="#fdebd0"/>
  <rect x="280" y="85" width="140" height="40" rx="0 0 0 0" fill="#fadbd8"/>

  <!-- Gauge labels -->
  <text x="350" y="310" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">20 — Full Trust</text>
  <text x="350" y="280" text-anchor="middle" font-size="9" fill="#2c3e50">SP buffer max</text>
  <text x="350" y="235" text-anchor="middle" font-size="9" fill="#2c3e50">15 — Strong</text>
  <text x="350" y="195" text-anchor="middle" font-size="9" fill="#2c3e50">10 — Moderate</text>
  <text x="350" y="155" text-anchor="middle" font-size="9" fill="#2c3e50">5 — Fragile</text>
  <text x="350" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">0 — Broken</text>
  <text x="350" y="98" text-anchor="middle" font-size="9" fill="#e74c3c">Permanent damage</text>

  <!-- TRUST BUILDING — left side -->
  <rect x="30" y="65" width="230" height="155" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="145" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#27ae60">✅ Trust Building</text>
  <text x="145" y="108" text-anchor="middle" font-size="10" fill="#2c3e50">Each rule followed through</text>
  <text x="145" y="123" text-anchor="middle" font-size="10" fill="#2c3e50">= +1 trust point (max 20)</text>

  <!-- Trust building examples -->
  <rect x="45" y="135" width="200" height="22" rx="4" fill="white" stroke="#a9dfbf" stroke-width="1"/>
  <text x="145" y="150" text-anchor="middle" font-size="9" fill="#27ae60">🛡️ "Condoms always" — followed</text>

  <rect x="45" y="160" width="200" height="22" rx="4" fill="white" stroke="#a9dfbf" stroke-width="1"/>
  <text x="145" y="175" text-anchor="middle" font-size="9" fill="#27ae60">💬 "Tell before, not after" — honored</text>

  <rect x="45" y="185" width="200" height="22" rx="4" fill="white" stroke="#a9dfbf" stroke-width="1"/>
  <text x="145" y="200" text-anchor="middle" font-size="9" fill="#27ae60">🏠 "No overnight stays" — respected</text>

  <!-- Arrow from building to gauge -->
  <path d="M260,140 C268,140 275,200 275,200" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- TRUST EROSION — right side -->
  <rect x="440" y="65" width="230" height="155" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
  <text x="555" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#e74c3c">⚠️ Trust Erosion</text>
  <text x="555" y="108" text-anchor="middle" font-size="10" fill="#2c3e50">Each rule breach</text>
  <text x="555" y="123" text-anchor="middle" font-size="10" fill="#2c3e50">= trust loss + SP gain</text>

  <!-- Erosion examples -->
  <rect x="455" y="135" width="200" height="22" rx="4" fill="white" stroke="#f5b7b1" stroke-width="1"/>
  <text x="555" y="150" text-anchor="middle" font-size="9" fill="#e74c3c">💔 Emotional boundary breach: −3 trust</text>

  <rect x="455" y="160" width="200" height="22" rx="4" fill="white" stroke="#f5b7b1" stroke-width="1"/>
  <text x="555" y="175" text-anchor="middle" font-size="9" fill="#e74c3c">🛡️ Safety rule breach: −5 trust (perm)</text>

  <rect x="455" y="185" width="200" height="22" rx="4" fill="white" stroke="#f5b7b1" stroke-width="1"/>
  <text x="555" y="200" text-anchor="middle" font-size="9" fill="#e74c3c">💬 Communication breach: −1 trust</text>

  <!-- Arrow from erosion to gauge -->
  <path d="M440,140 C432,140 425,200 425,200" stroke="#e74c3c" stroke-width="2" fill="none"/>

  <!-- REPAIR PATH — bottom -->
  <rect x="120" y="340" width="460" height="120" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="2"/>
  <text x="350" y="363" text-anchor="middle" font-size="13" font-weight="700" fill="#2980b9">🔧 Repair Arc</text>
  <text x="350" y="380" text-anchor="middle" font-size="10" fill="#2c3e50">Honest conversation can partially restore trust — but not to pre-breach levels</text>

  <!-- Repair steps -->
  <rect x="140" y="392" width="130" height="55" rx="6" fill="white" stroke="#aed6f1" stroke-width="1"/>
  <text x="205" y="410" text-anchor="middle" font-size="10" font-weight="700" fill="#2980b9">Step 1</text>
  <text x="205" y="425" text-anchor="middle" font-size="9" fill="#2c3e50">Acknowledge breach</text>
  <text x="205" y="438" text-anchor="middle" font-size="9" fill="#2c3e50">+1 trust restored</text>

  <rect x="285" y="392" width="130" height="55" rx="6" fill="white" stroke="#aed6f1" stroke-width="1"/>
  <text x="350" y="410" text-anchor="middle" font-size="10" font-weight="700" fill="#2980b9">Step 2</text>
  <text x="350" y="425" text-anchor="middle" font-size="9" fill="#2c3e50">Repair conversation</text>
  <text x="350" y="438" text-anchor="middle" font-size="9" fill="#2c3e50">+2 trust restored</text>

  <rect x="430" y="392" width="130" height="55" rx="6" fill="white" stroke="#aed6f1" stroke-width="1"/>
  <text x="495" y="410" text-anchor="middle" font-size="10" font-weight="700" fill="#2980b9">Step 3</text>
  <text x="495" y="425" text-anchor="middle" font-size="9" fill="#2c3e50">Consistent behavior</text>
  <text x="495" y="438" text-anchor="middle" font-size="9" fill="#2c3e50">+1 trust/week after</text>

  <!-- Arrows from gauge to repair -->
  <line x1="350" y1="325" x2="350" y2="340" stroke="#2980b9" stroke-width="2" stroke-dasharray="5"/>

  <!-- SP Buffer note -->
  <rect x="175" y="465" width="350" height="10" rx="3" fill="#fef9e7"/>
  <text x="350" y="475" text-anchor="middle" font-size="8" fill="#e67e22">Each trust point reduces SP gain from jealousy triggers by 1 (minimum +0 SP)</text>
</svg>
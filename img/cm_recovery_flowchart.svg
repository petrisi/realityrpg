<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowRight" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2c3e50"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="8" refX="0" refY="4" orient="auto">
      <path d="M10,0 L0,4 L10,8 Z" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Health Recovery Flowchart</text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#7f8c8d">From Critical to Healthy — Recovery requirements at each step</text>

  <!-- Nodes -->
  <!-- Critical -->
  <g transform="translate(40, 62)" filter="url(#shadow)">
    <rect width="120" height="80" rx="10" fill="#c0392b"/>
    <text x="60" y="32" text-anchor="middle" font-size="22">🚨</text>
    <text x="60" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="white">Critical</text>
    <text x="60" y="70" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Unconscious</text>
  </g>

  <!-- Injured/Ill -->
  <g transform="translate(245, 62)" filter="url(#shadow)">
    <rect width="120" height="80" rx="10" fill="#e74c3c"/>
    <text x="60" y="32" text-anchor="middle" font-size="22">🤕</text>
    <text x="60" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="white">Injured/Ill</text>
    <text x="60" y="70" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Hurt or sick</text>
  </g>

  <!-- Sick -->
  <g transform="translate(450, 62)" filter="url(#shadow)">
    <rect width="120" height="80" rx="10" fill="#f39c12"/>
    <text x="60" y="32" text-anchor="middle" font-size="22">😤</text>
    <text x="60" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="white">Sick</text>
    <text x="60" y="70" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Ailing</text>
  </g>

  <!-- Tired -->
  <g transform="translate(655, 62)" filter="url(#shadow)">
    <rect width="120" height="80" rx="10" fill="#27ae60"/>
    <text x="60" y="32" text-anchor="middle" font-size="22">😴</text>
    <text x="60" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="white">Tired</text>
    <text x="60" y="70" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Fatigued</text>
  </g>

  <!-- Arrows forward -->
  <line x1="160" y1="102" x2="235" y2="102" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="365" y1="102" x2="445" y2="102" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="570" y1="102" x2="650" y2="102" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- Arrow labels -->
  <g font-size="9" fill="#2c3e50" text-anchor="middle">
    <rect x="168" y="78" width="68" height="28" rx="4" fill="white" stroke="#d5dbe0" stroke-width="0.5"/>
    <text x="202" y="90">ER visit</text>
    <text x="202" y="102">1-4 weeks</text>

    <rect x="373" y="78" width="72" height="28" rx="4" fill="white" stroke="#d5dbe0" stroke-width="0.5"/>
    <text x="398" y="90">Doctor visit</text>
    <text x="398" y="102">3-7 days</text>

    <rect x="578" y="78" width="64" height="28" rx="4" fill="white" stroke="#d5dbe0" stroke-width="0.5"/>
    <text x="600" y="90">Rest + food</text>
    <text x="600" y="102">1-3 days</text>
  </g>

  <!-- Healthy node (bigger, special) -->
  <g transform="translate(795, 62)" filter="url(#shadow)">
    <rect width="90" height="80" rx="10" fill="#2ecc71"/>
    <text x="45" y="32" text-anchor="middle" font-size="22">💪</text>
    <text x="45" y="55" text-anchor="middle" font-size="13" font-weight="700" fill="white">Healthy</text>
    <text x="45" y="70" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Full HP</text>
  </g>

  <!-- Arrow to Healthy -->
  <line x1="775" y1="102" x2="790" y2="102" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowRight)"/>
  <g font-size="9" fill="#2c3e50" text-anchor="middle">
    <rect x="775" y="78" width="60" height="28" rx="4" fill="white" stroke="#d5dbe0" stroke-width="0.5"/>
    <text x="805" y="90">Good sleep</text>
    <text x="805" y="102">1 night</text>
  </g>

  <!-- Cost labels below -->
  <g font-size="9" fill="#7f8c8d" text-anchor="middle">
    <text x="202" y="165">💰 $2K–$50K</text>
    <text x="398" y="165">💰 $100–$500</text>
    <text x="600" y="165">💰 $10–$30</text>
    <text x="805" y="165">💰 Free</text>
  </g>

  <!-- Direction note -->
  <text x="450" y="190" text-anchor="middle" font-size="10" fill="#7f8c8d" font-style="italic">Recovery moves right → · Injuries move left ←</text>
</svg>

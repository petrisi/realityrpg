<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 620 480" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect width="620" height="480" rx="10" fill="#faf9f6"/>

  <!-- Title -->
  <text x="310" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Work Performance ↔ Boss Relationship Feedback Loop</text>

  <!-- LEFT SIDE: Virtuous Cycle (green) -->
  <text x="160" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#27ae60">🟢 Virtuous Cycle</text>

  <!-- Step 1: Good Performance -->
  <rect x="60" y="80" width="200" height="44" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">✅ Strong Performance</text>
  <text x="160" y="116" text-anchor="middle" font-size="9" fill="#2c3e50">Roll ≤ TN − 5</text>

  <!-- Arrow down -->
  <path d="M160,128 L160,148" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Step 2: Boss pleased -->
  <rect x="60" y="152" width="200" height="44" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">👍 Boss Relationship +1</text>
  <text x="160" y="188" text-anchor="middle" font-size="9" fill="#2c3e50">Trust builds over time</text>

  <!-- Arrow down -->
  <path d="M160,200 L160,220" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Step 3: Opportunities -->
  <rect x="60" y="224" width="200" height="44" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="244" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">📈 Opportunities arise</text>
  <text x="160" y="260" text-anchor="middle" font-size="9" fill="#2c3e50">Promotions, bonuses, flexibility</text>

  <!-- Arrow down -->
  <path d="M160,272 L160,292" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Step 4: Better performance -->
  <rect x="60" y="296" width="200" height="44" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="316" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">🌟 Even Better Work</text>
  <text x="160" y="332" text-anchor="middle" font-size="9" fill="#2c3e50">Motivated, less stress, more focus</text>

  <!-- Loop arrow back up -->
  <path d="M260,318 C280,318 280,102 260,102" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="285" y="210" font-size="9" fill="#27ae60" font-weight="600">FEEDBACK</text>

  <!-- RIGHT SIDE: Vicious Cycle (red) -->
  <text x="460" y="65" text-anchor="middle" font-size="14" font-weight="700" fill="#c0392b">🔴 Vicious Cycle</text>

  <!-- Step 1: Poor Performance -->
  <rect x="360" y="80" width="200" height="44" rx="8" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="100" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">❌ Poor Performance</text>
  <text x="460" y="116" text-anchor="middle" font-size="9" fill="#2c3e50">Roll &gt; TN</text>

  <!-- Arrow down -->
  <path d="M460,128 L460,148" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Step 2: Boss annoyed -->
  <rect x="360" y="152" width="200" height="44" rx="8" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">😒 Boss Relationship −1</text>
  <text x="460" y="188" text-anchor="middle" font-size="9" fill="#2c3e50">Under scrutiny, mistakes noted</text>

  <!-- Arrow down -->
  <path d="M460,200 L460,220" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Step 3: Pressure -->
  <rect x="360" y="224" width="200" height="44" rx="8" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="244" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">⚡ Pressure increases</text>
  <text x="460" y="260" text-anchor="middle" font-size="9" fill="#2c3e50">PIP, overtime demands, micromanage</text>

  <!-- Arrow down -->
  <path d="M460,272 L460,292" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>

  <!-- Step 4: Worse performance -->
  <rect x="360" y="296" width="200" height="44" rx="8" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="316" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">💀 Worse Performance</text>
  <text x="460" y="332" text-anchor="middle" font-size="9" fill="#2c3e50">Stressed, exhausted, more errors</text>

  <!-- Loop arrow back up -->
  <path d="M360,318 C340,318 340,102 360,102" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text x="335" y="210" font-size="9" fill="#c0392b" font-weight="600">FEEDBACK</text>

  <!-- Bottom: Three consecutive failures = warning -->
  <rect x="160" y="370" width="300" height="40" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="388" text-anchor="middle" font-size="10" font-weight="600" fill="#e67e22">⚠️ 3 consecutive failures = verbal warning</text>
  <text x="310" y="402" text-anchor="middle" font-size="10" fill="#d35400">Boss at −3 to −4 = Performance Improvement Plan</text>

  <!-- Bottom: How to break the cycle -->
  <rect x="160" y="425" width="300" height="40" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="443" text-anchor="middle" font-size="10" fill="#2980b9" font-weight="600">💡 Break the cycle: 2d10 + Communication (TN 55)</text>
  <text x="310" y="457" text-anchor="middle" font-size="10" fill="#2980b9">One-on-one conversation with the boss</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 720 480" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">🤝 Community Support Network — Reality's "Divine Power"</text>
  <text x="360" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Priya's support cascade after a bad day at work</text>

  <!-- Center node: Priya -->
  <circle cx="360" cy="240" r="55" fill="url(#centerGrad)" filter="url(#shadow)"/>
  <text x="360" y="232" text-anchor="middle" font-size="24">🧑</text>
  <text x="360" y="256" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Priya</text>

  <!-- Connection lines -->
  <line x1="310" y1="195" x2="175" y2="120" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="390" y1="190" x2="540" y2="110" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="310" y1="280" x2="165" y2="360" stroke="#e67e22" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="400" y1="280" x2="550" y2="370" stroke="#8e44ad" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Node 1: Best Friend (top-left) -->
  <rect x="60" y="70" width="220" height="90" rx="10" fill="#eaf2f8" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="170" y="98" text-anchor="middle" font-size="22">👫</text>
  <text x="170" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#2980b9">Best Friend</text>
  <text x="170" y="136" text-anchor="middle" font-size="10" fill="#2c3e50">"Want to talk?"</text>
  <rect x="100" y="145" width="140" height="18" rx="4" fill="#2980b9"/>
  <text x="170" y="158" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Support Check</text>

  <!-- Node 2: Sister (top-right) -->
  <rect x="440" y="60" width="220" height="90" rx="10" fill="#d4efdf" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="88" text-anchor="middle" font-size="22">👩‍👧</text>
  <text x="550" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#27ae60">Sister</text>
  <text x="550" y="126" text-anchor="middle" font-size="10" fill="#2c3e50">20 min call + advice</text>
  <rect x="480" y="135" width="140" height="18" rx="4" fill="#27ae60"/>
  <text x="550" y="148" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Empathy Check</text>

  <!-- Node 3: Therapist (bottom-left) -->
  <rect x="50" y="330" width="230" height="90" rx="10" fill="#fdebd0" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="165" y="358" text-anchor="middle" font-size="22">🧑‍⚕️</text>
  <text x="165" y="378" text-anchor="middle" font-size="12" font-weight="700" fill="#e67e22">Therapist</text>
  <text x="165" y="396" text-anchor="middle" font-size="10" fill="#2c3e50">Weekly session, process stress</text>
  <rect x="90" y="405" width="150" height="18" rx="4" fill="#e67e22"/>
  <text x="165" y="418" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Recovery Mechanic</text>

  <!-- Node 4: Self-Care (bottom-right) -->
  <rect x="440" y="340" width="220" height="90" rx="10" fill="#f5eef8" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="368" text-anchor="middle" font-size="22">🏠</text>
  <text x="550" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#8e44ad">Self-Care</text>
  <text x="550" y="406" text-anchor="middle" font-size="10" fill="#2c3e50">Meal + shower + comfort show</text>
  <rect x="475" y="415" width="170" height="18" rx="4" fill="#8e44ad"/>
  <text x="560" y="428" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">Stress Point Restoration</text>

  <!-- Bottom note -->
  <text x="360" y="465" text-anchor="middle" font-size="11" fill="#7f8c8d" font-style="italic">"None of this is instant. It takes hours, requires other people, and only works because she invested in these relationships over time."</text>
</svg>
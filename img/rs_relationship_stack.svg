<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 600 495" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="pyramidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fadbd8"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="495" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">The Relationship Stack Burden</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Multiple relationship stressors compound — SP multipliers escalate rapidly</text>

  <!-- PYRAMID — 4 levels -->
  <!-- Level 4 (top): 4+ stressors, x2.5 -->
  <polygon points="220,70 380,70 400,140 200,140" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="300" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="white">×2.5</text>
  <text x="300" y="114" text-anchor="middle" font-size="10" fill="white">4+ Stressors</text>
  <text x="300" y="128" text-anchor="middle" font-size="9" fill="#fadbd8">Everything at once — BURNOUT</text>

  <!-- Level 3: 3 stressors, x2.0 -->
  <polygon points="180,140 420,140 445,220 155,220" fill="#e67e22" stroke="#d35400" stroke-width="2"/>
  <text x="300" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="white">×2.0</text>
  <text x="300" y="190" text-anchor="middle" font-size="10" fill="white">3 Stressors</text>
  <text x="300" y="206" text-anchor="middle" font-size="9" fill="#fdebd0">Roommate + LDR + elder care</text>

  <!-- Level 2: 2 stressors, x1.5 -->
  <polygon points="140,220 460,220 490,300 110,300" fill="#f39c12" stroke="#e67e22" stroke-width="2"/>
  <text x="300" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="white">×1.5</text>
  <text x="300" y="270" text-anchor="middle" font-size="10" fill="white">2 Stressors</text>
  <text x="300" y="286" text-anchor="middle" font-size="9" fill="#fef9e7">Roommate + LDR failures</text>

  <!-- Level 1 (base): 1 stressor, x1.0 -->
  <polygon points="100,300 500,300 530,380 70,380" fill="#27ae60" stroke="#219a52" stroke-width="2"/>
  <text x="300" y="332" text-anchor="middle" font-size="14" font-weight="700" fill="white">×1.0</text>
  <text x="300" y="350" text-anchor="middle" font-size="10" fill="white">1 Stressor</text>
  <text x="300" y="366" text-anchor="middle" font-size="9" fill="#d5f5e3">Baseline — just a roommate issue</text>

  <!-- TIPPING POINT ZONE — above pyramid -->
  <rect x="130" y="400" width="340" height="65" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="300" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#e74c3c">⚠️ THE TIPPING POINT</text>
  <text x="300" y="438" text-anchor="middle" font-size="10" fill="#2c3e50">SP reaches 75% capacity → Relationship Fragility</text>
  <text x="300" y="454" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="600">All relationship TNs +5 → vicious cycle</text>

  <!-- Stressor examples — side annotations -->
  <!-- Left side -->
  <rect x="10" y="70" width="100" height="35" rx="4" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="60" y="87" text-anchor="middle" font-size="8" fill="#2980b9">💜 Poly jealousy</text>
  <text x="60" y="100" text-anchor="middle" font-size="8" fill="#7f8c8d">+2 to +4 SP</text>

  <rect x="10" y="120" width="100" height="35" rx="4" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="60" y="137" text-anchor="middle" font-size="8" fill="#2980b9">🌫️ Situationship</text>
  <text x="60" y="150" text-anchor="middle" font-size="8" fill="#7f8c8d">+1 to +3 SP/day</text>

  <rect x="10" y="170" width="100" height="35" rx="4" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="60" y="187" text-anchor="middle" font-size="8" fill="#2980b9">✈️ LDR failure</text>
  <text x="60" y="200" text-anchor="middle" font-size="8" fill="#7f8c8d">+2 to +4 SP</text>

  <rect x="10" y="220" width="100" height="35" rx="4" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="60" y="237" text-anchor="middle" font-size="8" fill="#2980b9">🏠 Roommate</text>
  <text x="60" y="250" text-anchor="middle" font-size="8" fill="#7f8c8d">+1 to +3 SP</text>

  <!-- Right side -->
  <rect x="490" y="70" width="100" height="35" rx="4" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="540" y="87" text-anchor="middle" font-size="8" fill="#2980b9">👥 Friend drama</text>
  <text x="540" y="100" text-anchor="middle" font-size="8" fill="#7f8c8d">+1 to +4 SP</text>

  <rect x="490" y="120" width="100" height="35" rx="4" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="540" y="137" text-anchor="middle" font-size="8" fill="#2980b9">👴 Elder care</text>
  <text x="540" y="150" text-anchor="middle" font-size="8" fill="#7f8c8d">+3 SP/meeting</text>

  <rect x="490" y="170" width="100" height="35" rx="4" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="540" y="187" text-anchor="middle" font-size="8" fill="#2980b9">🌿 Childfree</text>
  <text x="540" y="200" text-anchor="middle" font-size="8" fill="#7f8c8d">+1 to +4 SP</text>

  <rect x="490" y="220" width="100" height="35" rx="4" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="540" y="237" text-anchor="middle" font-size="8" fill="#2980b9">💍 Audit failure</text>
  <text x="540" y="250" text-anchor="middle" font-size="8" fill="#7f8c8d">+1 to +3 SP</text>

  <!-- Escape routes -->
  <rect x="130" y="475" width="340" height="10" rx="3" fill="#eafaf1"/>
  <text x="300" y="482" text-anchor="middle" font-size="9" fill="#27ae60">Escape: therapy (−2 SP/session) · support groups (−1 SP) · reduce active stressors</text>
</svg>
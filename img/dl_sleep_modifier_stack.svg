<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="520" height="520" rx="10" fill="#faf9f6"/>

  <!-- Title -->
  <text x="260" y="32" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Sleep Quality Modifier Stack</text>
  <text x="260" y="50" text-anchor="middle" font-size="11" fill="#7f8c8d">Roll 2d10 + Total Modifier vs TN 40 (lower = better sleep)</text>

  <!-- Center line -->
  <line x1="260" y1="65" x2="260" y2="470" stroke="#dcdcdc" stroke-width="1"/>

  <!-- POSITIVE MODIFIERS (top, green, going up) -->
  <rect x="60" y="75" width="180" height="28" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="75" y="93" font-size="11" fill="#27ae60" font-weight="600">🛏️ Good bed / mattress</text>
  <text x="225" y="93" text-anchor="end" font-size="12" font-weight="700" fill="#27ae60">+10</text>

  <rect x="60" y="110" width="180" height="28" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="75" y="128" font-size="11" fill="#27ae60" font-weight="600">🔇 Quiet, dark room</text>
  <text x="225" y="128" text-anchor="end" font-size="12" font-weight="700" fill="#27ae60">+10</text>

  <rect x="60" y="145" width="180" height="28" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="75" y="163" font-size="11" fill="#27ae60" font-weight="600">🧘 Consistent sleep schedule</text>
  <text x="225" y="163" text-anchor="end" font-size="12" font-weight="700" fill="#27ae60">+10</text>

  <rect x="60" y="180" width="180" height="28" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="75" y="198" font-size="11" fill="#27ae60" font-weight="600">🧘 Relaxation routine</text>
  <text x="225" y="198" text-anchor="end" font-size="12" font-weight="700" fill="#27ae60">+5</text>

  <rect x="60" y="215" width="180" height="28" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="75" y="233" font-size="11" fill="#27ae60" font-weight="600">🛏️ Decent bed (baseline)</text>
  <text x="225" y="233" text-anchor="end" font-size="12" font-weight="700" fill="#27ae60">+0</text>

  <!-- NEGATIVE MODIFIERS (bottom, red, going down) -->
  <rect x="280" y="250" width="180" height="28" rx="4" fill="#fadbd8" stroke="#c0392b" stroke-width="1"/>
  <text x="295" y="268" font-size="11" fill="#c0392b" font-weight="600">🔊 Construction / sirens</text>
  <text x="445" y="268" text-anchor="end" font-size="12" font-weight="700" fill="#c0392b">−20</text>

  <rect x="280" y="285" width="180" height="28" rx="4" fill="#fadbd8" stroke="#c0392b" stroke-width="1"/>
  <text x="295" y="303" font-size="11" fill="#c0392b" font-weight="600">📦 Sleeping in a car</text>
  <text x="445" y="303" text-anchor="end" font-size="12" font-weight="700" fill="#c0392b">−25</text>

  <rect x="280" y="320" width="180" height="28" rx="4" fill="#fadbd8" stroke="#c0392b" stroke-width="1"/>
  <text x="295" y="338" font-size="11" fill="#c0392b" font-weight="600">☕ Caffeine before bed</text>
  <text x="445" y="338" text-anchor="end" font-size="12" font-weight="700" fill="#c0392b">−15</text>

  <rect x="280" y="355" width="180" height="28" rx="4" fill="#fadbd8" stroke="#c0392b" stroke-width="1"/>
  <text x="295" y="373" font-size="11" fill="#c0392b" font-weight="600">😰 High stress (SP &gt; 10)</text>
  <text x="445" y="373" text-anchor="end" font-size="12" font-weight="700" fill="#c0392b">−10</text>

  <rect x="280" y="390" width="180" height="28" rx="4" fill="#fadbd8" stroke="#c0392b" stroke-width="1"/>
  <text x="295" y="408" font-size="11" fill="#c0392b" font-weight="600">🌡️ Room too hot / cold</text>
  <text x="445" y="408" text-anchor="end" font-size="12" font-weight="700" fill="#c0392b">−10</text>

  <rect x="280" y="425" width="180" height="28" rx="4" fill="#fadbd8" stroke="#c0392b" stroke-width="1"/>
  <text x="295" y="443" font-size="11" fill="#c0392b" font-weight="600">📱 Phone screen before bed</text>
  <text x="445" y="443" text-anchor="end" font-size="12" font-weight="700" fill="#c0392b">−5</text>

  <!-- Example box -->
  <rect x="50" y="468" width="420" height="44" rx="6" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="484" text-anchor="middle" font-size="10" font-weight="600" fill="#e67e22">Maya: +10+10−15−5−4 = +2 → rolls 47+2=49 vs TN 40 = FAILURE</text>
  <text x="260" y="500" text-anchor="middle" font-size="10" fill="#d35400">Poor sleep quality despite 7 hours in bed</text>
</svg>

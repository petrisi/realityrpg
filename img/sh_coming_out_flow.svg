<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arrowDark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" rx="12" fill="#fdfefe" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Coming Out — Structured Event</text>
  <line x1="160" y1="44" x2="640" y2="44" stroke="#ddd" stroke-width="1"/>

  <!-- Step 1: Choose the Audience -->
  <rect x="250" y="60" width="300" height="56" rx="14" fill="#1abc9c" stroke="#16a085" stroke-width="1.5"/>
  <text x="400" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff">Choose the Audience</text>
  <text x="400" y="104" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0f2f1">Family? Boss? Friends? Public?</text>

  <!-- Arrow 1→2 -->
  <line x1="400" y1="116" x2="400" y2="148" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Set the Stakes -->
  <rect x="250" y="148" width="300" height="64" rx="14" fill="#8e44ad" stroke="#7d3c98" stroke-width="1.5"/>
  <text x="400" y="173" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff">Set the Stakes</text>
  <text x="400" y="191" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e8daef">What do you hope to gain?</text>
  <text x="400" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e8daef">What do you fear losing?</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="212" x2="400" y2="244" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Roll the Check -->
  <rect x="250" y="244" width="300" height="56" rx="14" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="400" y="268" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#fff">Roll the Check</text>
  <text x="400" y="286" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d6eaf8">2d10 + RES mod + EXP mod</text>

  <!-- Arrow 3→Diamond -->
  <line x1="400" y1="300" x2="400" y2="332" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Diamond: Roll vs Acceptance TN -->
  <polygon points="400,332 500,380 400,428 300,380" fill="#ecf0f1" stroke="#555" stroke-width="2"/>
  <text x="400" y="376" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Roll vs</text>
  <text x="400" y="394" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Acceptance TN</text>

  <!-- Outcome 1: Critical Success -->
  <path d="M 500,380 C 530,380 545,320 545,320" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="545" y="290" width="230" height="60" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
  <text x="660" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e8449">🟢 Critical Success</text>
  <text x="660" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1e8449">≥TN+5: −3 SP, relationship ↑</text>

  <!-- Outcome 2: Success -->
  <line x1="500" y1="390" x2="545" y2="390" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <rect x="545" y="368" width="230" height="48" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="660" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#d4ac0d">🟡 Success</text>
  <text x="660" y="401" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d4ac0d">≥TN: −1 SP, stable</text>

  <!-- Outcome 3: Narrow Fail -->
  <line x1="500" y1="405" x2="545" y2="430" stroke="#e67e22" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <rect x="545" y="430" width="230" height="48" rx="10" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5"/>
  <text x="660" y="447" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ca6f1e">🟠 Narrow Fail</text>
  <text x="660" y="463" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#ca6f1e">TN−1 to TN−3: +2 SP, awkward</text>

  <!-- Outcome 4: Failure -->
  <line x1="500" y1="415" x2="545" y2="498" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowRed)"/>
  <rect x="545" y="498" width="230" height="48" rx="10" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="660" y="515" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#922b21">🔴 Failure</text>
  <text x="660" y="531" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#922b21">TN−4 to TN−6: +4 SP, rel. ↓</text>

  <!-- Outcome 5: Critical Fail -->
  <path d="M 500,425 C 530,445 545,558 545,558" fill="none" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowDark)"/>
  <rect x="545" y="558" width="230" height="48" rx="10" fill="#eaecee" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="660" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1a252f">💀 Critical Fail</text>
  <text x="660" y="591" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#1a252f">≤TN−7: +6 SP, may trigger trauma</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <style>
    text { font-size: 11px; fill: #2c3e50; }
    .title { font-size: 15px; font-weight: 700; fill: #2c3e50; text-anchor: middle; }
    .node { font-size: 11px; font-weight: 600; text-anchor: middle; }
    .node-sub { font-size: 9.5px; fill: #5d6d7e; text-anchor: middle; font-weight: 400; }
    .arrow { stroke: #7f8c8d; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .arrow-green { stroke: #27ae60; }
    .arrow-red { stroke: #e74c3c; }
    .loop-arrow { stroke: #e74c3c; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead-red); }
    .box { rx: 6; ry: 6; }
    .start { fill: #2c3e50; }
    .start-text { fill: #fff; font-size: 11px; font-weight: 600; text-anchor: middle; }
    .decision { fill: #fef9e7; stroke: #f39c12; stroke-width: 1.5; }
    .process { fill: #eaf2f8; stroke: #2980b9; stroke-width: 1.5; }
    .end { fill: #d5f5e3; stroke: #27ae60; stroke-width: 1.5; }
    .end-bad { fill: #fadbd8; stroke: #e74c3c; stroke-width: 1.5; }
    .label { font-size: 9px; font-weight: 600; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7f8c8d"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="410" y="24" class="title">Relocation Decision Tree</text>

  <!-- START node -->
  <rect x="320" y="38" width="180" height="34" class="box start"/>
  <text x="410" y="59" class="start-text">🏠 Starting Point: Need to Move?</text>

  <!-- Q1: Domestic or International? -->
  <line x1="410" y1="72" x2="410" y2="100" class="arrow"/>
  <rect x="300" y="100" width="220" height="34" class="box decision"/>
  <text x="410" y="117" class="node">🌍 Domestic or International?</text>

  <!-- LEFT BRANCH: Domestic -->
  <line x1="320" y1="134" x2="170" y2="162" class="arrow"/>
  <rect x="80" y="162" width="180" height="34" class="box process"/>
  <text x="170" y="179" class="node">🏙️ Domestic Move</text>
  <text x="170" y="191" class="node-sub">Apartment hunting, packing, moving</text>

  <!-- Domestic → Apartment Hunting -->
  <line x1="170" y1="196" x2="170" y2="224" class="arrow"/>
  <rect x="80" y="224" width="180" height="34" class="box process"/>
  <text x="170" y="241" class="node">🔍 Apartment Hunting</text>
  <text x="170" y="253" class="node-sub">Roll 2d10+INT vs TN 10</text>

  <!-- Apartment Hunting → Success -->
  <line x1="140" y1="258" x2="90" y2="286" class="arrow arrow-green"/>
  <text x="115" y="278" class="label" fill="#27ae60" text-anchor="middle">Success</text>
  <rect x="30" y="286" width="120" height="30" class="box end"/>
  <text x="90" y="305" class="node">✅ Place Secured</text>

  <!-- Apartment Hunting → Fail -->
  <line x1="200" y1="258" x2="250" y2="286" class="arrow arrow-red"/>
  <text x="225" y="278" class="label" fill="#e74c3c" text-anchor="middle">Fail</text>
  <rect x="210" y="286" width="120" height="30" class="box end-bad"/>
  <text x="270" y="305" class="node">❌ Search 1–2 weeks</text>

  <!-- LOOP: Fail → back to Apartment Hunting (curved arrow going up the right side) -->
  <path d="M 330 301 C 370 301, 370 244, 260 244" class="loop-arrow"/>
  <text x="370" y="276" class="label" fill="#e74c3c" text-anchor="middle">retry</text>

  <!-- Place Secured → Packing (arrow from bottom of Place Secured box) -->
  <line x1="90" y1="316" x2="170" y2="344" class="arrow"/>

  <!-- Packing -->
  <rect x="80" y="344" width="180" height="34" class="box process"/>
  <text x="170" y="361" class="node">📦 Packing &amp; Moving</text>
  <text x="170" y="373" class="node-sub">VIG checks, 2–14 days</text>

  <!-- Packing → Stress -->
  <line x1="170" y1="378" x2="170" y2="406" class="arrow"/>
  <rect x="80" y="406" width="180" height="34" class="box process"/>
  <text x="170" y="423" class="node">😰 +5 SP Base Stress</text>
  <text x="170" y="435" class="node-sub">+2–3 per complication</text>

  <!-- Domestic Move Complete -->
  <line x1="170" y1="440" x2="170" y2="468" class="arrow"/>
  <rect x="80" y="468" width="180" height="34" class="box end"/>
  <text x="170" y="485" class="node">🏡 Settled — Adaptation</text>
  <text x="170" y="497" class="node-sub">−5 social for 1 month</text>

  <!-- RIGHT BRANCH: International -->
  <line x1="500" y1="134" x2="650" y2="162" class="arrow"/>
  <rect x="560" y="162" width="180" height="34" class="box process"/>
  <text x="650" y="179" class="node">✈️ International Move</text>
  <text x="650" y="191" class="node-sub">Visa required</text>

  <!-- International → Visa Type -->
  <line x1="650" y1="196" x2="650" y2="224" class="arrow"/>
  <rect x="560" y="224" width="180" height="34" class="box process"/>
  <text x="650" y="241" class="node">📋 Choose Visa Type</text>
  <text x="650" y="253" class="node-sub">Work / Student / Nomad / Spouse</text>

  <!-- Visa → Application -->
  <line x1="650" y1="258" x2="650" y2="286" class="arrow"/>
  <rect x="560" y="286" width="180" height="34" class="box process"/>
  <text x="650" y="303" class="node">📝 Submit Application</text>
  <text x="650" y="315" class="node-sub">Wait 2 weeks – 24 months</text>

  <!-- Application → Interview -->
  <line x1="650" y1="320" x2="650" y2="348" class="arrow"/>
  <rect x="560" y="348" width="180" height="34" class="box process"/>
  <text x="650" y="365" class="node">🎤 Visa Interview</text>
  <text x="650" y="377" class="node-sub">Roll 2d10+PRC vs TN 12</text>

  <!-- Interview → Approved -->
  <line x1="620" y1="382" x2="570" y2="410" class="arrow arrow-green"/>
  <text x="590" y="402" class="label" fill="#27ae60" text-anchor="middle">Approved</text>
  <rect x="510" y="410" width="120" height="30" class="box end"/>
  <text x="570" y="429" class="node">✅ Move Forward</text>

  <!-- Interview → Denied -->
  <line x1="680" y1="382" x2="730" y2="410" class="arrow arrow-red"/>
  <text x="705" y="402" class="label" fill="#e74c3c" text-anchor="middle">Denied</text>
  <rect x="690" y="410" width="120" height="30" class="box end-bad"/>
  <text x="750" y="429" class="node">❌ +5–10 SP</text>

  <!-- Approved → Expat Life -->
  <line x1="570" y1="440" x2="570" y2="468" class="arrow"/>
  <rect x="510" y="468" width="120" height="34" class="box end"/>
  <text x="570" y="485" class="node">🌏 Expat Life</text>
  <text x="570" y="497" class="node-sub">Adaptation curve begins</text>

  <!-- Denied → Reapply -->
  <line x1="750" y1="440" x2="750" y2="468" class="arrow"/>
  <rect x="690" y="468" width="120" height="34" class="box end-bad"/>
  <text x="750" y="485" class="node">🔄 Reapply or</text>
  <text x="750" y="497" class="node-sub">1–3 year bar on 2nd fail</text>

</svg>

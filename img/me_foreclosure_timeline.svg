<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 500 420" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <title>Foreclosure Escalation Timeline</title>
  <desc>Five-stage escalation from Late Fee to Eviction with SP penalties and credit damage at each stage</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <text x="250" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">Foreclosure Escalation Timeline</text>
  <text x="250" y="40" text-anchor="middle" font-size="10" fill="#7f8c8d">A time bomb — once it starts, the clock is ticking</text>

  <!-- Timeline line -->
  <line x1="100" y1="55" x2="100" y2="385" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>

  <!-- Stage 1: Late Fee -->
  <circle cx="100" cy="80" r="12" fill="#f39c12" filter="url(#shadow)"/>
  <text x="100" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">1</text>
  <rect x="125" y="65" width="340" height="38" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="135" y="82" font-size="12" font-weight="700" fill="#e67e22">🟡 Late Fee — Missed Payment #1</text>
  <text x="135" y="96" font-size="10" fill="#7f8c8d">+1.5% late fee · Credit −25 · <tspan font-weight="700" fill="#e74c3c">+2 SP</tspan></text>

  <!-- Stage 2: Delinquent -->
  <circle cx="100" cy="140" r="12" fill="#e67e22" filter="url(#shadow)"/>
  <text x="100" y="145" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">2</text>
  <rect x="125" y="125" width="340" height="38" rx="6" fill="#fdf2e9" stroke="#e67e22" stroke-width="1"/>
  <text x="135" y="142" font-size="12" font-weight="700" fill="#d35400">🟠 Seriously Delinquent — Payment #2</text>
  <text x="135" y="156" font-size="10" fill="#7f8c8d">Second late fee · Credit −30 to −50 · <tspan font-weight="700" fill="#e74c3c">+4 SP</tspan></text>

  <!-- Stage 3: Pre-Foreclosure -->
  <circle cx="100" cy="200" r="12" fill="#d35400" filter="url(#shadow)"/>
  <text x="100" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">3</text>
  <rect x="125" y="185" width="340" height="38" rx="6" fill="#fdebd0" stroke="#d35400" stroke-width="1"/>
  <text x="135" y="202" font-size="12" font-weight="700" fill="#c0392b">🔴 Pre-Foreclosure Notice — Payment #3</text>
  <text x="135" y="216" font-size="10" fill="#7f8c8d">30–90 days to cure · Sell/refinance/negotiate · <tspan font-weight="700" fill="#e74c3c">+6 SP</tspan></text>

  <!-- Stage 4: Auction -->
  <circle cx="100" cy="260" r="12" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="100" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">4</text>
  <rect x="125" y="245" width="340" height="38" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="135" y="262" font-size="12" font-weight="700" fill="#e74c3c">🔴 Foreclosure Auction — Payments #4–5</text>
  <text x="135" y="276" font-size="10" fill="#7f8c8d">Lose equity · Credit −100 to −160 · Must move · <tspan font-weight="700" fill="#c0392b">+10 SP</tspan></text>

  <!-- Stage 5: Evicted -->
  <circle cx="100" cy="320" r="12" fill="#c0392b" filter="url(#shadow)"/>
  <text x="100" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">5</text>
  <rect x="125" y="305" width="340" height="38" rx="6" fill="#e8daef" stroke="#c0392b" stroke-width="1.5"/>
  <text x="135" y="322" font-size="12" font-weight="700" fill="#c0392b">🔴 Evicted — After Auction</text>
  <text x="135" y="336" font-size="10" fill="#7f8c8d">On the street · Credit ruined 7 years · <tspan font-weight="700" fill="#c0392b">+10 SP + trauma</tspan></text>

  <!-- Bottom warning -->
  <rect x="125" y="365" width="340" height="30" rx="6" fill="#2c3e50"/>
  <text x="295" y="384" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Campaign-altering event · Treat with narrative weight</text>
  <text x="295" y="410" text-anchor="middle" font-size="8" fill="#7f8c8d">* Trauma: permanent psychological condition — see Mental Health rules</text>
</svg>

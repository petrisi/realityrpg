<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 800 380" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">📈 Growth Curves: Fantasy XP vs. Reality Practice</text>

  <!-- Chart area -->
  <rect x="80" y="55" width="640" height="260" rx="8" fill="#faf9f6" stroke="#dcdcdc" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="80" y1="110" x2="720" y2="110" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="80" y1="165" x2="720" y2="165" stroke="#e8e8e8" stroke-width="0.5"/>
  <line x1="80" y1="220" x2="720" y2="220" stroke="#e8e8e8" stroke-width="0.5"/>

  <!-- Axes -->
  <line x1="120" y1="315" x2="700" y2="315" stroke="#2c3e50" stroke-width="2"/>
  <line x1="120" y1="65" x2="120" y2="315" stroke="#2c3e50" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="410" y="355" text-anchor="middle" font-size="12" fill="#7f8c8d">Time (sessions / months)</text>
  <text x="40" y="190" text-anchor="middle" font-size="12" fill="#7f8c8d" transform="rotate(-90,40,190)">Skill Level</text>

  <!-- Y-axis labels -->
  <text x="110" y="318" text-anchor="end" font-size="10" fill="#7f8c8d">Novice</text>
  <text x="110" y="223" text-anchor="end" font-size="10" fill="#7f8c8d">Skilled</text>
  <text x="110" y="113" text-anchor="end" font-size="10" fill="#7f8c8d">Master</text>

  <!-- FANTASY XP curve (stepped, linear thresholds) -->
  <polyline points="120,310 200,310 200,270 280,270 280,230 360,230 360,190 440,190 440,150 520,150 520,110 600,110 600,75 680,75"
    fill="none" stroke="#8e44ad" stroke-width="3" stroke-linejoin="round"/>

  <!-- FANTASY level markers -->
  <text x="200" y="305" text-anchor="middle" font-size="10" fill="#8e44ad" font-weight="700">Lv2</text>
  <text x="280" y="265" text-anchor="middle" font-size="10" fill="#8e44ad" font-weight="700">Lv3</text>
  <text x="360" y="225" text-anchor="middle" font-size="10" fill="#8e44ad" font-weight="700">Lv4</text>
  <text x="440" y="185" text-anchor="middle" font-size="10" fill="#8e44ad" font-weight="700">Lv5</text>
  <text x="520" y="145" text-anchor="middle" font-size="10" fill="#8e44ad" font-weight="700">Lv6</text>
  <text x="600" y="105" text-anchor="middle" font-size="10" fill="#8e44ad" font-weight="700">Lv7</text>

  <!-- REALITY Practice curve (smooth, nonlinear, with plateau and setback) -->
  <path d="M120,310 C180,305 220,290 260,280 C300,270 320,260 340,255 C360,252 380,253 400,258 C420,263 440,260 460,245 C490,225 520,200 540,185 C560,170 580,155 600,140 C620,125 650,110 680,95"
    fill="none" stroke="#27ae60" stroke-width="3"/>

  <!-- Setback annotation -->
  <rect x="345" y="240" width="75" height="22" rx="4" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="382" y="255" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="600">plateau!</text>

  <!-- Legend -->
  <rect x="530" y="65" width="175" height="75" rx="6" fill="#fff" stroke="#dcdcdc" stroke-width="1" filter="url(#shadow)"/>
  <line x1="545" y1="82" x2="575" y2="82" stroke="#8e44ad" stroke-width="3"/>
  <text x="582" y="86" font-size="11" fill="#2c3e50">Fantasy XP (stepped)</text>
  <line x1="545" y1="102" x2="575" y2="102" stroke="#27ae60" stroke-width="3"/>
  <text x="582" y="106" font-size="11" fill="#2c3e50">Reality Practice (smooth)</text>
  <text x="582" y="124" font-size="9" fill="#7f8c8d">with plateaus &amp; setbacks</text>

  <!-- Bottom notes -->
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#7f8c8d" font-style="italic">Fantasy: instant jumps at thresholds. Reality: slow, nonlinear, with breakthroughs and relapses.</text>
</svg>
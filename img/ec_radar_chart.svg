<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="640" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">📊 Character Attribute Comparison</text>
  <text x="450" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">All 8 example characters on the 6-axis radar</text>

  <!-- ===== LEFT RADAR: Characters 1-4 ===== -->
  <g transform="translate(220, 290)">
    <!-- Grid hexagons: max val = 18, max radius = 160px, so each unit = 8.89px -->
    <g fill="none" stroke="#e8ecef" stroke-width="0.8">
      <polygon points="0,-160 138.56,-80 138.56,80 0,160 -138.56,80 -138.56,-80" stroke="#ccd1d6" stroke-width="1"/>
      <polygon points="0,-133.3 115.85,-66.7 115.85,66.7 0,133.3 -115.85,66.7 -115.85,-66.7"/>
      <polygon points="0,-106.7 93.07,-53.3 93.07,53.3 0,106.7 -93.07,53.3 -93.07,-53.3"/>
      <polygon points="0,-80 69.28,-40 69.28,40 0,80 -69.28,40 -69.28,-40"/>
      <polygon points="0,-53.3 46.19,-26.7 46.19,26.7 0,53.3 -46.19,26.7 -46.19,-26.7"/>
    </g>

    <!-- Scale labels -->
    <g font-size="8" fill="#7f8c8d">
      <text x="4" y="-158">18</text>
      <text x="4" y="-131">15</text>
      <text x="4" y="-104">12</text>
      <text x="4" y="-78">9</text>
      <text x="4" y="-51">6</text>
    </g>

    <!-- Axis lines -->
    <g stroke="#ccd1d6" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="-160"/>
      <line x1="0" y1="0" x2="138.56" y2="-80"/>
      <line x1="0" y1="0" x2="138.56" y2="80"/>
      <line x1="0" y1="0" x2="0" y2="160"/>
      <line x1="0" y1="0" x2="-138.56" y2="80"/>
      <line x1="0" y1="0" x2="-138.56" y2="-80"/>
    </g>

    <!-- Axis labels -->
    <g font-size="11" font-weight="600" fill="#2c3e50" text-anchor="middle">
      <text x="0" y="-172">VIG</text>
      <text x="152" y="-84">INT</text>
      <text x="152" y="92">EXP</text>
      <text x="0" y="178">DXT</text>
      <text x="-152" y="92">RES</text>
      <text x="-152" y="-84">PRC</text>
    </g>

    <!-- Scale: value/18 * 160 = px -->
    <!-- Mei: VIG 8, INT 14, EXP 7, DXT 9, RES 6, PRC 8 -->
    <!-- px: 0,-71.1  126.2,-71.1  62.2,35.6  0,80  -53.3,26.7  -62.2,-35.6 -->
    <polygon points="0,-71.1 126.2,-71.1 62.2,35.6 0,80 -53.3,26.7 -62.2,-35.6"
      fill="#2980b9" fill-opacity="0.15" stroke="#2980b9" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Marcus: VIG 13, INT 9, EXP 11, DXT 12, RES 10, PRC 7 -->
    <!-- px: 0,-124.4  80,-44.4  97.8,53.3  0,106.7  -71.1,35.6  -62.2,-35.6 -->
    <polygon points="0,-124.4 80,-44.4 97.8,53.3 0,106.7 -71.1,35.6 -62.2,-35.6"
      fill="#e67e22" fill-opacity="0.15" stroke="#e67e22" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Carlos: VIG 10, INT 11, EXP 12, DXT 7, RES 9, PRC 9 -->
    <!-- px: 0,-88.9  106.7,-57.8  106.7,53.3  0,62.2  -71.1,35.6  -62.2,-35.6 -->
    <polygon points="0,-88.9 106.7,-57.8 106.7,53.3 0,62.2 -71.1,35.6 -62.2,-35.6"
      fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Elaine: VIG 6, INT 15, EXP 14, DXT 5, RES 13, PRC 10 -->
    <!-- px: 0,-53.3  133.3,-75.6  126.2,71.1  0,44.4  -124.4,57.8  -88.9,-53.3 -->
    <polygon points="0,-53.3 133.3,-75.6 126.2,71.1 0,44.4 -124.4,57.8 -88.9,-53.3"
      fill="#f39c12" fill-opacity="0.15" stroke="#f39c12" stroke-width="1.8" stroke-linejoin="round"/>
  </g>

  <!-- ===== RIGHT RADAR: Characters 5-8 ===== -->
  <g transform="translate(680, 290)">
    <!-- Grid hexagons -->
    <g fill="none" stroke="#e8ecef" stroke-width="0.8">
      <polygon points="0,-160 138.56,-80 138.56,80 0,160 -138.56,80 -138.56,-80" stroke="#ccd1d6" stroke-width="1"/>
      <polygon points="0,-133.3 115.85,-66.7 115.85,66.7 0,133.3 -115.85,66.7 -115.85,-66.7"/>
      <polygon points="0,-106.7 93.07,-53.3 93.07,53.3 0,106.7 -93.07,53.3 -93.07,-53.3"/>
      <polygon points="0,-80 69.28,-40 69.28,40 0,80 -69.28,40 -69.28,-40"/>
      <polygon points="0,-53.3 46.19,-26.7 46.19,26.7 0,53.3 -46.19,26.7 -46.19,-26.7"/>
    </g>

    <!-- Scale labels -->
    <g font-size="8" fill="#7f8c8d">
      <text x="4" y="-158">18</text>
      <text x="4" y="-131">15</text>
      <text x="4" y="-104">12</text>
      <text x="4" y="-78">9</text>
      <text x="4" y="-51">6</text>
    </g>

    <!-- Axis lines -->
    <g stroke="#ccd1d6" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="-160"/>
      <line x1="0" y1="0" x2="138.56" y2="-80"/>
      <line x1="0" y1="0" x2="138.56" y2="80"/>
      <line x1="0" y1="0" x2="0" y2="160"/>
      <line x1="0" y1="0" x2="-138.56" y2="80"/>
      <line x1="0" y1="0" x2="-138.56" y2="-80"/>
    </g>

    <!-- Axis labels -->
    <g font-size="11" font-weight="600" fill="#2c3e50" text-anchor="middle">
      <text x="0" y="-172">VIG</text>
      <text x="152" y="-84">INT</text>
      <text x="152" y="92">EXP</text>
      <text x="0" y="178">DXT</text>
      <text x="-152" y="92">RES</text>
      <text x="-152" y="-84">PRC</text>
    </g>

    <!-- Raj: VIG 8, INT 17, EXP 10, DXT 8, RES 12, PRC 9 -->
    <!-- px: 0,-71.1  151.1,-84.4  88.9,53.3  0,71.1  -106.7,57.8  -71.1,-40 -->
    <polygon points="0,-71.1 151.1,-84.4 88.9,53.3 0,71.1 -106.7,57.8 -71.1,-40"
      fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Tallulah: VIG 11, INT 10, EXP 14, DXT 9, RES 14, PRC 11 -->
    <!-- px: 0,-97.8  88.9,-53.3  126.2,71.1  0,80  -124.4,66.7  -97.8,-57.8 -->
    <polygon points="0,-97.8 88.9,-53.3 126.2,71.1 0,80 -124.4,66.7 -97.8,-57.8"
      fill="#8e44ad" fill-opacity="0.15" stroke="#8e44ad" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Youssef: VIG 9, INT 15, EXP 13, DXT 7, RES 11, PRC 10 -->
    <!-- px: 0,-80  133.3,-75.6  115.6,62.2  0,62.2  -97.8,53.3  -88.9,-53.3 -->
    <polygon points="0,-80 133.3,-75.6 115.6,62.2 0,62.2 -97.8,53.3 -88.9,-53.3"
      fill="#1abc9c" fill-opacity="0.15" stroke="#1abc9c" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Derek: VIG 14, INT 7, EXP 8, DXT 10, RES 10, PRC 6 -->
    <!-- px: 0,-124.4  62.2,-35.6  71.1,40  0,88.9  -88.9,53.3  -53.3,-26.7 -->
    <polygon points="0,-124.4 62.2,-35.6 71.1,40 0,88.9 -88.9,53.3 -53.3,-26.7"
      fill="#34495e" fill-opacity="0.15" stroke="#34495e" stroke-width="1.8" stroke-linejoin="round"/>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(50, 510)">
    <rect x="0" y="0" width="800" height="110" rx="8" fill="white" stroke="#e8ecef" stroke-width="1" filter="url(#shadow)"/>

    <!-- Left group label -->
    <text x="20" y="22" font-size="11" font-weight="700" fill="#2c3e50">Characters 1–4:</text>

    <rect x="130" y="10" width="12" height="12" rx="2" fill="#2980b9"/><text x="148" y="21" font-size="10" fill="#2c3e50">Mei (23)</text>
    <rect x="220" y="10" width="12" height="12" rx="2" fill="#e67e22"/><text x="238" y="21" font-size="10" fill="#2c3e50">Marcus (42)</text>
    <rect x="330" y="10" width="12" height="12" rx="2" fill="#27ae60"/><text x="348" y="21" font-size="10" fill="#2c3e50">Carlos (21)</text>
    <rect x="440" y="10" width="12" height="12" rx="2" fill="#f39c12"/><text x="458" y="21" font-size="10" fill="#2c3e50">Elaine (72)</text>

    <!-- Right group label -->
    <text x="20" y="50" font-size="11" font-weight="700" fill="#2c3e50">Characters 5–8:</text>

    <rect x="130" y="38" width="12" height="12" rx="2" fill="#e74c3c"/><text x="148" y="49" font-size="10" fill="#2c3e50">Raj (35)</text>
    <rect x="220" y="38" width="12" height="12" rx="2" fill="#8e44ad"/><text x="238" y="49" font-size="10" fill="#2c3e50">Tallulah (38)</text>
    <rect x="330" y="38" width="12" height="12" rx="2" fill="#1abc9c"/><text x="348" y="49" font-size="10" fill="#2c3e50">Youssef (24)</text>
    <rect x="440" y="38" width="12" height="12" rx="2" fill="#34495e"/><text x="458" y="49" font-size="10" fill="#2c3e50">Derek (31)</text>

    <!-- Insight row -->
    <text x="20" y="85" font-size="10" fill="#7f8c8d" font-style="italic">🔍 Notice: Raj &amp; Elaine spike INT (scholars), Marcus &amp; Derek spike VIG (physical), Tallulah &amp; Elaine lead in RES (resilient)</text>
    <text x="20" y="100" font-size="10" fill="#7f8c8d" font-style="italic">Each character has a distinct shape — no two profiles overlap perfectly. That's the point of diversity.</text>
  </g>
</svg>
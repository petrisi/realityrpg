<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="1" y="1" width="518" height="518" rx="10" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <!-- Title -->
  <text x="260" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#2c3e50">✊ Campaign 4 — NPC Relationship Web</text>

  <!-- Decorative ring -->
  <circle cx="260" cy="260" r="170" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- Connection lines -->
  <line x1="260" y1="225" x2="260" y2="80" stroke="#5d6d7e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="285" y1="240" x2="380" y2="150" stroke="#5d6d7e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="295" y1="260" x2="420" y2="260" stroke="#5d6d7e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="285" y1="280" x2="380" y2="390" stroke="#5d6d7e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="260" y1="295" x2="260" y2="410" stroke="#5d6d7e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="235" y1="280" x2="100" y2="390" stroke="#5d6d7e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="225" y1="260" x2="120" y2="260" stroke="#5d6d7e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="235" y1="240" x2="100" y2="150" stroke="#5d6d7e" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Relationship labels -->
  <text x="275" y="160" font-size="8" fill="#5d6d7e">Ally</text>
  <text x="345" y="200" font-size="8" fill="#5d6d7e">Antagonist</text>
  <text x="365" y="250" font-size="8" fill="#5d6d7e">Community</text>
  <text x="345" y="335" font-size="8" fill="#5d6d7e">Media</text>
  <text x="275" y="360" font-size="8" fill="#5d6d7e">Balance</text>
  <text x="155" y="335" font-size="8" fill="#5d6d7e">Wildcard</text>
  <text x="160" y="250" font-size="8" fill="#5d6d7e">Evidence</text>
  <text x="160" y="200" font-size="8" fill="#5d6d7e">Forces</text>

  <!-- Center PC -->
  <circle cx="260" cy="260" r="35" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="260" y="265" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">PC</text>

  <!-- 1. Tanya (activist) — top -->
  <rect x="220" y="80" width="80" height="40" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="98" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Tanya</text>
  <text x="260" y="111" text-anchor="middle" font-size="8" fill="#5d6d7e">activist</text>

  <!-- 2. Hayes (antagonist) — top-right -->
  <rect x="380" y="130" width="80" height="40" rx="6" fill="#fdf2f2" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="420" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Hayes</text>
  <text x="420" y="161" text-anchor="middle" font-size="8" fill="#5d6d7e">antagonist</text>

  <!-- 3. Amara (community) — right -->
  <rect x="420" y="240" width="80" height="40" rx="6" fill="#fff" stroke="#16a085" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="460" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Amara</text>
  <text x="460" y="271" text-anchor="middle" font-size="8" fill="#5d6d7e">community</text>

  <!-- 4. Marco (journalist) — bottom-right -->
  <rect x="380" y="370" width="80" height="40" rx="6" fill="#fff" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="420" y="388" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Marco</text>
  <text x="420" y="401" text-anchor="middle" font-size="8" fill="#5d6d7e">journalist</text>

  <!-- 5. Partner (anchor) — bottom -->
  <rect x="220" y="410" width="80" height="40" rx="6" fill="#fff" stroke="#e91e63" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="260" y="428" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Partner</text>
  <text x="260" y="441" text-anchor="middle" font-size="8" fill="#5d6d7e">anchor</text>

  <!-- 6. Cruz (law enforce) — bottom-left -->
  <rect x="60" y="370" width="80" height="40" rx="6" fill="#fff" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="388" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Cruz</text>
  <text x="100" y="401" text-anchor="middle" font-size="8" fill="#5d6d7e">law enforce</text>

  <!-- 7. Dr. Whitfield (expert) — left -->
  <rect x="40" y="240" width="80" height="40" rx="6" fill="#fff" stroke="#95a5a6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="80" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Dr. Whitfield</text>
  <text x="80" y="271" text-anchor="middle" font-size="8" fill="#5d6d7e">expert</text>

  <!-- 8. Opposition (collective) — top-left -->
  <rect x="60" y="130" width="80" height="40" rx="6" fill="#f5b7b1" stroke="#c0392b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Opposition</text>
  <text x="100" y="161" text-anchor="middle" font-size="8" fill="#5d6d7e">collective</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" width="520" height="480">
  <style>
    .title { font-size: 15px; font-weight: 700; fill: #2c3e50; text-anchor: middle; font-family: system-ui,-apple-system,sans-serif; }
    .subtitle { font-size: 10px; fill: #5d6d7e; text-anchor: middle; font-family: system-ui,-apple-system,sans-serif; }
    .attr-label { font-size: 12px; font-weight: 700; text-anchor: middle; font-family: system-ui,-apple-system,sans-serif; }
    .edge-label { font-size: 8.5px; text-anchor: middle; font-family: system-ui,-apple-system,sans-serif; }
  </style>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="480" fill="#ffffff" rx="6"/>

  <!-- Title -->
  <text x="260" y="24" class="title">🔗 Attribute–Event Cross Reference</text>
  <text x="260" y="40" class="subtitle">Which event tables test which attributes? Quick lookup for the GM.</text>

  <!-- ===== SIX ATTRIBUTE NODES (hexagon layout) ===== -->
  <!-- Center at 260,240. Radius ~130px -->
  <!-- VIG top: 260,110 | INT top-right: 373,175 | EXP bot-right: 373,305 -->
  <!-- DXT bot: 260,370 | RES top-left: 147,305 | PRC top-left: 147,175 -->

  <!-- Connecting lines between attributes and event categories -->
  <!-- Draw edges first (behind nodes) -->

  <!-- VIG edges -->
  <line x1="260" y1="110" x2="80" y2="200" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="260" y1="110" x2="440" y2="200" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- INT edges -->
  <line x1="373" y1="175" x2="440" y2="200" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="373" y1="175" x2="80" y2="200" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- EXP edges -->
  <line x1="373" y1="305" x2="440" y2="380" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="373" y1="305" x2="80" y2="380" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- DXT edges -->
  <line x1="260" y1="370" x2="80" y2="200" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="260" y1="370" x2="440" y2="380" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- RES edges -->
  <line x1="147" y1="305" x2="80" y2="380" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="147" y1="305" x2="440" y2="200" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- PRC edges -->
  <line x1="147" y1="175" x2="440" y2="380" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="147" y1="175" x2="80" y2="380" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- ===== ATTRIBUTE NODES ===== -->

  <!-- VIG (top) -->
  <circle cx="260" cy="110" r="32" fill="#d4efdf" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="106" class="attr-label" fill="#1e8449">VIG</text>
  <text x="260" y="120" text-anchor="middle" font-size="10" fill="#1e8449" font-family="system-ui,-apple-system,sans-serif">Vigor</text>

  <!-- INT (top-right) -->
  <circle cx="373" cy="175" r="32" fill="#eaf2f8" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="373" y="171" class="attr-label" fill="#2980b9">INT</text>
  <text x="373" y="185" text-anchor="middle" font-size="10" fill="#2980b9" font-family="system-ui,-apple-system,sans-serif">Intelligence</text>

  <!-- EXP (bottom-right) -->
  <circle cx="373" cy="305" r="32" fill="#fdebd0" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="373" y="301" class="attr-label" fill="#e67e22">EXP</text>
  <text x="373" y="315" text-anchor="middle" font-size="10" fill="#e67e22" font-family="system-ui,-apple-system,sans-serif">Experience</text>

  <!-- DXT (bottom) -->
  <circle cx="260" cy="370" r="32" fill="#fadbd8" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="366" class="attr-label" fill="#922b21">DXT</text>
  <text x="260" y="380" text-anchor="middle" font-size="10" fill="#922b21" font-family="system-ui,-apple-system,sans-serif">Dexterity</text>

  <!-- RES (bottom-left) -->
  <circle cx="147" cy="305" r="32" fill="#fef9e7" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="147" y="301" class="attr-label" fill="#7d6608">RES</text>
  <text x="147" y="315" text-anchor="middle" font-size="10" fill="#7d6608" font-family="system-ui,-apple-system,sans-serif">Resilience</text>

  <!-- PRC (top-left) -->
  <circle cx="147" cy="175" r="32" fill="#f5eef8" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
  <text x="147" y="171" class="attr-label" fill="#8e44ad">PRC</text>
  <text x="147" y="185" text-anchor="middle" font-size="10" fill="#8e44ad" font-family="system-ui,-apple-system,sans-serif">Presence</text>

  <!-- ===== EVENT CATEGORY BOXES ===== -->

  <!-- Daily Life (left) -->
  <rect x="15" y="185" width="130" height="30" rx="6" fill="#f8f8f8" stroke="#d5d8dc" stroke-width="1"/>
  <text x="80" y="204" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50" font-family="system-ui,-apple-system,sans-serif">🌅 Daily Life</text>

  <!-- Work (right) -->
  <rect x="375" y="185" width="130" height="30" rx="6" fill="#f8f8f8" stroke="#d5d8dc" stroke-width="1"/>
  <text x="440" y="204" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50" font-family="system-ui,-apple-system,sans-serif">💼 Work</text>

  <!-- Social (right-mid) -->
  <rect x="375" y="365" width="130" height="30" rx="6" fill="#f8f8f8" stroke="#d5d8dc" stroke-width="1"/>
  <text x="440" y="384" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50" font-family="system-ui,-apple-system,sans-serif">🤝 Social</text>

  <!-- Health (left-mid) -->
  <rect x="15" y="365" width="130" height="30" rx="6" fill="#f8f8f8" stroke="#d5d8dc" stroke-width="1"/>
  <text x="80" y="384" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50" font-family="system-ui,-apple-system,sans-serif">🏥 Health</text>

  <!-- Financial (left-low) -->
  <rect x="15" y="420" width="130" height="30" rx="6" fill="#f8f8f8" stroke="#d5d8dc" stroke-width="1"/>
  <text x="80" y="439" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50" font-family="system-ui,-apple-system,sans-serif">💰 Financial</text>

  <!-- Crisis (right-low) -->
  <rect x="375" y="420" width="130" height="30" rx="6" fill="#f8f8f8" stroke="#d5d8dc" stroke-width="1"/>
  <text x="440" y="439" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50" font-family="system-ui,-apple-system,sans-serif">🔥 Crisis</text>

  <!-- Edge labels showing primary attribute tested -->
  <text x="170" y="155" class="edge-label" fill="#1e8449">VIG, DXT</text>
  <text x="350" y="155" class="edge-label" fill="#2980b9">INT, EXP</text>
  <text x="350" y="335" class="edge-label" fill="#8e44ad">PRC</text>
  <text x="170" y="335" class="edge-label" fill="#7d6608">RES</text>
  <text x="170" y="405" class="edge-label" fill="#1e8449">VIG, RES</text>
  <text x="350" y="405" class="edge-label" fill="#2980b9">INT, PRC</text>

  <!-- Center label -->
  <text x="260" y="244" text-anchor="middle" font-size="11" fill="#5d6d7e" font-family="system-ui,-apple-system,sans-serif">Every event</text>
  <text x="260" y="256" text-anchor="middle" font-size="11" fill="#5d6d7e" font-family="system-ui,-apple-system,sans-serif">tests 1–3 attrs</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 570" width="500" height="570">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000030"/>
    </filter>
    <filter id="innerShadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000020"/>
    </filter>
    <linearGradient id="centerBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="570" rx="12" fill="#fefefe" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#2c3e50">The Menstrual Cycle</text>

  <!--
    Circle center: (250, 280), radius: 170
    Angles measured clockwise from 12-o'clock (top).
    Wedge arc endpoints: x = 250 + 170·sin(θ), y = 280 − 170·cos(θ)
      0°:     (250, 110)
      64.3°:  (402.0, 255.8)
      171.4°: (276.5, 450.0)
      205.7°: (172.8, 434.4)
  -->

  <!-- Menstruation wedge  0°–64.3°  (top-right quadrant) -->
  <path d="M250,280 L250,110 A170,170 0 0,1 402.0,255.8 Z"
        fill="#c0392b" opacity="0.88" stroke="#fff" stroke-width="2" filter="url(#innerShadow)"/>

  <!-- Follicular wedge  64.3°–171.4°  (bottom-right quadrant) -->
  <path d="M250,280 L402.0,255.8 A170,170 0 0,1 276.5,450.0 Z"
        fill="#27ae60" opacity="0.88" stroke="#fff" stroke-width="2" filter="url(#innerShadow)"/>

  <!-- Ovulation wedge  171.4°–205.7°  (bottom, narrow) -->
  <path d="M250,280 L276.5,450.0 A170,170 0 0,1 172.8,434.4 Z"
        fill="#f1c40f" opacity="0.90" stroke="#fff" stroke-width="2" filter="url(#innerShadow)"/>

  <!-- Luteal wedge  205.7°–360°  (left + top, large) -->
  <path d="M250,280 L172.8,434.4 A170,170 0 0,1 250,110 Z"
        fill="#e67e22" opacity="0.88" stroke="#fff" stroke-width="2" filter="url(#innerShadow)"/>

  <!--
    LABELS — placed along radial lines at r ≈ 125 from center.
    Position:  x = 250 + 125·sin(θ),  y = 280 − 125·cos(θ)
    Each group is rotated so text reads radially outward.
  -->

  <!-- Menstruation label  θ=32° (top-right) -->
  <g transform="translate(321.4, 168.7)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">🌙 Menstruation</text>
    <text x="0" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" fill="#000">Days 1–5</text>
    <text x="0" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">−1 VIG, +1 SP</text>
    <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">DXT −1 heavy days</text>
    <text x="0" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">Requires products</text>
  </g>

  <!-- Follicular label  θ=117.8° (bottom-right) -->
  <g transform="translate(368.9, 375.5)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">🌱 Follicular</text>
    <text x="0" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" fill="#000">Days 6–14</text>
    <text x="0" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">VIG normal, SP normal</text>
    <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">Energy rising</text>
    <text x="0" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">Fertility begins ~d10</text>
  </g>

  <!-- Ovulation label  θ=188.5° (bottom) -->
  <g transform="translate(235.2, 405.6)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">🌻 Ovulation</text>
    <text x="0" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" fill="#000">Days 14–16</text>
    <text x="0" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">+1 VIG, −1 SP</text>
    <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">Peak fertility</text>
    <text x="0" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">Mittelschmerz possible</text>
  </g>

  <!-- Luteal label  θ=282.9° (left side, = −77.1°) -->
  <g transform="translate(124.1, 168.7)">
    <text x="0" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#000">🍂 Luteal / PMS</text>
    <text x="0" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" fill="#000">Days 17–28</text>
    <text x="0" y="29" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">−1 VIG final 3d</text>
    <text x="0" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">+2 SP final 3d</text>
    <text x="0" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#000">EXP −2, food cravings</text>
  </g>

  <!--
    CURVED ARROWS — small clockwise arcs on r=203 at quadrant boundaries.
    Each spans ~5° with an arrowhead at the end.
  -->
  <!-- Arrow at 64.3°: Menstruation → Follicular -->
  <path d="M430.4,268.6 A203,203 0 0,1 436.6,284.9"
        fill="none" stroke="#7f8c8d" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- Arrow at 171.4°: Follicular → Ovulation -->
  <path d="M284.3,483.1 A203,203 0 0,1 267.8,488.9"
        fill="none" stroke="#7f8c8d" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- Arrow at 205.7°: Ovulation → Luteal -->
  <path d="M182.0,472.3 A203,203 0 0,1 166.8,462.1"
        fill="none" stroke="#7f8c8d" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- Arrow at 360°/0°: Luteal → Menstruation -->
  <path d="M250.0,77.0 A203,203 0 0,1 267.7,77.3"
        fill="none" stroke="#7f8c8d" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- CENTER CIRCLE -->
  <circle cx="250" cy="280" r="58" fill="url(#centerBg)" stroke="#ddd" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Calendar icon -->
  <g transform="translate(250,260)">
    <rect x="-14" y="-16" width="28" height="24" rx="3" fill="none" stroke="#8e8e8e" stroke-width="1.5"/>
    <line x1="-14" y1="-6" x2="14" y2="-6" stroke="#8e8e8e" stroke-width="1.2"/>
    <line x1="-6" y1="-16" x2="-6" y2="-22" stroke="#8e8e8e" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="-16" x2="6" y2="-22" stroke="#8e8e8e" stroke-width="1.5" stroke-linecap="round"/>
    <text x="0" y="7" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#8e8e8e">28</text>
    <circle cx="-7" cy="0" r="0.8" fill="#bbb"/>
    <circle cx="0" cy="0" r="0.8" fill="#bbb"/>
    <circle cx="7" cy="0" r="0.8" fill="#bbb"/>
  </g>

  <text x="250" y="298" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#555">28-day</text>
  <text x="250" y="312" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#555">cycle</text>

  <!-- DAY NUMBER MARKERS on outer edge (r ≈ 217) -->
  <g font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#aaa" text-anchor="middle">
    <!-- Day 1 at 0° (top) -->
    <text x="250" y="63">1</text>
    <!-- Day 5 at 64.3° -->
    <text x="444.3" y="289.4">5</text>
    <!-- Day 14 at 171.4° -->
    <text x="290.2" y="513.8">14</text>
    <!-- Day 16 at 205.7° -->
    <text x="193.9" y="503.3">16</text>
    <!-- Day 28 at 360° (top, offset right) -->
    <text x="260" y="63">28</text>
  </g>

</svg>
<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 720 560" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="hypersens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="neutral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#27ae60" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="hyposens" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2980b9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3498db" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="560" rx="12" fill="#faf9f6"/>

  <!-- Title -->
  <text x="360" y="35" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#2c3e50">Autism Sensory Processing</text>
  <text x="360" y="55" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#7f8c8d">Each sense can be hypersensitive, neutral, or hyposensitive — independently</text>

  <!-- === SENSE INPUTS (left side) === -->
  <text x="60" y="100" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#2c3e50">Sensory Input</text>

  <!-- Vision -->
  <rect x="10" y="115" width="100" height="40" rx="6" fill="#fff" stroke="#dcdcdc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="140" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14">👁️ Vision</text>

  <!-- Hearing -->
  <rect x="10" y="165" width="100" height="40" rx="6" fill="#fff" stroke="#dcdcdc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="190" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14">👂 Hearing</text>

  <!-- Touch -->
  <rect x="10" y="215" width="100" height="40" rx="6" fill="#fff" stroke="#dcdcdc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="240" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14">✋ Touch</text>

  <!-- Smell -->
  <rect x="10" y="265" width="100" height="40" rx="6" fill="#fff" stroke="#dcdcdc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="290" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14">👃 Smell</text>

  <!-- Taste -->
  <rect x="10" y="315" width="100" height="40" rx="6" fill="#fff" stroke="#dcdcdc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="340" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14">👅 Taste</text>

  <!-- Arrow lines from senses to filter -->
  <line x1="110" y1="135" x2="230" y2="135" stroke="#bdc3c7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="110" y1="185" x2="230" y2="185" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="110" y1="235" x2="230" y2="235" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="110" y1="285" x2="230" y2="285" stroke="#bdc3c7" stroke-width="1.5"/>
  <line x1="110" y1="335" x2="230" y2="335" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- === PROCESSING FILTER (center) === -->
  <rect x="230" y="110" width="140" height="270" rx="12" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="300" y="155" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Processing</text>
  <text x="300" y="175" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Filter</text>
  <text x="300" y="200" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#aab7b8">Each sense routed</text>
  <text x="300" y="215" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#aab7b8">to one of three</text>
  <text x="300" y="230" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#aab7b8">processing paths</text>

  <!-- === PATH 1: Hypersensitive (top output) === -->
  <line x1="370" y1="160" x2="500" y2="140" stroke="#e74c3c" stroke-width="3"/>
  <rect x="500" y="100" width="200" height="90" rx="8" fill="url(#hypersens)" filter="url(#shadow)"/>
  <text x="600" y="128" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">🔊 Hypersensitive</text>
  <text x="600" y="148" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#fadbd8">Input AMPLIFIED</text>
  <text x="600" y="165" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fadbd8">−5 to checks · +2 SP</text>
  <text x="600" y="180" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fadbd8">Overwhelming, painful</text>

  <!-- === PATH 2: Neutral (middle output) === -->
  <line x1="370" y1="245" x2="500" y2="245" stroke="#27ae60" stroke-width="3"/>
  <rect x="500" y="205" width="200" height="80" rx="8" fill="url(#neutral)" filter="url(#shadow)"/>
  <text x="600" y="233" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">✅ Neutral</text>
  <text x="600" y="253" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#d5f5e3">Normal processing</text>
  <text x="600" y="270" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#d5f5e3">No penalty applied</text>

  <!-- === PATH 3: Hyposensitive (bottom output) === -->
  <line x1="370" y1="340" x2="500" y2="360" stroke="#2980b9" stroke-width="3"/>
  <rect x="500" y="315" width="200" height="90" rx="8" fill="url(#hyposens)" filter="url(#shadow)"/>
  <text x="600" y="343" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">🔇 Hyposensitive</text>
  <text x="600" y="363" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#d4efff">Input DAMPENED</text>
  <text x="600" y="380" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#d4efff">Seeks more stimulation</text>
  <text x="600" y="395" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#d4efff">May not notice hazards</text>

  <!-- === SENSORY OVERLOAD OVERFLOW === -->
  <rect x="150" y="420" width="420" height="70" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="448" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#e67e22">⚠️ Sensory Overload</text>
  <text x="360" y="468" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#2c3e50">When multiple hypersensitive channels are active simultaneously</text>
  <text x="360" y="483" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#2c3e50">→ RES check TN 50 to manage · Accommodations reduce penalties</text>

  <!-- Legend -->
  <rect x="150" y="505" width="420" height="40" rx="6" fill="#fff" stroke="#dcdcdc" stroke-width="1"/>
  <line x1="170" y1="525" x2="210" y2="525" stroke="#e74c3c" stroke-width="3"/>
  <text x="218" y="529" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Hypersensitive (amplified)</text>
  <line x1="370" y1="525" x2="410" y2="525" stroke="#27ae60" stroke-width="3"/>
  <text x="418" y="529" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Neutral</text>
  <line x1="500" y1="525" x2="540" y2="525" stroke="#2980b9" stroke-width="3"/>
  <text x="548" y="529" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Hyposensitive (dampened)</text>
</svg>

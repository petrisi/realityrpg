<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340">
  <!-- Background -->
  <rect width="640" height="340" fill="#ffffff" rx="6"/>

  <!-- Title -->
  <text x="320" y="28" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#2c3e50">📈 Character Growth Over Campaign</text>

  <!-- Subtitle -->
  <text x="320" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#5d6d7e">+1 attribute per 3 sessions of meaningful development</text>

  <!-- Grid lines (horizontal at each Y tick) -->
  <!-- Y-axis left: Attribute Mod -3 to +5, 7 ticks, range 200px (y=80 to y=280), step = 200/7 ≈ 28.57px -->
  <!-- SP Max right: 5 to 50, 7 ticks, range 45, step = 45/7 ≈ 6.43 -->
  <line x1="80" y1="80" x2="600" y2="80" stroke="#dddddd" stroke-width="1"/>
  <line x1="80" y1="108.57" x2="600" y2="108.57" stroke="#dddddd" stroke-width="1"/>
  <line x1="80" y1="137.14" x2="600" y2="137.14" stroke="#dddddd" stroke-width="1"/>
  <line x1="80" y1="165.71" x2="600" y2="165.71" stroke="#dddddd" stroke-width="1"/>
  <line x1="80" y1="194.29" x2="600" y2="194.29" stroke="#dddddd" stroke-width="1"/>
  <line x1="80" y1="222.86" x2="600" y2="222.86" stroke="#dddddd" stroke-width="1"/>
  <line x1="80" y1="251.43" x2="600" y2="251.43" stroke="#dddddd" stroke-width="1"/>
  <line x1="80" y1="280" x2="600" y2="280" stroke="#dddddd" stroke-width="1"/>

  <!-- Axes -->
  <!-- X-axis -->
  <line x1="80" y1="280" x2="600" y2="280" stroke="#2c3e50" stroke-width="2"/>
  <!-- Y-axis left -->
  <line x1="80" y1="80" x2="80" y2="280" stroke="#2c3e50" stroke-width="2"/>
  <!-- Y-axis right -->
  <line x1="600" y1="80" x2="600" y2="280" stroke="#2c3e50" stroke-width="2"/>

  <!-- X tick labels: 0, 3, 6, 9, 12 mapped to x = 80, 200, 320, 440, 560 (step = 520/4 = 130px) -->
  <text x="80" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">0</text>
  <text x="200" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">3</text>
  <text x="320" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">6</text>
  <text x="440" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">9</text>
  <text x="560" y="296" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">12</text>

  <!-- Y tick labels left: -3, -2, -1, 0, +1, +2, +3 -->
  <text x="72" y="83" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">+3</text>
  <text x="72" y="111.57" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">+2</text>
  <text x="72" y="140.14" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">+1</text>
  <text x="72" y="168.71" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">0</text>
  <text x="72" y="197.29" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">−1</text>
  <text x="72" y="225.86" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">−2</text>
  <text x="72" y="254.43" text-anchor="end" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">−3</text>

  <!-- Y tick labels right: 5, 10, 15, 20, 25, 30, 35 (mapped: 5→top, 35→bottom, step 5 per tick) -->
  <text x="608" y="83" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">35</text>
  <text x="608" y="111.57" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">30</text>
  <text x="608" y="140.14" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">25</text>
  <text x="608" y="168.71" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">20</text>
  <text x="608" y="197.29" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">15</text>
  <text x="608" y="225.86" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">10</text>
  <text x="608" y="254.43" text-anchor="start" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">5</text>

  <!-- Curve 1: Attribute Growth (blue #2980b9) -->
  <!-- Steps: mod -3 at S0-S3, mod -2 at S3-S6, mod -1 at S6-S9, mod 0 at S9-S12, mod +1 at S12 -->
  <!-- y mapping: mod value m → y = 280 - (m - (-3)) * (200/8) = 280 - (m+3)*25 -->
  <!-- -3 → y=251.43, -2 → y=222.86, -1 → y=194.29, 0 → y=165.71, +1 → y=137.14 -->
  <polyline
    points="80,251.43 200,251.43 200,222.86 320,222.86 320,194.29 440,194.29 440,165.71 560,165.71 560,137.14"
    fill="none"
    stroke="#2980b9"
    stroke-width="3"
    stroke-linejoin="miter"
  />

  <!-- Curve 2: SP Max (green #27ae60, dashed) -->
  <!-- SP Max = 20 + mod*5: -3→5, -2→10, -1→15, 0→20, +1→25 -->
  <!-- SP mapping: sp value s → y = 280 - (s - 5) * (200/35) = 280 - (s-5)*5.714 -->
  <!-- 5→280, 10→252.86, 15→225.71, 20→198.57, 25→171.43 -->
  <polyline
    points="80,280 200,280 200,252.86 320,252.86 320,225.71 440,225.71 440,198.57 560,198.57 560,171.43"
    fill="none"
    stroke="#27ae60"
    stroke-width="3"
    stroke-dasharray="8,4"
    stroke-linejoin="miter"
  />

  <!-- Inflection point dots at S3, S6, S9, S12 -->
  <!-- S3 (x=200): mod -2 y=222.86, SP 10 y=252.86 -->
  <circle cx="200" cy="222.86" r="4" fill="#2980b9"/>
  <circle cx="200" cy="252.86" r="4" fill="#27ae60"/>

  <!-- S6 (x=320): mod -1 y=194.29, SP 15 y=225.71 -->
  <circle cx="320" cy="194.29" r="4" fill="#2980b9"/>
  <circle cx="320" cy="225.71" r="4" fill="#27ae60"/>

  <!-- S9 (x=440): mod 0 y=165.71, SP 20 y=198.57 -->
  <circle cx="440" cy="165.71" r="4" fill="#2980b9"/>
  <circle cx="440" cy="198.57" r="4" fill="#27ae60"/>

  <!-- S12 (x=560): mod +1 y=137.14, SP 25 y=171.43 -->
  <circle cx="560" cy="137.14" r="4" fill="#2980b9"/>
  <circle cx="560" cy="171.43" r="4" fill="#27ae60"/>

  <!-- Session labels at inflection points -->
  <text x="200" y="216" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#2980b9" font-weight="600">S3</text>
  <text x="320" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#2980b9" font-weight="600">S6</text>
  <text x="440" y="159" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#2980b9" font-weight="600">S9</text>
  <text x="560" y="131" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#2980b9" font-weight="600">S12</text>

  <!-- Growth milestone badges at S3/S6/S9/S12 -->
  <!-- Badge style: small rounded rect with "+1 Attribute" text -->
  <rect x="178" y="232" width="44" height="14" rx="3" fill="#2980b9" opacity="0.9"/>
  <text x="200" y="242" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#ffffff" font-weight="600">+1 Attr</text>

  <rect x="298" y="204" width="44" height="14" rx="3" fill="#2980b9" opacity="0.9"/>
  <text x="320" y="214" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#ffffff" font-weight="600">+1 Attr</text>

  <rect x="418" y="175" width="44" height="14" rx="3" fill="#2980b9" opacity="0.9"/>
  <text x="440" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#ffffff" font-weight="600">+1 Attr</text>

  <rect x="538" y="147" width="44" height="14" rx="3" fill="#2980b9" opacity="0.9"/>
  <text x="560" y="157" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#ffffff" font-weight="600">+1 Attr</text>

  <!-- Legend -->
  <!-- Blue line: Attribute Modifier -->
  <line x1="100" y1="312" x2="130" y2="312" stroke="#2980b9" stroke-width="3"/>
  <text x="138" y="315" font-family="system-ui, sans-serif" font-size="10" fill="#2c3e50">Attribute Modifier</text>

  <!-- Green dashed: SP Max -->
  <line x1="280" y1="312" x2="310" y2="312" stroke="#27ae60" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="318" y="315" font-family="system-ui, sans-serif" font-size="10" fill="#2c3e50">SP Max</text>

  <!-- Axis labels -->
  <text x="22" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e" transform="rotate(-90, 22, 180)">Attribute Modifier</text>
  <text x="628" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e" transform="rotate(90, 628, 180)">SP Max</text>
  <text x="340" y="308" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#5d6d7e">Sessions</text>
</svg>
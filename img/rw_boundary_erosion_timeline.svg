<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 720 310" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="310" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="360" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Boundary Erosion Over Time</text>
  <text x="360" y="44" text-anchor="middle" font-size="11" fill="#7f8c8d">Cumulative SP with boundary-setting (green) vs. without (red) — Sunday checks are decision points</text>

  <!-- Chart area -->
  <rect x="80" y="60" width="560" height="190" rx="4" fill="white" stroke="#dcdcdc" stroke-width="1"/>

  <!-- Y axis labels -->
  <g font-size="9" fill="#7f8c8d" text-anchor="end">
    <text x="75" y="82">Max SP</text>
    <text x="75" y="122">75%</text>
    <text x="75" y="162">50%</text>
    <text x="75" y="202">25%</text>
    <text x="75" y="242">0</text>
  </g>

  <!-- X axis labels (Weeks) -->
  <g font-size="9" fill="#7f8c8d" text-anchor="middle">
    <text x="110" y="265">Wk 1</text>
    <text x="190" y="265">Wk 2</text>
    <text x="270" y="265">Wk 3</text>
    <text x="350" y="265">Wk 4</text>
    <text x="430" y="265">Wk 5</text>
    <text x="510" y="265">Wk 6</text>
    <text x="590" y="265">Wk 7</text>
    <text x="630" y="265">Wk 8</text>
  </g>

  <!-- Grid lines -->
  <line x1="80" y1="80" x2="640" y2="80" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="80" y1="120" x2="640" y2="120" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="80" y1="160" x2="640" y2="160" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="80" y1="200" x2="640" y2="200" stroke="#e8e8e8" stroke-width="1"/>

  <!-- MAX SP DANGER LINE -->
  <line x1="80" y1="80" x2="640" y2="80" stroke="#e74c3c" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="645" y="84" font-size="9" fill="#e74c3c" font-weight="700">MAX SP →</text>

  <!-- GREEN LINE: With boundaries (stays flat around 50%) -->
  <polyline points="110,170 190,165 270,168 350,163 430,167 510,162 590,165 630,160"
    fill="none" stroke="#27ae60" stroke-width="3" stroke-linejoin="round"/>

  <!-- RED LINE: Without boundaries (rises steadily, crosses max at week 5) -->
  <polyline points="110,170 190,155 270,138 350,120 430,100 510,85 590,72 630,65"
    fill="none" stroke="#e74c3c" stroke-width="3" stroke-linejoin="round"/>

  <!-- Cross point marker -->
  <circle cx="510" cy="85" r="6" fill="#e74c3c" stroke="white" stroke-width="2"/>
  <rect x="520" y="65" width="110" height="28" rx="4" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="575" y="78" text-anchor="middle" font-size="8" font-weight="700" fill="#e74c3c">⚠️ CROSSES MAX</text>
  <text x="575" y="89" text-anchor="middle" font-size="7" fill="#e74c3c">Burnout entry risk</text>

  <!-- Sunday check markers -->
  <g fill="#f39c12">
    <text x="150" y="250" text-anchor="middle" font-size="8">🔔</text>
    <text x="230" y="250" text-anchor="middle" font-size="8">🔔</text>
    <text x="310" y="250" text-anchor="middle" font-size="8">🔔</text>
    <text x="390" y="250" text-anchor="middle" font-size="8">🔔</text>
    <text x="470" y="250" text-anchor="middle" font-size="8">🔔</text>
    <text x="550" y="250" text-anchor="middle" font-size="8">🔔</text>
    <text x="610" y="250" text-anchor="middle" font-size="8">🔔</text>
  </g>
  <text x="360" y="285" text-anchor="middle" font-size="9" fill="#7f8c8d">🔔 = Sunday evening recovery check (2d10 + RES vs TN 10)</text>

  <!-- Legend -->
  <g transform="translate(120, 295)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#27ae60" stroke-width="3"/>
    <text x="25" y="4" font-size="9" fill="#2c3e50">With boundaries</text>
    <line x1="130" y1="0" x2="150" y2="0" stroke="#e74c3c" stroke-width="3"/>
    <text x="155" y="4" font-size="9" fill="#2c3e50">Without boundaries</text>
    <line x1="290" y1="0" x2="310" y2="0" stroke="#e74c3c" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="315" y="4" font-size="9" fill="#2c3e50">Max SP threshold</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 520 540" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="260" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">💰 Maria's Tax Refund — How "Treasure" Evaporates</text>
  <text x="260" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">A $2,000 loot hoard lasts exactly 3 days</text>

  <!-- Starting amount -->
  <rect x="120" y="65" width="280" height="55" rx="8" fill="#27ae60" filter="url(#shadow)"/>
  <text x="260" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">💵 $2,000 Tax Refund</text>
  <text x="260" y="106" text-anchor="middle" font-size="10" fill="#eafaf4">The "dungeon loot" equivalent</text>

  <!-- Arrow down -->
  <line x1="260" y1="122" x2="260" y2="142" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Flow 1: Credit Card Debt -->
  <rect x="80" y="145" width="360" height="70" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="170" font-size="18">💳</text>
  <text x="130" y="168" font-size="13" font-weight="700" fill="#c0392b">Credit Card Debt</text>
  <text x="130" y="186" font-size="11" fill="#2c3e50">−$800 (min payment was $120, but she wants more)</text>
  <text x="440" y="180" text-anchor="end" font-size="14" font-weight="700" fill="#e74c3c">$1,200</text>
  <text x="440" y="194" text-anchor="end" font-size="9" fill="#7f8c8d">remaining</text>

  <line x1="260" y1="217" x2="260" y2="235" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Flow 2: Car Repairs -->
  <rect x="80" y="238" width="360" height="70" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="263" font-size="18">🔧</text>
  <text x="130" y="261" font-size="13" font-weight="700" fill="#e67e22">Car Repairs</text>
  <text x="130" y="279" font-size="11" fill="#2c3e50">−$400 (check engine light for months)</text>
  <text x="440" y="273" text-anchor="end" font-size="14" font-weight="700" fill="#e67e22">$800</text>
  <text x="440" y="287" text-anchor="end" font-size="9" fill="#7f8c8d">remaining</text>

  <line x1="260" y1="310" x2="260" y2="328" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Flow 3: School Supplies -->
  <rect x="80" y="331" width="360" height="70" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="356" font-size="18">📚</text>
  <text x="130" y="354" font-size="13" font-weight="700" fill="#27ae60">Daughter's School Supplies</text>
  <text x="130" y="372" font-size="11" fill="#2c3e50">−$300 (back-to-school shopping)</text>
  <text x="440" y="366" text-anchor="end" font-size="14" font-weight="700" fill="#27ae60">$500</text>
  <text x="440" y="380" text-anchor="end" font-size="9" fill="#7f8c8d">remaining</text>

  <line x1="260" y1="403" x2="260" y2="421" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Flow 4: Emergency Savings -->
  <rect x="80" y="424" width="360" height="70" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="449" font-size="18">🏦</text>
  <text x="130" y="447" font-size="13" font-weight="700" fill="#27ae60">Emergency Savings</text>
  <text x="130" y="465" font-size="11" fill="#2c3e50">−$200 (finally building a fund!)</text>
  <text x="440" y="459" text-anchor="end" font-size="14" font-weight="700" fill="#27ae60">$300</text>
  <text x="440" y="473" text-anchor="end" font-size="9" fill="#7f8c8d">remaining</text>

  <!-- Final: Discretionary -->
  <rect x="120" y="508" width="280" height="28" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="260" y="526" text-anchor="middle" font-size="11" font-weight="600" fill="#f39c12">🛍️ $300 discretionary — "treasure" that lasted 3 days</text>
</svg>
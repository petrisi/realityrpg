<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#f0efe9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">🔗 Campaign Character Web</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#7f8c8d">How these 8 characters connect in a shared campaign</text>

  <!-- ===== CONNECTION LINES (drawn before nodes) ===== -->
  <!-- Boston: Mei ↔ Raj -->
  <line x1="160" y1="170" x2="310" y2="120" stroke="#2980b9" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="235" y="140" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="600">Boston</text>

  <!-- Detroit: Marcus ↔ Tallulah (cousin mechanic) -->
  <line x1="130" y1="330" x2="310" y2="310" stroke="#27ae60" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="220" y="310" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="600">Cousin</text>

  <!-- DC: Carlos ↔ Youssef (classmates) -->
  <line x1="310" y1="480" x2="500" y2="500" stroke="#e67e22" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="405" y="485" text-anchor="middle" font-size="8" fill="#e67e22" font-weight="600">DC</text>

  <!-- Elaine ↔ Derek (library construction) -->
  <line x1="620" y1="400" x2="760" y2="340" stroke="#8e44ad" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.7"/>
  <text x="700" y="365" text-anchor="middle" font-size="8" fill="#8e44ad" font-weight="600">Library</text>

  <!-- Raj ↔ Tallulah (healthcare system) -->
  <line x1="330" y1="140" x2="310" y2="290" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="350" y="215" text-anchor="middle" font-size="7" fill="#e74c3c" font-weight="600">Healthcare</text>

  <!-- Carlos ↔ Derek (working class solidarity) -->
  <line x1="330" y1="500" x2="740" y2="360" stroke="#f1c40f" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="540" y="425" text-anchor="middle" font-size="7" fill="#f1c40f" font-weight="600">Working class</text>

  <!-- Mei ↔ Elaine (mentorship) -->
  <line x1="180" y1="190" x2="600" y2="420" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.35"/>
  <text x="395" y="295" text-anchor="middle" font-size="7" fill="#27ae60" font-weight="600">Mentorship?</text>

  <!-- Youssef ↔ Raj (policy/medicine overlap) -->
  <line x1="510" y1="480" x2="330" y2="140" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.35"/>
  <text x="440" y="300" text-anchor="middle" font-size="7" fill="#2980b9" font-weight="600">Policy</text>

  <!-- ===== CHARACTER NODES ===== -->
  <!-- Each node: circle + name + role tag -->

  <!-- Mei (top-left) -->
  <circle cx="160" cy="170" r="40" fill="#2980b9" filter="url(#shadow)"/>
  <text x="160" y="162" text-anchor="middle" font-size="22">👩‍💻</text>
  <text x="160" y="180" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Mei</text>
  <rect x="118" y="218" width="84" height="16" rx="4" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="160" y="230" text-anchor="middle" font-size="8" fill="#2980b9" font-weight="600">SF, tech intern</text>

  <!-- Marcus (mid-left) -->
  <circle cx="130" cy="330" r="40" fill="#e67e22" filter="url(#shadow)"/>
  <text x="130" y="322" text-anchor="middle" font-size="22">🔧</text>
  <text x="130" y="340" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Marcus</text>
  <rect x="88" y="378" width="84" height="16" rx="4" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="130" y="390" text-anchor="middle" font-size="8" fill="#e67e22" font-weight="600">Detroit, mechanic</text>

  <!-- Carlos (bottom-left) -->
  <circle cx="310" cy="480" r="40" fill="#27ae60" filter="url(#shadow)"/>
  <text x="310" y="472" text-anchor="middle" font-size="22">📚</text>
  <text x="310" y="490" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Carlos</text>
  <rect x="268" y="528" width="84" height="16" rx="4" fill="#d4efdf" stroke="#27ae60" stroke-width="1"/>
  <text x="310" y="540" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="600">Houston, student</text>

  <!-- Raj (top-center) -->
  <circle cx="310" cy="120" r="40" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="310" y="112" text-anchor="middle" font-size="22">🩺</text>
  <text x="310" y="130" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Raj</text>
  <rect x="268" y="158" width="84" height="16" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="310" y="170" text-anchor="middle" font-size="8" fill="#e74c3c" font-weight="600">Boston, resident</text>

  <!-- Tallulah (center) -->
  <circle cx="310" cy="310" r="40" fill="#8e44ad" filter="url(#shadow)"/>
  <text x="310" y="302" text-anchor="middle" font-size="22">🌿</text>
  <text x="310" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Tallulah</text>
  <rect x="258" y="358" width="104" height="16" rx="4" fill="#f5eef8" stroke="#8e44ad" stroke-width="1"/>
  <text x="310" y="370" text-anchor="middle" font-size="8" fill="#8e44ad" font-weight="600">Pine Ridge, liaison</text>

  <!-- Youssef (bottom-center) -->
  <circle cx="500" cy="500" r="40" fill="#1abc9c" filter="url(#shadow)"/>
  <text x="500" y="492" text-anchor="middle" font-size="22">🎓</text>
  <text x="500" y="510" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Youssef</text>
  <rect x="458" y="548" width="84" height="16" rx="4" fill="#d1f2eb" stroke="#1abc9c" stroke-width="1"/>
  <text x="500" y="560" text-anchor="middle" font-size="8" fill="#1abc9c" font-weight="600">DC, grad student</text>

  <!-- Elaine (bottom-right) -->
  <circle cx="620" cy="400" r="40" fill="#f39c12" filter="url(#shadow)"/>
  <text x="620" y="392" text-anchor="middle" font-size="22">📖</text>
  <text x="620" y="410" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Elaine</text>
  <rect x="578" y="448" width="84" height="16" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="620" y="460" text-anchor="middle" font-size="8" fill="#f39c12" font-weight="600">Portland, retired</text>

  <!-- Derek (right) -->
  <circle cx="760" cy="340" r="40" fill="#34495e" filter="url(#shadow)"/>
  <text x="760" y="332" text-anchor="middle" font-size="22">🏗️</text>
  <text x="760" y="350" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Derek</text>
  <rect x="718" y="388" width="84" height="16" rx="4" fill="#e8ecef" stroke="#34495e" stroke-width="1"/>
  <text x="760" y="400" text-anchor="middle" font-size="8" fill="#34495e" font-weight="600">Columbus, recovery</text>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="575" width="350" height="35" rx="6" fill="white" stroke="#dcdcdc" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="590" font-size="10" font-weight="700" fill="#2c3e50">Line style = connection strength</text>
  <line x1="30" y1="600" x2="60" y2="600" stroke="#2980b9" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="66" y="604" font-size="9" fill="#2c3e50">Strong (shared location/theme)</text>
  <line x1="220" y1="600" x2="246" y2="600" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="252" y="604" font-size="9" fill="#2c3e50">Weak (possible connection)</text>

  <!-- GM hint -->
  <rect x="530" y="575" width="350" height="35" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="705" y="590" text-anchor="middle" font-size="9" font-weight="600" fill="#2980b9">💡 GM: Link characters for instant drama</text>
  <text x="705" y="604" text-anchor="middle" font-size="8" fill="#2c3e50">Shared worlds create shared investment</text>
</svg>
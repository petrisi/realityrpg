<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="520" height="520" rx="10" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <!-- Title -->
  <text x="260" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#2c3e50">🎓 Campaign 1 — NPC Relationship Web</text>

  <!-- Decorative ring -->
  <circle cx="260" cy="260" r="170" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- Connection lines -->
  <!-- 1. Marcus (top) -->
  <line x1="260" y1="225" x2="260" y2="80" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 2. Dr. Kim (top-right) -->
  <line x1="285" y1="240" x2="380" y2="150" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 3. Jordan (right) -->
  <line x1="295" y1="260" x2="420" y2="260" stroke="#e91e63" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 4. Mom Elena (bottom-right) -->
  <line x1="285" y1="280" x2="380" y2="390" stroke="#e67e22" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 5. DeShawn (bottom) -->
  <line x1="260" y1="295" x2="260" y2="410" stroke="#f39c12" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 6. Dr. Patel (bottom-left) -->
  <line x1="235" y1="280" x2="100" y2="390" stroke="#16a085" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 7. Linda (left) -->
  <line x1="225" y1="260" x2="120" y2="260" stroke="#95a5a6" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- 8. Rachel (top-left) -->
  <line x1="235" y1="240" x2="100" y2="150" stroke="#8e44ad" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Edge labels -->
  <text x="275" y="160" font-size="8" fill="#5d6d7e">Annoyance→Friend</text>
  <text x="345" y="200" font-size="8" fill="#5d6d7e">Mentor</text>
  <text x="365" y="250" font-size="8" fill="#5d6d7e">Love Interest</text>
  <text x="345" y="335" font-size="8" fill="#5d6d7e">Tension</text>
  <text x="275" y="360" font-size="8" fill="#5d6d7e">Temptation</text>
  <text x="155" y="340" font-size="8" fill="#5d6d7e">Health Crisis</text>
  <text x="160" y="250" font-size="8" fill="#5d6d7e">Gatekeeper</text>
  <text x="160" y="200" font-size="8" fill="#5d6d7e">Healing</text>

  <!-- Center node -->
  <circle cx="260" cy="260" r="35" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="260" y="265" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">PC</text>

  <!-- NPC nodes -->
  <!-- 1. Marcus (top) -->
  <rect x="220" y="80" width="80" height="40" rx="6" fill="#fff" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Marcus</text>
  <text x="260" y="110" text-anchor="middle" font-size="8" fill="#5d6d7e">Roommate</text>

  <!-- 2. Dr. Kim (top-right) -->
  <rect x="380" y="130" width="80" height="40" rx="6" fill="#fff" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="146" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Dr. Kim</text>
  <text x="420" y="160" text-anchor="middle" font-size="8" fill="#5d6d7e">Supervisor</text>

  <!-- 3. Jordan (right) -->
  <rect x="420" y="240" width="80" height="40" rx="6" fill="#fff" stroke="#e91e63" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Jordan</text>
  <text x="460" y="270" text-anchor="middle" font-size="8" fill="#5d6d7e">Love Interest</text>

  <!-- 4. Mom Elena (bottom-right) -->
  <rect x="380" y="370" width="80" height="40" rx="6" fill="#fff" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="386" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Mom Elena</text>
  <text x="420" y="400" text-anchor="middle" font-size="8" fill="#5d6d7e">Family</text>

  <!-- 5. DeShawn (bottom) -->
  <rect x="220" y="410" width="80" height="40" rx="6" fill="#fff" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="426" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">DeShawn</text>
  <text x="260" y="440" text-anchor="middle" font-size="8" fill="#5d6d7e">Old Friend</text>

  <!-- 6. Dr. Patel (bottom-left) -->
  <rect x="60" y="370" width="80" height="40" rx="6" fill="#fff" stroke="#16a085" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="386" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Dr. Patel</text>
  <text x="100" y="400" text-anchor="middle" font-size="8" fill="#5d6d7e">Doctor</text>

  <!-- 7. Linda (left) -->
  <rect x="40" y="240" width="80" height="40" rx="6" fill="#fff" stroke="#95a5a6" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="256" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Linda</text>
  <text x="80" y="270" text-anchor="middle" font-size="8" fill="#5d6d7e">HR</text>

  <!-- 8. Rachel (top-left) -->
  <rect x="60" y="130" width="80" height="40" rx="6" fill="#fff" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="146" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Rachel</text>
  <text x="100" y="160" text-anchor="middle" font-size="8" fill="#5d6d7e">Therapist</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Weekly Resource Depletion Timeline</text>
  <text x="400" y="46" text-anchor="middle" font-size="12" fill="#7f8c8d">When your supplies run out determines your week</text>

  <!-- Timeline axis: x=100..750, days Mon-Sun -->
  <g font-size="11" fill="#7f8c8d" text-anchor="middle">
    <text x="100" y="70">Mon</text>
    <text x="210" y="70">Tue</text>
    <text x="320" y="70">Wed</text>
    <text x="430" y="70">Thu</text>
    <text x="540" y="70">Fri</text>
    <text x="650" y="70">Sat</text>
    <text x="750" y="70">Sun</text>
  </g>

  <!-- Day dividers -->
  <g stroke="#e8e8e8" stroke-width="1">
    <line x1="100" y1="78" x2="100" y2="310"/>
    <line x1="210" y1="78" x2="210" y2="310"/>
    <line x1="320" y1="78" x2="320" y2="310"/>
    <line x1="430" y1="78" x2="430" y2="310"/>
    <line x1="540" y1="78" x2="540" y2="310"/>
    <line x1="650" y1="78" x2="650" y2="310"/>
    <line x1="750" y1="78" x2="750" y2="310"/>
  </g>

  <!-- Resource rows -->
  <!-- Row 1: Toilet Paper — starts full, warning at Day 4, empty Day 6 -->
  <g transform="translate(0, 90)">
    <text x="90" y="20" text-anchor="end" font-size="12" font-weight="600" fill="#2c3e50">🧻 TP</text>
    <rect x="100" y="6" width="650" height="28" rx="4" fill="#e8e8e8"/>
    <rect x="100" y="6" width="430" height="28" rx="4" fill="#27ae60"/>
    <rect x="530" y="6" width="120" height="28" fill="#f39c12"/>
    <rect x="650" y="6" width="100" height="28" rx="0 4 4 0" fill="#e74c3c"/>
    <!-- Warning marker -->
    <text x="530" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">⚠ 1 left</text>
  </g>

  <!-- Row 2: Food — starts full, warning Day 3, empty Day 4 -->
  <g transform="translate(0, 130)">
    <text x="90" y="20" text-anchor="end" font-size="12" font-weight="600" fill="#2c3e50">🍕 Food</text>
    <rect x="100" y="6" width="650" height="28" rx="4" fill="#e8e8e8"/>
    <rect x="100" y="6" width="310" height="28" rx="4" fill="#27ae60"/>
    <rect x="410" y="6" width="80" height="28" fill="#f39c12"/>
    <rect x="490" y="6" width="260" height="28" rx="0 4 4 0" fill="#e74c3c"/>
    <text x="410" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">⚠ 1 day</text>
  </g>

  <!-- Row 3: Phone Battery — cycles daily, warning each evening -->
  <g transform="translate(0, 170)">
    <text x="90" y="20" text-anchor="end" font-size="12" font-weight="600" fill="#2c3e50">📱 Phone</text>
    <rect x="100" y="6" width="650" height="28" rx="4" fill="#e8e8e8"/>
    <!-- Each day: charge in morning, deplete through day -->
    <rect x="100" y="6" width="105" height="28" fill="#27ae60"/>
    <rect x="210" y="6" width="105" height="28" fill="#27ae60"/>
    <rect x="320" y="6" width="105" height="28" fill="#27ae60"/>
    <rect x="430" y="6" width="105" height="28" fill="#27ae60"/>
    <rect x="540" y="6" width="105" height="28" fill="#27ae60"/>
    <rect x="650" y="6" width="100" height="28" rx="0 4 4 0" fill="#27ae60"/>
    <text x="425" y="24" text-anchor="middle" font-size="9" fill="#7f8c8d">cycles daily</text>
  </g>

  <!-- Row 4: Gas Tank — warning Day 5, empty Day 6 -->
  <g transform="translate(0, 210)">
    <text x="90" y="20" text-anchor="end" font-size="12" font-weight="600" fill="#2c3e50">⛽ Gas</text>
    <rect x="100" y="6" width="650" height="28" rx="4" fill="#e8e8e8"/>
    <rect x="100" y="6" width="440" height="28" rx="4" fill="#27ae60"/>
    <rect x="540" y="6" width="100" height="28" fill="#f39c12"/>
    <rect x="640" y="6" width="110" height="28" rx="0 4 4 0" fill="#e74c3c"/>
    <text x="540" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">⚠ 1/8</text>
  </g>

  <!-- Row 5: Medications — refilled Day 7 -->
  <g transform="translate(0, 250)">
    <text x="90" y="20" text-anchor="end" font-size="12" font-weight="600" fill="#2c3e50">💊 Meds</text>
    <rect x="100" y="6" width="650" height="28" rx="4" fill="#e8e8e8"/>
    <rect x="100" y="6" width="520" height="28" rx="4" fill="#27ae60"/>
    <rect x="620" y="6" width="130" height="28" rx="0 4 4 0" fill="#f39c12"/>
    <text x="620" y="24" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">⚠ 3 left</text>
  </g>

  <!-- Row 6: Toiletries — adequate all week -->
  <g transform="translate(0, 290)">
    <text x="90" y="20" text-anchor="end" font-size="12" font-weight="600" fill="#2c3e50">🧴 Toiletries</text>
    <rect x="100" y="6" width="650" height="28" rx="4" fill="#e8e8e8"/>
    <rect x="100" y="6" width="650" height="28" rx="4" fill="#27ae60"/>
    <text x="425" y="24" text-anchor="middle" font-size="9" fill="#27ae60">OK all week</text>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 330)" font-size="10">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#27ae60"/>
    <text x="16" y="11">Adequate supply</text>
    <rect x="130" y="0" width="12" height="12" rx="2" fill="#f39c12"/>
    <text x="146" y="11">Warning threshold</text>
    <rect x="260" y="0" width="12" height="12" rx="2" fill="#e74c3c"/>
    <text x="276" y="11">Empty / critical</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 700 720" style="font-family: Segoe UI, system-ui, sans-serif;">
  <title>Self-Defense Legal Decision Tree</title>
  <desc>Flowchart showing legal consequences after a violent encounter, branching on threat imminence, force proportionality, and jurisdiction</desc>
  <defs>
    <filter id="ws" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2c3e50"/>
    </marker>
  </defs>

  <rect width="700" height="720" rx="12" fill="#fafbfc"/>
  <text x="350" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Self-Defense Legal Decision Tree</text>
  <text x="350" y="44" text-anchor="middle" font-size="10" fill="#5d6d7e">What happens after you use force? Follow the path.</text>

  <!-- START node -->
  <g filter="url(#ws)">
    <rect x="260" y="60" width="180" height="36" rx="18" fill="#2c3e50"/>
    <text x="350" y="83" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">YOU USED FORCE</text>
  </g>

  <!-- Arrow to Q1 -->
  <line x1="350" y1="96" x2="350" y2="115" stroke="#2c3e50" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Q1: Was threat imminent? -->
  <g filter="url(#ws)">
    <rect x="210" y="115" width="280" height="40" rx="6" fill="#ebf5fb" stroke="#2980b9" stroke-width="2"/>
    <text x="350" y="134" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">Was the threat IMMINENT?</text>
    <text x="350" y="147" text-anchor="middle" font-size="9" fill="#5d6d7e">Were you in immediate danger?</text>
  </g>

  <!-- NO branch (left) -->
  <text x="160" y="140" font-size="10" font-weight="700" fill="#c0392b">NO</text>
  <line x1="210" y1="135" x2="160" y2="135" stroke="#c0392b" stroke-width="2" marker-end="url(#ah)"/>

  <!-- NO outcome -->
  <g filter="url(#ws)">
    <rect x="40" y="155" width="240" height="56" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="2"/>
    <text x="160" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">❌ Criminal Charges Likely</text>
    <text x="160" y="192" text-anchor="middle" font-size="9" fill="#922b21">Assault charges; civil suit; prison time</text>
    <text x="160" y="204" text-anchor="middle" font-size="9" fill="#922b21">+12–20 SP</text>
  </g>

  <!-- YES branch (down) -->
  <text x="430" y="140" font-size="10" font-weight="700" fill="#27ae60">YES</text>
  <line x1="490" y1="135" x2="540" y2="135" stroke="#27ae60" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Q2: Was force proportional? -->
  <g filter="url(#ws)">
    <rect x="540" y="115" width="140" height="40" rx="6" fill="#ebf5fb" stroke="#2980b9" stroke-width="2"/>
    <text x="610" y="134" text-anchor="middle" font-size="10" font-weight="600" fill="#2c3e50">Was force PRO-</text>
    <text x="610" y="147" text-anchor="middle" font-size="10" font-weight="600" fill="#2c3e50">PORTIONAL?</text>
  </g>

  <!-- Q2 NO branch (right) -->
  <g filter="url(#ws)">
    <rect x="560" y="175" width="130" height="50" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="2"/>
    <text x="625" y="195" text-anchor="middle" font-size="10" font-weight="700" fill="#c0392b">⚠ Excessive Force</text>
    <text x="625" y="210" text-anchor="middle" font-size="9" fill="#922b21">2–15 years</text>
    <text x="625" y="222" text-anchor="middle" font-size="9" fill="#922b21">+10–15 SP</text>
  </g>

  <!-- Q2 YES branch (down) -->
  <line x1="610" y1="155" x2="610" y2="175" stroke="#27ae60" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Q3: Did you attempt to flee first? -->
  <g filter="url(#ws)">
    <rect x="310" y="220" width="280" height="40" rx="6" fill="#ebf5fb" stroke="#2980b9" stroke-width="2"/>
    <text x="450" y="239" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">Did you attempt to flee first?</text>
    <text x="450" y="252" text-anchor="middle" font-size="9" fill="#5d6d7e">(Duty to Retreat jurisdiction)</text>
  </g>
  <!-- Arrow from Q2 YES to Q3 -->
  <line x1="610" y1="225" x2="590" y2="225" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="590" y1="225" x2="590" y2="240" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Q3: What jurisdiction? -->
  <g filter="url(#ws)">
    <rect x="310" y="300" width="280" height="40" rx="6" fill="#ebf5fb" stroke="#2980b9" stroke-width="2"/>
    <text x="450" y="319" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">What is the jurisdiction?</text>
  </g>
  <line x1="450" y1="260" x2="450" y2="300" stroke="#2c3e50" stroke-width="2" marker-end="url(#ah)"/>

  <!-- SYG branch (left) -->
  <text x="220" y="330" font-size="10" font-weight="700" fill="#27ae60">SYG</text>
  <line x1="310" y1="320" x2="230" y2="320" stroke="#27ae60" stroke-width="2" marker-end="url(#ah)"/>

  <g filter="url(#ws)">
    <rect x="40" y="335" width="190" height="60" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
    <text x="135" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#1e8449">✅ Justified</text>
    <text x="135" y="372" text-anchor="middle" font-size="9" fill="#1e8449">Stand Your Ground (US SYG states)</text>
    <text x="135" y="384" text-anchor="middle" font-size="9" fill="#1e8449">No charges (usually) · +5–8 SP</text>
  </g>

  <!-- DTR branch (right) -->
  <text x="610" y="330" font-size="10" font-weight="700" fill="#d68910">DTR</text>
  <line x1="590" y1="320" x2="610" y2="320" stroke="#d68910" stroke-width="2" marker-end="url(#ah)"/>

  <g filter="url(#ws)">
    <rect x="610" y="290" width="75" height="50" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
    <text x="647" y="310" text-anchor="middle" font-size="9" font-weight="600" fill="#d68910">Did you</text>
    <text x="647" y="323" text-anchor="middle" font-size="9" font-weight="600" fill="#d68910">flee first?</text>
  </g>

  <!-- DTR YES -->
  <g filter="url(#ws)">
    <rect x="610" y="355" width="75" height="50" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
    <text x="647" y="375" text-anchor="middle" font-size="9" font-weight="700" fill="#1e8449">✅ Justified</text>
    <text x="647" y="390" text-anchor="middle" font-size="8" fill="#1e8449">+5–8 SP</text>
  </g>

  <!-- DTR NO -->
  <g filter="url(#ws)">
    <rect x="610" y="420" width="75" height="50" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="2"/>
    <text x="647" y="440" text-anchor="middle" font-size="9" font-weight="700" fill="#c0392b">⚠ Charges</text>
    <text x="647" y="455" text-anchor="middle" font-size="8" fill="#922b21">+8–12 SP</text>
  </g>

  <!-- Arrows for DTR -->
  <line x1="647" y1="340" x2="647" y2="355" stroke="#27ae60" stroke-width="1.5"/>
  <text x="665" y="348" font-size="8" fill="#27ae60">Yes</text>
  <line x1="610" y1="340" x2="590" y2="340" stroke="#c0392b" stroke-width="1.5"/>
  <text x="570" y="345" font-size="8" fill="#c0392b">No</text>
  <line x1="590" y1="340" x2="590" y2="445" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="590" y1="445" x2="610" y2="445" stroke="#c0392b" stroke-width="1.5"/>

  <!-- KILLING scenario branch -->
  <g filter="url(#ws)">
    <rect x="260" y="450" width="180" height="40" rx="6" fill="#e8daef" stroke="#8e44ad" stroke-width="2"/>
    <text x="350" y="469" text-anchor="middle" font-size="11" font-weight="600" fill="#2c3e50">💀 Did someone die?</text>
  </g>
  <line x1="450" y1="340" x2="450" y2="365" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="450" y1="365" x2="350" y2="450" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Killing outcome -->
  <g filter="url(#ws)">
    <rect x="200" y="510" width="300" height="60" rx="8" fill="#e8daef" stroke="#8e44ad" stroke-width="2"/>
    <text x="350" y="532" text-anchor="middle" font-size="11" font-weight="700" fill="#6c3483">⚠ Mandatory Investigation</text>
    <text x="350" y="548" text-anchor="middle" font-size="9" fill="#6c3483">Possible charges even if justified</text>
    <text x="350" y="560" text-anchor="middle" font-size="9" fill="#6c3483">+15 SP minimum · RES check TN 60 or gain Trauma</text>
  </g>
  <line x1="350" y1="490" x2="350" y2="510" stroke="#8e44ad" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Jurisdiction reference box -->
  <g filter="url(#ws)">
    <rect x="100" y="600" width="500" height="100" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
    <text x="350" y="622" text-anchor="middle" font-size="11" font-weight="700" fill="#d35400">🌍 Jurisdiction Reference</text>
    <text x="120" y="645" font-size="9" fill="#5d6d7e"><tspan font-weight="600">Stand Your Ground:</tspan> US SYG states (TX, FL, etc.)</text>
    <text x="120" y="660" font-size="9" fill="#5d6d7e"><tspan font-weight="600">Duty to Retreat:</tspan> UK, EU, Japan, Australia, most</text>
    <text x="280" y="660" font-size="9" fill="#5d6d7e">of the world</text>
    <text x="120" y="675" font-size="9" fill="#5d6d7e"><tspan font-weight="600">No deadly force:</tspan> Japan (no civilian firearms)</text>
    <text x="350" y="675" font-size="9" fill="#5d6d7e">· UK (self-defense not valid reason)</text>
    <text x="120" y="690" font-size="9" fill="#5d6d7e"><tspan font-weight="600">Home defense:</tspan> US (broad) · Germany (proportional only)</text>
    <text x="440" y="690" font-size="9" fill="#5d6d7e">· UK (no firearms allowed)</text>
  </g>
</svg>
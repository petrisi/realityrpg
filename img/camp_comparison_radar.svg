<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 550" width="600" height="550">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="550" rx="12" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#2c3e50" filter="url(#shadow)">📊 Campaign Comparison Radar</text>

  <!-- Subtitle -->
  <text x="300" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#5d6d7e">Pick a campaign for your table — each has different strengths</text>

  <!-- Grid polygons (concentric octagons at 20%, 40%, 60%, 80%, 100%) -->
  <!-- 20% level -->
  <polygon points="300,260 321.21,268.79 330,290 321.21,311.21 300,320 278.79,311.21 270,290 278.79,268.79" fill="none" stroke="#ddd" stroke-width="1"/>
  <!-- 40% level -->
  <polygon points="300,230 342.43,237.57 360,290 342.43,342.43 300,350 257.57,342.43 240,290 257.57,237.57" fill="none" stroke="#ddd" stroke-width="1"/>
  <!-- 60% level -->
  <polygon points="300,200 363.64,206.36 390,290 363.64,373.64 300,380 236.36,373.64 210,290 236.36,206.36" fill="none" stroke="#ddd" stroke-width="1"/>
  <!-- 80% level -->
  <polygon points="300,170 384.85,175.15 420,290 384.85,404.85 300,410 215.15,404.85 180,290 215.15,175.15" fill="none" stroke="#ddd" stroke-width="1"/>
  <!-- 100% level -->
  <polygon points="300,140 406.07,143.93 450,290 406.07,436.07 300,440 193.93,436.07 150,290 193.93,143.93" fill="none" stroke="#ccc" stroke-width="1.5"/>

  <!-- Axis lines from center to outer ring -->
  <g stroke="#ccc" stroke-width="1">
    <line x1="300" y1="290" x2="300" y2="140"/>
    <line x1="300" y1="290" x2="406.07" y2="143.93"/>
    <line x1="300" y1="290" x2="450" y2="290"/>
    <line x1="300" y1="290" x2="406.07" y2="436.07"/>
    <line x1="300" y1="290" x2="300" y2="440"/>
    <line x1="300" y1="290" x2="193.93" y2="436.07"/>
    <line x1="300" y1="290" x2="150" y2="290"/>
    <line x1="300" y1="290" x2="193.93" y2="143.93"/>
  </g>

  <!-- Campaign 1: The First Year (blue) -->
  <polygon points="300,170 342.43,237.57 405,290 406.07,436.07 300,335 211.37,403.64 210,290 257.57,237.57"
    fill="#2980b9" fill-opacity="0.15" stroke="#2980b9" stroke-width="2"/>

  <!-- Campaign 2: Midlife Reset (red) -->
  <polygon points="300,147.5 353.03,236.97 390,290 379.55,409.55 300,395 218.93,402.07 225,290 221.05,236.97"
    fill="#e74c3c" fill-opacity="0.15" stroke="#e74c3c" stroke-width="2"/>

  <!-- Campaign 3: Immigrant Dream (green) -->
  <polygon points="300,162.5 358.34,231.66 420,290 406.07,436.07 300,380 226.07,397.93 217.5,290 236.36,206.36"
    fill="#27ae60" fill-opacity="0.15" stroke="#27ae60" stroke-width="2"/>

  <!-- Campaign 4: The Activist (orange) -->
  <polygon points="300,185 374.24,215.76 390,290 379.55,409.55 300,425 251.21,371.21 180,290 215.15,175.15"
    fill="#e67e22" fill-opacity="0.15" stroke="#e67e22" stroke-width="2"/>

  <!-- Center dot -->
  <circle cx="300" cy="290" r="3" fill="#2c3e50"/>

  <!-- Axis labels (at ~170px from center, font-size 10) -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#2c3e50">
    <!-- 1. Emotional Intensity (top) -->
    <text x="300" y="118" text-anchor="middle">Emotional Intensity</text>
    <!-- 2. Mechanical Complexity (top-right) -->
    <text x="428" y="171" text-anchor="start">Mechanical Complexity</text>
    <!-- 3. NPC Count (right) -->
    <text x="472" y="294" text-anchor="start">NPC Count</text>
    <!-- 4. Session Count (bottom-right) -->
    <text x="428" y="414" text-anchor="start">Session Count</text>
    <!-- 5. SP Pressure (bottom) -->
    <text x="300" y="472" text-anchor="middle">SP Pressure</text>
    <!-- 6. Growth Potential (bottom-left) -->
    <text x="172" y="414" text-anchor="end">Growth Potential</text>
    <!-- 7. Pacing Speed (left) -->
    <text x="128" y="294" text-anchor="end">Pacing Speed</text>
    <!-- 8. Tone Darkness (top-left) -->
    <text x="172" y="171" text-anchor="end">Tone Darkness</text>
  </g>

  <!-- Scale labels along the top axis -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#95a5a6">
    <text x="308" y="262">20</text>
    <text x="308" y="232">40</text>
    <text x="308" y="202">60</text>
    <text x="308" y="172">80</text>
    <text x="308" y="142">100</text>
  </g>

  <!-- Legend (2 rows to fit within 600px width) -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2c3e50">
    <!-- Row 1 -->
    <rect x="100" y="492" width="14" height="14" rx="3" fill="#2980b9"/>
    <text x="120" y="504" text-anchor="start">The First Year</text>
    <rect x="250" y="492" width="14" height="14" rx="3" fill="#e74c3c"/>
    <text x="270" y="504" text-anchor="start">Midlife Reset</text>
    <!-- Row 2 -->
    <rect x="100" y="514" width="14" height="14" rx="3" fill="#27ae60"/>
    <text x="120" y="526" text-anchor="start">Immigrant Dream</text>
    <rect x="250" y="514" width="14" height="14" rx="3" fill="#e67e22"/>
    <text x="270" y="526" text-anchor="start">The Activist</text>
  </g>
</svg>
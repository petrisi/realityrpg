<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 650 420" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowR" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="650" height="420" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="325" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Gig Work Risk vs. Reward Matrix</text>
  <text x="325" y="44" text-anchor="middle" font-size="11" fill="#7f8c8d">Where each gig type lands on the stress vs. earnings spectrum</text>

  <!-- AXIS: X = Stress/Risk, Y = Earnings Potential -->
  <!-- Grid area -->
  <rect x="100" y="65" width="440" height="260" rx="4" fill="white" stroke="#dcdcdc" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="100" y1="130" x2="540" y2="130" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="100" y1="195" x2="540" y2="195" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="100" y1="260" x2="540" y2="260" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="220" y1="65" x2="220" y2="325" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="340" y1="65" x2="340" y2="325" stroke="#e8e8e8" stroke-width="1"/>
  <line x1="460" y1="65" x2="460" y2="325" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Quadrant labels — each on its own line -->
  <text x="160" y="82" font-size="9" fill="#27ae60" font-weight="600" opacity="0.5">LOW STRESS</text>
  <text x="460" y="82" font-size="9" fill="#e74c3c" font-weight="600" opacity="0.5">HIGH STRESS</text>
  <text x="160" y="94" font-size="9" fill="#27ae60" font-weight="600" opacity="0.5">HIGH EARNINGS</text>
  <text x="160" y="310" font-size="9" fill="#7f8c8d" font-weight="600" opacity="0.5">LOW EARNINGS</text>

  <!-- X axis label -->
  <text x="325" y="355" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3e50">Stress / Risk →</text>
  <!-- Y axis label -->
  <text x="35" y="195" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3e50" transform="rotate(-90, 35, 195)">Earnings Potential →</text>

  <!-- GIG TYPE POINTS -->
  <!-- Online Freelance: high earnings, low stress -->
  <g filter="url(#shadow)">
    <circle cx="170" cy="122" r="18" fill="#8e44ad" opacity="0.9"/>
    <text x="170" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="white">💻</text>
  </g>
  <text x="170" y="105" text-anchor="middle" font-size="9" font-weight="600" fill="#8e44ad">Online Freelance</text>

  <!-- Rideshare: medium-high earnings, medium stress -->
  <g filter="url(#shadow)">
    <circle cx="310" cy="120" r="18" fill="#e74c3c" opacity="0.9"/>
    <text x="310" y="124" text-anchor="middle" font-size="10" font-weight="700" fill="white">🚗</text>
  </g>
  <text x="310" y="103" text-anchor="middle" font-size="9" font-weight="600" fill="#e74c3c">Rideshare</text>

  <!-- Food Delivery: medium earnings, medium-high stress -->
  <g filter="url(#shadow)">
    <circle cx="380" cy="170" r="18" fill="#e67e22" opacity="0.9"/>
    <text x="380" y="174" text-anchor="middle" font-size="10" font-weight="700" fill="white">🍔</text>
  </g>
  <text x="380" y="153" text-anchor="middle" font-size="9" font-weight="600" fill="#e67e22">Food Delivery</text>

  <!-- Grocery Delivery: medium-low earnings, medium stress -->
  <g filter="url(#shadow)">
    <circle cx="300" cy="220" r="18" fill="#f39c12" opacity="0.9"/>
    <text x="300" y="224" text-anchor="middle" font-size="10" font-weight="700" fill="white">🛒</text>
  </g>
  <text x="300" y="250" text-anchor="middle" font-size="9" font-weight="600" fill="#f39c12">Grocery Delivery</text>

  <!-- Task-Based: low-medium earnings, low stress -->
  <g filter="url(#shadow)">
    <circle cx="180" cy="230" r="18" fill="#27ae60" opacity="0.9"/>
    <text x="180" y="234" text-anchor="middle" font-size="10" font-weight="700" fill="white">🛠️</text>
  </g>
  <text x="180" y="258" text-anchor="middle" font-size="9" font-weight="600" fill="#27ae60">Task-Based</text>

  <!-- Package Delivery: low earnings, medium stress -->
  <g filter="url(#shadow)">
    <circle cx="350" cy="265" r="18" fill="#2980b9" opacity="0.9"/>
    <text x="350" y="269" text-anchor="middle" font-size="10" font-weight="700" fill="white">📦</text>
  </g>
  <text x="350" y="290" text-anchor="middle" font-size="9" font-weight="600" fill="#2980b9">Package Delivery</text>

  <!-- STACKING ARROW: shows how stacking apps shifts you right and up -->
  <path d="M380,170 C400,160 420,140 430,120" fill="none" stroke="#e74c3c" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>
  <g transform="translate(420, 145)" filter="url(#shadow)">
    <rect width="100" height="30" rx="6" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
    <text x="50" y="14" text-anchor="middle" font-size="8" font-weight="700" fill="#e74c3c">Stacking 2–3 apps</text>
    <text x="50" y="25" text-anchor="middle" font-size="8" fill="#e74c3c">→ More $, More SP</text>
  </g>

  <!-- RATING SYSTEM note -->
  <rect x="100" y="375" width="440" height="35" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="320" y="390" text-anchor="middle" font-size="10" fill="#2c3e50">⭐ Rating modifier: 4.9+ gives +2 earnings / −1 SP · Below 4.0 gives −3 earnings / +3 SP per shift</text>
  <text x="320" y="405" text-anchor="middle" font-size="9" fill="#7f8c8d">Rating affects ALL gig types — a bad rating shifts every point down and right</text>
</svg>

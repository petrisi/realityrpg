<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 700 220" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <title>ECS Tracker</title>
  <desc>Economic Climate Score gauge from −10 (Depression) to +10 (Overheated Boom) with color-coded climate zones</desc>
  <defs>
    <linearGradient id="ecsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="14%" stop-color="#e74c3c"/>
      <stop offset="28%" stop-color="#e67e22"/>
      <stop offset="42%" stop-color="#f39c12"/>
      <stop offset="57%" stop-color="#27ae60"/>
      <stop offset="71%" stop-color="#2ecc71"/>
      <stop offset="85%" stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Economic Climate Score (ECS) Tracker</text>
  <text x="350" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Range: −10 (Depression) to +10 (Overheated Boom) · Starts at 0</text>

  <!-- Needle at 0 (center) — text above, arrow below -->
  <text x="350" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3e50">Current: 0</text>
  <polygon points="350,67 342,80 358,80" fill="#2c3e50"/>
  <circle cx="350" cy="67" r="5" fill="#2c3e50"/>

  <!-- Main bar -->
  <rect x="60" y="90" width="580" height="28" rx="14" fill="url(#ecsGrad)" filter="url(#shadow)"/>

  <!-- Tick marks and labels -->
  <g font-size="10" font-weight="600" text-anchor="middle">
    <text x="60" y="133" fill="#c0392b">−10</text>
    <text x="118" y="133" fill="#e74c3c">−7</text>
    <text x="175" y="133" fill="#e67e22">−5</text>
    <text x="233" y="133" fill="#f39c12">−3</text>
    <text x="350" y="133" fill="#2c3e50">0</text>
    <text x="467" y="133" fill="#27ae60">+3</text>
    <text x="525" y="133" fill="#2ecc71">+5</text>
    <text x="582" y="133" fill="#1abc9c">+7</text>
    <text x="640" y="133" fill="#8e44ad">+10</text>
  </g>

  <!-- Tick lines -->
  <g stroke="#2c3e50" stroke-width="1" opacity="0.3">
    <line x1="60" y1="118" x2="60" y2="125"/>
    <line x1="118" y1="118" x2="118" y2="125"/>
    <line x1="175" y1="118" x2="175" y2="125"/>
    <line x1="233" y1="118" x2="233" y2="125"/>
    <line x1="350" y1="118" x2="350" y2="125"/>
    <line x1="467" y1="118" x2="467" y2="125"/>
    <line x1="525" y1="118" x2="525" y2="125"/>
    <line x1="582" y1="118" x2="582" y2="125"/>
    <line x1="640" y1="118" x2="640" y2="125"/>
  </g>

  <!-- Climate zone labels below bar -->
  <g font-size="9" text-anchor="middle" font-weight="600">
    <text x="89" y="148" fill="#c0392b">Depression</text>
    <text x="147" y="148" fill="#e74c3c">Recession</text>
    <text x="205" y="148" fill="#e67e22">Slowing</text>
    <text x="292" y="148" fill="#27ae60">Stable</text>
    <text x="409" y="148" fill="#27ae60">Growing</text>
    <text x="496" y="148" fill="#2ecc71">Expansion</text>
    <text x="610" y="148" fill="#8e44ad">Overheated</text>
  </g>

  <!-- Shift arrows -->
  <text x="60" y="175" text-anchor="start" font-size="10" fill="#7f8c8d">← Economy contracts</text>
  <text x="640" y="175" text-anchor="end" font-size="10" fill="#7f8c8d">Economy expands →</text>
  <text x="350" y="205" text-anchor="middle" font-size="10" fill="#7f8c8d">Shifts 1–3 per cycle event · Change every 3–6 in-game months</text>
</svg>
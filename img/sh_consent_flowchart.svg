<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <!-- Arrowhead markers -->
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#6c3483"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#16a085"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#e67e22"/>
    </marker>

    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" rx="12" fill="#faf5fc"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, sans-serif" font-size="21" font-weight="700" fill="#6c3483">Consent Flowchart — Intimacy Scenes</text>
  <line x1="120" y1="42" x2="680" y2="42" stroke="#d2b4de" stroke-width="2"/>

  <!-- ════════════════════════════════════════
       1: Signal Interest (green)
       ════════════════════════════════════════ -->
  <rect x="275" y="54" width="250" height="44" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="82" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#1e8449">Signal Interest</text>

  <line x1="400" y1="98" x2="400" y2="118" stroke="#6c3483" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ════════════════════════════════════════
       2: Other player interested? (diamond)
       ════════════════════════════════════════ -->
  <polygon points="400,118 505,160 400,202 295,160" fill="#f5eef8" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="156" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#6c3483">Other player</text>
  <text x="400" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#6c3483">interested?</text>

  <!-- No → left -->
  <line x1="295" y1="160" x2="175" y2="160" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="235" y="152" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#c0392b">No</text>

  <rect x="60" y="138" width="115" height="44" rx="10" fill="#fadbd8" stroke="#c0392b" stroke-width="2" filter="url(#shadow)"/>
  <text x="117" y="161" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#922b21">Scene ends</text>
  <text x="117" y="179" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#922b21">gracefully</text>

  <!-- Yes → down -->
  <line x1="400" y1="202" x2="400" y2="230" stroke="#6c3483" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="418" y="222" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#6c3483">Yes</text>

  <!-- ════════════════════════════════════════
       3: Boundary Discussion (blue)
       ════════════════════════════════════════ -->
  <rect x="275" y="230" width="250" height="44" rx="10" fill="#d6eaf8" stroke="#2980b9" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="258" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#1a5276">Boundary Discussion</text>

  <line x1="400" y1="274" x2="400" y2="302" stroke="#6c3483" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ════════════════════════════════════════
       4: Intimate Scene (purple)
       ════════════════════════════════════════ -->
  <rect x="275" y="302" width="250" height="44" rx="10" fill="#e8daef" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="330" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#6c3483">Intimate Scene</text>

  <line x1="400" y1="346" x2="400" y2="374" stroke="#6c3483" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ════════════════════════════════════════
       5: Ongoing Consent Check (diamond)
       ════════════════════════════════════════ -->
  <polygon points="400,374 510,418 400,462 290,418" fill="#f5eef8" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="414" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#6c3483">Ongoing Consent</text>
  <text x="400" y="432" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#6c3483">Check</text>

  <!-- Withdrawn → left -->
  <line x1="290" y1="418" x2="175" y2="418" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="233" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#c0392b">Withdrawn</text>

  <rect x="60" y="396" width="115" height="44" rx="10" fill="#fadbd8" stroke="#c0392b" stroke-width="2" filter="url(#shadow)"/>
  <text x="117" y="424" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#922b21">Scene halts</text>

  <!-- Continues → down -->
  <line x1="400" y1="462" x2="400" y2="490" stroke="#16a085" stroke-width="2" marker-end="url(#arrow-teal)"/>
  <text x="418" y="482" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#16a085">Continues</text>

  <!-- ════════════════════════════════════════
       6: Aftercare (teal)
       ════════════════════════════════════════ -->
  <rect x="290" y="490" width="220" height="44" rx="10" fill="#d1f2eb" stroke="#16a085" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="518" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#0e6655">Aftercare</text>

  <line x1="400" y1="534" x2="400" y2="554" stroke="#6c3483" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ════════════════════════════════════════
       7: Dice roll (purple)
       ════════════════════════════════════════ -->
  <rect x="260" y="554" width="280" height="44" rx="10" fill="#e8daef" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="582" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="#6c3483">Both roll 2d10+RES (TN 6)</text>

  <!-- Success → left -->
  <line x1="260" y1="576" x2="170" y2="576" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="215" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#27ae60">Success</text>

  <rect x="30" y="554" width="140" height="44" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1e8449">−0 SP,</text>
  <text x="100" y="593" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#1e8449">processed</text>

  <!-- Fail → right -->
  <line x1="540" y1="576" x2="630" y2="576" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="585" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#e67e22">Fail</text>

  <rect x="630" y="554" width="140" height="44" rx="10" fill="#fdebd0" stroke="#e67e22" stroke-width="2" filter="url(#shadow)"/>
  <text x="700" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#a04000">+1 SP</text>
  <text x="700" y="593" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#a04000">vulnerability</text>

  <!-- ════════════════════════════════════════
       Note box
       ════════════════════════════════════════ -->
  <rect x="30" y="620" width="740" height="62" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="646" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#7d6608">⚠️ No dice rolled to determine IF someone wants intimacy. Consent is a player decision.</text>
  <text x="400" y="668" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="500" fill="#9a7d0a">Dice only resolve consequences after consent is confirmed.</text>

</svg>
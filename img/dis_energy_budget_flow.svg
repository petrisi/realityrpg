<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="s" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Energy Budget — Daily Flow</text>

  <!-- START pool -->
  <rect x="100" y="50" width="300" height="50" rx="10" fill="#8e44ad" filter="url(#s)"/>
  <text x="250" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">⚡ Start: 10 + VIG EP</text>

  <!-- Arrow down -->
  <line x1="250" y1="100" x2="250" y2="120" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Step 1: Morning -->
  <rect x="80" y="120" width="340" height="50" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#s)"/>
  <text x="110" y="150" font-size="15" fill="#1e8449">🌅 Morning Routine</text>
  <text x="370" y="150" text-anchor="end" font-size="14" font-weight="700" fill="#c0392b">−2 EP</text>
  <text x="370" y="135" text-anchor="end" font-size="11" fill="#7f8c8d">Normal: 1 EP</text>

  <line x1="250" y1="170" x2="250" y2="190" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Step 2: Commute -->
  <rect x="80" y="190" width="340" height="50" rx="8" fill="#d4efdf" stroke="#2ecc71" stroke-width="1.5" filter="url(#s)"/>
  <text x="110" y="220" font-size="15" fill="#1e8449">🚌 Commute</text>
  <text x="370" y="220" text-anchor="end" font-size="14" font-weight="700" fill="#c0392b">−2–4 EP</text>
  <text x="370" y="205" text-anchor="end" font-size="11" fill="#7f8c8d">Depends on AR</text>

  <line x1="250" y1="240" x2="250" y2="260" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Step 3: Work -->
  <rect x="80" y="260" width="340" height="50" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#s)"/>
  <text x="110" y="290" font-size="15" fill="#7d6608">💼 Work / School</text>
  <text x="370" y="290" text-anchor="end" font-size="14" font-weight="700" fill="#c0392b">−3–5 EP</text>
  <text x="370" y="275" text-anchor="end" font-size="11" fill="#7f8c8d">Per 4 hours</text>

  <line x1="250" y1="310" x2="250" y2="330" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Step 4: Social -->
  <rect x="80" y="330" width="340" height="50" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="1.5" filter="url(#s)"/>
  <text x="110" y="360" font-size="15" fill="#7e5109">🗣️ Social Interaction</text>
  <text x="370" y="360" text-anchor="end" font-size="14" font-weight="700" fill="#c0392b">−1–3 EP</text>
  <text x="370" y="345" text-anchor="end" font-size="11" fill="#7f8c8d">Sensory barriers ↑</text>

  <line x1="250" y1="380" x2="250" y2="400" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Step 5: Medical -->
  <rect x="80" y="400" width="340" height="50" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" filter="url(#s)"/>
  <text x="110" y="430" font-size="15" fill="#922b21">💊 Medical Management</text>
  <text x="370" y="430" text-anchor="end" font-size="14" font-weight="700" fill="#c0392b">−1–3 EP</text>
  <text x="370" y="415" text-anchor="end" font-size="11" fill="#7f8c8d">Daily overhead</text>

  <!-- WARNING zone -->
  <rect x="60" y="465" width="380" height="42" rx="8" fill="#c0392b" filter="url(#s)"/>
  <text x="250" y="486" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">⚠️ EP = 0 → −1 ALL attributes + +2 SP</text>
  <text x="250" y="502" text-anchor="middle" font-size="11" fill="#f5b7b1">Exhausted for remainder of the day</text>
</svg>
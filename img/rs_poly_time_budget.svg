<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 700 380" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="380" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Polyamory Weekly Time Budget</text>
  <text x="350" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Where does relationship time come from in a 168-hour week?</text>

  <!-- Full week bar — 168 hours -->
  <!-- Each hour = 3.2px. Total bar = 537px wide -->
  <text x="55" y="80" font-size="10" fill="#7f8c8d" font-weight="600">168 hrs</text>

  <!-- Bar segments -->
  <!-- Sleep: 56h (33.3%) = 177px -->
  <rect x="55" y="85" width="177" height="35" rx="4" fill="#5d6d7e"/>
  <text x="143" y="107" text-anchor="middle" font-size="10" fill="white" font-weight="600">😴 Sleep</text>
  <text x="143" y="135" text-anchor="middle" font-size="8" fill="#5d6d7e">56 hrs</text>

  <!-- Work: 45h (26.8%) = 144px -->
  <rect x="232" y="85" width="144" height="35" rx="0" fill="#2980b9"/>
  <text x="304" y="107" text-anchor="middle" font-size="10" fill="white" font-weight="600">💼 Work</text>
  <text x="304" y="135" text-anchor="middle" font-size="8" fill="#2980b9">45 hrs</text>

  <!-- Self-care: 14h (8.3%) = 45px -->
  <rect x="376" y="85" width="45" height="35" rx="0" fill="#27ae60"/>
  <text x="398" y="107" text-anchor="middle" font-size="9" fill="white" font-weight="600">🧘</text>
  <text x="398" y="135" text-anchor="middle" font-size="8" fill="#27ae60">14 hrs</text>

  <!-- Chores/life admin: 15h (9%) = 48px -->
  <rect x="421" y="85" width="48" height="35" rx="0" fill="#f39c12"/>
  <text x="445" y="107" text-anchor="middle" font-size="9" fill="white" font-weight="600">🏠</text>
  <text x="445" y="135" text-anchor="middle" font-size="8" fill="#e67e22">15 hrs</text>

  <!-- Remaining: 38h (22.6%) = 122px -->
  <rect x="469" y="85" width="122" height="35" rx="0 4 4 0" fill="#e8e8e8"/>
  <text x="530" y="107" text-anchor="middle" font-size="10" fill="#2c3e50" font-weight="600">Available</text>
  <text x="530" y="135" text-anchor="middle" font-size="8" fill="#5d6d7e">38 hrs</text>

  <!-- SCENARIO 1: Monogamous — 1 primary partner (10h) -->
  <text x="55" y="165" font-size="12" font-weight="700" fill="#27ae60">Scenario 1: Monogamous (10h relationship time)</text>

  <rect x="55" y="172" width="100" height="30" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="105" y="191" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">❤️ Primary: 10h</text>

  <rect x="160" y="172" width="100" height="30" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="210" y="191" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">✅ 28h remaining</text>

  <!-- SCENARIO 2: Relationship Anarchy Triad (10h + 10h = 20h) -->
  <text x="55" y="230" font-size="12" font-weight="700" fill="#f39c12">Scenario 2: RA Triad (20h relationship time)</text>

  <rect x="55" y="237" width="100" height="30" rx="4" fill="#fdebd0" stroke="#f39c12" stroke-width="1"/>
  <text x="105" y="256" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="600">💜 Partner A: 10h</text>

  <rect x="160" y="237" width="100" height="30" rx="4" fill="#fdebd0" stroke="#f39c12" stroke-width="1"/>
  <text x="210" y="256" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="600">💛 Partner B: 10h</text>

  <rect x="265" y="237" width="100" height="30" rx="4" fill="#fdebd0" stroke="#f39c12" stroke-width="1"/>
  <text x="315" y="256" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="600">⚠️ 18h remaining</text>

  <!-- SCENARIO 3: Triad + Casual (22h relationship time) -->
  <text x="55" y="295" font-size="12" font-weight="700" fill="#e74c3c">Scenario 3: RA Triad + Casual (22h relationship time)</text>

  <rect x="55" y="302" width="100" height="30" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="105" y="321" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="600">💜 Partner A: 10h</text>

  <rect x="160" y="302" width="100" height="30" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="210" y="321" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="600">💛 Partner B: 10h</text>

  <rect x="265" y="302" width="100" height="30" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="315" y="321" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="600">💚 Casual: 2h</text>

  <rect x="370" y="302" width="100" height="30" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="420" y="321" text-anchor="middle" font-size="10" fill="#e74c3c" font-weight="600">🔴 16h remaining</text>

  <!-- Right side annotation -->
  <rect x="490" y="165" width="190" height="195" rx="8" fill="#fef9e7" stroke="#f9e79f" stroke-width="1"/>
  <text x="585" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#e67e22">⏰ The Math</text>
  <text x="585" y="210" text-anchor="middle" font-size="10" fill="#2c3e50">Every hour of relationship</text>
  <text x="585" y="225" text-anchor="middle" font-size="10" fill="#2c3e50">time is an hour NOT spent on</text>
  <text x="585" y="240" text-anchor="middle" font-size="10" fill="#2c3e50">sleep, hobbies, or rest.</text>
  <text x="585" y="262" text-anchor="middle" font-size="10" fill="#2c3e50">Scheduling failures happen</text>
  <text x="585" y="277" text-anchor="middle" font-size="10" fill="#2c3e50">when available hours &lt; need.</text>
  <text x="585" y="302" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">Each failure = +2 SP for the</text>
  <text x="585" y="317" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">neglected partner.</text>
  <text x="585" y="337" text-anchor="middle" font-size="9" fill="#7f8c8d">3 consecutive failures =</text>
  <text x="585" y="350" text-anchor="middle" font-size="9" fill="#7f8c8d">relationship tier decay.</text>
</svg>
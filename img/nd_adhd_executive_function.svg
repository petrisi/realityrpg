<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" rx="12" fill="#faf9f6"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#2c3e50">ADHD &amp; Executive Function</text>
  <text x="350" y="55" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#7f8c8d">The brain's management system — weakened areas shown with red dashed lines</text>

  <!-- Brain icon area — center -->
  <circle cx="350" cy="210" r="90" fill="#2980b9" opacity="0.08"/>
  <circle cx="350" cy="210" r="70" fill="#2980b9" opacity="0.12"/>
  <circle cx="350" cy="210" r="50" fill="#2980b9" filter="url(#shadow)"/>
  <text x="350" y="200" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="700" fill="#fff">Executive</text>
  <text x="350" y="218" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="700" fill="#fff">Function</text>
  <text x="350" y="238" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#d4efff">(Brain's CEO)</text>

  <!-- === BRANCH 1: Working Memory (top-left) === -->
  <line x1="300" y1="170" x2="120" y2="100" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="8,5"/>
  <rect x="40" y="60" width="160" height="50" rx="8" fill="#fff" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="120" y="85" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#c0392b">🧠 Working Memory</text>
  <text x="120" y="101" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">WEAKENED</text>

  <!-- === BRANCH 2: Inhibitory Control (top) === -->
  <line x1="350" y1="160" x2="350" y2="80" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="8,5"/>
  <rect x="260" y="35" width="180" height="50" rx="8" fill="#fff" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="350" y="60" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#c0392b">🛑 Inhibitory Control</text>
  <text x="350" y="76" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">WEAKENED</text>

  <!-- === BRANCH 3: Cognitive Flexibility (top-right) === -->
  <line x1="400" y1="170" x2="580" y2="100" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="8,5"/>
  <rect x="500" y="60" width="160" height="50" rx="8" fill="#fff" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="580" y="85" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#c0392b">🔄 Cog. Flexibility</text>
  <text x="580" y="101" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">WEAKENED</text>

  <!-- === BRANCH 4: Emotional Regulation (right) === -->
  <line x1="400" y1="230" x2="600" y2="230" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="8,5"/>
  <rect x="500" y="200" width="170" height="50" rx="8" fill="#fff" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="585" y="225" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#c0392b">🎢 Emotional Regulation</text>
  <text x="585" y="241" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">WEAKENED</text>

  <!-- === BRANCH 5: Task Initiation (bottom-right) === -->
  <line x1="390" y1="250" x2="560" y2="350" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="8,5"/>
  <rect x="470" y="320" width="170" height="50" rx="8" fill="#fff" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="555" y="345" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#c0392b">🚀 Task Initiation</text>
  <text x="555" y="361" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">WEAKENED</text>

  <!-- === BRANCH 6: Time Management (bottom-left) === -->
  <line x1="310" y1="250" x2="140" y2="350" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="8,5"/>
  <rect x="50" y="320" width="180" height="50" rx="8" fill="#fff" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="140" y="345" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#c0392b">⏰ Time Management</text>
  <text x="140" y="361" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">WEAKENED</text>

  <!-- === HYPERFOCUS — special overactive branch === -->
  <line x1="350" y1="260" x2="350" y2="390" stroke="#e67e22" stroke-width="4"/>
  <circle cx="350" cy="410" r="30" fill="#e67e22" filter="url(#shadow)"/>
  <circle cx="350" cy="410" r="36" fill="none" stroke="#e67e22" stroke-width="2" opacity="0.4"/>
  <circle cx="350" cy="410" r="42" fill="none" stroke="#e67e22" stroke-width="1.5" opacity="0.2"/>
  <text x="350" y="405" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">🔥 Hyperfocus</text>
  <text x="350" y="421" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#fdebd0">OVERACTIVE</text>

  <!-- Bottom note -->
  <rect x="100" y="465" width="500" height="40" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="350" y="482" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#2c3e50">Red dashed = weakened in ADHD · Orange glow = overactive (hyperfocus)</text>
  <text x="350" y="498" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">Treatment targets weakened areas; hyperfocus is a double-edged sword</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c0392b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#27ae60"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" rx="12" fill="#faf9f6"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#2c3e50">BPD Splitting Cycle</text>
  <text x="300" y="55" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#7f8c8d">The emotional rollercoaster — not manipulation, not malice</text>

  <!-- === CYCLE NODES arranged in a circle === -->
  <!-- Center of cycle: 300, 330 -->
  <!-- Radius: 200 -->

  <!-- Node 1: Trigger (top) -->
  <circle cx="300" cy="130" r="42" fill="#c0392b" filter="url(#shadow)"/>
  <text x="300" y="122" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">😰 Trigger</text>
  <text x="300" y="138" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fadbd8">Perceived</text>
  <text x="300" y="150" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fadbd8">rejection</text>

  <!-- Node 2: Idealization (right-top) -->
  <circle cx="470" cy="210" r="42" fill="#27ae60" filter="url(#shadow)"/>
  <text x="470" y="202" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">💚 Idealization</text>
  <text x="470" y="218" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#d5f5e3">"You're</text>
  <text x="470" y="230" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#d5f5e3">perfect"</text>

  <!-- Node 3: Relationship Threat (right) -->
  <circle cx="500" cy="340" r="42" fill="#e67e22" filter="url(#shadow)"/>
  <text x="500" y="332" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">⚡ Threat</text>
  <text x="500" y="348" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fdebd0">Canceled</text>
  <text x="500" y="360" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fdebd0">plans</text>

  <!-- Node 4: Splitting Switch (right-bottom) -->
  <circle cx="460" cy="460" r="42" fill="#f39c12" filter="url(#shadow)"/>
  <text x="460" y="452" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">⚡ Splitting</text>
  <text x="460" y="468" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fdebd0">State</text>
  <text x="460" y="480" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fdebd0">switch</text>

  <!-- Node 5: Devaluation (bottom) -->
  <circle cx="300" cy="520" r="42" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="300" y="512" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">💔 Devaluation</text>
  <text x="300" y="528" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fadbd8">"You're</text>
  <text x="300" y="540" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fadbd8">terrible"</text>

  <!-- Node 6: Desperate Behavior (left-bottom) -->
  <circle cx="140" cy="460" r="42" fill="#c0392b" filter="url(#shadow)"/>
  <text x="140" y="452" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">💥 Desperate</text>
  <text x="140" y="468" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">Behavior</text>

  <!-- Node 7: Regret &amp; Shame (left) -->
  <circle cx="100" cy="340" r="42" fill="#8e44ad" filter="url(#shadow)"/>
  <text x="100" y="332" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">😔 Regret</text>
  <text x="100" y="348" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">&amp; Shame</text>

  <!-- Node 8: Repair Attempt (left-top) -->
  <circle cx="130" cy="210" r="42" fill="#2980b9" filter="url(#shadow)"/>
  <text x="130" y="202" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">🤝 Repair</text>
  <text x="130" y="218" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#d4efff">Apology,</text>
  <text x="130" y="230" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#d4efff">connection</text>

  <!-- === ARROWS forming the cycle === -->
  <!-- Trigger → Idealization -->
  <path d="M335,148 Q380,170 440,192" fill="none" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Idealization → Threat -->
  <path d="M480,252 Q495,290 500,300" fill="none" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Threat → Splitting -->
  <path d="M490,382 Q480,420 468,425" fill="none" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- Splitting → Devaluation -->
  <path d="M430,480 Q370,510 335,520" fill="none" stroke="#f39c12" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Devaluation → Desperate Behavior -->
  <path d="M270,510 Q200,490 175,475" fill="none" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Desperate Behavior → Regret -->
  <path d="M135,420 Q120,385 105,375" fill="none" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Regret → Repair -->
  <path d="M105,300 Q115,260 120,250" fill="none" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- Repair → back to Trigger (completes loop) -->
  <path d="M155,190 Q220,160 265,140" fill="none" stroke="#2980b9" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- === SP annotations near nodes === -->
  <!-- SP gains near painful nodes -->
  <rect x="340" y="108" width="50" height="18" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="365" y="121" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#c0392b">+5 SP</text>

  <rect x="175" y="320" width="45" height="18" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="197" y="333" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#c0392b">+2 SP</text>

  <rect x="175" y="440" width="45" height="18" rx="4" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="197" y="453" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#c0392b">+3 SP</text>

  <!-- SP recovery near repair -->
  <rect x="85" y="185" width="50" height="18" rx="4" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="110" y="198" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="600" fill="#27ae60">−3 SP</text>

  <!-- Center note -->
  <circle cx="300" cy="330" r="65" fill="#fff" stroke="#dcdcdc" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="310" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#2c3e50">Fear of</text>
  <text x="300" y="328" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#2c3e50">Abandonment</text>
  <text x="300" y="348" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">drives the cycle</text>
  <text x="300" y="363" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">at every step</text>

  <!-- Bottom note -->
  <rect x="100" y="565" width="400" height="25" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="300" y="582" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2980b9">DBT treatment helps break the cycle by teaching distress tolerance skills</text>
</svg>

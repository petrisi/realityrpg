<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 520 440" style="font-family: Segoe UI, system-ui, sans-serif;">
  <title>Collateral Damage Risk Diagram</title>
  <desc>Room floor plan showing bullet trajectories, bystander risk, and the 1d6 outcomes for missed shots in an enclosed space</desc>
  <defs>
    <filter id="ws" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="520" height="440" rx="12" fill="#fafbfc"/>
  <text x="260" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Missed Shots &amp; Collateral Damage</text>
  <text x="260" y="44" text-anchor="middle" font-size="10" fill="#5d6d7e">In enclosed spaces, bullets don't vanish — they endanger everyone</text>

  <!-- Room outline -->
  <rect x="60" y="60" width="400" height="280" rx="0" fill="#fdf2e9" stroke="#8e44ad" stroke-width="3"/>
  <text x="260" y="55" text-anchor="middle" font-size="9" fill="#5d6d7e">ROOM / BAR / HOME</text>

  <!-- Walls detail -->
  <line x1="60" y1="60" x2="60" y2="340" stroke="#5d6d7e" stroke-width="3"/>
  <line x1="460" y1="60" x2="460" y2="340" stroke="#5d6d7e" stroke-width="3"/>
  <line x1="60" y1="60" x2="460" y2="60" stroke="#5d6d7e" stroke-width="3"/>
  <line x1="60" y1="340" x2="460" y2="340" stroke="#5d6d7e" stroke-width="3"/>

  <!-- Interior wall -->
  <line x1="260" y1="60" x2="260" y2="200" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="260" y="130" text-anchor="middle" font-size="8" fill="#95a5a6">wall</text>

  <!-- Shooter position -->
  <circle cx="140" cy="250" r="20" fill="#3498db" opacity="0.8" filter="url(#ws)"/>
  <text x="140" y="254" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">SHOOTER</text>

  <!-- Target position -->
  <circle cx="380" cy="180" r="20" fill="#e74c3c" opacity="0.8" filter="url(#ws)"/>
  <text x="380" y="184" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">TARGET</text>

  <!-- Bystander 1 -->
  <circle cx="100" cy="140" r="16" fill="#f39c12" opacity="0.8" filter="url(#ws)"/>
  <text x="100" y="144" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">BYS1</text>

  <!-- Bystander 2 -->
  <circle cx="380" cy="280" r="16" fill="#f39c12" opacity="0.8" filter="url(#ws)"/>
  <text x="380" y="284" text-anchor="middle" font-size="7" font-weight="700" fill="#fff">BYS2</text>

  <!-- Bullet trajectory 1: direct hit path -->
  <line x1="155" y1="240" x2="365" y2="190" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="260" y="210" text-anchor="middle" font-size="8" fill="#e74c3c" font-weight="600">Direct path</text>

  <!-- Bullet trajectory 2: ricochet to bystander -->
  <line x1="380" y1="165" x2="380" y2="100" stroke="#f39c12" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="380" y1="100" x2="100" y2="125" stroke="#f39c12" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="260" y="95" text-anchor="middle" font-size="8" fill="#f39c12" font-weight="600">Ricochet → bystander</text>

  <!-- Bullet trajectory 3: through wall -->
  <line x1="380" y1="195" x2="420" y2="340" stroke="#e67e22" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="420" y="310" text-anchor="start" font-size="8" fill="#e67e22" font-weight="600">Through wall</text>

  <!-- Bullet trajectory 4: wide miss -->
  <line x1="155" y1="260" x2="155" y2="340" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="140" y="360" text-anchor="middle" font-size="8" fill="#27ae60" font-weight="600">Wide miss (safe)</text>

  <!-- 1d6 outcomes box -->
  <g filter="url(#ws)">
    <rect x="60" y="370" width="400" height="55" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
    <text x="260" y="388" text-anchor="middle" font-size="10" font-weight="700" fill="#d35400">Roll 1d6 for missed shot outcome:</text>
    <text x="80" y="406" font-size="9" fill="#c0392b">1–2: Bystander hit</text>
    <text x="200" y="406" font-size="9" fill="#f39c12">3–4: Ricochet</text>
    <text x="320" y="406" font-size="9" fill="#27ae60">5–6: Wide miss</text>
    <text x="80" y="420" font-size="9" fill="#5d6d7e">In enclosed spaces, 67% of missed shots cause collateral damage</text>
  </g>

  <!-- Warning -->
  <text x="260" y="438" text-anchor="middle" font-size="9" font-weight="600" fill="#c0392b">⚠ Bullets penetrate walls, shatter windows, and can kill someone in the next room</text>
</svg>
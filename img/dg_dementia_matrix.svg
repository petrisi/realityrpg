<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 850 480" width="850" height="480">
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#2c3e50">Dementia Progression — Attribute Decline Matrix</text>
  <text x="425" y="50" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#7f8c8d">Over 8–15 years, attributes erode stage by stage. Each stage lasts years, not weeks.</text>

  <!-- Timeline axis at top -->
  <line x1="100" y1="75" x2="800" y2="75" stroke="#2c3e50" stroke-width="2"/>
  <text x="100" y="65" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">Year 0</text>
  <text x="280" y="65" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">Year 4</text>
  <text x="470" y="65" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">Year 8</text>
  <text x="650" y="65" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">Year 11</text>
  <text x="800" y="65" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">Year 15</text>
  <text x="450" y="90" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#2c3e50" font-weight="600">TIME →</text>

  <!-- Stage zones -->
  <rect x="100" y="95" width="180" height="350" rx="8" fill="#d4efdf" opacity="0.4"/>
  <text x="190" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#27ae60">🔍 Mild Cognitive</text>
  <text x="190" y="133" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#27ae60">2–4 years</text>

  <rect x="290" y="95" width="180" height="350" rx="8" fill="#fef9e7" opacity="0.5"/>
  <text x="380" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#f39c12">🟡 Mild Dementia</text>
  <text x="380" y="133" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#f39c12">2–4 years</text>

  <rect x="480" y="95" width="180" height="350" rx="8" fill="#fdebd0" opacity="0.5"/>
  <text x="570" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#e67e22">🟠 Moderate</text>
  <text x="570" y="133" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#e67e22">3–6 years</text>

  <rect x="670" y="95" width="130" height="350" rx="8" fill="#fadbd8" opacity="0.5"/>
  <text x="735" y="118" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#e74c3c">🔴 Severe</text>
  <text x="735" y="133" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#e74c3c">1–3 years</text>

  <!-- INT bars -->
  <text x="100" y="170" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#2c3e50">INT:</text>
  <rect x="125" y="155" width="150" height="22" rx="4" fill="#2980b9" opacity="0.85"/>
  <rect x="125" y="155" width="150" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="200" y="170" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">−1</text>

  <rect x="315" y="155" width="120" height="22" rx="4" fill="#2980b9" opacity="0.7"/>
  <rect x="315" y="155" width="120" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="375" y="170" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">−2</text>

  <rect x="505" y="155" width="90" height="22" rx="4" fill="#2980b9" opacity="0.55"/>
  <rect x="505" y="155" width="90" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="550" y="170" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">−3</text>

  <rect x="695" y="155" width="30" height="22" rx="4" fill="#2980b9" opacity="0.3"/>
  <rect x="695" y="155" width="30" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="710" y="170" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">−4</text>

  <!-- EXP bars -->
  <text x="100" y="220" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#2c3e50">EXP:</text>
  <rect x="125" y="205" width="150" height="22" rx="4" fill="#8e44ad" opacity="0.85"/>
  <rect x="125" y="205" width="150" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="200" y="220" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">0</text>

  <rect x="315" y="205" width="135" height="22" rx="4" fill="#8e44ad" opacity="0.7"/>
  <rect x="315" y="205" width="135" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="375" y="220" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">−1</text>

  <rect x="505" y="205" width="120" height="22" rx="4" fill="#8e44ad" opacity="0.55"/>
  <rect x="505" y="205" width="120" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="565" y="220" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">−2</text>

  <rect x="695" y="205" width="90" height="22" rx="4" fill="#8e44ad" opacity="0.4"/>
  <rect x="695" y="205" width="90" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="740" y="220" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">−3</text>

  <!-- VIG bars -->
  <text x="100" y="270" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#2c3e50">VIG:</text>
  <rect x="125" y="255" width="150" height="22" rx="4" fill="#27ae60" opacity="0.85"/>
  <rect x="125" y="255" width="150" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="200" y="270" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">0</text>

  <rect x="315" y="255" width="150" height="22" rx="4" fill="#27ae60" opacity="0.85"/>
  <rect x="315" y="255" width="150" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="390" y="270" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">0</text>

  <rect x="505" y="255" width="135" height="22" rx="4" fill="#27ae60" opacity="0.7"/>
  <rect x="505" y="255" width="135" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="573" y="270" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">−1</text>

  <rect x="695" y="255" width="120" height="22" rx="4" fill="#e74c3c" opacity="0.6"/>
  <rect x="695" y="255" width="120" height="22" rx="4" fill="none" stroke="#2c3e50" stroke-width="1"/>
  <text x="755" y="270" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700">−2</text>

  <!-- Symptom descriptions -->
  <text x="190" y="315" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Forgetfulness</text>
  <text x="190" y="330" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Misplacing items</text>
  <text x="190" y="345" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">INT checks −3</text>
  <text x="190" y="360" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7f8c8d">Often denied</text>

  <text x="380" y="315" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Can't manage</text>
  <text x="380" y="330" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">finances/driving</text>
  <text x="380" y="345" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Personality changes</text>
  <text x="380" y="360" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Still recognizes family</text>

  <text x="570" y="315" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Needs help bathing/</text>
  <text x="570" y="330" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">dressing. Wanders.</text>
  <text x="570" y="345" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Agitation. Aggression.</text>
  <text x="570" y="360" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="600">⚠ No decisions</text>

  <text x="735" y="315" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">No coherent speech</text>
  <text x="735" y="330" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Full-time care</text>
  <text x="735" y="345" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Incontinence</text>
  <text x="735" y="360" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#e74c3c" font-weight="600">Death from pneumonia</text>

  <!-- Red zone annotation -->
  <rect x="480" y="385" width="320" height="25" rx="4" fill="#e74c3c" opacity="0.1"/>
  <text x="640" y="402" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#e74c3c" font-weight="700">⚠ MODERATE+ = Cannot make medical or financial decisions</text>

  <!-- Bottom note -->
  <rect x="100" y="440" width="650" height="22" rx="4" fill="#fef9e7" stroke="#f9e79f" stroke-width="1"/>
  <text x="425" y="455" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#e67e22">Dementia caregiving: +3 SP/day (vs +2 general) · TN increases by 5 per stage · Wandering risk each month</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 680 400" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <!-- Gauge clip paths -->
    <clipPath id="gauge1"><path d="M115,185 A60,60 0 0,1 115,65"/></clipPath>
    <clipPath id="gauge2"><path d="M295,185 A60,60 0 0,1 295,65"/></clipPath>
    <clipPath id="gauge3"><path d="M385,185 A60,60 0 0,1 385,65"/></clipPath>
    <clipPath id="gauge4"><path d="M565,185 A60,60 0 0,1 565,65"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="680" height="400" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="340" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Annual Marriage Audit Dashboard</text>
  <text x="340" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Four dimensions assessed each year — failures trigger required conversations</text>

  <!-- GAUGE 1: Financial Review — TN 35 -->
  <g transform="translate(115, 125)">
    <!-- Background arc -->
    <path d="M-60,60 A60,60 0 0,1 60,60" fill="none" stroke="#e8e8e8" stroke-width="12"/>
    <!-- Fill arc — FAIL state (red-orange) -->
    <path d="M-60,60 A60,60 0 0,1 60,60" fill="none" stroke="#e67e22" stroke-width="12" stroke-dasharray="120 265"/>
    <!-- Label -->
    <text x="0" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3e50">💰 Financial</text>
    <text x="0" y="100" text-anchor="middle" font-size="9" fill="#e67e22" font-weight="700">FAIL · TN 35</text>
    <text x="0" y="114" text-anchor="middle" font-size="8" fill="#7f8c8d">Behind on savings</text>
  </g>

  <!-- GAUGE 2: Emotional Check-in — TN 30 -->
  <g transform="translate(295, 125)">
    <path d="M-60,60 A60,60 0 0,1 60,60" fill="none" stroke="#e8e8e8" stroke-width="12"/>
    <!-- Mixed: Sarah pass, David fail -->
    <path d="M-60,60 A60,60 0 0,1 0,0" fill="none" stroke="#27ae60" stroke-width="12"/>
    <path d="M0,0 A60,60 0 0,1 60,60" fill="none" stroke="#e74c3c" stroke-width="12"/>
    <text x="0" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3e50">💭 Emotional</text>
    <text x="0" y="100" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="700">MIXED · TN 30</text>
    <text x="0" y="114" text-anchor="middle" font-size="8" fill="#7f8c8d">David feels neglected</text>
  </g>

  <!-- GAUGE 3: Intimacy Assessment — TN 35 -->
  <g transform="translate(385, 125)">
    <path d="M-60,60 A60,60 0 0,1 60,60" fill="none" stroke="#e8e8e8" stroke-width="12"/>
    <path d="M-60,60 A60,60 0 0,1 60,60" fill="none" stroke="#e74c3c" stroke-width="12" stroke-dasharray="120 265"/>
    <text x="0" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3e50">💞 Intimacy</text>
    <text x="0" y="100" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="700">FAIL · TN 35</text>
    <text x="0" y="114" text-anchor="middle" font-size="8" fill="#7f8c8d">Both agree: lacking</text>
  </g>

  <!-- GAUGE 4: Future Alignment — TN 40 -->
  <g transform="translate(565, 125)">
    <path d="M-60,60 A60,60 0 0,1 60,60" fill="none" stroke="#e8e8e8" stroke-width="12"/>
    <path d="M-60,60 A60,60 0 0,1 60,60" fill="none" stroke="#e74c3c" stroke-width="12" stroke-dasharray="180 265"/>
    <text x="0" y="85" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3e50">🔮 Future</text>
    <text x="0" y="100" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="700">FAIL · TN 40</text>
    <text x="0" y="114" text-anchor="middle" font-size="8" fill="#7f8c8d">Adoption mismatch</text>
  </g>

  <!-- CONVERSATION HOURS — below gauges -->
  <rect x="60" y="260" width="560" height="120" rx="8" fill="white" stroke="#dcdcdc" stroke-width="1"/>
  <text x="340" y="283" text-anchor="middle" font-size="12" font-weight="700" fill="#2c3e50">Required Conversations (from failures)</text>

  <!-- Financial failure -->
  <rect x="80" y="295" width="120" height="70" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="140" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#e67e22">💰 3 hours</text>
  <text x="140" y="332" text-anchor="middle" font-size="8" fill="#2c3e50">Downsize apartment?</text>
  <text x="140" y="347" text-anchor="middle" font-size="8" fill="#2c3e50">+1 SP each</text>

  <!-- Emotional failure -->
  <rect x="210" y="295" width="120" height="70" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="270" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">💭 2 hours</text>
  <text x="270" y="332" text-anchor="middle" font-size="8" fill="#2c3e50">Overtime neglect</text>
  <text x="270" y="347" text-anchor="middle" font-size="8" fill="#2c3e50">+2 SP David / +1 Sarah</text>

  <!-- Intimacy failure -->
  <rect x="340" y="295" width="120" height="70" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="400" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">💞 2 hours</text>
  <text x="400" y="332" text-anchor="middle" font-size="8" fill="#2c3e50">Schedule counseling</text>
  <text x="400" y="347" text-anchor="middle" font-size="8" fill="#2c3e50">$150/session · +1 SP each</text>

  <!-- Future alignment failure -->
  <rect x="470" y="295" width="120" height="70" rx="6" fill="#fdedec" stroke="#c0392b" stroke-width="1.5"/>
  <text x="530" y="315" text-anchor="middle" font-size="10" font-weight="700" fill="#c0392b">🔮 4 hours</text>
  <text x="530" y="332" text-anchor="middle" font-size="8" fill="#2c3e50">Adoption vs childfree</text>
  <text x="530" y="347" text-anchor="middle" font-size="8" fill="#c0392b">+3 SP each — BIGGEST</text>
</svg>
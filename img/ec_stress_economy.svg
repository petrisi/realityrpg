<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">⚡ Daily Stress Economy</text>
  <text x="400" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">How Stress Points flow through a character's day</text>

  <!-- ===== CENTRAL: Stress Pool ===== -->
  <rect x="290" y="200" width="220" height="100" rx="12" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="400" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">🎒 Stress Pool</text>
  <text x="400" y="258" text-anchor="middle" font-size="12" fill="#bdc3c7">Current / Max SP</text>
  <text x="400" y="280" text-anchor="middle" font-size="10" fill="#95a5a6">e.g. 18 / 25</text>

  <!-- ===== LEFT SIDE: Stress SOURCES (red arrows IN) ===== -->
  <!-- Source 1: Work/Responsibility -->
  <rect x="30" y="80" width="190" height="55" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">💼 Work / Responsibility</text>
  <text x="125" y="120" text-anchor="middle" font-size="9" fill="#c0392b">+2 to +3 SP/day</text>
  <line x1="220" y1="108" x2="290" y2="220" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Source 2: Chronic Conditions -->
  <rect x="30" y="160" width="190" height="55" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">🧠 Chronic Conditions</text>
  <text x="125" y="200" text-anchor="middle" font-size="9" fill="#c0392b">+1 to +3 SP/day (GAD, PTSD)</text>
  <line x1="220" y1="188" x2="290" y2="230" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Source 3: Life Events -->
  <rect x="30" y="240" width="190" height="55" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="263" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">🌪️ Life Events &amp; Triggers</text>
  <text x="125" y="280" text-anchor="middle" font-size="9" fill="#c0392b">+3 to +5 SP (one-time spikes)</text>
  <line x1="220" y1="268" x2="290" y2="250" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Source 4: Poverty/Scarcity -->
  <rect x="30" y="320" width="190" height="55" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="343" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">🏚️ Poverty / Scarcity</text>
  <text x="125" y="360" text-anchor="middle" font-size="9" fill="#c0392b">+1 to +2 SP/day (food, rent)</text>
  <line x1="220" y1="348" x2="290" y2="270" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Source 5: Social Pressure -->
  <rect x="30" y="400" width="190" height="55" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="423" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">👥 Social Pressure</text>
  <text x="125" y="440" text-anchor="middle" font-size="9" fill="#c0392b">+1 to +2 SP (family, stigma)</text>
  <line x1="220" y1="428" x2="290" y2="280" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- ===== RIGHT SIDE: Coping (green arrows OUT) ===== -->
  <!-- Coping 1: Therapy/Treatment -->
  <rect x="580" y="80" width="190" height="55" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">🧑‍⚕️ Therapy / Treatment</text>
  <text x="675" y="120" text-anchor="middle" font-size="9" fill="#27ae60">−1 to −3 SP per session</text>
  <line x1="580" y1="108" x2="510" y2="220" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Coping 2: Social Support -->
  <rect x="580" y="160" width="190" height="55" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="183" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">🤝 Social Support</text>
  <text x="675" y="200" text-anchor="middle" font-size="9" fill="#27ae60">−1 to −2 SP (family, friends)</text>
  <line x1="580" y1="188" x2="510" y2="230" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Coping 3: Healthy Habits -->
  <rect x="580" y="240" width="190" height="55" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="263" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">🏃 Healthy Habits</text>
  <text x="675" y="280" text-anchor="middle" font-size="9" fill="#27ae60">−1 to −2 SP (exercise, sleep)</text>
  <line x1="580" y1="268" x2="510" y2="250" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Coping 4: Spirituality/Purpose -->
  <rect x="580" y="320" width="190" height="55" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="343" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">🙏 Spirituality / Purpose</text>
  <text x="675" y="360" text-anchor="middle" font-size="9" fill="#27ae60">−1 to −5 SP (prayer, ceremony)</text>
  <line x1="580" y1="348" x2="510" y2="270" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Coping 5: Rest/Recovery -->
  <rect x="580" y="400" width="190" height="55" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="423" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">😴 Rest / Recovery</text>
  <text x="675" y="440" text-anchor="middle" font-size="9" fill="#27ae60">−1 to −2 SP (good sleep)</text>
  <line x1="580" y1="428" x2="510" y2="280" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- ===== BOTTOM: Threshold ===== -->
  <rect x="250" y="340" width="300" height="50" rx="8" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="400" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">⚠️ EPISODE THRESHOLD</text>
  <text x="400" y="380" text-anchor="middle" font-size="10" fill="#fadbd8">SP reaches Max → RES check or Episode</text>

  <!-- Arrow from pool to threshold -->
  <line x1="400" y1="300" x2="400" y2="340" stroke="#e74c3c" stroke-width="3" stroke-dasharray="6,3" marker-end="url(#arrowRed)"/>

  <!-- Net daily balance note -->
  <rect x="50" y="460" width="700" height="45" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="479" text-anchor="middle" font-size="10" font-weight="600" fill="#2980b9">📐 Net = Sources − Coping. If Net &gt; 0, stress accumulates daily. If Net ≤ 0, character stays stable.</text>
  <text x="400" y="496" text-anchor="middle" font-size="9" fill="#2c3e50">Example: Carlos has +6 SP/day sources but only −4 SP/day coping → net +2/day → crisis in 2 days.</text>
</svg>
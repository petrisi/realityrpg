<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 560 400" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <title>Monthly Business Viability Check</title>
  <desc>10x10 outcome grid for 2d10 vs TN 7 with color-coded cells from Crit Fail to Crit Success</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <text x="200" y="24" text-anchor="middle" font-size="15" font-weight="700" fill="#2c3e50">Monthly Business Viability Check</text>
  <text x="200" y="36" text-anchor="middle" font-size="10" fill="#7f8c8d">2d10 outcome grid · TN 7 (modified by ECS)</text>

  <!-- Grid: 10x10, each cell 30x30, starting at x=50 y=55 -->
  <!-- Row labels (die 1) -->
  <g font-size="11" font-weight="600" fill="#2c3e50" text-anchor="end">
    <text x="42" y="72">1</text><text x="42" y="102">2</text><text x="42" y="132">3</text>
    <text x="42" y="162">4</text><text x="42" y="192">5</text><text x="42" y="222">6</text>
    <text x="42" y="252">7</text><text x="42" y="282">8</text><text x="42" y="312">9</text><text x="42" y="342">10</text>
  </g>
  <!-- Col labels (die 2) -->
  <g font-size="11" font-weight="600" fill="#2c3e50" text-anchor="middle">
    <text x="65" y="50">1</text><text x="95" y="50">2</text><text x="125" y="50">3</text>
    <text x="155" y="50">4</text><text x="185" y="50">5</text><text x="215" y="50">6</text>
    <text x="245" y="50">7</text><text x="275" y="50">8</text><text x="305" y="50">9</text><text x="335" y="50">10</text>
  </g>

  <!-- Cells: sum = row+col. TN 7 means sum≥7 = success. Sum≥9 = crit success. Sum≤4 = crit fail. Sum 5-6 = fail. -->
  <!-- Row 1 (die=1): sums 2-11 -->
  <rect x="50" y="55" width="30" height="30" fill="#c0392b" rx="2"/><rect x="80" y="55" width="30" height="30" fill="#c0392b" rx="2"/>
  <rect x="110" y="55" width="30" height="30" fill="#e74c3c" rx="2"/><rect x="140" y="55" width="30" height="30" fill="#f39c12" rx="2"/>
  <rect x="170" y="55" width="30" height="30" fill="#f39c12" rx="2"/><rect x="200" y="55" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="230" y="55" width="30" height="30" fill="#27ae60" rx="2"/><rect x="260" y="55" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="290" y="55" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="320" y="55" width="30" height="30" fill="#1abc9c" rx="2"/>

  <!-- Row 2 (die=2): sums 3-12 -->
  <rect x="50" y="85" width="30" height="30" fill="#c0392b" rx="2"/><rect x="80" y="85" width="30" height="30" fill="#c0392b" rx="2"/>
  <rect x="110" y="85" width="30" height="30" fill="#e74c3c" rx="2"/><rect x="140" y="85" width="30" height="30" fill="#f39c12" rx="2"/>
  <rect x="170" y="85" width="30" height="30" fill="#f39c12" rx="2"/><rect x="200" y="85" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="230" y="85" width="30" height="30" fill="#27ae60" rx="2"/><rect x="260" y="85" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="290" y="85" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="320" y="85" width="30" height="30" fill="#1abc9c" rx="2"/>

  <!-- Row 3 -->
  <rect x="50" y="115" width="30" height="30" fill="#c0392b" rx="2"/><rect x="80" y="115" width="30" height="30" fill="#e74c3c" rx="2"/>
  <rect x="110" y="115" width="30" height="30" fill="#f39c12" rx="2"/><rect x="140" y="115" width="30" height="30" fill="#f39c12" rx="2"/>
  <rect x="170" y="115" width="30" height="30" fill="#27ae60" rx="2"/><rect x="200" y="115" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="230" y="115" width="30" height="30" fill="#27ae60" rx="2"/><rect x="260" y="115" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="290" y="115" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="320" y="115" width="30" height="30" fill="#1abc9c" rx="2"/>

  <!-- Row 4 -->
  <rect x="50" y="145" width="30" height="30" fill="#e74c3c" rx="2"/><rect x="80" y="145" width="30" height="30" fill="#f39c12" rx="2"/>
  <rect x="110" y="145" width="30" height="30" fill="#f39c12" rx="2"/><rect x="140" y="145" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="170" y="145" width="30" height="30" fill="#27ae60" rx="2"/><rect x="200" y="145" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="230" y="145" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="260" y="145" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="290" y="145" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="320" y="145" width="30" height="30" fill="#1abc9c" rx="2"/>

  <!-- Row 5 -->
  <rect x="50" y="175" width="30" height="30" fill="#f39c12" rx="2"/><rect x="80" y="175" width="30" height="30" fill="#f39c12" rx="2"/>
  <rect x="110" y="175" width="30" height="30" fill="#27ae60" rx="2"/><rect x="140" y="175" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="170" y="175" width="30" height="30" fill="#27ae60" rx="2"/><rect x="200" y="175" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="230" y="175" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="260" y="175" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="290" y="175" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="320" y="175" width="30" height="30" fill="#1abc9c" rx="2"/>

  <!-- Row 6 -->
  <rect x="50" y="205" width="30" height="30" fill="#f39c12" rx="2"/><rect x="80" y="205" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="110" y="205" width="30" height="30" fill="#27ae60" rx="2"/><rect x="140" y="205" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="170" y="205" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="200" y="205" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="230" y="205" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="260" y="205" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="290" y="205" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="320" y="205" width="30" height="30" fill="#1abc9c" rx="2"/>

  <!-- Row 7 -->
  <rect x="50" y="235" width="30" height="30" fill="#27ae60" rx="2"/><rect x="80" y="235" width="30" height="30" fill="#27ae60" rx="2"/>
  <rect x="110" y="235" width="30" height="30" fill="#27ae60" rx="2"/><rect x="140" y="235" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="170" y="235" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="200" y="235" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="230" y="235" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="260" y="235" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="290" y="235" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="320" y="235" width="30" height="30" fill="#1abc9c" rx="2"/>

  <!-- Row 8 -->
  <rect x="50" y="265" width="30" height="30" fill="#27ae60" rx="2"/><rect x="80" y="265" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="110" y="265" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="140" y="265" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="170" y="265" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="200" y="265" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="230" y="265" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="260" y="265" width="30" height="30" fill="#1abc9c" rx="2"/>
  <rect x="290" y="265" width="30" height="30" fill="#1abc9c" rx="2"/><rect x="320" y="265" width="30" height="30" fill="#1abc9c" rx="2"/>

  <!-- Rows 9-10: all crit success -->
  <rect x="50" y="295" width="300" height="30" fill="#1abc9c" rx="2"/>
  <rect x="50" y="325" width="300" height="30" fill="#1abc9c" rx="2"/>

  <!-- Legend -->
  <g font-size="10" font-weight="600">
    <rect x="50" y="365" width="12" height="12" fill="#c0392b" rx="2"/>
    <text x="68" y="375">Crit Fail (1-2): Crisis −20 to −50%</text>
    <rect x="50" y="380" width="12" height="12" fill="#e74c3c" rx="2"/>
    <text x="68" y="390">Fail (3-4): Loss −5 to −15%</text>
  </g>
  <g font-size="10" font-weight="600">
    <rect x="230" y="365" width="12" height="12" fill="#f39c12" rx="2"/>
    <text x="248" y="375">Fail (5-6): Barely break even</text>
    <rect x="230" y="380" width="12" height="12" fill="#27ae60" rx="2"/>
    <text x="248" y="390">Success (7-8): Profit 10-30%</text>
  </g>
  <g font-size="10" font-weight="600">
    <rect x="410" y="365" width="12" height="12" fill="#1abc9c" rx="2"/>
    <text x="428" y="375">Crit Success (9-10):</text>
    <text x="428" y="390">Breakthrough! ×2</text>
  </g>
</svg>

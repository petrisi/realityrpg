<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 700 380" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <text x="350" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">Encumbrance: Max Load by VIG Score</text>
  <text x="350" y="50" text-anchor="middle" font-size="12" fill="#7f8c8d">Overload costs 1 VIG/hour. At VIG 0 while overloaded, risk injury.</text>

  <!-- Chart area: y=80 to y=320, x=140 to x=620 -->
  <!-- 5 rows, each 40px tall -->

  <!-- Row 1: VIG 8 or below — 15 lb -->
  <g transform="translate(0, 80)">
    <text x="130" y="22" text-anchor="end" font-size="13" font-weight="600" fill="#2c3e50">VIG ≤ 8</text>
    <rect x="140" y="6" width="620" height="32" rx="4" fill="#e8e8e8"/>
    <rect x="140" y="6" width="68" height="32" rx="4" fill="#e74c3c"/>
    <text x="174" y="27" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">15 lb</text>
    <!-- Penalty zone -->
    <rect x="208" y="6" width="552" height="32" rx="0" fill="#e74c3c" opacity="0.1"/>
    <text x="484" y="27" font-size="11" fill="#c0392b">−2 to all physical rolls</text>
  </g>

  <!-- Row 2: VIG 9-11 — 25 lb -->
  <g transform="translate(0, 125)">
    <text x="130" y="22" text-anchor="end" font-size="13" font-weight="600" fill="#2c3e50">VIG 9–11</text>
    <rect x="140" y="6" width="620" height="32" rx="4" fill="#e8e8e8"/>
    <rect x="140" y="6" width="113" height="32" rx="4" fill="#e67e22"/>
    <text x="196" y="27" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">25 lb</text>
    <rect x="253" y="6" width="507" height="32" rx="0" fill="#e67e22" opacity="0.1"/>
    <text x="506" y="27" font-size="11" fill="#e67e22">−1 to all physical rolls</text>
  </g>

  <!-- Row 3: VIG 12-14 — 40 lb -->
  <g transform="translate(0, 170)">
    <text x="130" y="22" text-anchor="end" font-size="13" font-weight="600" fill="#2c3e50">VIG 12–14</text>
    <rect x="140" y="6" width="620" height="32" rx="4" fill="#e8e8e8"/>
    <rect x="140" y="6" width="181" height="32" rx="4" fill="#f39c12"/>
    <text x="230" y="27" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">40 lb</text>
    <rect x="321" y="6" width="439" height="32" rx="0" fill="#f39c12" opacity="0.1"/>
    <text x="540" y="27" font-size="11" fill="#f39c12">−1 to DEX rolls only</text>
  </g>

  <!-- Row 4: VIG 15-17 — 55 lb -->
  <g transform="translate(0, 215)">
    <text x="130" y="22" text-anchor="end" font-size="13" font-weight="600" fill="#2c3e50">VIG 15–17</text>
    <rect x="140" y="6" width="620" height="32" rx="4" fill="#e8e8e8"/>
    <rect x="140" y="6" width="249" height="32" rx="4" fill="#27ae60"/>
    <text x="264" y="27" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">55 lb</text>
    <rect x="389" y="6" width="371" height="32" rx="0" fill="#f39c12" opacity="0.08"/>
    <text x="574" y="27" font-size="11" fill="#7f8c8d">No penalty until 70 lb</text>
  </g>

  <!-- Row 5: VIG 18+ — 70 lb -->
  <g transform="translate(0, 260)">
    <text x="130" y="22" text-anchor="end" font-size="13" font-weight="600" fill="#2c3e50">VIG 18+</text>
    <rect x="140" y="6" width="620" height="32" rx="4" fill="#e8e8e8"/>
    <rect x="140" y="6" width="317" height="32" rx="4" fill="#27ae60"/>
    <text x="300" y="27" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">70 lb</text>
    <rect x="457" y="6" width="303" height="32" rx="0" fill="#f39c12" opacity="0.08"/>
    <text x="608" y="27" font-size="11" fill="#7f8c8d">No penalty until 90 lb</text>
  </g>

  <!-- Scale labels -->
  <g font-size="10" fill="#7f8c8d" text-anchor="middle">
    <text x="140" y="335">0 lb</text>
    <text x="308" y="335">35 lb</text>
    <text x="477" y="335">70 lb</text>
    <text x="645" y="335">105 lb</text>
  </g>

  <!-- Legend -->
  <g transform="translate(140, 350)" font-size="10">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#e74c3c"/>
    <text x="16" y="11">Comfortable load</text>
    <rect x="120" y="0" width="12" height="12" rx="2" fill="#e74c3c" opacity="0.15"/>
    <text x="136" y="11">Penalty zone (overloaded)</text>
  </g>
</svg>

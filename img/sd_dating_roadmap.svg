<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 900 430" width="900" height="430">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="900" height="430" fill="#fafbfc" rx="8"/>
  <text x="450" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#2c3e50">Dating Roadmap</text>

  <!-- Main progression path (horizontal) -->
  <!-- Step 1: Attraction Check -->
  <rect x="30" y="60" width="68" height="72" rx="8" fill="#2c3e50" filter="url(#s1)"/>
  <text x="64" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">💘</text>
  <text x="64" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#ecf0f1">Attraction</text>
  <text x="64" y="116" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="7" fill="#bdc3c7">Check</text>

  <line x1="98" y1="96" x2="118" y2="96" stroke="#2c3e50" stroke-width="2"/>
  <polygon points="115,92 122,96 115,100" fill="#2c3e50"/>

  <!-- Step 2: Compatibility Check -->
  <rect x="122" y="60" width="78" height="72" rx="8" fill="#2c3e50" filter="url(#s1)"/>
  <text x="161" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">🔍</text>
  <text x="161" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#ecf0f1">Compatibility</text>
  <text x="161" y="116" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="7" fill="#bdc3c7">Check</text>

  <line x1="200" y1="96" x2="220" y2="96" stroke="#2c3e50" stroke-width="2"/>
  <polygon points="217,92 224,96 217,100" fill="#2c3e50"/>

  <!-- Step 3: Vulnerability Check -->
  <rect x="224" y="60" width="80" height="72" rx="8" fill="#2c3e50" filter="url(#s1)"/>
  <text x="264" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">🫀</text>
  <text x="264" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#ecf0f1">Vulnerability</text>
  <text x="264" y="116" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="7" fill="#bdc3c7">Check</text>

  <line x1="304" y1="96" x2="324" y2="96" stroke="#2c3e50" stroke-width="2"/>
  <polygon points="321,92 328,96 321,100" fill="#2c3e50"/>

  <!-- Step 4: First Date -->
  <rect x="328" y="60" width="68" height="72" rx="8" fill="#2980b9" filter="url(#s1)"/>
  <text x="362" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">🍽️</text>
  <text x="362" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#fff">First Date</text>

  <line x1="396" y1="96" x2="416" y2="96" stroke="#2980b9" stroke-width="2"/>
  <polygon points="413,92 420,96 413,100" fill="#2980b9"/>

  <!-- Step 5: Second Date -->
  <rect x="420" y="60" width="68" height="72" rx="8" fill="#2980b9" filter="url(#s1)"/>
  <text x="454" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">🎬</text>
  <text x="454" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#fff">Second Date</text>

  <line x1="488" y1="96" x2="508" y2="96" stroke="#2980b9" stroke-width="2"/>
  <polygon points="485,92 492,96 485,100" fill="#2980b9"/>

  <!-- Step 6: "I Like You" -->
  <rect x="512" y="60" width="72" height="72" rx="8" fill="#e67e22" filter="url(#s1)"/>
  <text x="548" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">💬</text>
  <text x="548" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#fff">I Like You</text>

  <line x1="584" y1="96" x2="604" y2="96" stroke="#e67e22" stroke-width="2"/>
  <polygon points="581,92 588,96 581,100" fill="#e67e22"/>

  <!-- Step 7: Exclusive -->
  <rect x="608" y="60" width="60" height="72" rx="8" fill="#e67e22" filter="url(#s1)"/>
  <text x="638" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">💑</text>
  <text x="638" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#fff">Exclusive</text>

  <line x1="668" y1="96" x2="688" y2="96" stroke="#e67e22" stroke-width="2"/>
  <polygon points="665,92 672,96 665,100" fill="#e67e22"/>

  <!-- Step 8: "I Love You" -->
  <rect x="692" y="60" width="72" height="72" rx="8" fill="#c0392b" filter="url(#s1)"/>
  <text x="728" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">❤️</text>
  <text x="728" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#fff">I Love You</text>

  <line x1="764" y1="96" x2="784" y2="96" stroke="#c0392b" stroke-width="2"/>
  <polygon points="761,92 768,96 761,100" fill="#c0392b"/>

  <!-- Step 9: Meeting Family -->
  <rect x="788" y="60" width="78" height="72" rx="8" fill="#c0392b" filter="url(#s1)"/>
  <text x="827" y="85" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">👨‍👩‍👧</text>
  <text x="827" y="105" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#fff">Meet Family</text>

  <!-- Step 10: Moving In (below, since horizontal space) -->
  <rect x="770" y="155" width="78" height="72" rx="8" fill="#c0392b" filter="url(#s1)"/>
  <text x="809" y="180" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">🏠</text>
  <text x="809" y="200" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#fff">Moving In</text>

  <line x1="827" y1="132" x2="827" y2="150" stroke="#c0392b" stroke-width="2"/>
  <polygon points="823,145 831,145 827,155" fill="#c0392b"/>

  <!-- Step 11: Marriage (below moving in) -->
  <rect x="770" y="240" width="78" height="72" rx="8" fill="#c0392b" filter="url(#s1)"/>
  <text x="809" y="265" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">💍</text>
  <text x="809" y="285" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#fff">Marriage</text>

  <line x1="809" y1="227" x2="809" y2="237" stroke="#c0392b" stroke-width="2"/>
  <polygon points="805,232 813,232 809,242" fill="#c0392b"/>

  <!-- Breakup exit path (red, branching downward from middle) -->
  <line x1="548" y1="132" x2="548" y2="160" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="544,155 552,155 548,165" fill="#c0392b"/>

  <!-- Breakup box -->
  <rect x="440" y="165" width="216" height="90" rx="10" fill="#fff5f5" stroke="#c0392b" stroke-width="2" filter="url(#s1)"/>
  <text x="548" y="185" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#c0392b">⚠ Breakup</text>
  <text x="460" y="205" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b">• Stress 3-8</text>
  <text x="460" y="222" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b">• −2 Mental Health (4-12 wks)</text>
  <text x="460" y="239" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b">• Tier → Acquaintance/Stranger</text>

  <!-- Additional breakup branches from other steps -->
  <line x1="362" y1="132" x2="362" y2="155" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="454" y1="132" x2="454" y2="155" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="362" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="7" fill="#c0392b" opacity="0.6">exit</text>
  <text x="454" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="7" fill="#c0392b" opacity="0.6">exit</text>

  <!-- Bottom note -->
  <text x="450" y="405" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#7f8c8d">Each step requires mutual investment. Failure at any step may trigger the breakup path.</text>

  <!-- Legend for checks -->
  <rect x="30" y="300" width="200" height="78" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1" filter="url(#s2)"/>
  <text x="130" y="320" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" fill="#2c3e50">Check Types</text>
  <text x="42" y="340" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d">💘 Attraction: Presence check</text>
  <text x="42" y="356" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d">🔍 Compatibility: Empathy check</text>
  <text x="42" y="372" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d">🫀 Vulnerability: Resolve check</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 560 720" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <title>Running for Office — Campaign Flowchart</title>
  <desc>4-phase vertical flowchart showing campaign phases with dice mechanics, resource bars, and Election Day final roll</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2980b9"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#27ae60"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="720" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="280" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Running for Office — Campaign Flowchart</text>
  <text x="280" y="45" text-anchor="middle" font-size="10.5" fill="#5d6d7e">4 overlapping phases with time, money, and stress costs</text>

  <!-- ════════════════════════════════════════
       LEFT COLUMN: 4 Phase Boxes (x=30..340)
       RIGHT COLUMN: Resource Bars (x=365..540)
       ════════════════════════════════════════ -->

  <!-- Phase 1: Fundraising -->
  <g filter="url(#shadow)">
    <rect x="30" y="58" width="310" height="68" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
    <text x="45" y="80" font-size="12" font-weight="700" fill="#2c3e50">① Fundraising</text>
    <text x="45" y="97" font-size="9.5" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">2d10+PRC+EXP vs TN 12</tspan><tspan fill="#5d6d7e"> per event</tspan></text>
    <text x="45" y="111" font-size="9.5" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">1d6×$500</tspan><tspan fill="#5d6d7e"> per success · <tspan font-family="Consolas, monospace" fill="#e67e22">+2 SP</tspan><tspan fill="#5d6d7e"> per event</tspan></tspan></text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="185" y1="126" x2="185" y2="146" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: Platform Development -->
  <g filter="url(#shadow)">
    <rect x="30" y="150" width="310" height="68" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
    <text x="45" y="172" font-size="12" font-weight="700" fill="#2c3e50">② Platform Development</text>
    <text x="45" y="189" font-size="9.5" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">2d10+INT vs TN 12</tspan><tspan fill="#5d6d7e"> research</tspan></text>
    <text x="45" y="203" font-size="9.5" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">2d10+PRC vs TN 10</tspan><tspan fill="#5d6d7e"> town halls</tspan></text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="185" y1="218" x2="185" y2="238" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3: Campaign Execution -->
  <g filter="url(#shadow)">
    <rect x="30" y="242" width="310" height="68" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
    <text x="45" y="264" font-size="12" font-weight="700" fill="#2c3e50">③ Campaign Execution</text>
    <text x="45" y="281" font-size="9.5" fill="#5d6d7e">Debates · media · canvassing · endorsements</text>
    <text x="45" y="295" font-size="9.5" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+1 to +2 Campaign Points</tspan><tspan fill="#5d6d7e"> per success</tspan></text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="185" y1="310" x2="185" y2="330" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4: Scandal Management -->
  <g filter="url(#shadow)">
    <rect x="30" y="334" width="310" height="68" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
    <text x="45" y="356" font-size="12" font-weight="700" fill="#2c3e50">④ Scandal Management</text>
    <text x="45" y="373" font-size="9.5" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">1d10/month</tspan><tspan fill="#5d6d7e"> · On 1-2: scandal hits</tspan></text>
    <text x="45" y="387" font-size="9.5" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">2d10+PRC+RES vs TN 14</tspan><tspan fill="#5d6d7e"> to respond</tspan></text>
  </g>

  <!-- ════════════════════════════════════════
       RIGHT COLUMN: Resource Bars
       ════════════════════════════════════════ -->
  <text x="452" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3e50">Resources</text>

  <!-- Time -->
  <g filter="url(#shadow)">
    <rect x="365" y="86" width="170" height="42" rx="8" fill="#eaf2f8" stroke="#3498db" stroke-width="1.2"/>
    <text x="378" y="104" font-size="10" font-weight="600" fill="#2c3e50">⏱ Time</text>
    <text x="378" y="118" font-size="9" fill="#5d6d7e">3-24 months (office level)</text>
  </g>

  <!-- Money -->
  <g filter="url(#shadow)">
    <rect x="365" y="134" width="170" height="42" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.2"/>
    <text x="378" y="152" font-size="10" font-weight="600" fill="#2c3e50">💰 Money</text>
    <text x="378" y="166" font-size="9" fill="#5d6d7e">$5K to $3M+ fundraising</text>
  </g>

  <!-- SP -->
  <g filter="url(#shadow)">
    <rect x="365" y="182" width="170" height="42" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.2"/>
    <text x="378" y="200" font-size="10" font-weight="600" fill="#2c3e50">⚡ SP (Stress)</text>
    <text x="378" y="214" font-size="9" fill="#5d6d7e">Accumulates toward burnout</text>
  </g>

  <!-- Connector lines from phases to resource bars (dashed) -->
  <line x1="340" y1="92" x2="365" y2="107" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="184" x2="365" y2="155" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="340" y1="368" x2="365" y2="203" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ════════════════════════════════════════
       BRANCHING from Phase 4: Scandal outcomes
       ════════════════════════════════════════ -->

  <!-- Arrow down from Phase 4 center -->
  <line x1="185" y1="402" x2="185" y2="422" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Branch split: Success (left) vs Failure (right) -->
  <!-- Success branch (green) -->
  <line x1="185" y1="422" x2="90" y2="422" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="90" y1="422" x2="90" y2="442" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="138" y="416" text-anchor="middle" font-size="9" font-weight="700" fill="#27ae60">Success</text>

  <g filter="url(#shadow)">
    <rect x="15" y="442" width="150" height="36" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
    <text x="90" y="458" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e8449">−1 CP, continue</text>
    <text x="90" y="470" text-anchor="middle" font-size="8.5" fill="#5d6d7e">campaign lives on</text>
  </g>

  <!-- Failure branch (red) -->
  <line x1="185" y1="422" x2="280" y2="422" stroke="#c0392b" stroke-width="1.5"/>
  <line x1="280" y1="422" x2="280" y2="442" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="233" y="416" text-anchor="middle" font-size="9" font-weight="700" fill="#c0392b">Failure</text>

  <g filter="url(#shadow)">
    <rect x="205" y="442" width="155" height="36" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="1.5"/>
    <text x="282" y="458" text-anchor="middle" font-size="9.5" font-weight="600" fill="#922b21">−3 CP, possible end</text>
    <text x="282" y="470" text-anchor="middle" font-size="8.5" fill="#5d6d7e">campaign may collapse</text>
  </g>

  <!-- Convergence arrow back to main flow -->
  <line x1="90" y1="478" x2="90" y2="508" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="90" y1="508" x2="185" y2="508" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="185" y1="508" x2="185" y2="518" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="280" y1="478" x2="280" y2="508" stroke="#2980b9" stroke-width="1.5"/>
  <line x1="280" y1="508" x2="185" y2="508" stroke="#2980b9" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BOTTOM: Election Day Final Roll
       ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="50" y="530" width="270" height="60" rx="12" fill="#2c3e50"/>
    <text x="185" y="554" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">⚡ Election Day — Final Roll</text>
    <text x="185" y="572" text-anchor="middle" font-size="10" fill="#ecf0f1"><tspan font-family="Consolas, monospace" fill="#f39c12">2d10 + Campaign Points + EXP mod vs TN</tspan></text>
    <text x="185" y="586" text-anchor="middle" font-size="9" fill="#bdc3c7">(TN depends on office level)</text>
  </g>

  <!-- Bottom note -->
  <g filter="url(#shadow)">
    <rect x="30" y="610" width="500" height="44" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
    <text x="280" y="628" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7e5109">⚠️ Phases ①-④ overlap in time — all run simultaneously toward Election Day</text>
    <text x="280" y="643" text-anchor="middle" font-size="9" fill="#5d6d7e">Scandal risk is constant (monthly roll) · SP accumulates across all phases · High SP = burnout risk</text>
  </g>
</svg>

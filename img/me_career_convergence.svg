<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">Career Ladder Salary Comparison</text>
  <text x="300" y="40" text-anchor="middle" font-size="10" fill="#7f8c8d">Same level, different pay — compare career paths</text>

  <!-- Horizontal bars for each career at each level -->
  <!-- Y positions: L1=60, L2=100, L3=140, L4=180, L5=220, L6=260 -->
  <!-- X scale: $0..$600K maps to 120..560 -->

  <g font-size="10" font-weight="600" fill="#2c3e50" text-anchor="end">
    <text x="115" y="64">Level 1</text>
    <text x="115" y="104">Level 2</text>
    <text x="115" y="144">Level 3</text>
    <text x="115" y="184">Level 4</text>
    <text x="115" y="224">Level 5</text>
    <text x="115" y="264">Level 6</text>
  </g>

  <!-- Corporate: $40-60K, $60-90K, $90-130K, $130-180K, $180-300K, $300K-1M -->
  <g filter="url(#shadow)">
    <rect x="125" y="52" width="30" height="16" rx="3" fill="#2980b9" opacity="0.8"/>
    <rect x="125" y="92" width="50" height="16" rx="3" fill="#2980b9" opacity="0.8"/>
    <rect x="125" y="132" width="83" height="16" rx="3" fill="#2980b9" opacity="0.8"/>
    <rect x="125" y="172" width="113" height="16" rx="3" fill="#2980b9" opacity="0.8"/>
    <rect x="125" y="212" width="163" height="16" rx="3" fill="#2980b9" opacity="0.8"/>
    <rect x="125" y="252" width="200" height="16" rx="3" fill="#2980b9" opacity="0.8"/>
  </g>

  <!-- Healthcare: $30-45K, $45-60K, $60-95K, $95-130K, $180-400K -->
  <g filter="url(#shadow)">
    <rect x="125" y="52" width="23" height="16" rx="3" fill="#27ae60" opacity="0.6"/>
    <rect x="125" y="92" width="38" height="16" rx="3" fill="#27ae60" opacity="0.6"/>
    <rect x="125" y="132" width="68" height="16" rx="3" fill="#27ae60" opacity="0.6"/>
    <rect x="125" y="172" width="83" height="16" rx="3" fill="#27ae60" opacity="0.6"/>
    <rect x="125" y="212" width="163" height="16" rx="3" fill="#27ae60" opacity="0.6"/>
  </g>

  <!-- Tech: $60-90K, $90-140K, $140-200K, $200-300K, $200-350K, $300-600K -->
  <g filter="url(#shadow)">
    <rect x="125" y="52" width="50" height="16" rx="3" fill="#e67e22" opacity="0.8"/>
    <rect x="125" y="92" width="83" height="16" rx="3" fill="#e67e22" opacity="0.8"/>
    <rect x="125" y="132" width="113" height="16" rx="3" fill="#e67e22" opacity="0.8"/>
    <rect x="125" y="172" width="140" height="16" rx="3" fill="#e67e22" opacity="0.8"/>
    <rect x="125" y="212" width="153" height="16" rx="3" fill="#e67e22" opacity="0.8"/>
    <rect x="125" y="252" width="200" height="16" rx="3" fill="#e67e22" opacity="0.8"/>
  </g>

  <!-- Trades: $30-45K, $45-70K, $70-100K, $80-120K, $100-250K -->
  <g filter="url(#shadow)">
    <rect x="125" y="52" width="23" height="16" rx="3" fill="#f39c12" opacity="0.6"/>
    <rect x="125" y="92" width="55" height="16" rx="3" fill="#f39c12" opacity="0.6"/>
    <rect x="125" y="132" width="73" height="16" rx="3" fill="#f39c12" opacity="0.6"/>
    <rect x="125" y="172" width="93" height="16" rx="3" fill="#f39c12" opacity="0.6"/>
    <rect x="125" y="212" width="127" height="16" rx="3" fill="#f39c12" opacity="0.6"/>
  </g>

  <!-- Federal GS: $30-55K, $55-85K, $85-115K, $115-165K, $165-220K -->
  <g filter="url(#shadow)">
    <rect x="125" y="52" width="35" height="16" rx="3" fill="#8e44ad" opacity="0.6"/>
    <rect x="125" y="92" width="65" height="16" rx="3" fill="#8e44ad" opacity="0.6"/>
    <rect x="125" y="132" width="93" height="16" rx="3" fill="#8e44ad" opacity="0.6"/>
    <rect x="125" y="172" width="123" height="16" rx="3" fill="#8e44ad" opacity="0.6"/>
    <rect x="125" y="212" width="147" height="16" rx="3" fill="#8e44ad" opacity="0.6"/>
  </g>

  <!-- Education: $45-70K, $65-85K, $75-100K, $85-120K, $100-180K -->
  <g filter="url(#shadow)">
    <rect x="125" y="52" width="38" height="16" rx="3" fill="#1abc9c" opacity="0.6"/>
    <rect x="125" y="92" width="65" height="16" rx="3" fill="#1abc9c" opacity="0.6"/>
    <rect x="125" y="132" width="78" height="16" rx="3" fill="#1abc9c" opacity="0.6"/>
    <rect x="125" y="172" width="93" height="16" rx="3" fill="#1abc9c" opacity="0.6"/>
    <rect x="125" y="212" width="113" height="16" rx="3" fill="#1abc9c" opacity="0.6"/>
  </g>

  <!-- Legend -->
  <g font-size="9" font-weight="600">
    <rect x="125" y="285" width="10" height="10" rx="2" fill="#2980b9"/><text x="140" y="294">Corporate</text>
    <rect x="200" y="285" width="10" height="10" rx="2" fill="#e67e22"/><text x="215" y="294">Tech</text>
    <rect x="260" y="285" width="10" height="10" rx="2" fill="#27ae60"/><text x="275" y="294">Healthcare</text>
    <rect x="350" y="285" width="10" height="10" rx="2" fill="#f39c12"/><text x="365" y="294">Trades</text>
    <rect x="420" y="285" width="10" height="10" rx="2" fill="#8e44ad"/><text x="435" y="294">Federal</text>
    <rect x="490" y="285" width="10" height="10" rx="2" fill="#1abc9c"/><text x="505" y="294">Education</text>
  </g>
</svg>

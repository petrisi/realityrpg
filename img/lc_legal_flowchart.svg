<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Legal System Flowchart</text>

  <!-- ════════════════════════════════════════
       Row 1: Police Encounter → TN Check
       ════════════════════════════════════════ -->

  <!-- Police Encounter -->
  <rect x="50" y="80" width="160" height="50" rx="10" fill="#2980b9" filter="url(#shadow)"/>
  <text x="130" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🚔 Police</text>
  <text x="130" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Encounter</text>

  <line x1="210" y1="105" x2="250" y2="105" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- TN Check -->
  <rect x="250" y="80" width="170" height="50" rx="10" fill="#f39c12" filter="url(#shadow)"/>
  <text x="335" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">🎲 TN Check</text>
  <text x="335" y="119" text-anchor="middle" font-size="11" fill="#fff">(RES + EXP)</text>

  <!-- Success branch going right (upper) -->
  <line x1="335" y1="80" x2="335" y2="55" stroke="#27ae60" stroke-width="2"/>
  <line x1="335" y1="55" x2="470" y2="55" stroke="#27ae60" stroke-width="2"/>
  <line x1="470" y1="55" x2="470" y2="80" stroke="#27ae60" stroke-width="2"/>
  <text x="398" y="50" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">✓ Success</text>

  <!-- Warning / Ticket -->
  <rect x="470" y="80" width="160" height="50" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="550" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="#27ae60">⚠️ Warning</text>
  <text x="550" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#27ae60">or Ticket</text>

  <line x1="630" y1="105" x2="670" y2="105" stroke="#27ae60" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- End node (success path) -->
  <rect x="670" y="80" width="100" height="50" rx="10" fill="#27ae60" filter="url(#shadow)"/>
  <text x="720" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">✅ End</text>
  <text x="720" y="119" text-anchor="middle" font-size="10" fill="#d5f5e3">No record</text>

  <!-- Failure branch going down -->
  <line x1="335" y1="130" x2="335" y2="158" stroke="#c0392b" stroke-width="2"/>
  <text x="355" y="150" font-size="11" font-weight="700" fill="#c0392b">✗ Fail</text>

  <!-- ════════════════════════════════════════
       Row 2: Arrest → Court Date → Trial
       ════════════════════════════════════════ -->

  <!-- Arrest -->
  <rect x="250" y="168" width="170" height="50" rx="10" fill="#fadbd8" stroke="#c0392b" stroke-width="2" filter="url(#shadow)"/>
  <text x="335" y="191" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">🔒 Arrest</text>
  <text x="335" y="207" text-anchor="middle" font-size="11" fill="#922b21">Detained</text>

  <line x1="335" y1="218" x2="335" y2="248" stroke="#c0392b" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- Court Date -->
  <rect x="250" y="253" width="170" height="50" rx="10" fill="#2980b9" filter="url(#shadow)"/>
  <text x="335" y="276" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">📅 Court Date</text>
  <text x="335" y="292" text-anchor="middle" font-size="11" fill="#d6eaf8">Schedule set</text>

  <line x1="335" y1="303" x2="335" y2="333" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Trial / Hearing -->
  <rect x="250" y="338" width="170" height="50" rx="10" fill="#2980b9" filter="url(#shadow)"/>
  <text x="335" y="361" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">⚖️ Trial / Hearing</text>
  <text x="335" y="377" text-anchor="middle" font-size="11" fill="#d6eaf8">Present evidence</text>

  <line x1="335" y1="388" x2="335" y2="418" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════
       Row 3: Verdict (decision point)
       ════════════════════════════════════════ -->

  <!-- Verdict diamond -->
  <polygon points="335,418 430,453 335,488 240,453" fill="#f39c12" filter="url(#shadow)"/>
  <text x="335" y="451" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">⚖️ Verdict</text>
  <text x="335" y="467" text-anchor="middle" font-size="11" fill="#fff">Jury / Judge</text>

  <!-- Guilty branch going right -->
  <line x1="430" y1="453" x2="470" y2="453" stroke="#c0392b" stroke-width="2"/>
  <text x="450" y="445" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">Guilty</text>

  <!-- Sentence / Fine -->
  <rect x="470" y="433" width="150" height="50" rx="10" fill="#fadbd8" stroke="#c0392b" stroke-width="2" filter="url(#shadow)"/>
  <text x="545" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">💰 Sentence / Fine</text>
  <text x="545" y="472" text-anchor="middle" font-size="11" fill="#922b21">Jail, probation, fees</text>

  <line x1="620" y1="458" x2="660" y2="458" stroke="#c0392b" stroke-width="2" marker-end="url(#arrRed)"/>

  <!-- Record Impact + SP -->
  <rect x="660" y="433" width="190" height="50" rx="10" fill="#c0392b" filter="url(#shadow)"/>
  <text x="755" y="456" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">📋 Record Impact</text>
  <text x="755" y="472" text-anchor="middle" font-size="11" fill="#f5b7b1">Criminal record + SP gained</text>

  <!-- Not Guilty branch going down -->
  <line x1="335" y1="488" x2="335" y2="518" stroke="#27ae60" stroke-width="2"/>
  <text x="288" y="510" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">Not Guilty</text>

  <!-- Released -->
  <rect x="240" y="518" width="190" height="50" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="335" y="541" text-anchor="middle" font-size="12" font-weight="700" fill="#27ae60">✅ Released</text>
  <text x="335" y="557" text-anchor="middle" font-size="11" fill="#1e8449">No criminal record</text>

  <!-- ════════════════════════════════════════
       Side note: Traffic tickets
       ════════════════════════════════════════ -->

  <!-- Dashed line from TN Check to traffic note -->
  <line x1="420" y1="105" x2="500" y2="105" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="500" y1="105" x2="500" y2="155" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Traffic Ticket note -->
  <rect x="420" y="155" width="210" height="70" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="525" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#7d6608">🚗 Traffic Ticket (bypasses arrest)</text>
  <text x="525" y="193" text-anchor="middle" font-size="10" fill="#9a7d0a">Pay Fine or Contest in Court</text>
  <text x="525" y="209" text-anchor="middle" font-size="10" fill="#9a7d0a">No arrest, lower stakes</text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 650 530" width="650" height="530">
  <!-- Title -->
  <text x="325" y="30" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#2c3e50">Estate Planning Decision Flowchart</text>
  <text x="325" y="50" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#7f8c8d">What happens to a character's assets, property, and obligations after death</text>

  <!-- START: Death Event -->
  <rect x="225" y="70" width="200" height="45" rx="22" fill="#2c3e50"/>
  <text x="325" y="98" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">💀 Character Dies</text>

  <!-- Arrow down -->
  <line x1="325" y1="115" x2="325" y2="140" stroke="#2c3e50" stroke-width="2"/>

  <!-- Decision: Has Will? -->
  <polygon points="325,140 425,175 325,210 225,175" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
  <text x="325" y="179" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#2c3e50">Has a Will?</text>

  <!-- YES path (left) -->
  <line x1="225" y1="175" x2="140" y2="175" stroke="#27ae60" stroke-width="2"/>
  <text x="175" y="168" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#27ae60" font-weight="700">YES</text>

  <!-- YES outcome: Valid Will -->
  <rect x="40" y="190" width="200" height="75" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="140" y="213" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#27ae60">📜 Valid Will</text>
  <text x="140" y="230" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Executor distributes assets</text>
  <text x="140" y="245" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Time: 3–12 months · Cost: $1.5–5K</text>

  <!-- YES: sub-decision: Contested? -->
  <line x1="140" y1="265" x2="140" y2="290" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="140,290 200,315 140,340 80,315" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="140" y="319" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#e74c3c">Contested?</text>

  <!-- Contested: YES -->
  <line x1="80" y1="315" x2="40" y2="315" stroke="#e74c3c" stroke-width="1.5"/>
  <rect x="0" y="305" width="80" height="55" rx="6" fill="#e74c3c"/>
  <text x="40" y="325" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" font-weight="700" fill="#fff">⚖️ CONTEST</text>
  <text x="40" y="340" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#fff">1–3 years</text>
  <text x="40" y="353" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#fff">$10–100K+</text>

  <!-- NO path (right) -->
  <line x1="425" y1="175" x2="510" y2="175" stroke="#e74c3c" stroke-width="2"/>
  <text x="470" y="168" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#e74c3c" font-weight="700">NO</text>

  <!-- NO outcome: Intestate -->
  <rect x="410" y="190" width="200" height="75" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
  <text x="510" y="213" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#e74c3c">❌ Intestate</text>
  <text x="510" y="230" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">State law determines split</text>
  <text x="510" y="245" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">Time: 6–18 months · Cost: $3–15K</text>

  <!-- Small estate branch from intestate -->
  <line x1="510" y1="265" x2="510" y2="290" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="4"/>
  <rect x="430" y="290" width="160" height="45" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="510" y="308" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" font-weight="700" fill="#27ae60">🏦 Small Estate (&lt;$50K)</text>
  <text x="510" y="324" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#2c3e50">Simplified: 1–3 months · $200–1K</text>

  <!-- Both paths converge to: Debts Paid First -->
  <line x1="140" y1="360" x2="140" y2="380" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="510" y1="345" x2="510" y2="380" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="140" y1="380" x2="325" y2="380" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="510" y1="380" x2="325" y2="380" stroke="#2c3e50" stroke-width="1.5"/>
  <line x1="325" y1="380" x2="325" y2="400" stroke="#2c3e50" stroke-width="1.5"/>

  <rect x="200" y="400" width="250" height="55" rx="8" fill="#f5eef8" stroke="#8e44ad" stroke-width="2"/>
  <text x="325" y="423" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#8e44ad">⚠ Debts Paid From Estate First</text>
  <text x="325" y="442" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#2c3e50">If debts &gt; assets → heirs receive nothing</text>

  <!-- Final: Inheritance Event -->
  <line x1="325" y1="455" x2="325" y2="475" stroke="#2c3e50" stroke-width="2"/>
  <rect x="225" y="475" width="200" height="30" rx="6" fill="#27ae60"/>
  <text x="325" y="494" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">💰 Inheritance Event (+4 SP)</text>
</svg>
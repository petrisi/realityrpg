<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 550 550" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="550" height="550" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="275" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">SBNR vs Religious Practice: The Trade-off</text>
  <text x="275" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Different paths, different strengths</text>

  <!-- Radar chart centered at (275, 240), max radius 160px, 5 levels = 32px per level -->
  <g transform="translate(275, 240)">

    <!-- Grid hexagons: 5 levels, each level = 32px -->
    <g fill="none" stroke="#e8ecef" stroke-width="0.8">
      <!-- Level 5 (outermost) -->
      <polygon points="0,-160 138.56,-80 138.56,80 0,160 -138.56,80 -138.56,-80" stroke="#ccd1d6" stroke-width="1"/>
      <!-- Level 4 -->
      <polygon points="0,-128 110.85,-64 110.85,64 0,128 -110.85,64 -110.85,-64"/>
      <!-- Level 3 -->
      <polygon points="0,-96 83.14,-48 83.14,48 0,96 -83.14,48 -83.14,-48"/>
      <!-- Level 2 -->
      <polygon points="0,-64 55.43,-32 55.43,32 0,64 -55.43,32 -55.43,-32"/>
      <!-- Level 1 (innermost) -->
      <polygon points="0,-32 27.71,-16 27.71,16 0,32 -27.71,16 -27.71,-16"/>
    </g>

    <!-- Scale labels on the top axis -->
    <g font-size="9" fill="#7f8c8d">
      <text x="4" y="-158">5</text>
      <text x="4" y="-126">4</text>
      <text x="4" y="-94">3</text>
      <text x="4" y="-62">2</text>
      <text x="4" y="-30">1</text>
    </g>

    <!-- Axis lines -->
    <g stroke="#ccd1d6" stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="-160"/>
      <line x1="0" y1="0" x2="138.56" y2="-80"/>
      <line x1="0" y1="0" x2="138.56" y2="80"/>
      <line x1="0" y1="0" x2="0" y2="160"/>
      <line x1="0" y1="0" x2="-138.56" y2="80"/>
      <line x1="0" y1="0" x2="-138.56" y2="-80"/>
    </g>

    <!-- Axis labels -->
    <g font-size="12" font-weight="600" fill="#2c3e50" text-anchor="middle">
      <!-- Axis 1: SP Reduction (top, -90°) -->
      <text x="0" y="-172">SP Reduction</text>
      <!-- Axis 2: Community Trust (top-right, -30°) -->
      <text x="152" y="-84">Community Trust</text>
      <!-- Axis 3: Time Cost (bottom-right, +30°) -->
      <text x="152" y="96">Time Cost</text>
      <!-- Axis 4: Flexibility (bottom, +90°) -->
      <text x="0" y="178">Flexibility</text>
      <!-- Axis 5: Doctrinal Freedom (bottom-left, +150°) -->
      <text x="-152" y="96">Doctrinal Freedom</text>
      <!-- Axis 6: Meaning Depth (top-left, +210°) -->
      <text x="-152" y="-84">Meaning Depth</text>
    </g>

    <!-- ===== Religious Practice (blue) ===== -->
    <!-- SP Reduction:4→0,-128 | Community Trust:5→138.56,-80 | Time Cost:3→83.14,48 | Flexibility:2→0,64 | Doctrinal Freedom:1→-27.71,16 | Meaning Depth:5→-138.56,-80 -->
    <polygon points="0,-128 138.56,-80 83.14,48 0,64 -27.71,16 -138.56,-80"
      fill="#2980b9" fill-opacity="0.30" stroke="#2980b9" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- ===== SBNR Practice (green) ===== -->
    <!-- SP Reduction:5→0,-160 | Community Trust:1→27.71,-16 | Time Cost:4→110.85,64 | Flexibility:5→0,160 | Doctrinal Freedom:5→-138.56,80 | Meaning Depth:3→-83.14,-48 -->
    <polygon points="0,-160 27.71,-16 110.85,64 0,160 -138.56,80 -83.14,-48"
      fill="#27ae60" fill-opacity="0.30" stroke="#27ae60" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- Value dots: Religious Practice -->
    <g fill="#2980b9">
      <circle cx="0" cy="-128" r="3.5"/>
      <circle cx="138.56" cy="-80" r="3.5"/>
      <circle cx="83.14" cy="48" r="3.5"/>
      <circle cx="0" cy="64" r="3.5"/>
      <circle cx="-27.71" cy="16" r="3.5"/>
      <circle cx="-138.56" cy="-80" r="3.5"/>
    </g>

    <!-- Value dots: SBNR Practice -->
    <g fill="#27ae60">
      <circle cx="0" cy="-160" r="3.5"/>
      <circle cx="27.71" cy="-16" r="3.5"/>
      <circle cx="110.85" cy="64" r="3.5"/>
      <circle cx="0" cy="160" r="3.5"/>
      <circle cx="-138.56" cy="80" r="3.5"/>
      <circle cx="-83.14" cy="-48" r="3.5"/>
    </g>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(25, 420)">
    <rect x="0" y="0" width="500" height="38" rx="8" fill="white" stroke="#e8ecef" stroke-width="1" filter="url(#shadow)"/>

    <!-- Religious Practice -->
    <rect x="20" y="12" width="14" height="14" rx="3" fill="#2980b9" fill-opacity="0.30" stroke="#2980b9" stroke-width="1.5"/>
    <text x="42" y="24" font-size="12" font-weight="600" fill="#2c3e50">Religious Practice</text>

    <!-- SBNR Practice -->
    <rect x="230" y="12" width="14" height="14" rx="3" fill="#27ae60" fill-opacity="0.30" stroke="#27ae60" stroke-width="1.5"/>
    <text x="252" y="24" font-size="12" font-weight="600" fill="#2c3e50">SBNR Practice</text>
  </g>

  <!-- ===== Bottom Note ===== -->
  <text x="275" y="480" text-anchor="middle" font-size="10" fill="#7f8c8d" font-style="italic">SBNR: powerful stress management BUT lacks Community Trust — must build secular community intentionally.</text>
  <text x="275" y="496" text-anchor="middle" font-size="10" fill="#7f8c8d" font-style="italic">Religion: strong community BUT carries doctrinal constraints and politics.</text>
</svg>
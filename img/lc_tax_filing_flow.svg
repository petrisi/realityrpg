<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 900 700" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">Tax Filing Process — 6 Steps</text>
  <text x="450" y="50" text-anchor="middle" font-size="11" fill="#7f8c8d">Annual obligation · April 15 deadline · TN checks at each hurdle</text>

  <!-- ════════════════════════════════════════
       Step 1: Gather Documents
       ════════════════════════════════════════ -->
  <rect x="300" y="65" width="300" height="60" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="450" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">📄 Step 1: Gather Documents</text>
  <text x="450" y="106" text-anchor="middle" font-size="11" fill="#d6eaf8">W-2, 1099, receipts, prior year return</text>

  <!-- TN Check badge -->
  <rect x="510" y="55" width="85" height="22" rx="4" fill="#f39c12" stroke="#e67e22" stroke-width="1"/>
  <text x="552" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">🎲 TN Check</text>

  <!-- Failure branch right from Step 1 -->
  <line x1="600" y1="95" x2="720" y2="95" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="720" y1="95" x2="720" y2="85" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="640" y="88" text-anchor="middle" font-size="10" font-weight="700" fill="#c0392b">Missing docs</text>

  <rect x="670" y="58" width="180" height="40" rx="8" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="760" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#c0392b">⚠️ Missing Docs → Extension</text>
  <text x="760" y="90" text-anchor="middle" font-size="9" fill="#922b21">File Form 4868 (free, +6 months)</text>

  <!-- Arrow down -->
  <line x1="450" y1="125" x2="450" y2="155" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════
       Step 2: Choose Filing Method
       ════════════════════════════════════════ -->
  <rect x="300" y="155" width="300" height="80" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="450" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">🔧 Step 2: Choose Filing Method</text>
  <text x="450" y="194" text-anchor="middle" font-size="10" fill="#d6eaf8">Free (IRS Free File) → Software → Preparer → CPA</text>
  <text x="450" y="208" text-anchor="middle" font-size="10" fill="#aed6f1">Cost ↑, Accuracy bonus ↑</text>

  <!-- Cost/Accuracy badge -->
  <rect x="510" y="145" width="85" height="22" rx="4" fill="#27ae60" stroke="#2ecc71" stroke-width="1"/>
  <text x="552" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">+Accuracy</text>

  <!-- Arrow down -->
  <line x1="450" y1="235" x2="450" y2="265" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════
       Step 3: Fill Out Form 1040
       ════════════════════════════════════════ -->
  <rect x="300" y="265" width="300" height="60" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="450" y="288" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">📝 Step 3: Fill Out Form 1040</text>
  <text x="450" y="306" text-anchor="middle" font-size="11" fill="#d6eaf8">Income, deductions, credits, calculations</text>

  <!-- TN Check badge -->
  <rect x="510" y="255" width="85" height="22" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
  <text x="552" y="270" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">🎲 TN 40-60</text>

  <!-- Failure branch right from Step 3 -->
  <line x1="600" y1="295" x2="720" y2="295" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="720" y1="295" x2="720" y2="285" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="640" y="288" text-anchor="middle" font-size="10" font-weight="700" fill="#c0392b">Errors!</text>

  <rect x="670" y="260" width="180" height="50" rx="8" fill="#fadbd8" stroke="#c0392b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="760" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#c0392b">⚠️ Errors → Audit Risk</text>
  <text x="760" y="292" text-anchor="middle" font-size="9" fill="#922b21">Wrong calc → penalties + interest</text>
  <text x="760" y="304" text-anchor="middle" font-size="9" fill="#922b21">File amended 1040-X if caught</text>

  <!-- Arrow down -->
  <line x1="450" y1="325" x2="450" y2="355" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════
       Step 4: Submit
       ════════════════════════════════════════ -->
  <rect x="300" y="355" width="300" height="70" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="450" y="378" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">📤 Step 4: Submit</text>
  <text x="450" y="394" text-anchor="middle" font-size="11" fill="#d6eaf8">E-file (fast, recommended) or Mail (slow)</text>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#aed6f1">Processing time depends on method</text>

  <!-- Processing time badge -->
  <rect x="510" y="345" width="85" height="22" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
  <text x="552" y="360" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">⏱ Wait</text>

  <!-- Arrow down -->
  <line x1="450" y1="425" x2="450" y2="455" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════
       Step 5: Wait for Results
       ════════════════════════════════════════ -->
  <rect x="300" y="455" width="300" height="70" rx="10" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="450" y="478" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">⏳ Step 5: Wait for Results</text>
  <text x="450" y="494" text-anchor="middle" font-size="11" fill="#d6eaf8">E-file: 7–21 days · Mail: 6–12 weeks</text>
  <text x="450" y="508" text-anchor="middle" font-size="10" fill="#aed6f1">Track at IRS2Go or Where's My Refund?</text>

  <!-- Arrow down -->
  <line x1="450" y1="525" x2="450" y2="555" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════
       Step 6: Refund or Owe (Decision)
       ════════════════════════════════════════ -->
  <!-- Decision diamond -->
  <polygon points="450,555 560,600 450,645 340,600" fill="#f39c12" filter="url(#shadow)"/>
  <text x="450" y="594" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">💰 Step 6:</text>
  <text x="450" y="610" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Refund or Owe?</text>

  <!-- SUCCESS branch — left: Refund -->
  <line x1="340" y1="600" x2="290" y2="600" stroke="#27ae60" stroke-width="2"/>
  <line x1="290" y1="600" x2="290" y2="615" stroke="#27ae60" stroke-width="2"/>
  <text x="315" y="595" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">Refund</text>

  <rect x="180" y="615" width="220" height="50" rx="10" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="290" y="638" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">✅ Refund Received!</text>
  <text x="290" y="654" text-anchor="middle" font-size="10" fill="#d5f5e3">Money in your account 🎉</text>

  <!-- FAILURE branch — right: Owe / Penalties -->
  <line x1="560" y1="600" x2="610" y2="600" stroke="#c0392b" stroke-width="2"/>
  <line x1="610" y1="600" x2="610" y2="615" stroke="#c0392b" stroke-width="2"/>
  <text x="635" y="595" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">Owe</text>

  <rect x="610" y="615" width="220" height="50" rx="10" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="720" y="638" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">⚠️ Owe + Penalties</text>
  <text x="720" y="654" text-anchor="middle" font-size="10" fill="#f5b7b1">Interest accrues · Late fee risk</text>

</svg>
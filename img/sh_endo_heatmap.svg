<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 600 450" width="600" height="450">
  <defs>
    <style>
      .title { font: bold 18px system-ui, sans-serif; fill: #2c3e50; }
      .subtitle { font: 13px system-ui, sans-serif; fill: #7f8c8d; }
      .day-text { font: bold 14px system-ui, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .legend-title { font: bold 12px system-ui, sans-serif; fill: #2c3e50; }
      .legend-label { font: 11px system-ui, sans-serif; fill: #34495e; }
      .legend-effect { font: 10px system-ui, sans-serif; fill: #636e72; }
      .annotation { font: bold 13px system-ui, sans-serif; fill: #e74c3c; text-anchor: middle; }
      .annotation-sub { font: 12px system-ui, sans-serif; fill: #636e72; text-anchor: middle; }
      .week-label { font: bold 11px system-ui, sans-serif; fill: #95a5a6; text-anchor: end; dominant-baseline: central; }
      .day-header { font: bold 11px system-ui, sans-serif; fill: #95a5a6; text-anchor: middle; }
      .phase-label { font: 10px system-ui, sans-serif; fill: #b2bec3; text-anchor: middle; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="600" height="450" rx="8" fill="#fafbfc"/>

  <!-- Title -->
  <text x="300" y="28" class="title" text-anchor="middle">Endometriosis — Monthly Pain Calendar</text>
  <text x="300" y="48" class="subtitle" text-anchor="middle">Approximately 16 of 28 days affected</text>

  <!-- Day headers -->
  <g class="day-header">
    <text x="93" y="68">Mon</text>
    <text x="133" y="68">Tue</text>
    <text x="173" y="68">Wed</text>
    <text x="213" y="68">Thu</text>
    <text x="253" y="68">Fri</text>
    <text x="293" y="68">Sat</text>
    <text x="333" y="68">Sun</text>
  </g>

  <!-- Week labels -->
  <text x="78" y="108" class="week-label">W1</text>
  <text x="78" y="173" class="week-label">W2</text>
  <text x="78" y="238" class="week-label">W3</text>
  <text x="78" y="303" class="week-label">W4</text>

  <!-- =================== GRID: 4 rows × 7 cols =================== -->
  <!-- Cell: 40×40, gap: 4, starts at x=81 y=78 -->

  <!-- Row 1: Days 1-7 — RED(1-4), ORANGE(5-7) -->
  <g transform="translate(81, 78)">
    <rect width="40" height="40" rx="6" fill="#e74c3c"/><text x="20" y="20" class="day-text">1</text>
    <rect x="44" width="40" height="40" rx="6" fill="#e74c3c"/><text x="64" y="20" class="day-text">2</text>
    <rect x="88" width="40" height="40" rx="6" fill="#e74c3c"/><text x="108" y="20" class="day-text">3</text>
    <rect x="132" width="40" height="40" rx="6" fill="#e74c3c"/><text x="152" y="20" class="day-text">4</text>
    <rect x="176" width="40" height="40" rx="6" fill="#e67e22"/><text x="196" y="20" class="day-text">5</text>
    <rect x="220" width="40" height="40" rx="6" fill="#e67e22"/><text x="240" y="20" class="day-text">6</text>
    <rect x="264" width="40" height="40" rx="6" fill="#e67e22"/><text x="284" y="20" class="day-text">7</text>
  </g>

  <!-- Row 2: Days 8-14 — ORANGE(8-9), GREEN(10-14) -->
  <g transform="translate(81, 143)">
    <rect width="40" height="40" rx="6" fill="#e67e22"/><text x="20" y="20" class="day-text">8</text>
    <rect x="44" width="40" height="40" rx="6" fill="#e67e22"/><text x="64" y="20" class="day-text">9</text>
    <rect x="88" width="40" height="40" rx="6" fill="#27ae60"/><text x="108" y="20" class="day-text">10</text>
    <rect x="132" width="40" height="40" rx="6" fill="#27ae60"/><text x="152" y="20" class="day-text">11</text>
    <rect x="176" width="40" height="40" rx="6" fill="#27ae60"/><text x="196" y="20" class="day-text">12</text>
    <rect x="220" width="40" height="40" rx="6" fill="#27ae60"/><text x="240" y="20" class="day-text">13</text>
    <rect x="264" width="40" height="40" rx="6" fill="#27ae60"/><text x="284" y="20" class="day-text">14</text>
  </g>

  <!-- Row 3: Days 15-21 — GREEN(15-18), ORANGE(19-20), GREEN(21) -->
  <g transform="translate(81, 208)">
    <rect width="40" height="40" rx="6" fill="#27ae60"/><text x="20" y="20" class="day-text">15</text>
    <rect x="44" width="40" height="40" rx="6" fill="#27ae60"/><text x="64" y="20" class="day-text">16</text>
    <rect x="88" width="40" height="40" rx="6" fill="#27ae60"/><text x="108" y="20" class="day-text">17</text>
    <rect x="132" width="40" height="40" rx="6" fill="#27ae60"/><text x="152" y="20" class="day-text">18</text>
    <rect x="176" width="40" height="40" rx="6" fill="#e67e22"/><text x="196" y="20" class="day-text">19</text>
    <rect x="220" width="40" height="40" rx="6" fill="#e67e22"/><text x="240" y="20" class="day-text">20</text>
    <rect x="264" width="40" height="40" rx="6" fill="#27ae60"/><text x="284" y="20" class="day-text">21</text>
  </g>

  <!-- Row 4: Days 22-28 — GREEN(22-23), YELLOW(24-28) -->
  <g transform="translate(81, 273)">
    <rect width="40" height="40" rx="6" fill="#27ae60"/><text x="20" y="20" class="day-text">22</text>
    <rect x="44" width="40" height="40" rx="6" fill="#27ae60"/><text x="64" y="20" class="day-text">23</text>
    <rect x="88" width="40" height="40" rx="6" fill="#f1c40f"/><text x="108" y="20" class="day-text">24</text>
    <rect x="132" width="40" height="40" rx="6" fill="#f1c40f"/><text x="152" y="20" class="day-text">25</text>
    <rect x="176" width="40" height="40" rx="6" fill="#f1c40f"/><text x="196" y="20" class="day-text">26</text>
    <rect x="220" width="40" height="40" rx="6" fill="#f1c40f"/><text x="240" y="20" class="day-text">27</text>
    <rect x="264" width="40" height="40" rx="6" fill="#f1c40f"/><text x="284" y="20" class="day-text">28</text>
  </g>

  <!-- =================== LEGEND =================== -->
  <g transform="translate(390, 78)">
    <!-- Legend box background -->
    <rect width="195" height="245" rx="8" fill="#ffffff" stroke="#dcdde1" stroke-width="1"/>

    <text x="15" y="25" class="legend-title">Severity Legend</text>

    <!-- Red — Severe -->
    <rect x="15" y="40" width="18" height="18" rx="4" fill="#e74c3c"/>
    <text x="42" y="53" class="legend-label">Severe Pain</text>
    <text x="15" y="68" class="legend-effect">−2 VIG, +3 SP</text>
    <text x="15" y="82" class="legend-effect">May be bedridden</text>

    <!-- Orange — Moderate -->
    <rect x="15" y="94" width="18" height="18" rx="4" fill="#e67e22"/>
    <text x="42" y="107" class="legend-label">Moderate Pain</text>
    <text x="15" y="122" class="legend-effect">−1 VIG, +1 SP</text>
    <text x="15" y="136" class="legend-effect">DXT/INT −1</text>

    <!-- Yellow — Mild -->
    <rect x="15" y="148" width="18" height="18" rx="4" fill="#f1c40f"/>
    <text x="42" y="161" class="legend-label">Mild Discomfort</text>
    <text x="15" y="176" class="legend-effect">−1 VIG, +1 SP</text>

    <!-- Green — Normal -->
    <rect x="15" y="188" width="18" height="18" rx="4" fill="#27ae60"/>
    <text x="42" y="201" class="legend-label">Normal</text>
    <text x="15" y="216" class="legend-effect">No penalty</text>
  </g>

  <!-- =================== ANNOTATIONS =================== -->
  <text x="220" y="368" class="annotation">⚠ 16 bad days/month</text>
  <text x="220" y="390" class="annotation-sub">−2 VIG during period · −1 VIG luteal</text>

</svg>
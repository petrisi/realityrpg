<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <text x="250" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">AI Displacement Risk by Profession</text>
  <text x="250" y="40" text-anchor="middle" font-size="10" fill="#7f8c8d">4-axis risk assessment: Automation, Income Impact, Retraining Difficulty, Timeline Urgency</text>

  <!-- Radar center: 250, 210. 4 axes at 0°, 90°, 180°, 270° -->
  <!-- Grid circles -->
  <g stroke="#e8e8e8" stroke-width="1" fill="none">
    <circle cx="250" cy="210" r="40"/>
    <circle cx="250" cy="210" r="80"/>
    <circle cx="250" cy="210" r="120"/>
    <circle cx="250" cy="210" r="160"/>
  </g>

  <!-- Axes -->
  <g stroke="#dcdcdc" stroke-width="1">
    <line x1="250" y1="50" x2="250" y2="370"/>
    <line x1="90" y1="210" x2="410" y2="210"/>
  </g>

  <!-- Axis labels -->
  <text x="250" y="42" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">Automation Risk</text>
  <text x="420" y="214" text-anchor="start" font-size="10" font-weight="700" fill="#f39c12">Income Impact</text>
  <text x="250" y="385" text-anchor="middle" font-size="10" font-weight="700" fill="#e67e22">Retraining Difficulty</text>
  <text x="75" y="214" text-anchor="end" font-size="10" font-weight="700" fill="#2980b9">Timeline Urgency</text>

  <!-- Grid labels (1-5 scale) -->
  <g font-size="8" fill="#7f8c8d">
    <text x="252" y="208">1</text>
    <text x="252" y="168">2</text>
    <text x="252" y="128">3</text>
    <text x="252" y="88">4</text>
    <text x="252" y="48">5</text>
  </g>

  <!-- Data polygons (x=250+r*cos, y=210-r*sin for each axis value) -->
  <!-- Healthcare: Auto=1, Income=2, Retraining=3, Timeline=1 → r values: 32,64,96,32 -->
  <polygon points="218,210 250,178 282,210 250,210" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <circle cx="218" cy="210" r="4" fill="#27ae60"/>
  <circle cx="250" cy="178" r="4" fill="#27ae60"/>
  <circle cx="282" cy="210" r="4" fill="#27ae60"/>
  <circle cx="250" cy="210" r="4" fill="#27ae60"/>

  <!-- Coding: Auto=4, Income=4, Retraining=3, Timeline=3 → r: 128,128,96,96 -->
  <polygon points="122,210 250,82 378,210 250,306" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <circle cx="122" cy="210" r="4" fill="#f39c12"/>
  <circle cx="250" cy="82" r="4" fill="#f39c12"/>
  <circle cx="378" cy="210" r="4" fill="#f39c12"/>
  <circle cx="250" cy="306" r="4" fill="#f39c12"/>

  <!-- Data Entry: Auto=5, Income=5, Retraining=2, Timeline=5 → r: 160,160,64,160 -->
  <polygon points="90,210 250,50 410,210 250,274" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="90" cy="210" r="4" fill="#e74c3c"/>
  <circle cx="250" cy="50" r="4" fill="#e74c3c"/>
  <circle cx="410" cy="210" r="4" fill="#e74c3c"/>
  <circle cx="250" cy="274" r="4" fill="#e74c3c"/>

  <!-- Trades: Auto=1, Income=2, Retraining=1, Timeline=1 → r: 32,32,32,32 -->
  <polygon points="218,210 250,178 282,210 250,210" fill="#2980b9" opacity="0.15" stroke="#2980b9" stroke-width="2"/>

  <!-- Legend -->
  <g font-size="10" font-weight="600">
    <line x1="100" y1="355" x2="120" y2="355" stroke="#27ae60" stroke-width="2"/>
    <text x="125" y="359">Healthcare (Safe)</text>

    <line x1="260" y1="355" x2="280" y2="355" stroke="#f39c12" stroke-width="2"/>
    <text x="285" y="359">Coding (High risk)</text>

    <line x1="100" y1="375" x2="120" y2="375" stroke="#e74c3c" stroke-width="2"/>
    <text x="125" y="379">Data Entry (Critical)</text>

    <line x1="260" y1="375" x2="280" y2="375" stroke="#2980b9" stroke-width="2"/>
    <text x="285" y="379">Trades (Very safe)</text>
  </g>
</svg>

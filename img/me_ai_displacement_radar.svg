<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 520 440" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <title>AI Displacement Risk by Profession</title>
  <desc>Four-axis radar chart (Automation Risk, Income Impact, Retraining Difficulty, Timeline Urgency) comparing 4 professions</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <text x="260" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">AI Displacement Risk by Profession</text>
  <text x="260" y="40" text-anchor="middle" font-size="10" fill="#7f8c8d">4-axis risk assessment: Automation, Income Impact, Retraining Difficulty, Timeline Urgency</text>

  <!-- Radar center: 260, 220. 4 axes at 0°, 90°, 180°, 270° -->
  <!-- Grid circles — moved down to give top axis label room -->
  <g stroke="#e8e8e8" stroke-width="1" fill="none">
    <circle cx="260" cy="220" r="40"/>
    <circle cx="260" cy="220" r="80"/>
    <circle cx="260" cy="220" r="120"/>
    <circle cx="260" cy="220" r="155"/>
  </g>

  <!-- Axes -->
  <g stroke="#dcdcdc" stroke-width="1">
    <line x1="260" y1="65" x2="260" y2="375"/>
    <line x1="105" y1="220" x2="415" y2="220"/>
  </g>

  <!-- Axis labels — repositioned for clearance -->
  <text x="260" y="58" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">Automation Risk</text>
  <text x="425" y="224" text-anchor="start" font-size="10" font-weight="700" fill="#f39c12">Income Impact</text>
  <text x="260" y="390" text-anchor="middle" font-size="10" font-weight="700" fill="#e67e22">Retraining Difficulty</text>
  <text x="90" y="224" text-anchor="end" font-size="10" font-weight="700" fill="#2980b9">Timeline Urgency</text>

  <!-- Grid labels (1-5 scale) on all 4 axes -->
  <g font-size="8" fill="#7f8c8d" text-anchor="middle">
    <!-- Top axis (Automation Risk) -->
    <text x="262" y="218">1</text>
    <text x="262" y="178">2</text>
    <text x="262" y="138">3</text>
    <text x="262" y="98">4</text>
    <text x="262" y="63">5</text>
    <!-- Right axis (Income Impact) -->
    <text x="302" y="224">2</text>
    <text x="342" y="224">3</text>
    <text x="382" y="224">4</text>
    <text x="418" y="224">5</text>
    <!-- Bottom axis (Retraining Difficulty) -->
    <text x="260" y="262">2</text>
    <text x="260" y="302">3</text>
    <text x="260" y="342">4</text>
    <text x="260" y="378">5</text>
    <!-- Left axis (Timeline Urgency) -->
    <text x="216" y="224">2</text>
    <text x="176" y="224">3</text>
    <text x="136" y="224">4</text>
    <text x="100" y="224">5</text>
  </g>

  <!-- Data polygons — re-centered at (260, 220) -->
  <!-- Healthcare: Auto=1, Income=2, Retraining=3, Timeline=1 → r values: 31,62,93,31 -->
  <polygon points="229,220 260,189 291,220 260,220" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="2"/>
  <circle cx="229" cy="220" r="4" fill="#27ae60"/>
  <circle cx="260" cy="189" r="4" fill="#27ae60"/>
  <circle cx="291" cy="220" r="4" fill="#27ae60"/>
  <circle cx="260" cy="220" r="4" fill="#27ae60"/>

  <!-- Coding: Auto=4, Income=4, Retraining=3, Timeline=3 → r: 124,124,93,93 -->
  <polygon points="136,220 260,96 384,220 260,313" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <circle cx="136" cy="220" r="4" fill="#f39c12"/>
  <circle cx="260" cy="96" r="4" fill="#f39c12"/>
  <circle cx="384" cy="220" r="4" fill="#f39c12"/>
  <circle cx="260" cy="313" r="4" fill="#f39c12"/>

  <!-- Data Entry: Auto=5, Income=5, Retraining=2, Timeline=5 → r: 155,155,62,155 -->
  <polygon points="105,220 260,65 415,220 260,282" fill="#e74c3c" opacity="0.15" stroke="#e74c3c" stroke-width="2"/>
  <circle cx="105" cy="220" r="4" fill="#e74c3c"/>
  <circle cx="260" cy="65" r="4" fill="#e74c3c"/>
  <circle cx="415" cy="220" r="4" fill="#e74c3c"/>
  <circle cx="260" cy="282" r="4" fill="#e74c3c"/>

  <!-- Trades: Auto=1, Income=2, Retraining=1, Timeline=1 → r: 31,31,31,31 -->
  <!-- Dashed and shifted outward to distinguish from Healthcare -->
  <polygon points="220,220 260,180 300,220 260,220" fill="#2980b9" opacity="0.12" stroke="#2980b9" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="220" cy="220" r="4" fill="#2980b9"/>
  <circle cx="260" cy="180" r="4" fill="#2980b9"/>
  <circle cx="300" cy="220" r="4" fill="#2980b9"/>
  <circle cx="260" cy="220" r="4" fill="#2980b9"/>

  <!-- Legend — moved below chart with more clearance -->
  <g font-size="10" font-weight="600">
    <line x1="110" y1="410" x2="130" y2="410" stroke="#27ae60" stroke-width="2"/>
    <text x="135" y="414">Healthcare (Safe)</text>

    <line x1="270" y1="410" x2="290" y2="410" stroke="#f39c12" stroke-width="2"/>
    <text x="295" y="414">Coding (High risk)</text>

    <line x1="110" y1="428" x2="130" y2="428" stroke="#e74c3c" stroke-width="2"/>
    <text x="135" y="432">Data Entry (Critical)</text>

    <line x1="270" y1="428" x2="290" y2="428" stroke="#2980b9" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="295" y="432">Trades (Very safe)</text>
  </g>
</svg>
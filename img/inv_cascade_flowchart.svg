<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 900 580" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="s" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">The Cascade: One Forgotten Item Can Ruin a Week</text>

  <!-- Flow boxes — vertical chain, compacted with 32px boxes + 10px arrows = 42px per step -->
  <g font-size="11" font-weight="600" text-anchor="middle">

    <!-- 1: Forget Keys -->
    <rect x="340" y="44" width="220" height="32" rx="6" fill="#e74c3c" filter="url(#s)"/>
    <text x="450" y="66" fill="#fff">🔑 Forget Keys</text>

    <line x1="450" y1="76" x2="450" y2="88" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 2: Locked Out -->
    <rect x="340" y="88" width="220" height="32" rx="6" fill="#e74c3c" filter="url(#s)"/>
    <text x="450" y="110" fill="#fff">🚪 Locked Out</text>

    <line x1="450" y1="120" x2="450" y2="132" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 3: Locksmith $150 -->
    <rect x="340" y="132" width="220" height="32" rx="6" fill="#e67e22" filter="url(#s)"/>
    <text x="450" y="154" fill="#fff">🔧 Locksmith ($150)</text>

    <line x1="450" y1="164" x2="450" y2="176" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 4: Late to Work -->
    <rect x="340" y="176" width="220" height="32" rx="6" fill="#e67e22" filter="url(#s)"/>
    <text x="450" y="198" fill="#fff">⏰ Late to Work (2 hrs)</text>

    <line x1="450" y1="208" x2="450" y2="220" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 5: Boss Angry -->
    <rect x="340" y="220" width="220" height="32" rx="6" fill="#f39c12" filter="url(#s)"/>
    <text x="450" y="242" fill="#fff">😤 Boss Is Angry</text>

    <line x1="450" y1="252" x2="450" y2="264" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 6: Use PTO -->
    <rect x="340" y="264" width="220" height="32" rx="6" fill="#f39c12" filter="url(#s)"/>
    <text x="450" y="286" fill="#fff">📋 Forced to Use PTO</text>

    <line x1="450" y1="296" x2="450" y2="308" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 7: Lose Pay -->
    <rect x="340" y="308" width="220" height="32" rx="6" fill="#f39c12" filter="url(#s)"/>
    <text x="450" y="330" fill="#fff">💸 Lose a Day's Pay</text>

    <line x1="450" y1="340" x2="450" y2="352" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 8: Can't Afford Groceries -->
    <rect x="310" y="352" width="280" height="32" rx="6" fill="#c0392b" filter="url(#s)"/>
    <text x="450" y="374" fill="#fff">🛒 Can't Afford Groceries</text>

    <line x1="450" y1="384" x2="450" y2="396" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 9: Ramen Week -->
    <rect x="310" y="396" width="280" height="32" rx="6" fill="#c0392b" filter="url(#s)"/>
    <text x="450" y="418" fill="#fff">🍜 Ramen Week → Low Energy</text>

    <line x1="450" y1="428" x2="450" y2="440" stroke="#c0392b" stroke-width="2" marker-end="url(#arr)"/>

    <!-- 10: Poor Performance -->
    <rect x="310" y="440" width="280" height="32" rx="6" fill="#c0392b" filter="url(#s)"/>
    <text x="450" y="462" fill="#fff">📉 Poor Work Performance</text>

  </g>

  <!-- Side annotation: Boss Relationship -1 -->
  <g font-size="11" font-weight="600">
    <line x1="560" y1="237" x2="620" y2="237" stroke="#2c3e50" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="620" y="222" width="160" height="30" rx="5" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
    <text x="700" y="241" text-anchor="middle" fill="#c0392b">Boss Relationship −1</text>
  </g>

  <!-- Closing loop arrow from bottom back to top -->
  <g>
    <path d="M 290,456 Q 260,456 260,250 Q 260,58 340,58" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr)" opacity="0.5"/>
    <text x="230" y="250" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="600" transform="rotate(-90, 230, 250)">LOOP REPEATS</text>
  </g>

  <!-- Bottom tagline -->
  <text x="450" y="510" text-anchor="middle" font-size="14" font-weight="700" fill="#2c3e50">This is not game design. This is Tuesday.</text>

  <!-- Summary box -->
  <rect x="250" y="525" width="400" height="42" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="450" y="544" text-anchor="middle" font-size="12" fill="#7f8c8d">One forgotten key costs ~$150 + lost wages + stress +</text>
  <text x="450" y="560" text-anchor="middle" font-size="12" fill="#7f8c8d">cascading effects that can last an entire week or more.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 420 520" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="gaugeGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="35%" stop-color="#f1c40f"/>
      <stop offset="65%" stop-color="#e67e22"/>
      <stop offset="85%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#2ecc71"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#d35400"/>
    </linearGradient>
    <linearGradient id="barGrad4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="520" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">Political Stress Budget</text>
  <text x="210" y="50" text-anchor="middle" font-size="10.5" fill="#5d6d7e">When SP from politics exceeds capacity, burnout occurs</text>

  <!-- ===== STRESS SOURCE BARS ===== -->
  <!-- Bar container background -->
  <rect x="20" y="62" width="260" height="210" rx="10" fill="#fff" stroke="#d5dbdb" stroke-width="1" filter="url(#shadow)"/>

  <!-- Section header -->
  <text x="35" y="85" font-size="11" font-weight="700" fill="#2c3e50">Stress Sources</text>

  <!-- Source 1: Family arguments -->
  <rect x="30" y="96" width="240" height="38" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.2"/>
  <text x="42" y="110" font-size="11" font-weight="600" fill="#2c3e50">Family arguments</text>
  <text x="42" y="124" font-size="10" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+1 SP/round</tspan><tspan fill="#5d6d7e"> (3+ rounds typical)</tspan></text>
  <!-- Mini bar indicator -->
  <rect x="245" y="104" width="18" height="22" rx="3" fill="url(#barGrad1)"/>

  <!-- Source 2: News consumption -->
  <rect x="30" y="142" width="240" height="38" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.2"/>
  <text x="42" y="156" font-size="11" font-weight="600" fill="#2c3e50">News consumption</text>
  <text x="42" y="170" font-size="10" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+0.5 SP/week</tspan><tspan fill="#5d6d7e"> (outrage cycle)</tspan></text>
  <rect x="245" y="150" width="18" height="22" rx="3" fill="url(#barGrad2)"/>

  <!-- Source 3: Protest participation -->
  <rect x="30" y="188" width="240" height="38" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="1.2"/>
  <text x="42" y="202" font-size="11" font-weight="600" fill="#2c3e50">Protest participation</text>
  <text x="42" y="216" font-size="10" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+1 to +4 SP</tspan><tspan fill="#5d6d7e"> per event</tspan></text>
  <rect x="245" y="196" width="18" height="22" rx="3" fill="url(#barGrad3)"/>

  <!-- Source 4: Campaign work -->
  <rect x="30" y="234" width="240" height="38" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="1.2"/>
  <text x="42" y="248" font-size="11" font-weight="600" fill="#2c3e50">Campaign work</text>
  <text x="42" y="262" font-size="10" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+2 SP</tspan><tspan fill="#5d6d7e"> per fundraising event</tspan></text>
  <rect x="245" y="242" width="18" height="22" rx="3" fill="url(#barGrad4)"/>

  <!-- ===== VERTICAL SP GAUGE ===== -->
  <!-- Gauge outer -->
  <rect x="300" y="80" width="44" height="340" rx="22" fill="#fff" stroke="#d5dbdb" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Gauge fill gradient (background) -->
  <rect x="304" y="84" width="36" height="332" rx="18" fill="url(#gaugeGrad)"/>
  <!-- Gauge inner track (lighter) -->
  <rect x="310" y="90" width="24" height="320" rx="12" fill="#fff" opacity="0.5"/>

  <!-- Gauge tick marks and labels -->
  <!-- 25 (top) -->
  <line x1="348" y1="90" x2="358" y2="90" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="362" y="94" font-size="9" fill="#c0392b" font-weight="700">25</text>

  <!-- 20 -->
  <line x1="348" y1="158" x2="358" y2="158" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="362" y="162" font-size="9" fill="#c0392b">20</text>

  <!-- 15 -->
  <line x1="348" y1="226" x2="358" y2="226" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="362" y="230" font-size="9" fill="#d35400">15</text>

  <!-- 10 -->
  <line x1="348" y1="294" x2="358" y2="294" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="362" y="298" font-size="9" fill="#f39c12">10</text>

  <!-- 5 -->
  <line x1="348" y1="362" x2="358" y2="362" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="362" y="366" font-size="9" fill="#27ae60">5</text>

  <!-- 0 (bottom) -->
  <line x1="348" y1="410" x2="358" y2="410" stroke="#95a5a6" stroke-width="1.5"/>
  <text x="362" y="414" font-size="9" fill="#27ae60">0</text>

  <!-- BURNOUT threshold line at ~22 (y ≈ 108) -->
  <line x1="296" y1="108" x2="348" y2="108" stroke="#c0392b" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="290" y="103" text-anchor="end" font-size="9" font-weight="700" fill="#c0392b">⚠ BURNOUT</text>

  <!-- Current level indicator (arrow showing ~8 SP accumulated) -->
  <circle cx="322" cy="338" r="8" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="322" y="342" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">▼</text>

  <!-- Recovery zone label -->
  <rect x="296" y="370" width="50" height="22" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1"/>
  <text x="321" y="385" text-anchor="middle" font-size="8" font-weight="600" fill="#1e8449">✓ Recovery</text>

  <!-- Gauge label -->
  <text x="322" y="432" text-anchor="middle" font-size="10" font-weight="600" fill="#2c3e50">SP</text>
  <text x="322" y="444" text-anchor="middle" font-size="8" fill="#5d6d7e">capacity: 25</text>

  <!-- ===== BOTTOM NOTE ===== -->
  <rect x="20" y="440" width="380" height="55" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
  <text x="210" y="458" text-anchor="middle" font-size="10" font-weight="600" fill="#7e5109">⚡ Recovery: rest, disengage from news, self-care</text>
  <text x="210" y="473" text-anchor="middle" font-size="9" fill="#5d6d7e">−1 SP per full rest day · −2 SP per weekend off · −5 SP per vacation</text>
  <text x="210" y="486" text-anchor="middle" font-size="9" fill="#5d6d7e">Recovery takes 2× the time it took to accumulate stress</text>
</svg>
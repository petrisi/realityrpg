<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <radialGradient id="bgWash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0392b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0.02"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="#fafbfc" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#2c3e50">How Gossip Spreads</text>

  <!-- Permanent Reputation background wash — ENLARGED to contain all circles -->
  <!-- Largest circle r=190 centered at 400,240 → extends y=50 to y=430, x=210 to x=590 -->
  <!-- Rect needs to cover that: y=48 to y=435, x=200 to x=600 -->
  <rect x="100" y="48" width="600" height="400" rx="16" fill="url(#bgWash)" stroke="#c0392b" stroke-width="1" stroke-dasharray="8,6" stroke-opacity="0.3"/>
  <text x="720" y="72" text-anchor="end" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b" opacity="0.6">Day 31+: Permanent Reputation</text>

  <!-- Day 15-30: Full community ring (yellow) — reduced r from 210 to 190 -->
  <circle cx="400" cy="240" r="190" fill="none" stroke="#f1c40f" stroke-width="3" opacity="0.5" filter="url(#s1)"/>
  <text x="600" y="240" font-family="Segoe UI, sans-serif" font-size="11" fill="#d4ac0d" font-weight="600">Day 15-30</text>
  <text x="600" y="254" font-family="Segoe UI, sans-serif" font-size="10" fill="#d4ac0d">Full Community</text>

  <!-- Day 4-14: Friends + Acquaintances ring (orange) — reduced r from 140 to 125 -->
  <circle cx="400" cy="240" r="125" fill="none" stroke="#e67e22" stroke-width="3" opacity="0.7" filter="url(#s1)"/>
  <text x="530" y="190" font-family="Segoe UI, sans-serif" font-size="11" fill="#ca6f1e" font-weight="600">Day 4-14</text>
  <text x="530" y="204" font-family="Segoe UI, sans-serif" font-size="10" fill="#ca6f1e">Friends + Acquaintances</text>

  <!-- Day 1-3: Close Friends ring (red) — reduced r from 70 to 60 -->
  <circle cx="400" cy="240" r="60" fill="none" stroke="#c0392b" stroke-width="3" filter="url(#s1)"/>
  <text x="460" y="180" font-family="Segoe UI, sans-serif" font-size="11" fill="#c0392b" font-weight="600">Day 1-3</text>
  <text x="460" y="194" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b">Close Friends</text>

  <!-- Center: YOU -->
  <circle cx="400" cy="240" r="30" fill="#2c3e50" filter="url(#s1)"/>
  <text x="400" y="236" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#ecf0f1">YOU</text>
  <text x="400" y="252" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#bdc3c7">Source</text>

  <!-- Small person icons in each ring -->
  <!-- Close Friends ring -->
  <circle cx="345" cy="215" r="8" fill="#c0392b" opacity="0.8"/>
  <circle cx="455" cy="215" r="8" fill="#c0392b" opacity="0.8"/>
  <circle cx="400" cy="290" r="8" fill="#c0392b" opacity="0.8"/>
  <circle cx="365" cy="270" r="8" fill="#c0392b" opacity="0.8"/>
  <circle cx="435" cy="270" r="8" fill="#c0392b" opacity="0.8"/>

  <!-- Friends + Acquaintances ring -->
  <circle cx="300" cy="200" r="7" fill="#e67e22" opacity="0.6"/>
  <circle cx="310" cy="270" r="7" fill="#e67e22" opacity="0.6"/>
  <circle cx="300" cy="310" r="7" fill="#e67e22" opacity="0.6"/>
  <circle cx="500" cy="200" r="7" fill="#e67e22" opacity="0.6"/>
  <circle cx="510" cy="280" r="7" fill="#e67e22" opacity="0.6"/>
  <circle cx="500" cy="320" r="7" fill="#e67e22" opacity="0.6"/>
  <circle cx="350" cy="170" r="7" fill="#e67e22" opacity="0.6"/>
  <circle cx="470" cy="170" r="7" fill="#e67e22" opacity="0.6"/>

  <!-- Full Community ring -->
  <circle cx="250" cy="210" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="240" cy="260" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="250" cy="310" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="550" cy="210" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="560" cy="270" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="550" cy="320" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="290" cy="175" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="510" cy="175" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="360" cy="155" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="460" cy="155" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="360" cy="345" r="6" fill="#f1c40f" opacity="0.5"/>
  <circle cx="460" cy="345" r="6" fill="#f1c40f" opacity="0.5"/>

  <!-- Ripple effect lines -->
  <path d="M375,215 Q385,228 390,233" stroke="#c0392b" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M425,215 Q415,228 410,233" stroke="#c0392b" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Bottom annotation -->
  <rect x="150" y="460" width="500" height="30" rx="6" fill="#fff5f5" stroke="#c0392b" stroke-width="1" filter="url(#s1)"/>
  <text x="400" y="479" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#c0392b" font-weight="600">⚠ What you say becomes permanent reputation within a month</text>
</svg>

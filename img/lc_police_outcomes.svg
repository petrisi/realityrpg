<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <style>
      text { font-family: system-ui, sans-serif; }
      .title { font-size: 20px; font-weight: 700; fill: #2c3e50; }
      .subtitle { font-size: 12px; fill: #7f8c8d; }
      .base-label { font-size: 16px; font-weight: 700; fill: #fff; }
      .mod-desc { font-size: 13px; font-weight: 600; }
      .mod-val { font-size: 14px; font-weight: 700; }
      .col-header { font-size: 14px; font-weight: 700; }
      .note { font-size: 11px; font-style: italic; }
      .example-label { font-size: 12px; font-weight: 600; }
      .example-val { font-size: 13px; font-weight: 700; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" rx="8" fill="#fafbfc"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" class="title">Police Interaction Check — Modifier Stack</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">Roll 2d10 vs Target Number (TN). Higher TN = harder to pass = worse outcome.</text>

  <!-- ===== BASE TN BOX ===== -->
  <rect x="100" y="68" width="700" height="48" rx="8" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="450" y="98" text-anchor="middle" class="base-label">🎯 Base TN: 30 — Routine Stop (no provocation)</text>

  <!-- ===== DIVIDER ===== -->
  <line x1="450" y1="130" x2="450" y2="490" stroke="#ddd" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== LEFT COLUMN: TN Increases (Bad) ===== -->
  <text x="150" y="148" text-anchor="middle" class="col-header" fill="#c0392b">⚠️ TN Increases (Harder)</text>
  <line x1="150" y1="156" x2="390" y2="156" stroke="#fadbd8" stroke-width="2"/>

  <!-- +10 Black character -->
  <rect x="50" y="168" width="370" height="36" rx="5" fill="#fde8e8" stroke="#e8b4b4" stroke-width="0.75"/>
  <text x="65" y="192" class="mod-desc" fill="#c0392b">↑ Black character</text>
  <text x="405" y="192" text-anchor="end" class="mod-val" fill="#c0392b">+10</text>

  <!-- +8 Hispanic/Latino character -->
  <rect x="50" y="212" width="370" height="36" rx="5" fill="#fde8e8" stroke="#e8b4b4" stroke-width="0.75"/>
  <text x="65" y="236" class="mod-desc" fill="#c0392b">↑ Hispanic/Latino character</text>
  <text x="405" y="236" text-anchor="end" class="mod-val" fill="#c0392b">+8</text>

  <!-- +8 Indigenous character -->
  <rect x="50" y="256" width="370" height="36" rx="5" fill="#fde8e8" stroke="#e8b4b4" stroke-width="0.75"/>
  <text x="65" y="280" class="mod-desc" fill="#c0392b">↑ Indigenous character</text>
  <text x="405" y="280" text-anchor="end" class="mod-val" fill="#c0392b">+8</text>

  <!-- +5 Young male 18-29 -->
  <rect x="50" y="300" width="370" height="36" rx="5" fill="#fde8e8" stroke="#e8b4b4" stroke-width="0.75"/>
  <text x="65" y="324" class="mod-desc" fill="#c0392b">↑ Young male (18–29)</text>
  <text x="405" y="324" text-anchor="end" class="mod-val" fill="#c0392b">+5</text>

  <!-- +5 Hoodie/dark clothing at night -->
  <rect x="50" y="344" width="370" height="36" rx="5" fill="#fde8e8" stroke="#e8b4b4" stroke-width="0.75"/>
  <text x="65" y="368" class="mod-desc" fill="#c0392b">↑ Hoodie / dark clothing at night</text>
  <text x="405" y="368" text-anchor="end" class="mod-val" fill="#c0392b">+5</text>

  <!-- +8 High-crime area -->
  <rect x="50" y="388" width="370" height="36" rx="5" fill="#fde8e8" stroke="#e8b4b4" stroke-width="0.75"/>
  <text x="65" y="412" class="mod-desc" fill="#c0392b">↑ High-crime area</text>
  <text x="405" y="412" text-anchor="end" class="mod-val" fill="#c0392b">+8</text>

  <!-- +8 Prior record -->
  <rect x="50" y="432" width="370" height="36" rx="5" fill="#fde8e8" stroke="#e8b4b4" stroke-width="0.75"/>
  <text x="65" y="456" class="mod-desc" fill="#c0392b">↑ Prior criminal record</text>
  <text x="405" y="456" text-anchor="end" class="mod-val" fill="#c0392b">+8</text>

  <!-- ===== RIGHT COLUMN: TN Decreases (Good) ===== -->
  <text x="750" y="148" text-anchor="middle" class="col-header" fill="#27ae60">✅ TN Decreases (Easier)</text>
  <line x1="510" y1="156" x2="850" y2="156" stroke="#d5f5e3" stroke-width="2"/>

  <!-- -5 Calm and compliant -->
  <rect x="510" y="168" width="340" height="36" rx="5" fill="#eafaf1" stroke="#a9dfbf" stroke-width="0.75"/>
  <text x="525" y="192" class="mod-desc" fill="#27ae60">↓ Calm and compliant</text>
  <text x="835" y="192" text-anchor="end" class="mod-val" fill="#27ae60">−5</text>

  <!-- -5 Respectful (PRC check TN 30) -->
  <rect x="510" y="212" width="340" height="36" rx="5" fill="#eafaf1" stroke="#a9dfbf" stroke-width="0.75"/>
  <text x="525" y="236" class="mod-desc" fill="#27ae60">↓ Respectful (PRC check TN 30)</text>
  <text x="835" y="236" text-anchor="end" class="mod-val" fill="#27ae60">−5</text>

  <!-- Spacer row with note -->
  <text x="525" y="280" class="note" fill="#7f8c8d" font-size="11">Few mitigating factors exist.</text>
  <text x="525" y="296" class="note" fill="#7f8c8d" font-size="11">The system is stacked against</text>
  <text x="525" y="312" class="note" fill="#7f8c8d" font-size="11">marginalized characters.</text>

  <!-- ===== EXAMPLE BOX ===== -->
  <rect x="100" y="500" width="700" height="72" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="450" y="524" text-anchor="middle" class="example-label" fill="#e67e22">📋 Example: Marcus (Black, male 24, in high-crime area, calm)</text>
  <text x="450" y="546" text-anchor="middle" class="example-val" fill="#d35400">TN = 30 + 10 + 8 − 5 = 43 → Needs 2d10 ≥ 43 (very hard)</text>
  <text x="450" y="564" text-anchor="middle" class="note" fill="#c0392b" font-size="10">Without being calm: TN = 30 + 10 + 8 = 48 (near-impossible without Hero Points)</text>
</svg>
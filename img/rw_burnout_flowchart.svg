<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 900 340" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowR" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2c3e50"/>
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="8" refX="0" refY="4" orient="auto">
      <path d="M10,0 L0,4 L10,8 Z" fill="#2c3e50"/>
    </marker>
    <marker id="arrowD" markerWidth="10" markerHeight="8" refX="5" refY="8" orient="auto">
      <path d="M0,0 L5,8 L10,0 Z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowU" markerWidth="10" markerHeight="8" refX="5" refY="0" orient="auto">
      <path d="M0,8 L5,0 L10,8 Z" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Burnout Entry &amp; Recovery Flowchart</text>
  <text x="450" y="44" text-anchor="middle" font-size="11" fill="#7f8c8d">From normal SP to breakdown and back — with the Recovery Trap feedback loop</text>

  <!-- TOP ROW: Normal → Over Max → Recovery Check -->
  <!-- Normal -->
  <g transform="translate(30, 65)" filter="url(#shadow)">
    <rect width="110" height="52" rx="8" fill="#27ae60"/>
    <text x="55" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="white">Normal SP</text>
    <text x="55" y="40" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Under max</text>
  </g>

  <!-- Arrow to Over Max -->
  <line x1="140" y1="91" x2="195" y2="91" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="167" y="82" text-anchor="middle" font-size="8" fill="#e74c3c" font-weight="600">SP &gt; max</text>

  <!-- Over Max -->
  <g transform="translate(195, 65)" filter="url(#shadow)">
    <rect width="110" height="52" rx="8" fill="#f39c12"/>
    <text x="55" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="white">Over Max SP</text>
    <text x="55" y="40" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.85)">Stress critical</text>
  </g>

  <!-- Arrow to Recovery Check -->
  <line x1="305" y1="91" x2="360" y2="91" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="332" y="82" text-anchor="middle" font-size="8" fill="#2c3e50" font-weight="600">Rest period</text>

  <!-- Recovery Check (diamond) -->
  <g transform="translate(390, 55)" filter="url(#shadow)">
    <rect width="100" height="72" rx="8" fill="#2980b9"/>
    <text x="50" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="white">Recovery</text>
    <text x="50" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="white">Check?</text>
    <text x="50" y="55" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.85)">2d10+RES vs TN10</text>
  </g>

  <!-- PASS arrow going back to Normal -->
  <path d="M440,55 C440,35 250,35 140,55" fill="none" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowL)"/>
  <text x="290" y="30" text-anchor="middle" font-size="9" fill="#27ae60" font-weight="700">PASS → Recovered</text>

  <!-- FAIL arrow going down to Burnout L1 -->
  <line x1="440" y1="127" x2="440" y2="155" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowD)"/>
  <text x="455" y="145" font-size="9" fill="#e74c3c" font-weight="700">FAIL ↓</text>

  <!-- BURNOUT LEVELS: L1 → L2 → L3 → L4 → L5 (rightward cascade) -->
  <!-- L1 -->
  <g transform="translate(30, 165)" filter="url(#shadow)">
    <rect width="100" height="60" rx="8" fill="#f39c12"/>
    <text x="50" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">😤 Level 1</text>
    <text x="50" y="36" text-anchor="middle" font-size="9" fill="white">Overworked</text>
    <text x="50" y="50" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.85)">−1 checks · +2 SP/d</text>
  </g>

  <line x1="130" y1="195" x2="185" y2="195" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="157" y="186" text-anchor="middle" font-size="7" fill="#e74c3c">fail recover</text>

  <!-- L2 -->
  <g transform="translate(185, 165)" filter="url(#shadow)">
    <rect width="100" height="60" rx="8" fill="#e67e22"/>
    <text x="50" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">😰 Level 2</text>
    <text x="50" y="36" text-anchor="middle" font-size="9" fill="white">Cynical</text>
    <text x="50" y="50" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.85)">−2 INT/PRC · +3 SP/d</text>
  </g>

  <line x1="285" y1="195" x2="340" y2="195" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="312" y="186" text-anchor="middle" font-size="7" fill="#e74c3c">fail recover</text>

  <!-- L3 -->
  <g transform="translate(340, 165)" filter="url(#shadow)">
    <rect width="100" height="60" rx="8" fill="#d35400"/>
    <text x="50" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">😞 Level 3</text>
    <text x="50" y="36" text-anchor="middle" font-size="9" fill="white">Exhausted</text>
    <text x="50" y="50" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.85)">−3 all · +4 SP/d</text>
  </g>

  <line x1="440" y1="195" x2="495" y2="195" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="467" y="186" text-anchor="middle" font-size="7" fill="#e74c3c">fail recover</text>

  <!-- L4 -->
  <g transform="translate(495, 165)" filter="url(#shadow)">
    <rect width="100" height="60" rx="8" fill="#e74c3c"/>
    <text x="50" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">🤒 Level 4</text>
    <text x="50" y="36" text-anchor="middle" font-size="9" fill="white">Physically Ill</text>
    <text x="50" y="50" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.85)">−4 all · +5 SP/d</text>
  </g>

  <line x1="595" y1="195" x2="650" y2="195" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="622" y="186" text-anchor="middle" font-size="7" fill="#e74c3c">fail recover</text>

  <!-- L5 -->
  <g transform="translate(650, 165)" filter="url(#shadow)">
    <rect width="100" height="60" rx="8" fill="#c0392b"/>
    <text x="50" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="white">💔 Level 5</text>
    <text x="50" y="36" text-anchor="middle" font-size="9" fill="white">Breakdown</text>
    <text x="50" y="50" text-anchor="middle" font-size="8" fill="rgba(255,255,255,0.85)">Incapacitated</text>
  </g>

  <!-- RECOVERY PATHS (bottom row) -->
  <!-- Recovery box -->
  <g transform="translate(30, 250)" filter="url(#shadow)">
    <rect width="200" height="65" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="2"/>
    <text x="100" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#2980b9">Recovery Paths</text>
    <text x="100" y="38" text-anchor="middle" font-size="9" fill="#2c3e50">Therapy · Vacation · Exercise</text>
    <text x="100" y="52" text-anchor="middle" font-size="9" fill="#2c3e50">Social Support · Digital Detox</text>
  </g>

  <!-- Arrow from recovery going UP to L2 (forces recovery) -->
  <path d="M130,250 C130,235 235,235 235,230" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrowU)"/>
  <text x="175" y="232" text-anchor="middle" font-size="8" fill="#27ae60">recover to L2</text>

  <!-- Hospitalization (forces to L2) -->
  <g transform="translate(260, 250)" filter="url(#shadow)">
    <rect width="130" height="65" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="2"/>
    <text x="65" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">🏥 Hospitalization</text>
    <text x="65" y="38" text-anchor="middle" font-size="9" fill="#2c3e50">Forces recovery to L2</text>
    <text x="65" y="52" text-anchor="middle" font-size="9" fill="#2c3e50">$5K–$50K · 3–14 days</text>
  </g>

  <!-- Recovery Trap feedback loop -->
  <g transform="translate(430, 250)" filter="url(#shadow)">
    <rect width="200" height="65" rx="8" fill="#fef9e7" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="100" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">⚠️ Recovery Trap</text>
    <text x="100" y="36" text-anchor="middle" font-size="9" fill="#2c3e50">Time off → no income → financial</text>
    <text x="100" y="48" text-anchor="middle" font-size="9" fill="#2c3e50">stress → more SP → slower recovery</text>
    <text x="100" y="60" text-anchor="middle" font-size="8" fill="#e74c3c" font-weight="600">FEEDBACK LOOP →</text>
  </g>

  <!-- Arrow from Recovery Trap looping back to burnout levels -->
  <path d="M630,250 C630,240 780,240 780,200 C780,175 755,175 755,195" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowD)"/>

  <!-- Permanent damage note (bottom right) -->
  <g transform="translate(670, 250)" filter="url(#shadow)">
    <rect width="190" height="65" rx="8" fill="#e8daef" stroke="#8e44ad" stroke-width="1"/>
    <text x="95" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#8e44ad">Permanent Damage?</text>
    <text x="95" y="36" text-anchor="middle" font-size="9" fill="#2c3e50">After L5 recovery: roll d100</text>
    <text x="95" y="48" text-anchor="middle" font-size="9" fill="#2c3e50">1–30: None · 31–60: RES −1</text>
    <text x="95" y="60" text-anchor="middle" font-size="9" fill="#e74c3c">96–100: Career-ending</text>
  </g>

  <!-- Legend -->
  <text x="450" y="335" text-anchor="middle" font-size="9" fill="#7f8c8d">Solid arrows = progression · Dashed green = recovery · Dashed red = feedback trap · Each level requires failed recovery check to advance</text>
</svg>

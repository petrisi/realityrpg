<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="105%" height="105%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#2c3e50" flood-opacity="0.12"/>
    </filter>
    <filter id="regionShadow" x="-3%" y="-3%" width="108%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#2c3e50" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#2c3e50">Heritage Regions &amp; Cultural Backgrounds</text>
  <text x="400" y="45" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Simplified world map showing ethnic heritage regions available in character creation</text>

  <!-- Simplified world map outlines -->
  <!-- Ocean background -->
  <rect x="50" y="60" width="700" height="400" rx="8" fill="#eaf2f8" stroke="#d5dbdb" stroke-width="1"/>

  <!-- ===== NORTH AMERICA ===== -->
  <path d="M80,100 L120,90 L160,85 L190,95 L200,120 L210,150 L200,180 L195,200 L185,220 L170,240 L150,250 L130,245 L110,230 L95,210 L85,180 L80,150 L75,120 Z"
    fill="#2980b9" fill-opacity="0.25" stroke="#2980b9" stroke-width="1.5" filter="url(#regionShadow)"/>
  <text x="140" y="165" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#2c3e50" font-weight="600">North America</text>
  <text x="140" y="177" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">Indigenous</text>

  <!-- ===== LATIN AMERICA ===== -->
  <path d="M130,245 L150,250 L170,270 L180,300 L175,330 L165,360 L150,380 L135,390 L120,380 L110,350 L105,320 L108,290 L115,265 Z"
    fill="#f39c12" fill-opacity="0.25" stroke="#f39c12" stroke-width="1.5" filter="url(#regionShadow)"/>
  <text x="145" y="315" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#2c3e50" font-weight="600">Latin America</text>
  <text x="145" y="327" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">Mexican, Central &amp; South</text>

  <!-- ===== EUROPE ===== -->
  <path d="M350,90 L380,80 L410,82 L430,90 L440,105 L435,125 L425,140 L410,150 L395,155 L380,150 L365,145 L350,135 L340,120 L338,105 Z"
    fill="#2c3e50" fill-opacity="0.22" stroke="#2c3e50" stroke-width="1.5" filter="url(#regionShadow)"/>
  <text x="388" y="118" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#2c3e50" font-weight="600">Europe</text>
  <text x="388" y="130" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">European American</text>

  <!-- ===== WEST AFRICA ===== -->
  <path d="M370,170 L395,165 L420,170 L430,185 L435,205 L425,225 L410,240 L390,245 L375,235 L365,215 L362,195 Z"
    fill="#c0392b" fill-opacity="0.22" stroke="#c0392b" stroke-width="1.5" filter="url(#regionShadow)"/>
  <text x="398" y="205" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#2c3e50" font-weight="600">West Africa</text>
  <text x="398" y="217" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">Nigeria, African</text>
  <text x="398" y="227" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">Diaspora</text>

  <!-- ===== EAST AFRICA / MENA ===== -->
  <path d="M430,175 L460,170 L485,175 L500,190 L505,210 L498,230 L485,245 L465,250 L445,245 L435,230 L430,210 L428,190 Z"
    fill="#e67e22" fill-opacity="0.22" stroke="#e67e22" stroke-width="1.5" filter="url(#regionShadow)"/>
  <text x="468" y="210" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#2c3e50" font-weight="600">Middle East</text>
  <text x="468" y="222" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">&amp; North Africa</text>

  <!-- ===== SOUTH ASIA ===== -->
  <path d="M520,155 L545,145 L570,150 L585,165 L590,185 L585,210 L570,230 L550,240 L530,235 L515,220 L510,200 L512,178 Z"
    fill="#27ae60" fill-opacity="0.25" stroke="#27ae60" stroke-width="1.5" filter="url(#regionShadow)"/>
  <text x="550" y="190" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#2c3e50" font-weight="600">South Asia</text>
  <text x="550" y="202" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">India, Pakistan,</text>
  <text x="550" y="212" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">Bangladesh</text>

  <!-- ===== EAST ASIA ===== -->
  <path d="M590,100 L620,90 L650,95 L670,110 L680,135 L675,165 L660,185 L640,195 L615,190 L595,175 L585,155 L582,130 L585,112 Z"
    fill="#2980b9" fill-opacity="0.25" stroke="#2980b9" stroke-width="1.5" filter="url(#regionShadow)"/>
  <text x="635" y="140" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#2c3e50" font-weight="600">East Asia</text>
  <text x="635" y="152" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">China, Korea,</text>
  <text x="635" y="162" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">Japan</text>

  <!-- ===== MIXED / SEAS ===== -->
  <!-- Small mixed region indicator in Southeast Asia / Oceania area -->
  <ellipse cx="680" cy="250" rx="35" ry="25" fill="#7f8c8d" fill-opacity="0.15" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="680" y="254" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d" font-weight="600">Mixed</text>
  <text x="680" y="265" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#7f8c8d">Heritage</text>

  <!-- ===== AUSTRALIA (small) ===== -->
  <path d="M650,340 L680,330 L710,335 L725,350 L720,375 L700,385 L675,380 L655,368 L648,355 Z"
    fill="#d5dbdb" fill-opacity="0.3" stroke="#d5dbdb" stroke-width="1"/>

  <!-- ===== SOUTH AFRICA (small) ===== -->
  <path d="M400,300 L420,295 L435,305 L438,325 L430,340 L415,345 L400,338 L395,320 Z"
    fill="#d5dbdb" fill-opacity="0.3" stroke="#d5dbdb" stroke-width="1"/>

  <!-- Legend -->
  <rect x="50" y="420" width="700" height="60" rx="8" fill="#fff" stroke="#d5dbdb" stroke-width="1" filter="url(#shadow)"/>
  <g font-family="Segoe UI, sans-serif" font-size="10">
    <!-- Legend items -->
    <rect x="65" y="435" width="12" height="12" rx="3" fill="#2980b9" fill-opacity="0.35" stroke="#2980b9" stroke-width="1"/>
    <text x="82" y="445" fill="#2c3e50">North America / East Asia</text>

    <rect x="250" y="435" width="12" height="12" rx="3" fill="#2c3e50" fill-opacity="0.35" stroke="#2c3e50" stroke-width="1"/>
    <text x="267" y="445" fill="#2c3e50">Europe</text>

    <rect x="350" y="435" width="12" height="12" rx="3" fill="#c0392b" fill-opacity="0.35" stroke="#c0392b" stroke-width="1"/>
    <text x="367" y="445" fill="#2c3e50">West Africa</text>

    <rect x="470" y="435" width="12" height="12" rx="3" fill="#e67e22" fill-opacity="0.35" stroke="#e67e22" stroke-width="1"/>
    <text x="487" y="445" fill="#2c3e50">Middle East / N. Africa</text>

    <rect x="650" y="435" width="12" height="12" rx="3" fill="#27ae60" fill-opacity="0.35" stroke="#27ae60" stroke-width="1"/>
    <text x="667" y="445" fill="#2c3e50">South Asia</text>

    <rect x="65" y="455" width="12" height="12" rx="3" fill="#f39c12" fill-opacity="0.35" stroke="#f39c12" stroke-width="1"/>
    <text x="82" y="465" fill="#2c3e50">Latin America</text>

    <rect x="250" y="455" width="12" height="12" rx="3" fill="#7f8c8d" fill-opacity="0.35" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="267" y="465" fill="#2c3e50">Mixed Heritage</text>

    <text x="550" y="465" fill="#7f8c8d" font-style="italic">Gray = other regions (not primary)</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#2c3e50" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#2980b9"/>
    </marker>
    <marker id="arrowYellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#f39c12"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="350" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#2c3e50">Character Creation — 9-Step Flowchart</text>

  <!-- Column 1: Steps 1-3 -->
  <!-- Step 1 -->
  <rect x="60" y="48" width="240" height="68" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="82" cy="68" r="12" fill="#27ae60"/>
  <text x="82" y="73" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="100" y="68" font-family="Segoe UI, sans-serif" font-size="16">🎂</text>
  <text x="128" y="66" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Age &amp; Budget</text>
  <text x="128" y="84" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Set birthdate &amp; point budget</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="116" x2="180" y2="136" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 2 -->
  <rect x="60" y="136" width="240" height="68" rx="10" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="82" cy="156" r="12" fill="#2980b9"/>
  <text x="82" y="161" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="100" y="156" font-family="Segoe UI, sans-serif" font-size="16">📊</text>
  <text x="128" y="154" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Attributes</text>
  <text x="128" y="172" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Assign 6 core attributes</text>

  <!-- Arrow 2→3 -->
  <line x1="180" y1="204" x2="180" y2="224" stroke="#2980b9" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 3 -->
  <rect x="60" y="224" width="240" height="68" rx="10" fill="#fdebd0" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="82" cy="244" r="12" fill="#f39c12"/>
  <text x="82" y="249" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="100" y="244" font-family="Segoe UI, sans-serif" font-size="16">🌍</text>
  <text x="128" y="242" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Ethnicity</text>
  <text x="128" y="260" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Choose heritage background</text>

  <!-- Column 2: Steps 4-6 -->
  <!-- Step 4 -->
  <rect x="330" y="48" width="240" height="68" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="352" cy="68" r="12" fill="#27ae60"/>
  <text x="352" y="73" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">4</text>
  <text x="370" y="68" font-family="Segoe UI, sans-serif" font-size="16">🏠</text>
  <text x="398" y="66" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Culture &amp; Class</text>
  <text x="398" y="84" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Socioeconomic background</text>

  <!-- Arrow 4→5 -->
  <line x1="450" y1="116" x2="450" y2="136" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 5 -->
  <rect x="330" y="136" width="240" height="68" rx="10" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="352" cy="156" r="12" fill="#2980b9"/>
  <text x="352" y="161" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">5</text>
  <text x="370" y="156" font-family="Segoe UI, sans-serif" font-size="16">🎭</text>
  <text x="398" y="154" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Personality Traits</text>
  <text x="398" y="172" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">3 adv. + 2 disadv.</text>

  <!-- Arrow 5→6 -->
  <line x1="450" y1="204" x2="450" y2="224" stroke="#2980b9" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 6 -->
  <rect x="330" y="224" width="240" height="68" rx="10" fill="#fdebd0" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="352" cy="244" r="12" fill="#f39c12"/>
  <text x="352" y="249" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">6</text>
  <text x="370" y="244" font-family="Segoe UI, sans-serif" font-size="16">🧠</text>
  <text x="398" y="242" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Mental Health</text>
  <text x="398" y="260" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Psychological profile</text>

  <!-- Column 3: Steps 7-9 -->
  <!-- Step 7 -->
  <rect x="600" y="48" width="240" height="68" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="622" cy="68" r="12" fill="#27ae60"/>
  <text x="622" y="73" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">7</text>
  <text x="640" y="68" font-family="Segoe UI, sans-serif" font-size="16">🎒</text>
  <text x="668" y="66" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Starting Inventory</text>
  <text x="668" y="84" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Equipment &amp; possessions</text>

  <!-- Arrow 7→8 -->
  <line x1="720" y1="116" x2="720" y2="136" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Step 8 -->
  <rect x="600" y="136" width="240" height="68" rx="10" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="622" cy="156" r="12" fill="#2980b9"/>
  <text x="622" y="161" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">8</text>
  <text x="640" y="156" font-family="Segoe UI, sans-serif" font-size="16">✍️</text>
  <text x="668" y="154" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Name &amp; Story</text>
  <text x="668" y="172" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Backstory &amp; identity</text>

  <!-- Arrow 8→9 -->
  <line x1="720" y1="204" x2="720" y2="224" stroke="#2980b9" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Step 9 — Complete -->
  <rect x="600" y="224" width="240" height="68" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <circle cx="622" cy="244" r="12" fill="#27ae60"/>
  <text x="622" y="249" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">9</text>
  <text x="640" y="244" font-family="Segoe UI, sans-serif" font-size="16">📋</text>
  <text x="668" y="242" font-family="Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Complete Walkthrough</text>
  <text x="668" y="260" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Review &amp; finalize</text>

  <!-- Connecting arrows between columns -->
  <!-- Step 3 → Step 4 (right arrow) -->
  <path d="M 300 258 L 310 258 Q 320 258 320 252 L 320 82 Q 320 76 326 76" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Step 6 → Step 7 (right arrow) -->
  <path d="M 570 258 L 580 258 Q 590 258 590 252 L 590 82 Q 590 76 596 76" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- Legend -->
  <rect x="60" y="308" width="780" height="30" rx="6" fill="#fff" stroke="#d5dbdb" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="85" cy="323" r="5" fill="#27ae60"/>
  <text x="96" y="327" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Green = Identity</text>
  <circle cx="195" cy="323" r="5" fill="#2980b9"/>
  <text x="206" y="327" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Blue = Development</text>
  <circle cx="350" cy="323" r="5" fill="#f39c12"/>
  <text x="361" y="327" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Yellow = Context</text>
  <text x="500" y="327" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Follow arrows → complete your character</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 700 520" width="700" height="520">
  <defs>
    <!-- Soft gradient backgrounds for each track -->
    <linearGradient id="gradBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3498db" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3498db" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="gradPurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9b59b6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#9b59b6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="gradRose" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="gradGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#27ae60" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#27ae60" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Arrowhead marker -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3498db" opacity="0.7"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9b59b6" opacity="0.7"/>
    </marker>
    <marker id="arrowRose" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e74c3c" opacity="0.7"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#27ae60" opacity="0.7"/>
    </marker>

    <!-- Dice icon symbol -->
    <g id="diceIcon">
      <rect x="0" y="0" width="12" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <circle cx="3.5" cy="3.5" r="1" fill="currentColor"/>
      <circle cx="8.5" cy="3.5" r="1" fill="currentColor"/>
      <circle cx="6" cy="6" r="1" fill="currentColor"/>
      <circle cx="3.5" cy="8.5" r="1" fill="currentColor"/>
      <circle cx="8.5" cy="8.5" r="1" fill="currentColor"/>
    </g>

    <!-- Dollar icon symbol -->
    <g id="dollarIcon">
      <circle cx="6" cy="6" r="5.5" fill="none" stroke="currentColor" stroke-width="1.2"/>
      <path d="M6,2.5 L6,9.5" stroke="currentColor" stroke-width="1.2"/>
      <path d="M8,4 C7,3 5,3.5 5,5 C5,6.5 8,6.5 8,8 C8,9.5 6,9.5 6,9.5" stroke="currentColor" stroke-width="1" fill="none"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="700" height="520" rx="12" fill="#faf9f7"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Transition Paths</text>
  <text x="350" y="48" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#7f8c8d" font-style="italic">Player choice, never forced by the GM</text>

  <!-- Separator line under title -->
  <line x1="60" y1="58" x2="640" y2="58" stroke="#e8e4e0" stroke-width="1"/>

  <!-- ==================== TRACK 1: Social Transition ==================== -->
  <g transform="translate(0, 72)">
    <!-- Track background -->
    <rect x="55" y="0" width="590" height="88" rx="8" fill="url(#gradBlue)" stroke="#3498db" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Emoji/icon label -->
    <text x="75" y="30" font-size="20">🏳️</text>

    <!-- Track title -->
    <text x="105" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Social Transition</text>
    <text x="105" y="38" font-family="system-ui, sans-serif" font-size="11" fill="#7f8c8d">(name / pronouns)</text>

    <!-- Timeline arrow -->
    <line x1="105" y1="58" x2="420" y2="58" stroke="#3498db" stroke-width="2.5" marker-end="url(#arrowBlue)" stroke-linecap="round"/>
    <circle cx="105" cy="58" r="3" fill="#3498db"/>

    <!-- Timeline labels -->
    <text x="105" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#3498db" font-weight="600">Immediate</text>
    <text x="385" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#3498db" font-weight="600" text-anchor="end">Weeks</text>

    <!-- Cost badge -->
    <g transform="translate(440, 14)">
      <use href="#dollarIcon" color="#27ae60"/>
      <text x="15" y="10" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#27ae60">Free</text>
    </g>

    <!-- Check badge -->
    <g transform="translate(440, 36)">
      <rect x="0" y="0" width="12" height="12" rx="2" fill="#3498db" opacity="0.15"/>
      <text x="6" y="10" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="#3498db">✓</text>
      <text x="15" y="10" font-family="system-ui, sans-serif" font-size="12" fill="#7f8c8d">None (player choice)</text>
    </g>
  </g>

  <!-- ==================== TRACK 2: Hormone Therapy ==================== -->
  <g transform="translate(0, 175)">
    <!-- Track background -->
    <rect x="55" y="0" width="590" height="88" rx="8" fill="url(#gradPurple)" stroke="#9b59b6" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Emoji/icon label -->
    <text x="75" y="30" font-size="20">💊</text>

    <!-- Track title -->
    <text x="105" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Hormone Therapy</text>
    <text x="105" y="38" font-family="system-ui, sans-serif" font-size="11" fill="#7f8c8d">(HRT)</text>

    <!-- Timeline arrow -->
    <line x1="105" y1="58" x2="420" y2="58" stroke="#9b59b6" stroke-width="2.5" marker-end="url(#arrowPurple)" stroke-linecap="round"/>
    <circle cx="105" cy="58" r="3" fill="#9b59b6"/>

    <!-- Timeline labels -->
    <text x="105" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#9b59b6" font-weight="600">Months</text>
    <text x="385" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#9b59b6" font-weight="600" text-anchor="end">Years</text>

    <!-- Cost badge -->
    <g transform="translate(440, 14)">
      <use href="#dollarIcon" color="#9b59b6"/>
      <text x="15" y="10" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#9b59b6">$200–$1,000/mo</text>
    </g>

    <!-- Check badge -->
    <g transform="translate(440, 36)">
      <use href="#diceIcon" color="#9b59b6"/>
      <text x="15" y="10" font-family="system-ui, sans-serif" font-size="12" fill="#2c3e50">INT TN 8</text>
      <text x="15" y="24" font-family="system-ui, sans-serif" font-size="10" fill="#7f8c8d">(navigate healthcare)</text>
    </g>
  </g>

  <!-- ==================== TRACK 3: Surgery ==================== -->
  <g transform="translate(0, 278)">
    <!-- Track background -->
    <rect x="55" y="0" width="590" height="88" rx="8" fill="url(#gradRose)" stroke="#e74c3c" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Emoji/icon label -->
    <text x="75" y="30" font-size="20">🏥</text>

    <!-- Track title -->
    <text x="105" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Surgery</text>
    <text x="105" y="38" font-family="system-ui, sans-serif" font-size="11" fill="#7f8c8d">(gender-affirming procedures)</text>

    <!-- Timeline arrow -->
    <line x1="105" y1="58" x2="420" y2="58" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arrowRose)" stroke-linecap="round"/>
    <circle cx="105" cy="58" r="3" fill="#e74c3c"/>

    <!-- Timeline labels -->
    <text x="105" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#e74c3c" font-weight="600">Months prep</text>
    <text x="385" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#e74c3c" font-weight="600" text-anchor="end">1–6 mo recovery</text>

    <!-- Cost badge -->
    <g transform="translate(440, 14)">
      <use href="#dollarIcon" color="#e74c3c"/>
      <text x="15" y="10" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#e74c3c">$5,000–$100,000+</text>
    </g>

    <!-- Check badge -->
    <g transform="translate(440, 36)">
      <use href="#diceIcon" color="#e74c3c"/>
      <text x="15" y="10" font-family="system-ui, sans-serif" font-size="12" fill="#2c3e50">INT TN 10 + VIG TN 8</text>
    </g>
  </g>

  <!-- ==================== TRACK 4: Legal Name/Gender Change ==================== -->
  <g transform="translate(0, 381)">
    <!-- Track background -->
    <rect x="55" y="0" width="590" height="88" rx="8" fill="url(#gradGreen)" stroke="#27ae60" stroke-width="1" stroke-opacity="0.3"/>

    <!-- Emoji/icon label -->
    <text x="75" y="30" font-size="20">📋</text>

    <!-- Track title -->
    <text x="105" y="22" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#2c3e50">Legal Name/Gender Change</text>
    <text x="105" y="38" font-family="system-ui, sans-serif" font-size="11" fill="#7f8c8d">(court order / documentation)</text>

    <!-- Timeline arrow -->
    <line x1="105" y1="58" x2="420" y2="58" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowGreen)" stroke-linecap="round"/>
    <circle cx="105" cy="58" r="3" fill="#27ae60"/>

    <!-- Timeline labels -->
    <text x="105" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#27ae60" font-weight="600">1–6 months</text>
    <text x="385" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#27ae60" font-weight="600" text-anchor="end">Done</text>

    <!-- Cost badge -->
    <g transform="translate(440, 14)">
      <use href="#dollarIcon" color="#27ae60"/>
      <text x="15" y="10" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#27ae60">$50–$500</text>
    </g>

    <!-- Check badge -->
    <g transform="translate(440, 36)">
      <use href="#diceIcon" color="#27ae60"/>
      <text x="15" y="10" font-family="system-ui, sans-serif" font-size="12" fill="#2c3e50">INT TN 8</text>
      <text x="15" y="24" font-family="system-ui, sans-serif" font-size="10" fill="#7f8c8d">(paperwork)</text>
    </g>
  </g>

  <!-- Decorative heart/affirmation at bottom -->
  <text x="350" y="505" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#bdc3c7">All paths are valid · No path is required · You define your journey</text>
</svg>

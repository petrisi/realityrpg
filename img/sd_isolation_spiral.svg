<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="spiralGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7f8c8d"/>
      <stop offset="50%" stop-color="#566573"/>
      <stop offset="100%" stop-color="#2c3e50"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="#fafbfc" rx="8"/>
  <text x="300" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#2c3e50">The Isolation Spiral</text>

  <!-- Spiral path (darkening as it goes down) -->
  <!-- Stage 1: No community -->
  <rect x="180" y="55" width="240" height="50" rx="12" fill="#95a5a6" filter="url(#s1)"/>
  <text x="300" y="87" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#fff">No Community</text>

  <!-- Arrow down -->
  <path d="M300,105 L300,125" stroke="#7f8c8d" stroke-width="3" marker-end="none"/>
  <polygon points="295,120 305,120 300,132" fill="#7f8c8d"/>

  <!-- Stage 2: −2 Mental Health -->
  <rect x="200" y="135" width="200" height="50" rx="12" fill="#7f8c8d" filter="url(#s1)"/>
  <text x="300" y="167" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#fff">−2 Mental Health</text>

  <!-- Arrow down - curving left -->
  <path d="M300,185 L300,205" stroke="#6c7a89" stroke-width="3"/>
  <polygon points="295,200 305,200 300,212" fill="#6c7a89"/>

  <!-- Stage 3: +1 Stress/week -->
  <rect x="170" y="215" width="260" height="50" rx="12" fill="#5d6d7e" filter="url(#s1)"/>
  <text x="300" y="247" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#fff">+1 Stress/week</text>

  <!-- Arrow down - curving right -->
  <path d="M300,265 L300,285" stroke="#4a5568" stroke-width="3"/>
  <polygon points="295,280 305,280 300,292" fill="#4a5568"/>

  <!-- Stage 4: Communication atrophy -->
  <rect x="150" y="295" width="300" height="50" rx="12" fill="#3d4f5f" filter="url(#s1)"/>
  <text x="300" y="327" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#fff">Communication Atrophy</text>

  <!-- Arrow down -->
  <path d="M300,345 L300,365" stroke="#2d3e4f" stroke-width="3"/>
  <polygon points="295,360 305,360 300,372" fill="#2d3e4f"/>

  <!-- Stage 5: Job search penalty -->
  <rect x="140" y="375" width="320" height="50" rx="12" fill="#2c3e50" filter="url(#s1)"/>
  <text x="300" y="407" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#fff">Job Search Penalty</text>

  <!-- Arrow down - deeper -->
  <path d="M300,425 L300,445" stroke="#1a252f" stroke-width="3"/>
  <polygon points="295,440 305,440 300,452" fill="#1a252f"/>

  <!-- Stage 6: Deeper isolation -->
  <rect x="160" y="455" width="280" height="50" rx="12" fill="#17202a" filter="url(#s1)"/>
  <text x="300" y="487" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#e74c3c">⚠ Deeper Isolation</text>

  <!-- Annotations on left side -->
  <rect x="30" y="170" width="130" height="32" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#s2)"/>
  <text x="95" y="191" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#e67e22" font-weight="600">3 months: penalties +1</text>

  <rect x="30" y="370" width="130" height="32" rx="6" fill="#fdf2e9" stroke="#e67e22" stroke-width="1" filter="url(#s2)"/>
  <text x="95" y="391" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#e67e22" font-weight="600">6 months: penalties +2</text>

  <!-- Escape path on right side (green) -->
  <path d="M440,300 Q520,280 540,250 Q560,220 540,200 Q520,180 460,170" stroke="#27ae60" stroke-width="3" fill="none" filter="url(#s1)"/>
  <polygon points="465,165 455,170 465,175" fill="#27ae60"/>

  <!-- Breaking out box -->
  <rect x="455" y="110" width="120" height="110" rx="10" fill="#d5f5e3" stroke="#27ae60" stroke-width="2" filter="url(#s1)"/>
  <text x="515" y="130" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#27ae60">🌿 Break Out</text>
  <text x="515" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2c3e50">Resolve check</text>
  <text x="515" y="166" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2c3e50">→ Attend 3×</text>
  <text x="515" y="182" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#2c3e50">→ Build 1 connection</text>

  <!-- Arrow from escape path pointing to breaking out -->
  <line x1="460" y1="170" x2="460" y2="130" stroke="#27ae60" stroke-width="2"/>
  <polygon points="455,135 465,135 460,125" fill="#27ae60"/>

  <!-- Warning at bottom -->
  <text x="300" y="540" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#7f8c8d">Without intervention, the spiral deepens each month.</text>
</svg>
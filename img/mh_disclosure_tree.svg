<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="dshadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.13"/>
    </filter>
    <marker id="darrowG" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#27ae60"/>
    </marker>
    <marker id="darrowO" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="350" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#2c3e50">Disclosure Decision Tree</text>
  <text x="350" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">To reveal or conceal — every choice has consequences</text>

  <!-- Root node: Disclose condition? -->
  <g filter="url(#dshadow)">
    <rect x="250" y="60" width="200" height="44" rx="10" fill="#2c3e50" stroke="#34495e" stroke-width="2"/>
    <text x="350" y="87" text-anchor="middle" font-size="14" font-weight="700" fill="white">Disclose condition?</text>
  </g>

  <!-- YES branch (left, green) -->
  <!-- Arrow YES -->
  <path d="M260,82 L150,110" stroke="#27ae60" stroke-width="2.5" fill="none" marker-end="url(#darrowG)"/>
  <text x="210" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#27ae60">YES</text>

  <!-- YES intermediate: NPC Reaction roll -->
  <g filter="url(#dshadow)">
    <rect x="55" y="115" width="190" height="40" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
    <text x="150" y="133" text-anchor="middle" font-size="12" font-weight="700" fill="#2c3e50">NPC Reaction Roll</text>
    <text x="150" y="148" text-anchor="middle" font-size="10" fill="#7f8c8d">(1d6)</text>
  </g>

  <!-- Three branches from NPC Reaction -->
  <!-- Supportive (5-6) -->
  <path d="M100,155 L60,200" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#darrowG)"/>
  <g filter="url(#dshadow)">
    <rect x="10" y="205" width="100" height="55" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
    <text x="60" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">Supportive</text>
    <text x="60" y="238" text-anchor="middle" font-size="10" fill="#2c3e50">roll: 5-6</text>
    <text x="60" y="252" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">+3 social</text>
  </g>

  <!-- Neutral (3-4) -->
  <path d="M150,155 L150,200" stroke="#7f8c8d" stroke-width="2" fill="none" marker-end="url(#darrowG)"/>
  <g filter="url(#dshadow)">
    <rect x="110" y="205" width="100" height="55" rx="8" fill="#f0f3f4" stroke="#95a5a6" stroke-width="2"/>
    <text x="160" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#7f8c8d">Neutral</text>
    <text x="160" y="238" text-anchor="middle" font-size="10" fill="#2c3e50">roll: 3-4</text>
    <text x="160" y="252" text-anchor="middle" font-size="10" fill="#7f8c8d">no effect</text>
  </g>

  <!-- Stigmatizing (1-2) -->
  <path d="M200,155 L240,200" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#darrowG)"/>
  <g filter="url(#dshadow)">
    <rect x="190" y="205" width="100" height="55" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="2"/>
    <text x="240" y="223" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">Stigmatizing</text>
    <text x="240" y="238" text-anchor="middle" font-size="10" fill="#2c3e50">roll: 1-2</text>
    <text x="240" y="252" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="600">−5 social</text>
  </g>

  <!-- NO branch (right, orange) -->
  <!-- Arrow NO -->
  <path d="M440,82 L550,110" stroke="#e67e22" stroke-width="2.5" fill="none" marker-end="url(#darrowO)"/>
  <text x="490" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#e67e22">NO</text>

  <!-- NO result -->
  <g filter="url(#dshadow)">
    <rect x="460" y="115" width="220" height="60" rx="10" fill="#fef9e7" stroke="#e67e22" stroke-width="2"/>
    <text x="570" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#2c3e50">Masking Penalty</text>
    <text x="570" y="152" text-anchor="middle" font-size="13" font-weight="700" fill="#e67e22">−2 on EXP checks</text>
    <text x="570" y="167" text-anchor="middle" font-size="9" fill="#7f8c8d">The energy of hiding drains you</text>
  </g>

  <!-- NO sub-branch: additional note -->
  <path d="M570,175 L570,200" stroke="#e67e22" stroke-width="2" fill="none" marker-end="url(#darrowO)"/>
  <g filter="url(#dshadow)">
    <rect x="460" y="205" width="220" height="50" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
    <text x="570" y="222" text-anchor="middle" font-size="10" fill="#2c3e50">⚠ Concealment costs</text>
    <text x="570" y="237" text-anchor="middle" font-size="9" fill="#7f8c8d">Hiding your condition prevents</text>
    <text x="570" y="248" text-anchor="middle" font-size="9" fill="#7f8c8d">access to support and accommodations</text>
  </g>

  <!-- Bottom note -->
  <g>
    <rect x="200" y="300" width="300" height="30" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
    <text x="350" y="319" text-anchor="middle" font-size="10" fill="#2980b9" font-style="italic">The GM rolls NPC Reaction secretly — the player never knows</text>
  </g>
</svg>
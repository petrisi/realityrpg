<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 700 450" width="700" height="450">
  <defs>
    <filter id="rs1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1e8449"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#922b21"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="450" fill="#fafbfc" rx="12"/>

  <!-- Title -->
  <text x="350" y="26" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#2c3e50">Religious Practice: The SP Double-Edged Sword</text>
  <text x="350" y="44" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#7f8c8d">Both a source of stress AND a solution to stress</text>

  <!-- ===== LEFT COLUMN — SP REDUCTION ===== -->
  <!-- Header bar -->
  <rect x="22" y="56" width="210" height="26" rx="6" fill="#d5f5e3" stroke="#1e8449" stroke-width="1"/>
  <text x="127" y="74" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#1e8449">SP Reduction Sources</text>

  <!-- Item 1: Worship attendance -->
  <rect x="22" y="90" width="210" height="28" rx="5" fill="#eafaf1" stroke="#1e8449" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="127" y="103" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#1e8449" font-weight="600">Worship attendance</text>
  <text x="127" y="114" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#1e8449" font-weight="700">−2 SP/week</text>
  <line x1="232" y1="104" x2="298" y2="130" stroke="#1e8449" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Item 2: Daily prayer/meditation -->
  <rect x="22" y="126" width="210" height="28" rx="5" fill="#eafaf1" stroke="#1e8449" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="127" y="139" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#1e8449" font-weight="600">Daily prayer / meditation</text>
  <text x="127" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#1e8449" font-weight="700">−1 to −2 SP/day</text>
  <line x1="232" y1="140" x2="298" y2="160" stroke="#1e8449" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Item 3: Community belonging -->
  <rect x="22" y="162" width="210" height="28" rx="5" fill="#eafaf1" stroke="#1e8449" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="127" y="175" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#1e8449" font-weight="600">Community belonging</text>
  <text x="127" y="186" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#1e8449" font-weight="700">comfort, meaning</text>
  <line x1="232" y1="176" x2="298" y2="190" stroke="#1e8449" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Item 4: Ritual participation -->
  <rect x="22" y="198" width="210" height="28" rx="5" fill="#eafaf1" stroke="#1e8449" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="127" y="211" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#1e8449" font-weight="600">Ritual participation</text>
  <text x="127" y="222" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#1e8449" font-weight="700">structure, purpose</text>
  <line x1="232" y1="212" x2="298" y2="220" stroke="#1e8449" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Item 5: Religious study -->
  <rect x="22" y="234" width="210" height="28" rx="5" fill="#eafaf1" stroke="#1e8449" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="127" y="247" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#1e8449" font-weight="600">Religious study</text>
  <text x="127" y="258" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#1e8449" font-weight="700">−1 SP/week</text>
  <line x1="232" y1="248" x2="298" y2="250" stroke="#1e8449" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Item 6: Fasting observance -->
  <rect x="22" y="270" width="210" height="28" rx="5" fill="#eafaf1" stroke="#1e8449" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="127" y="283" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#1e8449" font-weight="600">Fasting observance</text>
  <text x="127" y="294" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#1e8449" font-weight="700">−2 to −4 SP at conclusion</text>
  <line x1="232" y1="284" x2="298" y2="280" stroke="#1e8449" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ===== RIGHT COLUMN — SP GENERATION ===== -->
  <!-- Header bar -->
  <rect x="468" y="56" width="210" height="26" rx="6" fill="#fadbd8" stroke="#922b21" stroke-width="1"/>
  <text x="573" y="74" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="700" fill="#922b21">SP Generation Sources</text>

  <!-- Item 1: Religious obligations -->
  <rect x="468" y="90" width="210" height="28" rx="5" fill="#fdedec" stroke="#922b21" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="573" y="103" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#922b21" font-weight="600">Religious obligations</text>
  <text x="573" y="114" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#922b21" font-weight="700">time / money pressure</text>
  <line x1="468" y1="104" x2="402" y2="130" stroke="#922b21" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Item 2: Community politics -->
  <rect x="468" y="126" width="210" height="28" rx="5" fill="#fdedec" stroke="#922b21" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="573" y="139" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#922b21" font-weight="600">Community politics</text>
  <text x="573" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#922b21" font-weight="700">gossip, factions</text>
  <line x1="468" y1="140" x2="402" y2="160" stroke="#922b21" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Item 3: Doctrinal conflicts -->
  <rect x="468" y="162" width="210" height="28" rx="5" fill="#fdedec" stroke="#922b21" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="573" y="175" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#922b21" font-weight="600">Doctrinal conflicts</text>
  <text x="573" y="186" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#922b21" font-weight="700">guilt, fear</text>
  <line x1="468" y1="176" x2="402" y2="190" stroke="#922b21" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Item 4: Moral injury -->
  <rect x="468" y="198" width="210" height="28" rx="5" fill="#fdedec" stroke="#922b21" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="573" y="211" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#922b21" font-weight="600">Moral injury</text>
  <text x="573" y="222" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#922b21" font-weight="700">cognitive dissonance</text>
  <line x1="468" y1="212" x2="402" y2="220" stroke="#922b21" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Item 5: Leadership burden -->
  <rect x="468" y="234" width="210" height="28" rx="5" fill="#fdedec" stroke="#922b21" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="573" y="247" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#922b21" font-weight="600">Leadership burden</text>
  <text x="573" y="258" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#922b21" font-weight="700">+3 to +5 SP/week</text>
  <line x1="468" y1="248" x2="402" y2="250" stroke="#922b21" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Item 6: Failure to tithe -->
  <rect x="468" y="270" width="210" height="28" rx="5" fill="#fdedec" stroke="#922b21" stroke-width="0.8" filter="url(#rs1)"/>
  <text x="573" y="283" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#922b21" font-weight="600">Failure to tithe</text>
  <text x="573" y="294" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#922b21" font-weight="700">+2 SP/month</text>
  <line x1="468" y1="284" x2="402" y2="280" stroke="#922b21" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- ===== CENTER GAUGE ===== -->
  <!-- Gauge body -->
  <rect x="300" y="90" width="100" height="200" rx="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5" filter="url(#rs1)"/>

  <!-- Green zone (top) -->
  <rect x="300" y="90" width="100" height="60" rx="40" fill="#d5f5e3" opacity="0.7"/>
  <text x="350" y="118" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#1e8449">HEALTHY</text>
  <text x="350" y="129" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#1e8449">COMMUNITY</text>
  <text x="350" y="142" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="7" fill="#1e8449">Net SP Reduction</text>

  <!-- Yellow zone (middle) -->
  <rect x="300" y="150" width="100" height="60" fill="#fef9e7" opacity="0.7"/>
  <text x="350" y="178" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#b7950b">BALANCED</text>
  <text x="350" y="191" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="7" fill="#b7950b">Roughly even</text>

  <!-- Red zone (bottom) -->
  <rect x="300" y="210" width="100" height="60" rx="0" fill="#fadbd8" opacity="0.7"/>
  <text x="350" y="238" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#922b21">TOXIC</text>
  <text x="350" y="249" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" font-weight="700" fill="#922b21">ENVIRONMENT</text>
  <text x="350" y="262" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="7" fill="#922b21">Net SP Generation</text>

  <!-- Gauge label -->
  <text x="350" y="84" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" font-weight="700" fill="#2c3e50">NET EFFECT</text>

  <!-- Needle pointing toward green (healthy default) -->
  <polygon points="350,120 343,155 350,150 357,155" fill="#2c3e50" stroke="#1a252f" stroke-width="0.5" filter="url(#rs1)"/>
  <circle cx="350" cy="155" r="4" fill="#2c3e50"/>

  <!-- ===== BOTTOM NOTE ===== -->
  <rect x="55" y="310" width="590" height="44" rx="8" fill="#eaecee" stroke="#bdc3c7" stroke-width="0.8"/>
  <text x="350" y="328" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#2c3e50" font-weight="600">For most characters, religious practice is NET POSITIVE for SP management.</text>
  <text x="350" y="343" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9.5" fill="#7f8c8d">For characters in toxic religious environments, it can be NET NEGATIVE.</text>
</svg>
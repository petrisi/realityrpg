<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 820 260" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="820" height="260" rx="10" fill="#faf9f6"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Sleep Debt Accumulation Timeline</text>
  <text x="410" y="48" text-anchor="middle" font-size="11" fill="#7f8c8d">Each day of deficient sleep compounds the penalty — and there is no safe threshold for zero sleep</text>

  <!-- Timeline bar -->
  <line x1="60" y1="100" x2="760" y2="100" stroke="#dcdcdc" stroke-width="3" stroke-linecap="round"/>

  <!-- Day markers -->
  <!-- Day 1 -->
  <circle cx="100" cy="100" r="18" fill="#27ae60" filter="url(#shadow)"/>
  <text x="100" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="100" y="68" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">Day 1</text>
  <text x="100" y="125" text-anchor="middle" font-size="9" fill="#2c3e50">−1 rolls</text>
  <text x="100" y="137" text-anchor="middle" font-size="8" fill="#7f8c8d">Mild groggy</text>

  <!-- Day 2 -->
  <circle cx="180" cy="100" r="18" fill="#2ecc71" filter="url(#shadow)"/>
  <text x="180" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="180" y="68" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="600">Day 2</text>
  <text x="180" y="125" text-anchor="middle" font-size="9" fill="#2c3e50">−2 rolls</text>
  <text x="180" y="137" text-anchor="middle" font-size="8" fill="#7f8c8d">Irritable</text>

  <!-- Day 3 -->
  <circle cx="260" cy="100" r="18" fill="#f39c12" filter="url(#shadow)"/>
  <text x="260" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="260" y="68" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="600">Day 3</text>
  <text x="260" y="125" text-anchor="middle" font-size="9" fill="#2c3e50">−3 rolls, −1 VIG</text>
  <text x="260" y="137" text-anchor="middle" font-size="8" fill="#7f8c8d">Microsleeps</text>

  <!-- Day 4 -->
  <circle cx="340" cy="100" r="18" fill="#e67e22" filter="url(#shadow)"/>
  <text x="340" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">4</text>
  <text x="340" y="68" text-anchor="middle" font-size="10" fill="#e67e22" font-weight="600">Day 4</text>
  <text x="340" y="125" text-anchor="middle" font-size="9" fill="#2c3e50">−4 rolls, −2 VIG</text>
  <text x="340" y="137" text-anchor="middle" font-size="8" fill="#7f8c8d">Emotional</text>

  <!-- Day 5 -->
  <circle cx="420" cy="100" r="18" fill="#d35400" filter="url(#shadow)"/>
  <text x="420" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">5</text>
  <text x="420" y="68" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="600">Day 5</text>
  <text x="420" y="125" text-anchor="middle" font-size="9" fill="#2c3e50">−5 rolls, −3 VIG</text>
  <text x="420" y="137" text-anchor="middle" font-size="8" fill="#7f8c8d">Hallucinations</text>

  <!-- Day 6+ -->
  <circle cx="500" cy="100" r="18" fill="#c0392b" filter="url(#shadow)"/>
  <text x="500" y="105" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">6+</text>
  <text x="500" y="68" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="600">Day 6+</text>
  <text x="500" y="125" text-anchor="middle" font-size="9" fill="#2c3e50">−5 rolls, −4 VIG/d</text>
  <text x="500" y="137" text-anchor="middle" font-size="8" fill="#c0392b">1d20 on 1=collapse</text>

  <!-- Day 11 DEATH -->
  <rect x="570" y="78" width="100" height="44" rx="8" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="620" y="97" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Day 11</text>
  <text x="620" y="113" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">💀 DEATH</text>
  <text x="620" y="140" text-anchor="middle" font-size="8" fill="#c0392b">Zero sleep for 11 days</text>

  <!-- Warning zone highlight -->
  <rect x="485" y="72" width="195" height="58" rx="6" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="583" y="66" text-anchor="middle" font-size="9" fill="#c0392b" font-weight="600">⚠️ CRITICAL ZONE</text>

  <!-- VIG drain bar at bottom -->
  <text x="60" y="175" font-size="11" font-weight="600" fill="#2c3e50">VIG Drain:</text>
  <rect x="150" y="165" width="600" height="22" rx="4" fill="#e8e8e8"/>
  <rect x="150" y="165" width="30" height="22" rx="4" fill="#27ae60"/>
  <rect x="180" y="165" width="30" height="22" fill="#2ecc71"/>
  <rect x="210" y="165" width="30" height="22" fill="#f39c12"/>
  <rect x="240" y="165" width="30" height="22" fill="#e67e22"/>
  <rect x="270" y="165" width="30" height="22" fill="#d35400"/>
  <rect x="300" y="165" width="30" height="22" fill="#c0392b"/>
  <rect x="330" y="165" width="30" height="22" fill="#c0392b"/>
  <rect x="360" y="165" width="30" height="22" fill="#c0392b"/>
  <rect x="390" y="165" width="30" height="22" fill="#c0392b"/>
  <rect x="420" y="165" width="30" height="22" fill="#c0392b"/>
  <rect x="450" y="165" width="30" height="22" fill="#2c3e50"/>
  <text x="165" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">0</text>
  <text x="195" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">0</text>
  <text x="225" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−1</text>
  <text x="255" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−2</text>
  <text x="285" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−3</text>
  <text x="315" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−4</text>
  <text x="345" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−4</text>
  <text x="375" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−4</text>
  <text x="405" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−4</text>
  <text x="435" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−4</text>
  <text x="465" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−4</text>
  <text x="495" y="181" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−4</text>

  <!-- Roll penalty bar -->
  <text x="60" y="215" font-size="11" font-weight="600" fill="#2c3e50">Roll Penalty:</text>
  <rect x="150" y="205" width="600" height="22" rx="4" fill="#e8e8e8"/>
  <rect x="150" y="205" width="60" height="22" rx="4" fill="#2980b9"/>
  <rect x="210" y="205" width="60" height="22" fill="#3498db"/>
  <rect x="270" y="205" width="60" height="22" fill="#e67e22"/>
  <rect x="330" y="205" width="60" height="22" fill="#d35400"/>
  <rect x="390" y="205" width="60" height="22" fill="#c0392b"/>
  <rect x="450" y="205" width="60" height="22" fill="#c0392b"/>
  <rect x="510" y="205" width="60" height="22" fill="#c0392b"/>
  <rect x="570" y="205" width="60" height="22" fill="#c0392b"/>
  <rect x="630" y="205" width="60" height="22" fill="#c0392b"/>
  <rect x="690" y="205" width="60" height="22" rx="4" fill="#c0392b"/>
  <text x="180" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−1</text>
  <text x="240" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−2</text>
  <text x="300" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−3</text>
  <text x="360" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−4</text>
  <text x="420" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−5</text>
  <text x="480" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−5</text>
  <text x="540" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−5</text>
  <text x="600" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−5</text>
  <text x="660" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−5</text>
  <text x="720" y="221" text-anchor="middle" font-size="8" fill="#fff" font-weight="600">−5</text>

  <!-- Day labels under bars -->
  <text x="180" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D1</text>
  <text x="240" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D2</text>
  <text x="300" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D3</text>
  <text x="360" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D4</text>
  <text x="420" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D5</text>
  <text x="480" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D6</text>
  <text x="540" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D7</text>
  <text x="600" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D8</text>
  <text x="660" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D9</text>
  <text x="720" y="245" text-anchor="middle" font-size="8" fill="#7f8c8d">D10</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 500 660" width="500" height="660">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="sevGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="20%" stop-color="#2ecc71"/>
      <stop offset="40%" stop-color="#f1c40f"/>
      <stop offset="60%" stop-color="#e67e22"/>
      <stop offset="80%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#922b21"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="660" rx="12" fill="#faf9f6"/>

  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="700" fill="#2c3e50">Emergency Severity Scale</text>
  <text x="250" y="50" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#7f8c8d">Assign SP, estimate costs, track recovery time</text>
  <line x1="100" y1="58" x2="400" y2="58" stroke="#e74c3c" stroke-width="2"/>

  <!-- ════════════════════════════════════════
       LEVEL 6: Catastrophic (top)
       Box: y=80, h=70, bottom=150
       ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="80" width="440" height="70" rx="8" fill="#922b21" stroke="#641e16" stroke-width="2"/>
  </g>
  <circle cx="55" cy="115" r="14" fill="#641e16"/>
  <text x="55" y="120" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">6</text>
  <text x="80" y="99" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">💀 Catastrophic</text>
  <text x="80" y="115" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#f5b7b1">SP: +10 · Cost: $100K–$500K+</text>
  <text x="80" y="130" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#f5b7b1">Recovery: Permanent impact</text>
  <text x="460" y="99" text-anchor="end" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#f5b7b1" font-style="italic">Paralysis, amputation,</text>
  <text x="460" y="111" text-anchor="end" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#f5b7b1" font-style="italic">disability, death of loved one</text>

  <line x1="250" y1="150" x2="250" y2="168" stroke="#e74c3c" stroke-width="2"/>

  <!-- ════════════════════════════════════════
       LEVEL 5: Life-Threatening
       Box: y=170, h=70, bottom=240
       ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="30" y="170" width="440" height="70" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="2"/>
  </g>
  <circle cx="55" cy="205" r="14" fill="#e74c3c"/>
  <text x="55" y="210" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">5</text>
  <text x="80" y="189" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#922b21">Life-Threatening</text>
  <text x="80" y="205" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#922b21">SP: +8 · Cost: $50K–$100K+</text>
  <text x="80" y="220" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#922b21">Recovery: 3–12 months</text>
  <text x="460" y="189" text-anchor="end" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#922b21" font-style="italic">Heart attack, stroke,</text>
  <text x="460" y="201" text-anchor="end" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#922b21" font-style="italic">major trauma, cancer Dx</text>

  <line x1="250" y1="240" x2="250" y2="258" stroke="#e74c3c" stroke-width="2"/>

  <!-- ════════════════════════════════════════
       LEVEL 4: Serious Injury
       Box: y=260, h=70, bottom=330
       ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="60" y="260" width="380" height="70" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
  </g>
  <circle cx="85" cy="295" r="14" fill="#e67e22"/>
  <text x="85" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">4</text>
  <text x="110" y="279" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#a04000">Serious Injury</text>
  <text x="110" y="295" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#a04000">SP: +5 · Cost: $10K–$50K</text>
  <text x="110" y="310" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#a04000">Recovery: 1–6 months</text>
  <text x="430" y="279" text-anchor="end" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#a04000" font-style="italic">Broken bones, surgery,</text>
  <text x="430" y="291" text-anchor="end" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#a04000" font-style="italic">TBI, organ damage</text>

  <line x1="250" y1="330" x2="250" y2="348" stroke="#e67e22" stroke-width="2"/>

  <!-- ════════════════════════════════════════
       LEVEL 3: Minor Injury
       Box: y=350, h=70, bottom=420
       ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="90" y="350" width="320" height="70" rx="8" fill="#fef9e7" stroke="#f1c40f" stroke-width="2"/>
  </g>
  <circle cx="115" cy="385" r="14" fill="#f1c40f"/>
  <text x="115" y="390" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="140" y="369" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#7d6608">Minor Injury</text>
  <text x="140" y="385" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#7d6608">SP: +3 · Cost: $1K–$10K</text>
  <text x="140" y="400" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#7d6608">Recovery: 1–4 weeks</text>
  <text x="400" y="369" text-anchor="end" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7d6608" font-style="italic">Sprains, lacerations,</text>
  <text x="400" y="381" text-anchor="end" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7d6608" font-style="italic">concussion, burns</text>

  <line x1="250" y1="420" x2="250" y2="438" stroke="#f1c40f" stroke-width="2"/>

  <!-- ════════════════════════════════════════
       LEVEL 2: Property Damage
       Box: y=440, h=70, bottom=510
       ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="120" y="440" width="260" height="70" rx="8" fill="#d4efdf" stroke="#2ecc71" stroke-width="2"/>
  </g>
  <circle cx="145" cy="475" r="14" fill="#2ecc71"/>
  <text x="145" y="480" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="170" y="464" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e8449">Property Damage</text>
  <text x="170" y="480" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#1e8449">SP: +2 · Cost: $500–$15K</text>
  <text x="170" y="495" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#1e8449">Recovery: Days to a week</text>
  <text x="388" y="480" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7f8c8d" font-style="italic">Car accident,</text>
  <text x="388" y="492" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7f8c8d" font-style="italic">home damage, theft</text>

  <line x1="250" y1="510" x2="250" y2="528" stroke="#2ecc71" stroke-width="2"/>

  <!-- ════════════════════════════════════════
       LEVEL 1: Minor Inconvenience (bottom)
       Box: y=525, h=70, bottom=595
       ════════════════════════════════════════ -->
  <g filter="url(#shadow)">
    <rect x="150" y="525" width="200" height="70" rx="8" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  </g>
  <circle cx="175" cy="560" r="14" fill="#27ae60"/>
  <text x="175" y="565" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="200" y="549" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" font-weight="700" fill="#1e8449">Minor Inconvenience</text>
  <text x="200" y="565" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#1e8449">SP: +0 · Cost: $0–$100</text>
  <text x="200" y="580" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10.5" fill="#1e8449">Recovery: None needed</text>
  <text x="358" y="565" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7f8c8d" font-style="italic">Flat tire, parking</text>
  <text x="358" y="577" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#7f8c8d" font-style="italic">ticket, lost keys</text>

  <!-- GM note box -->
  <rect x="50" y="607" width="400" height="38" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="250" y="622" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7d6608">Insurance, emergency fund, and social support reduce costs by 1–3 levels</text>
  <text x="250" y="637" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#7d6608">GM may combine levels for compound emergencies</text>
</svg>

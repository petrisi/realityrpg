<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#fafbfc" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#2c3e50">Professional Network Map</text>

  <!-- Three orbiting rings -->
  <circle cx="400" cy="300" r="230" fill="none" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="630" y="300" font-family="Segoe UI, sans-serif" font-size="10" fill="#7f8c8d" font-weight="600">Annually: update presence</text>

  <circle cx="400" cy="300" r="175" fill="none" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="575" y="300" font-family="Segoe UI, sans-serif" font-size="10" fill="#7f8c8d" font-weight="600">Quarterly: 1 event</text>

  <circle cx="400" cy="300" r="120" fill="none" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="520" y="300" font-family="Segoe UI, sans-serif" font-size="10" fill="#7f8c8d" font-weight="600">Monthly: 2 contacts</text>

  <!-- Central node: YOU -->
  <circle cx="400" cy="300" r="36" fill="#2c3e50" filter="url(#s1)"/>
  <text x="400" y="296" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#ecf0f1">YOU</text>
  <text x="400" y="312" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#bdc3c7">Network</text>

  <!-- Hexagon positions: 6 contacts around center -->
  <!-- Top: Mentor (120 degrees from right) -->
  <circle cx="400" cy="130" r="30" fill="#2980b9" filter="url(#s1)"/>
  <text x="400" y="126" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">🧭</text>
  <text x="400" y="175" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2c3e50">Mentor</text>
  <text x="400" y="188" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d">Guidance &amp; advice</text>
  <line x1="400" y1="160" x2="400" y2="264" stroke="#2980b9" stroke-width="1.5"/>

  <!-- Top-right: Industry Contact (30 degrees) -->
  <circle cx="560" cy="165" r="30" fill="#27ae60" filter="url(#s1)"/>
  <text x="560" y="161" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">🌐</text>
  <text x="560" y="210" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2c3e50">Industry Contact</text>
  <text x="560" y="223" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d">Market insights</text>
  <line x1="535" y1="185" x2="425" y2="278" stroke="#27ae60" stroke-width="1.5"/>

  <!-- Bottom-right: Competitor (330 degrees) -->
  <circle cx="560" cy="435" r="30" fill="#c0392b" filter="url(#s1)"/>
  <text x="560" y="431" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">⚔️</text>
  <text x="560" y="478" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2c3e50">Competitor</text>
  <text x="560" y="491" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d">Benchmarking</text>
  <line x1="535" y1="415" x2="425" y2="322" stroke="#c0392b" stroke-width="1.5"/>

  <!-- Bottom: Former Boss (240 degrees) -->
  <circle cx="400" cy="470" r="30" fill="#f39c12" filter="url(#s1)"/>
  <text x="400" y="466" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">📋</text>
  <text x="400" y="515" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2c3e50">Former Boss</text>
  <text x="400" y="528" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d">References &amp; vouch</text>
  <line x1="400" y1="440" x2="400" y2="336" stroke="#f39c12" stroke-width="1.5"/>

  <!-- Bottom-left: Mentee (210 degrees) -->
  <circle cx="240" cy="435" r="30" fill="#e67e22" filter="url(#s1)"/>
  <text x="240" y="431" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">🎓</text>
  <text x="240" y="478" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2c3e50">Mentee</text>
  <text x="240" y="491" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d">Leadership practice</text>
  <line x1="265" y1="415" x2="375" y2="322" stroke="#e67e22" stroke-width="1.5"/>

  <!-- Top-left: Colleague (150 degrees) -->
  <circle cx="240" cy="165" r="30" fill="#7f8c8d" filter="url(#s1)"/>
  <text x="240" y="161" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18">👔</text>
  <text x="240" y="210" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#2c3e50">Colleague</text>
  <text x="240" y="223" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#7f8c8d">Daily collaboration</text>
  <line x1="265" y1="185" x2="375" y2="278" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Cross-reference: Mentor → Industry Contact (warm intro) -->
  <line x1="425" y1="155" x2="535" y2="185" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,3" filter="url(#s2)"/>
  <rect x="460" y="152" width="80" height="18" rx="4" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="500" y="165" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#f39c12" font-weight="600">warm intro</text>

  <!-- Cross-reference: Colleague → Mentee -->
  <line x1="265" y1="185" x2="265" y2="415" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Cross-reference: Former Boss → Industry Contact -->
  <line x1="425" y1="440" x2="535" y2="415" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Bottom note -->
  <text x="400" y="570" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#7f8c8d">Maintain your network regularly — connections weaken without contact.</text>
</svg>
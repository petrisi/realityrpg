<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 720" width="520" height="720">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/>
    </filter>
    <marker id="arrowDn" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="520" height="720" rx="12" fill="#faf9f6"/>

  <!-- Title -->
  <text x="260" y="35" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="700" fill="#2c3e50">Overtraining → Injury Cascade</text>
  <text x="260" y="55" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="12" fill="#5d6d7e">Small decisions compound into catastrophe</text>

  <!-- Level 0: Fresh -->
  <g transform="translate(60, 80)" filter="url(#shadow)">
    <rect width="400" height="56" rx="8" fill="#27ae60"/>
    <text x="200" y="24" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">🟢 Level 0 — Fresh</text>
    <text x="200" y="43" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#e8f8f5">No penalty · Normal SP reduction · Baseline</text>
  </g>

  <!-- Arrow 0→1 -->
  <line x1="260" y1="136" x2="260" y2="160" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowDn)"/>
  <text x="370" y="152" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#5d6d7e" font-style="italic">missed rest day</text>

  <!-- Level 1: Sore -->
  <g transform="translate(60, 162)" filter="url(#shadow)">
    <rect width="400" height="56" rx="8" fill="#f39c12"/>
    <text x="200" y="24" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">🟡 Level 1 — Sore</text>
    <text x="200" y="43" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#fef9e7">−1 checks · SP reduction halved · 1 rest day recovers</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="260" y1="218" x2="260" y2="242" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowDn)"/>
  <text x="370" y="234" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#5d6d7e" font-style="italic">keep pushing, no rest</text>

  <!-- Level 2: Fatigued -->
  <g transform="translate(60, 244)" filter="url(#shadow)">
    <rect width="400" height="56" rx="8" fill="#e67e22"/>
    <text x="200" y="24" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">🟠 Level 2 — Fatigued</text>
    <text x="200" y="43" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#fdebd0">−2 checks · No SP reduction · +1 daily SP from fatigue</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="260" y1="300" x2="260" y2="324" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowDn)"/>
  <text x="370" y="316" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#5d6d7e" font-style="italic">still training at TN 55+</text>

  <!-- Level 3: Overtrained -->
  <g transform="translate(60, 326)" filter="url(#shadow)">
    <rect width="400" height="56" rx="8" fill="#e74c3c"/>
    <text x="200" y="24" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">🔴 Level 3 — Overtrained</text>
    <text x="200" y="43" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#fadbd8">−3 checks · Exercise INCREASES SP · RES TN 40 to resist</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="260" y1="382" x2="260" y2="406" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowDn)"/>
  <text x="370" y="398" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#5d6d7e" font-style="italic">critical failure while overtrained</text>

  <!-- Level 4: Injured -->
  <g transform="translate(60, 408)" filter="url(#shadow)">
    <rect width="400" height="56" rx="8" fill="#c0392b"/>
    <text x="200" y="24" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">🏥 Level 4 — Injured</text>
    <text x="200" y="43" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#f5b7b1">Cannot exercise · −2 VIG · +3 daily SP · Weeks of recovery</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="260" y1="464" x2="260" y2="488" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowDn)"/>
  <text x="370" y="480" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="9" fill="#5d6d7e" font-style="italic">severe injury, surgery required</text>

  <!-- Level 5: Rehab -->
  <g transform="translate(60, 490)" filter="url(#shadow)">
    <rect width="400" height="56" rx="8" fill="#2c3e50"/>
    <text x="200" y="24" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700" fill="#fff">🛏️ Level 5 — Rehab</text>
    <text x="200" y="43" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#aab7b8">−3 VIG · −2 all physical · +5 daily SP · PT $100–$300/session</text>
  </g>

  <!-- Bottom warning -->
  <text x="260" y="570" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#5d6d7e" font-style="italic">Each month injured = −1 Fitness Level</text>
  <text x="260" y="588" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" fill="#5d6d7e" font-style="italic">The body remembers — regaining lost levels takes half the normal time</text>

  <!-- Recovery path (upward dashed arrow on left side) -->
  <path d="M 45 518 L 45 108" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,4" fill="none"/>
  <polygon points="45 100 40 112 50 112" fill="#27ae60"/>
  <text x="25" y="320" text-anchor="middle" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="10" fill="#27ae60" font-weight="600" transform="rotate(-90, 25, 320)">Rest + Recovery</text>
</svg>

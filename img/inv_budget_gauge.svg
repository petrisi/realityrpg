<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 500 480" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <title>Budget Health Under Inflation</title>
  <desc>Semicircular gauge showing how inflation erodes purchasing power: Deflation (blue), Stable (green), Rising (yellow), High (orange), Crisis (red). Needle shows current inflation impact on a character's budget.</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <text x="230" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Budget Health Under Inflation</text>
  <text x="230" y="46" text-anchor="middle" font-size="10" fill="#7f8c8d">How inflation erodes (or boosts) your purchasing power</text>

  <!-- Gauge body centered at (200, 260) — slightly left to leave room for right-side labels -->
  <g transform="translate(190, 260)">
    <!-- Background arc — full 180° semicircle, radius=110, stroke-width=30 -->
    <path d="M -110,80 A 110,110 0 0,1 110,80" fill="none" stroke="#e8e8e8" stroke-width="30" stroke-linecap="butt"/>

    <!-- Color zones -->
    <path d="M 72,-28 A 110,110 0 0,1 110,80" fill="none" stroke="#2980b9" stroke-width="30" stroke-linecap="butt"/>
    <path d="M 0,-110 A 110,110 0 0,1 72,-28" fill="none" stroke="#27ae60" stroke-width="30" stroke-linecap="butt"/>
    <path d="M -78,-28 A 110,110 0 0,1 0,-110" fill="none" stroke="#f39c12" stroke-width="30" stroke-linecap="butt"/>
    <path d="M -110,20 A 110,110 0 0,1 -78,-28" fill="none" stroke="#e67e22" stroke-width="30" stroke-linecap="butt"/>
    <path d="M -110,80 A 110,110 0 0,1 -110,20" fill="none" stroke="#e74c3c" stroke-width="30" stroke-linecap="butt"/>

    <!-- Tick marks -->
    <g stroke="#2c3e50" stroke-width="1.5" opacity="0.4">
      <line x1="-110" y1="80" x2="-110" y2="92"/>
      <line x1="-90" y1="20" x2="-85" y2="28"/>
      <line x1="-50" y1="-30" x2="-47" y2="-22"/>
      <line x1="0" y1="-110" x2="0" y2="-100"/>
      <line x1="50" y1="-30" x2="47" y2="-22"/>
    </g>

    <!-- Tick labels -->
    <g font-size="9" fill="#7f8c8d" text-anchor="middle">
      <text x="-110" y="108">Crisis</text>
      <text x="-55" y="-35">4%</text>
      <text x="0" y="-118">0%</text>
      <text x="55" y="-35">−2%</text>
      <text x="110" y="108">Deflation</text>
    </g>

    <!-- Zone labels -->
    <g font-size="8" text-anchor="middle" font-weight="600">
      <text x="-85" y="55" fill="#e74c3c">Crisis</text>
      <text x="-40" y="-5" fill="#e67e22">High</text>
      <text x="0" y="-55" fill="#f39c12">Rising</text>
      <text x="45" y="-5" fill="#27ae60">Stable</text>
      <text x="85" y="55" fill="#2980b9">Deflation</text>
    </g>

    <!-- Needle at 2% inflation -->
    <line x1="0" y1="80" x2="-50" y2="-30" stroke="#2c3e50" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="80" r="8" fill="#2c3e50"/>
    <circle cx="0" cy="80" r="3" fill="#fff"/>

    <!-- Current inflation display -->
    <text x="0" y="135" text-anchor="middle" font-size="32" font-weight="700" fill="#2c3e50">2%</text>
    <text x="0" y="155" text-anchor="middle" font-size="12" fill="#7f8c8d">Monthly Inflation</text>
  </g>

  <!-- Right side: Impact on budget — shifted left so text fits in viewBox -->
  <g font-size="11" font-weight="600">
    <text x="320" y="130" fill="#2980b9">Deflation (−2%)</text>
    <text x="320" y="146" fill="#7f8c8d" font-size="10" font-weight="400">Budget stretches further</text>

    <text x="320" y="190" fill="#27ae60">Stable (0–2%)</text>
    <text x="320" y="206" fill="#7f8c8d" font-size="10" font-weight="400">Normal budget management</text>

    <text x="320" y="250" fill="#f39c12">Rising (3–5%)</text>
    <text x="320" y="266" fill="#7f8c8d" font-size="10" font-weight="400">+1 TN on budget rolls</text>

    <text x="320" y="310" fill="#e67e22">High (6–10%)</text>
    <text x="320" y="326" fill="#7f8c8d" font-size="10" font-weight="400">+2 TN, cut expenses or debt</text>

    <text x="320" y="370" fill="#e74c3c">Crisis (10%+)</text>
    <text x="320" y="386" fill="#7f8c8d" font-size="10" font-weight="400">−5 stress resist, forced debt</text>
  </g>

  <!-- Bottom note -->
  <text x="230" y="460" text-anchor="middle" font-size="10" fill="#7f8c8d">Budget TN = base 6 + inflation tier modifier. Roll 2d10+PRC each month.</text>
</svg>
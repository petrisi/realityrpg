<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" width="520" height="520">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="500" height="500" rx="10" fill="#fff" stroke="#ddd" stroke-width="1"/>

  <!-- Title -->
  <text x="260" y="24" text-anchor="middle" font-size="14" font-weight="700" fill="#2c3e50">🔄 Campaign 2 — NPC Relationship Web</text>

  <!-- Decorative ring -->
  <circle cx="260" cy="260" r="170" fill="none" stroke="#ddd" stroke-width="1"/>

  <!-- Connection lines -->
  <line x1="260" y1="225" x2="260" y2="80" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="285" y1="240" x2="380" y2="150" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="295" y1="260" x2="420" y2="260" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="285" y1="280" x2="380" y2="390" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="260" y1="295" x2="260" y2="410" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="235" y1="280" x2="100" y2="390" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="225" y1="260" x2="120" y2="260" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="235" y1="240" x2="100" y2="150" stroke="#bbb" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Relationship labels -->
  <text x="275" y="160" font-size="8" fill="#5d6d7e">Divorce</text>
  <text x="345" y="200" font-size="8" fill="#5d6d7e">Daughter</text>
  <text x="365" y="250" font-size="8" fill="#5d6d7e">Diagnosis</text>
  <text x="345" y="335" font-size="8" fill="#5d6d7e">Layoff</text>
  <text x="275" y="360" font-size="8" fill="#5d6d7e">Romance</text>
  <text x="155" y="335" font-size="8" fill="#5d6d7e">Support</text>
  <text x="160" y="250" font-size="8" fill="#5d6d7e">Therapy</text>
  <text x="160" y="200" font-size="8" fill="#5d6d7e">Normalcy</text>

  <!-- Center node: PC -->
  <circle cx="260" cy="260" r="35" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="260" y="265" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">PC</text>

  <!-- 1. Carmen (top) -->
  <rect x="220" y="80" width="80" height="40" rx="6" fill="#fff" stroke="#e74c3c" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="99" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Carmen</text>
  <text x="260" y="112" text-anchor="middle" font-size="8" fill="#5d6d7e">Divorce</text>

  <!-- 2. Maya (top-right) -->
  <rect x="380" y="130" width="80" height="40" rx="6" fill="#fff" stroke="#e91e63" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="149" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Maya</text>
  <text x="420" y="162" text-anchor="middle" font-size="8" fill="#5d6d7e">Daughter</text>

  <!-- 3. David Park (right) -->
  <rect x="420" y="240" width="80" height="40" rx="6" fill="#fff" stroke="#16a085" stroke-width="2" filter="url(#shadow)"/>
  <text x="460" y="259" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">David Park</text>
  <text x="460" y="272" text-anchor="middle" font-size="8" fill="#5d6d7e">Doctor</text>

  <!-- 4. Tom Brennan (bottom-right) -->
  <rect x="380" y="370" width="80" height="40" rx="6" fill="#fff" stroke="#95a5a6" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="389" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Tom Brennan</text>
  <text x="420" y="402" text-anchor="middle" font-size="8" fill="#5d6d7e">Boss</text>

  <!-- 5. Sam Torres (bottom) -->
  <rect x="220" y="410" width="80" height="40" rx="6" fill="#fff" stroke="#e91e63" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="429" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Sam Torres</text>
  <text x="260" y="442" text-anchor="middle" font-size="8" fill="#5d6d7e">Romance</text>

  <!-- 6. Frankie (bottom-left) -->
  <rect x="60" y="370" width="80" height="40" rx="6" fill="#fff" stroke="#27ae60" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="389" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Frankie</text>
  <text x="100" y="402" text-anchor="middle" font-size="8" fill="#5d6d7e">Sibling</text>

  <!-- 7. Dr. Okafor (left) -->
  <rect x="40" y="240" width="80" height="40" rx="6" fill="#fff" stroke="#8e44ad" stroke-width="2" filter="url(#shadow)"/>
  <text x="80" y="259" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Dr. Okafor</text>
  <text x="80" y="272" text-anchor="middle" font-size="8" fill="#5d6d7e">Therapist</text>

  <!-- 8. Jean-Pierre (top-left) -->
  <rect x="60" y="130" width="80" height="40" rx="6" fill="#fff" stroke="#f39c12" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="149" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Jean-Pierre</text>
  <text x="100" y="162" text-anchor="middle" font-size="8" fill="#5d6d7e">Barista</text>
</svg>
<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 680" width="560" height="680">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d6d7e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="680" fill="#ffffff" rx="6"/>

  <!-- Title -->
  <text x="280" y="28" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="#2c3e50">📋 Session Flow — Reality RPG</text>
  <text x="280" y="44" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5d6d7e">The lifecycle of one campaign session, ~90–120 minutes</text>

  <!-- ===== PHASE 1: OPENING ===== -->
  <rect x="40" y="60" width="480" height="14" rx="4" fill="#eaf2f8"/>
  <text x="52" y="71" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#2980b9">PHASE 1: OPENING (5–10 min)</text>

  <!-- Node: Check-in -->
  <rect x="60" y="85" width="180" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="108" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2c3e50">🙋 Player Check-in</text>

  <line x1="150" y1="121" x2="150" y2="140" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node: SP Recovery -->
  <rect x="60" y="140" width="180" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="163" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2c3e50">📊 Calculate SP Recovery</text>

  <line x1="150" y1="176" x2="150" y2="195" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node: Calendar Events -->
  <rect x="60" y="195" width="180" height="36" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="218" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2c3e50">📅 Seasonal / Climate Events</text>

  <!-- Side note box -->
  <rect x="270" y="85" width="240" height="146" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="390" y="105" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#e67e22">💡 GM Prep Checklist</text>
  <text x="285" y="125" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">□ Review last session notes</text>
  <text x="285" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">□ Check each PC's SP level</text>
  <text x="285" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">□ Note seasonal events this month</text>
  <text x="285" y="170" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">□ Prepare 2–3 scene outlines</text>
  <text x="285" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">□ Have event tables ready</text>
  <text x="285" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">□ Watch for PCs near SP max</text>
  <text x="285" y="215" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">□ Plan next session hook</text>
  <text x="285" y="225" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">□ Is this session 3/6/9/12?</text>

  <!-- Arrow down to Phase 2 -->
  <line x1="150" y1="231" x2="150" y2="250" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== PHASE 2: MAIN SCENES ===== -->
  <rect x="40" y="250" width="480" height="14" rx="4" fill="#fef9e7"/>
  <text x="52" y="261" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#d4a017">PHASE 2: MAIN SCENES (40–60 min)</text>

  <!-- Scene 1 -->
  <rect x="60" y="275" width="200" height="44" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="294" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2c3e50">🎬 Scene 1 — Opening</text>
  <text x="160" y="310" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">2–4 dice checks + SP tally</text>

  <line x1="160" y1="319" x2="160" y2="338" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Diamond: Escalation? -->
  <polygon points="160,338 210,360 160,382 110,360" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="364" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#2c3e50">Escalate?</text>

  <!-- Yes → Scene 2 -->
  <line x1="160" y1="382" x2="160" y2="401" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>
  <text x="168" y="396" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5d6d7e">Yes</text>

  <!-- Scene 2 -->
  <rect x="60" y="401" width="200" height="44" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="420" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2c3e50">🔥 Scene 2 — Escalation</text>
  <text x="160" y="436" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">2–4 dice checks + SP tally</text>

  <line x1="160" y1="445" x2="160" y2="464" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Diamond: Climax? -->
  <polygon points="160,464 210,486 160,508 110,486" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="492" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#2c3e50">Climax?</text>

  <!-- Yes → Scene 3 -->
  <line x1="160" y1="508" x2="160" y2="527" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Scene 3 (optional) -->
  <rect x="60" y="527" width="200" height="44" rx="8" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="546" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2c3e50">💥 Scene 3 — Climax</text>
  <text x="160" y="562" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">Resolution + SP tally</text>

  <!-- Side note: SP tracking -->
  <rect x="290" y="275" width="220" height="130" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="295" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" font-weight="700" fill="#e67e22">⚠️ SP Watch Points</text>
  <text x="305" y="315" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">• Track SP after each event</text>
  <text x="305" y="330" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">• Flag PCs within 3 SP of max</text>
  <text x="305" y="345" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">• Offer rest scenes if needed</text>
  <text x="305" y="360" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">• Roll event tables for surprises</text>
  <text x="305" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">Balance difficulty across</text>
  <text x="305" y="394" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#5d6d7e">players with different SP levels</text>

  <!-- No branch from Escalate → skip to closing -->
  <line x1="210" y1="360" x2="310" y2="360" stroke="#5d6d7e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="260" y="355" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5d6d7e">No → skip</text>

  <!-- Arrow down to Phase 3 -->
  <line x1="160" y1="571" x2="160" y2="590" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== PHASE 3: CLOSING ===== -->
  <rect x="40" y="590" width="480" height="14" rx="4" fill="#d4efdf"/>
  <text x="52" y="601" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="700" fill="#1e8449">PHASE 3: CLOSING (5–10 min)</text>

  <!-- Node: Session Wrap -->
  <rect x="60" y="614" width="130" height="36" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="125" y="637" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2c3e50">📝 Session Wrap</text>

  <!-- Node: Next Hook -->
  <rect x="210" y="614" width="130" height="36" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="275" y="637" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2c3e50">🪝 Next Session Hook</text>

  <!-- Node: Growth Check -->
  <rect x="360" y="614" width="150" height="36" rx="8" fill="#d4efdf" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="435" y="637" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" font-weight="600" fill="#2c3e50">🌱 Growth Check (3/6/9/12)</text>

  <!-- Connecting arrows between closing nodes -->
  <line x1="190" y1="632" x2="210" y2="632" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="340" y1="632" x2="360" y2="632" stroke="#5d6d7e" stroke-width="2" marker-end="url(#arr)"/>
</svg>

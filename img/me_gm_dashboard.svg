<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 600 350" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <title>GM's Economic Dashboard</title>
  <desc>Dashboard card tracking ECS, Monthly Inflation, Job Market, Credit Conditions, Housing Market, Stock Market Trend, and Next ECS Shift</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">GM's Economic Dashboard</text>
  <text x="300" y="40" text-anchor="middle" font-size="10" fill="#7f8c8d">Keep this tracker visible on your campaign board</text>

  <!-- Dashboard card -->
  <rect x="30" y="55" width="540" height="280" rx="12" fill="#fff" stroke="#dcdcdc" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- ECS field -->
  <rect x="50" y="75" width="230" height="60" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="65" y="95" font-size="11" font-weight="700" fill="#2c3e50">📊 ECS (Economic Climate)</text>
  <text x="65" y="115" font-size="18" font-weight="700" fill="#27ae60">0</text>
  <text x="95" y="115" font-size="10" fill="#7f8c8d">/ −10 to +10</text>

  <!-- Inflation field -->
  <rect x="300" y="75" width="230" height="60" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="315" y="95" font-size="11" font-weight="700" fill="#2c3e50">📈 Monthly Inflation</text>
  <text x="315" y="115" font-size="18" font-weight="700" fill="#f39c12">1%</text>
  <text x="350" y="115" font-size="10" fill="#7f8c8d">(Stable baseline)</text>

  <!-- Job Market -->
  <rect x="50" y="150" width="150" height="50" rx="8" fill="#f0faf4" stroke="#27ae60" stroke-width="1"/>
  <text x="65" y="170" font-size="10" font-weight="700" fill="#2c3e50">💼 Job Market</text>
  <text x="65" y="190" font-size="13" font-weight="700" fill="#27ae60">Normal</text>

  <!-- Credit Conditions -->
  <rect x="220" y="150" width="150" height="50" rx="8" fill="#f0faf4" stroke="#27ae60" stroke-width="1"/>
  <text x="235" y="170" font-size="10" font-weight="700" fill="#2c3e50">💳 Credit</text>
  <text x="235" y="190" font-size="13" font-weight="700" fill="#27ae60">Normal</text>

  <!-- Housing Market -->
  <rect x="390" y="150" width="150" height="50" rx="8" fill="#f0faf4" stroke="#27ae60" stroke-width="1"/>
  <text x="405" y="170" font-size="10" font-weight="700" fill="#2c3e50">🏠 Housing</text>
  <text x="405" y="190" font-size="13" font-weight="700" fill="#27ae60">Warm</text>

  <!-- Stock Market -->
  <rect x="50" y="220" width="230" height="50" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1"/>
  <text x="65" y="240" font-size="10" font-weight="700" fill="#2c3e50">📉 Stock Market Trend</text>
  <text x="65" y="260" font-size="13" font-weight="700" fill="#f39c12">Sideways</text>

  <!-- Next shift tracker -->
  <rect x="300" y="220" width="230" height="50" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="315" y="240" font-size="10" font-weight="700" fill="#2c3e50">📅 Next ECS Shift</text>
  <text x="315" y="260" font-size="13" font-weight="700" fill="#e67e22">3–6 months</text>

  <!-- Status options below -->
  <text x="300" y="310" text-anchor="middle" font-size="10" fill="#7f8c8d">Job Market: Tight / Normal / Weak / Frozen · Credit: Loose / Normal / Tight / Frozen</text>
  <text x="300" y="325" text-anchor="middle" font-size="10" fill="#7f8c8d">Housing: Hot / Warm / Cooling / Cold / Crashing · Stocks: Bull / Sideways / Bear / Crash</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 600 400" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <title>Investment Risk vs Return Matrix</title>
  <desc>Scatter plot of 6 investment types (Bonds, Index Funds, REITs, Stocks, Private Biz, Crypto) plotted by risk level vs return</desc>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
  </defs>

  <text x="300" y="24" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50">Investment Risk vs Return Matrix</text>

  <!-- Chart area: x=100..550, y=50..340 -->
  <!-- Grid -->
  <g stroke="#e8e8e8" stroke-width="1">
    <line x1="100" y1="50" x2="550" y2="50"/>
    <line x1="100" y1="130" x2="550" y2="130"/>
    <line x1="100" y1="210" x2="550" y2="210"/>
    <line x1="100" y1="290" x2="550" y2="290"/>
    <line x1="100" y1="340" x2="550" y2="340"/>
    <!-- Vertical grid lines -->
    <line x1="210" y1="50" x2="210" y2="340"/>
    <line x1="320" y1="50" x2="320" y2="340"/>
    <line x1="430" y1="50" x2="430" y2="340"/>
  </g>

  <!-- X-axis labels: Risk (Low → Extreme) -->
  <g font-size="10" fill="#7f8c8d" text-anchor="middle">
    <text x="100" y="360">Low</text>
    <text x="210" y="360">Medium</text>
    <text x="320" y="355">High</text>
    <text x="430" y="360">Very High</text>
    <text x="550" y="360">Extreme</text>
    <text x="325" y="370" font-size="12" font-weight="600">Risk Level →</text>
  </g>

  <!-- Y-axis labels: Return -->
  <g font-size="10" fill="#7f8c8d" text-anchor="end">
    <text x="90" y="54">+1000%</text>
    <text x="90" y="134">+200%</text>
    <text x="90" y="214">10%</text>
    <text x="90" y="294">0%</text>
    <text x="90" y="344">−90%</text>
  </g>
  <text x="25" y="195" text-anchor="middle" font-size="12" fill="#7f8c8d" font-weight="600" transform="rotate(-90,25,195)">Return →</text>

  <!-- Investment dots -->
  <!-- Bonds: Low risk, 2-5% return → x=130, y=260 -->
  <circle cx="130" cy="260" r="14" fill="#27ae60" opacity="0.8" filter="url(#shadow)"/>
  <text x="130" y="265" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">🏛️</text>
  <text x="155" y="264" font-size="10" font-weight="600" fill="#27ae60">Bonds</text>

  <!-- Index Funds: Medium risk, 7-10% → x=210, y=210 -->
  <circle cx="210" cy="210" r="14" fill="#2980b9" opacity="0.8" filter="url(#shadow)"/>
  <text x="210" y="215" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">📊</text>
  <text x="235" y="214" font-size="10" font-weight="600" fill="#2980b9">Index Funds</text>

  <!-- REITs: Medium risk, 5-8% → x=240, y=230 -->
  <circle cx="240" cy="230" r="12" fill="#1abc9c" opacity="0.8" filter="url(#shadow)"/>
  <text x="240" y="234" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">🏠</text>
  <text x="260" y="234" font-size="10" font-weight="600" fill="#1abc9c">REITs</text>

  <!-- Individual Stocks: High risk, −50 to +200% → x=320, y=130 -->
  <circle cx="320" cy="130" r="16" fill="#f39c12" opacity="0.8" filter="url(#shadow)"/>
  <text x="320" y="135" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">📈</text>
  <text x="345" y="134" font-size="10" font-weight="600" fill="#f39c12">Stocks</text>

  <!-- Private Business: Very High risk, varies → x=430, y=180 -->
  <circle cx="430" cy="180" r="14" fill="#e67e22" opacity="0.8" filter="url(#shadow)"/>
  <text x="430" y="185" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">🏢</text>
  <text x="455" y="184" font-size="10" font-weight="600" fill="#e67e22">Private Biz</text>

  <!-- Crypto: Extreme risk, −90 to +1000% → x=530, y=100 -->
  <circle cx="530" cy="100" r="18" fill="#e74c3c" opacity="0.8" filter="url(#shadow)"/>
  <text x="530" y="105" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">₿</text>
  <text x="555" y="104" font-size="10" font-weight="600" fill="#e74c3c">Crypto</text>

  <!-- Risk zones -->
  <rect x="100" y="50" width="80" height="290" fill="#27ae60" opacity="0.03" rx="4"/>
  <rect x="180" y="50" width="120" height="290" fill="#2980b9" opacity="0.03" rx="4"/>
  <rect x="300" y="50" width="110" height="290" fill="#f39c12" opacity="0.03" rx="4"/>
  <rect x="410" y="50" width="110" height="290" fill="#e67e22" opacity="0.03" rx="4"/>
  <rect x="520" y="50" width="30" height="290" fill="#e74c3c" opacity="0.03" rx="4"/>

  <!-- Size = volatility range -->
  <text x="300" y="380" text-anchor="middle" font-size="10" fill="#7f8c8d">Dot size = volatility range · Bigger dot = wider possible outcomes</text>
</svg>

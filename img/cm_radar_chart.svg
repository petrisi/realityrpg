<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 550" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="550" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Character Attribute Radar</text>
  <text x="250" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">6-Axis Comparison: Marcus vs. Mei</text>

  <!-- Chart area background -->
  <rect x="50" y="60" width="400" height="400" rx="8" fill="white" stroke="#e8ecef" stroke-width="1" filter="url(#shadow)"/>

  <g transform="translate(250, 270)">
    <!-- Grid hexagons at 5, 10, 15, 20 -->
    <!-- Scale: max radius = 160px for value 20, so each unit = 8px -->

    <!-- Grid level 20 -->
    <polygon points="0,-160 138.56,-80 138.56,80 0,160 -138.56,80 -138.56,-80"
      fill="none" stroke="#d5dbe0" stroke-width="1"/>
    <!-- Grid level 15 -->
    <polygon points="0,-120 103.92,-60 103.92,60 0,120 -103.92,60 -103.92,-60"
      fill="none" stroke="#e8ecef" stroke-width="0.8"/>
    <!-- Grid level 10 -->
    <polygon points="0,-80 69.28,-40 69.28,40 0,80 -69.28,40 -69.28,-40"
      fill="none" stroke="#e8ecef" stroke-width="0.8"/>
    <!-- Grid level 5 -->
    <polygon points="0,-40 34.64,-20 34.64,20 0,40 -34.64,20 -34.64,-20"
      fill="none" stroke="#e8ecef" stroke-width="0.8"/>

    <!-- Scale labels -->
    <g font-size="9" fill="#7f8c8d">
      <text x="3" y="-162">20</text>
      <text x="3" y="-122">15</text>
      <text x="3" y="-82">10</text>
      <text x="3" y="-42">5</text>
    </g>

    <!-- Axis lines -->
    <g stroke="#ccd1d6" stroke-width="1">
      <!-- VIG: top (angle -90°) -->
      <line x1="0" y1="0" x2="0" y2="-160"/>
      <!-- INT: top-right (angle -30°) -->
      <line x1="0" y1="0" x2="138.56" y2="-80"/>
      <!-- EXP: bottom-right (angle 30°) -->
      <line x1="0" y1="0" x2="138.56" y2="80"/>
      <!-- DXT: bottom (angle 90°) -->
      <line x1="0" y1="0" x2="0" y2="160"/>
      <!-- RES: bottom-left (angle 150°) -->
      <line x1="0" y1="0" x2="-138.56" y2="80"/>
      <!-- PRC: top-left (angle 210°) -->
      <line x1="0" y1="0" x2="-138.56" y2="-80"/>
    </g>

    <!-- Axis labels -->
    <g font-size="12" font-weight="600" fill="#2c3e50" text-anchor="middle">
      <text x="0" y="-175">VIG</text>
      <text x="155" y="-85">INT</text>
      <text x="155" y="90">EXP</text>
      <text x="0" y="180">DXT</text>
      <text x="-155" y="90">RES</text>
      <text x="-155" y="-85">PRC</text>
    </g>

    <!-- Axis full names -->
    <g font-size="8" fill="#7f8c8d" text-anchor="middle">
      <text x="0" y="-186">Vigor</text>
      <text x="155" y="-96">Intellect</text>
      <text x="155" y="101">Expression</text>
      <text x="0" y="191">Dexterity</text>
      <text x="-155" y="101">Resolve</text>
      <text x="-155" y="-96">Presence</text>
    </g>

    <!-- Marcus (Brawler) profile: VIG 16, INT 9, EXP 13, DXT 11, RES 14, PRC 7 -->
    <!-- VIG 16: (0, -128)  INT 9: (57.69, -36)  EXP 13: (73.04, 41.6)  DXT 11: (0, 88)  RES 14: (-76.68, 42)  PRC 7: (-36.38, -21) -->
    <polygon points="0,-128 57.69,-36 73.04,41.6 0,88 -76.68,42 -36.38,-21"
      fill="#e67e22" fill-opacity="0.12" stroke="#e67e22" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Marcus data points -->
    <g fill="#e67e22" stroke="white" stroke-width="1.5">
      <circle cx="0" cy="-128" r="4"/>
      <circle cx="57.69" cy="-36" r="4"/>
      <circle cx="73.04" cy="41.6" r="4"/>
      <circle cx="0" cy="88" r="4"/>
      <circle cx="-76.68" cy="42" r="4"/>
      <circle cx="-36.38" cy="-21" r="4"/>
    </g>

    <!-- Marcus value labels -->
    <g font-size="9" font-weight="600" fill="#e67e22" text-anchor="middle">
      <text x="0" y="-136">16</text>
      <text x="67" y="-32">9</text>
      <text x="82" y="46">13</text>
      <text x="0" y="100">11</text>
      <text x="-86" y="46">14</text>
      <text x="-46" y="-17">7</text>
    </g>

    <!-- Mei (Scholar) profile: VIG 8, INT 17, EXP 14, DXT 10, RES 12, PRC 11 -->
    <!-- VIG 8: (0, -64)  INT 17: (117.57, -68)  EXP 14: (77.13, 44)  DXT 10: (0, 80)  RES 12: (-69.28, 36)  PRC 11: (-53.89, -31) -->
    <polygon points="0,-64 117.57,-68 77.13,44 0,80 -69.28,36 -53.89,-31"
      fill="#2980b9" fill-opacity="0.12" stroke="#2980b9" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Mei data points -->
    <g fill="#2980b9" stroke="white" stroke-width="1.5">
      <circle cx="0" cy="-64" r="4"/>
      <circle cx="117.57" cy="-68" r="4"/>
      <circle cx="77.13" cy="44" r="4"/>
      <circle cx="0" cy="80" r="4"/>
      <circle cx="-69.28" cy="36" r="4"/>
      <circle cx="-53.89" cy="-31" r="4"/>
    </g>

    <!-- Mei value labels -->
    <g font-size="9" font-weight="600" fill="#2980b9" text-anchor="middle">
      <text x="0" y="-72">8</text>
      <text x="127" y="-64">17</text>
      <text x="86" y="48">14</text>
      <text x="0" y="92">10</text>
      <text x="-79" y="40">12</text>
      <text x="-63" y="-27">11</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(100, 490)">
    <rect x="0" y="0" width="300" height="44" rx="6" fill="white" stroke="#e8ecef" stroke-width="1" filter="url(#shadow)"/>

    <!-- Marcus -->
    <rect x="16" y="14" width="14" height="14" rx="3" fill="#e67e22"/>
    <text x="38" y="26" font-size="12" fill="#2c3e50" font-weight="500">Marcus (Brawler)</text>

    <!-- Mei -->
    <rect x="170" y="14" width="14" height="14" rx="3" fill="#2980b9"/>
    <text x="192" y="26" font-size="12" fill="#2c3e50" font-weight="500">Mei (Scholar)</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="#fafbfc" rx="8"/>
  <text x="400" y="32" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="20" font-weight="700" fill="#2c3e50">Your Relationship Web</text>

  <!-- Connections: drawn from center to each node -->
  <!-- Family-Level: thick red lines -->
  <line x1="400" y1="250" x2="180" y2="120" stroke="#c0392b" stroke-width="6" stroke-linecap="round" filter="url(#shadowLight)"/>
  <line x1="400" y1="250" x2="620" y2="380" stroke="#c0392b" stroke-width="6" stroke-linecap="round" filter="url(#shadowLight)"/>

  <!-- Confidant: thick gold lines -->
  <line x1="400" y1="250" x2="650" y2="130" stroke="#f39c12" stroke-width="5" stroke-linecap="round" filter="url(#shadowLight)"/>
  <line x1="400" y1="250" x2="200" y2="370" stroke="#f39c12" stroke-width="5" stroke-linecap="round" filter="url(#shadowLight)"/>

  <!-- Friend: medium green lines -->
  <line x1="400" y1="250" x2="100" y2="260" stroke="#27ae60" stroke-width="4" stroke-linecap="round" filter="url(#shadowLight)"/>
  <line x1="400" y1="250" x2="700" y2="260" stroke="#27ae60" stroke-width="4" stroke-linecap="round" filter="url(#shadowLight)"/>

  <!-- Acquaintance: thin blue lines -->
  <line x1="400" y1="250" x2="300" y2="100" stroke="#2980b9" stroke-width="2.5" stroke-linecap="round" filter="url(#shadowLight)"/>
  <line x1="400" y1="250" x2="500" y2="400" stroke="#2980b9" stroke-width="2.5" stroke-linecap="round" filter="url(#shadowLight)"/>

  <!-- Stranger: very thin gray line -->
  <line x1="400" y1="250" x2="600" y2="250" stroke="#7f8c8d" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="6,4" filter="url(#shadowLight)"/>

  <!-- Central node: YOU -->
  <circle cx="400" cy="250" r="38" fill="#2c3e50" filter="url(#shadow)"/>
  <circle cx="400" cy="250" r="34" fill="#34495e"/>
  <text x="400" y="255" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#ecf0f1">YOU</text>

  <!-- Node 1: Family-Level - Mom -->
  <circle cx="180" cy="120" r="28" fill="#c0392b" filter="url(#shadow)"/>
  <text x="180" y="116" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">Mom</text>
  <text x="180" y="128" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#f5b7b1">Family-Level</text>

  <!-- Node 2: Family-Level - Sister -->
  <circle cx="620" cy="380" r="28" fill="#c0392b" filter="url(#shadow)"/>
  <text x="620" y="376" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">Sister</text>
  <text x="620" y="388" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#f5b7b1">Family-Level</text>

  <!-- Node 3: Confidant - Alex -->
  <circle cx="650" cy="130" r="28" fill="#f39c12" filter="url(#shadow)"/>
  <text x="650" y="126" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">Alex</text>
  <text x="650" y="138" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#fdebd0">Confidant</text>

  <!-- Node 4: Confidant - Jordan -->
  <circle cx="200" cy="370" r="28" fill="#f39c12" filter="url(#shadow)"/>
  <text x="200" y="366" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">Jordan</text>
  <text x="200" y="378" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#fdebd0">Confidant</text>

  <!-- Node 5: Friend - Sam -->
  <circle cx="100" cy="260" r="28" fill="#27ae60" filter="url(#shadow)"/>
  <text x="100" y="256" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">Sam</text>
  <text x="100" y="268" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#a9dfbf">Friend</text>

  <!-- Node 6: Friend - Taylor -->
  <circle cx="700" cy="260" r="28" fill="#27ae60" filter="url(#shadow)"/>
  <text x="700" y="256" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">Taylor</text>
  <text x="700" y="268" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#a9dfbf">Friend</text>

  <!-- Node 7: Acquaintance - Casey -->
  <circle cx="300" cy="100" r="28" fill="#2980b9" filter="url(#shadow)"/>
  <text x="300" y="96" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">Casey</text>
  <text x="300" y="108" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#aed6f1">Acquaintance</text>

  <!-- Node 8: Acquaintance - Drew -->
  <circle cx="500" cy="400" r="28" fill="#2980b9" filter="url(#shadow)"/>
  <text x="500" y="396" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" font-weight="600" fill="#fff">Drew</text>
  <text x="500" y="408" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="9" fill="#aed6f1">Acquaintance</text>

  <!-- Node 9: Stranger - Neighbor -->
  <circle cx="600" cy="250" r="22" fill="#7f8c8d" filter="url(#shadow)"/>
  <text x="600" y="247" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#fff">Neighbor</text>
  <text x="600" y="258" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="8" fill="#d5dbdb">Stranger</text>

  <!-- Legend -->
  <rect x="20" y="420" width="310" height="65" rx="6" fill="#fff" stroke="#bdc3c7" stroke-width="1" filter="url(#shadow)"/>
  <text x="32" y="440" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#2c3e50">Tier Legend</text>
  <line x1="32" y1="455" x2="62" y2="455" stroke="#c0392b" stroke-width="6"/>
  <text x="68" y="459" font-family="Segoe UI, sans-serif" font-size="10" fill="#2c3e50">Family-Level</text>
  <line x1="32" y1="472" x2="58" y2="472" stroke="#f39c12" stroke-width="5"/>
  <text x="64" y="476" font-family="Segoe UI, sans-serif" font-size="10" fill="#2c3e50">Confidant</text>
  <line x1="120" y1="455" x2="146" y2="455" stroke="#27ae60" stroke-width="4"/>
  <text x="152" y="459" font-family="Segoe UI, sans-serif" font-size="10" fill="#2c3e50">Friend</text>
  <line x1="120" y1="472" x2="142" y2="472" stroke="#2980b9" stroke-width="2.5"/>
  <text x="148" y="476" font-family="Segoe UI, sans-serif" font-size="10" fill="#2c3e50">Acquaintance</text>
  <line x1="220" y1="455" x2="242" y2="455" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="248" y="459" font-family="Segoe UI, sans-serif" font-size="10" fill="#2c3e50">Stranger</text>
</svg>
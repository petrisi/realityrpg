<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 140" width="960" height="140">
  <defs>
    <style>
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #2c3e50; font-weight: 600; text-anchor: middle; }
      .label { font-family: system-ui, -apple-system, sans-serif; font-size: 9px; fill: #5d6d7e; text-anchor: middle; }
      .emoji { font-size: 14px; text-anchor: middle; }
      .node-text { font-family: system-ui, -apple-system, sans-serif; font-size: 10px; fill: #ffffff; font-weight: 700; text-anchor: middle; dominant-baseline: central; }
      .warning { font-size: 11px; text-anchor: start; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="140" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text class="title" x="480" y="20">🌍 Campaign 3: The Immigrant Dream — 12-Session Arc</text>

  <!-- Connecting lines (stress intensity colors) -->
  <line x1="60" y1="70" x2="130" y2="70" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="70" x2="200" y2="70" stroke="#e67e22" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="70" x2="270" y2="70" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
  <line x1="270" y1="70" x2="340" y2="70" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
  <line x1="340" y1="70" x2="410" y2="70" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="410" y1="70" x2="480" y2="70" stroke="#82e0aa" stroke-width="3" stroke-linecap="round"/>
  <line x1="480" y1="70" x2="550" y2="70" stroke="#27ae60" stroke-width="3" stroke-linecap="round"/>
  <line x1="550" y1="70" x2="620" y2="70" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <line x1="620" y1="70" x2="690" y2="70" stroke="#f39c12" stroke-width="3" stroke-linecap="round"/>
  <line x1="690" y1="70" x2="760" y2="70" stroke="#27ae60" stroke-width="3" stroke-linecap="round"/>
  <line x1="760" y1="70" x2="830" y2="70" stroke="#27ae60" stroke-width="3" stroke-linecap="round"/>
  <line x1="830" y1="70" x2="900" y2="70" stroke="#27ae60" stroke-width="3" stroke-linecap="round"/>

  <!-- Session nodes (circles) -->
  <circle cx="60" cy="70" r="12" fill="#3498db"/>
  <circle cx="130" cy="70" r="12" fill="#3498db"/>
  <circle cx="200" cy="70" r="12" fill="#3498db"/>
  <circle cx="270" cy="70" r="12" fill="#3498db"/>
  <circle cx="340" cy="70" r="12" fill="#3498db"/>
  <circle cx="410" cy="70" r="12" fill="#e74c3c"/>
  <circle cx="480" cy="70" r="12" fill="#3498db"/>
  <circle cx="550" cy="70" r="12" fill="#3498db"/>
  <circle cx="620" cy="70" r="12" fill="#e74c3c"/>
  <circle cx="690" cy="70" r="12" fill="#3498db"/>
  <circle cx="760" cy="70" r="12" fill="#3498db"/>
  <circle cx="830" cy="70" r="12" fill="#3498db"/>
  <circle cx="900" cy="70" r="12" fill="#3498db"/>

  <!-- Session numbers inside circles -->
  <text class="node-text" x="60" y="70">1</text>
  <text class="node-text" x="130" y="70">2</text>
  <text class="node-text" x="200" y="70">3</text>
  <text class="node-text" x="270" y="70">4</text>
  <text class="node-text" x="340" y="70">5</text>
  <text class="node-text" x="410" y="70">6</text>
  <text class="node-text" x="480" y="70">7</text>
  <text class="node-text" x="550" y="70">8</text>
  <text class="node-text" x="620" y="70">9</text>
  <text class="node-text" x="690" y="70">10</text>
  <text class="node-text" x="760" y="70">11</text>
  <text class="node-text" x="830" y="70">12</text>

  <!-- Emoji above nodes -->
  <text class="emoji" x="60" y="42">✈️</text>
  <text class="emoji" x="130" y="42">🗣️</text>
  <text class="emoji" x="200" y="42">💼</text>
  <text class="emoji" x="270" y="42">🏫</text>
  <text class="emoji" x="340" y="42">🏠</text>
  <text class="emoji" x="410" y="42">⚖️</text>
  <text class="emoji" x="480" y="42">🤝</text>
  <text class="emoji" x="550" y="42">🎉</text>
  <text class="emoji" x="620" y="42">🌊</text>
  <text class="emoji" x="690" y="42">🔧</text>
  <text class="emoji" x="760" y="42">🌱</text>
  <text class="emoji" x="830" y="42">🏡</text>

  <!-- Warning triangles for crisis points S6 and S9 -->
  <text class="warning" x="426" y="74" fill="#e74c3c">⚠️</text>
  <text class="warning" x="636" y="74" fill="#e74c3c">⚠️</text>

  <!-- Labels below nodes -->
  <text class="label" x="60" y="100">S1: Arrival</text>
  <text class="label" x="130" y="100">S2: Language</text>
  <text class="label" x="200" y="100">S3: Work</text>
  <text class="label" x="270" y="100">S4: School</text>
  <text class="label" x="340" y="100">S5: Culture</text>
  <text class="label" x="410" y="100">S6: Legal</text>
  <text class="label" x="480" y="100">S7: Community</text>
  <text class="label" x="550" y="100">S8: Festival</text>
  <text class="label" x="620" y="100">S9: Crisis</text>
  <text class="label" x="690" y="100">S10: Repair</text>
  <text class="label" x="760" y="100">S11: Rooting</text>
  <text class="label" x="830" y="100">S12: Belonging</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 700 430" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="dshadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.13"/>
    </filter>
    <!-- Level 0: neutral gray -->
    <linearGradient id="d0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d5dbdb"/><stop offset="100%" stop-color="#aab7b8"/>
    </linearGradient>
    <!-- Level 1: light green -->
    <linearGradient id="d1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4efdf"/><stop offset="100%" stop-color="#82e0aa"/>
    </linearGradient>
    <!-- Level 2: light blue -->
    <linearGradient id="d2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d6eaf8"/><stop offset="100%" stop-color="#5dade2"/>
    </linearGradient>
    <!-- Level 3: deeper blue -->
    <linearGradient id="d3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d6eaf8"/><stop offset="100%" stop-color="#2e86c1"/>
    </linearGradient>
    <!-- Level 4: red -->
    <linearGradient id="d4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fadbd8"/><stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <!-- Level 5: purple -->
    <linearGradient id="d5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8daef"/><stop offset="100%" stop-color="#8e44ad"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="430" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="350" y="24" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">Devotion Levels</text>
  <text x="350" y="38" text-anchor="middle" font-size="10" fill="#7f8c8d">From cultural observer to full-time commitment — time, money, and SP scale together</text>

  <!-- Ladder: 6 bars × 46px + 5 gaps × 10px = 306px, y=48 to y=354+46=400 -->

  <!-- Level 5: Full-Time (top, narrowest) -->
  <g filter="url(#dshadow)">
    <rect x="225" y="48" width="150" height="46" rx="10" fill="url(#d5)" stroke="#8e44ad" stroke-width="2.5"/>
    <text x="246" y="66" font-size="10" font-weight="700" fill="white">LVL 5</text>
    <text x="246" y="80" font-size="10" font-weight="700" fill="white">Full-Time</text>
    <text x="300" y="66" font-size="9" font-weight="600" fill="white">15+ hrs/wk</text>
    <text x="300" y="80" font-size="9" fill="white">−5 SP/wk; +2 RES</text>
  </g>
  <text x="475" y="66" font-size="9" font-weight="600" fill="#8e44ad">+5 Social</text>
  <text x="475" y="80" font-size="9" fill="#c0392b">Net: −3 SP/wk</text>

  <!-- Arrow down -->
  <path d="M300,94 L300,104" stroke="#8e44ad" stroke-width="2"/>

  <!-- Level 4: Active Leader -->
  <g filter="url(#dshadow)">
    <rect x="210" y="104" width="180" height="46" rx="10" fill="url(#d4)" stroke="#e74c3c" stroke-width="2"/>
    <text x="226" y="122" font-size="10" font-weight="700" fill="white">LVL 4</text>
    <text x="226" y="136" font-size="10" font-weight="700" fill="white">Active Leader</text>
    <text x="290" y="122" font-size="9" font-weight="600" fill="white">8-15 hrs/wk · $300-600</text>
    <text x="290" y="136" font-size="9" fill="white">−4 SP/wk; +2 RES</text>
  </g>
  <text x="495" y="122" font-size="9" font-weight="600" fill="#e74c3c">+4 Social</text>
  <text x="495" y="136" font-size="9" fill="#c0392b">Net: −2 SP/wk</text>

  <!-- Arrow down -->
  <path d="M300,150 L300,160" stroke="#e74c3c" stroke-width="2"/>

  <!-- Level 3: Committed -->
  <g filter="url(#dshadow)">
    <rect x="180" y="160" width="240" height="46" rx="10" fill="url(#d3)" stroke="#2e86c1" stroke-width="2"/>
    <text x="196" y="178" font-size="10" font-weight="700" fill="white">LVL 3</text>
    <text x="196" y="192" font-size="10" font-weight="700" fill="white">Committed</text>
    <text x="280" y="178" font-size="9" font-weight="600" fill="white">5-8 hrs/wk · $150-300</text>
    <text x="280" y="192" font-size="9" fill="white">−3 SP/wk; +1 RES</text>
  </g>
  <text x="525" y="178" font-size="9" font-weight="600" fill="#2e86c1">+3 Social</text>
  <text x="525" y="192" font-size="9" fill="#1e8449">Net: +1 SP/wk</text>

  <!-- Arrow down -->
  <path d="M300,206 L300,216" stroke="#2e86c1" stroke-width="2"/>

  <!-- Level 2: Practicing -->
  <g filter="url(#dshadow)">
    <rect x="150" y="216" width="290" height="46" rx="10" fill="url(#d2)" stroke="#5dade2" stroke-width="2"/>
    <text x="166" y="234" font-size="10" font-weight="700" fill="#2c3e50">LVL 2</text>
    <text x="166" y="248" font-size="10" font-weight="700" fill="#2c3e50">Practicing</text>
    <text x="270" y="234" font-size="9" font-weight="600" fill="#2c3e50">3-5 hrs/wk · $50-150</text>
    <text x="270" y="248" font-size="9" fill="#2c3e50">−2 SP/wk</text>
  </g>
  <text x="545" y="234" font-size="9" font-weight="600" fill="#2980b9">+2 Social</text>
  <text x="545" y="248" font-size="9" fill="#1e8449">Net: +2 SP/wk</text>

  <!-- Arrow down -->
  <path d="M300,262 L300,272" stroke="#5dade2" stroke-width="2"/>

  <!-- Level 1: Cultural -->
  <g filter="url(#dshadow)">
    <rect x="120" y="272" width="350" height="46" rx="10" fill="url(#d1)" stroke="#82e0aa" stroke-width="2"/>
    <text x="136" y="290" font-size="10" font-weight="700" fill="#2c3e50">LVL 1</text>
    <text x="136" y="304" font-size="10" font-weight="700" fill="#2c3e50">Cultural</text>
    <text x="270" y="290" font-size="9" font-weight="600" fill="#2c3e50">1-2 hrs/wk · $0-50</text>
    <text x="270" y="304" font-size="9" fill="#2c3e50">−1 SP holidays</text>
  </g>
  <text x="575" y="290" font-size="9" font-weight="600" fill="#1e8449">+1 Social</text>
  <text x="575" y="304" font-size="9" fill="#1e8449">Net: +1 SP/wk</text>

  <!-- Arrow down -->
  <path d="M300,318 L300,328" stroke="#82e0aa" stroke-width="2"/>

  <!-- Level 0: None (bottom, widest) -->
  <g filter="url(#dshadow)">
    <rect x="90" y="328" width="420" height="46" rx="10" fill="url(#d0)" stroke="#aab7b8" stroke-width="2"/>
    <text x="106" y="346" font-size="10" font-weight="700" fill="#2c3e50">LVL 0</text>
    <text x="106" y="360" font-size="10" font-weight="700" fill="#2c3e50">None</text>
    <text x="270" y="346" font-size="9" font-weight="600" fill="#2c3e50">No practice · Invisible</text>
    <text x="270" y="360" font-size="9" fill="#2c3e50">No cost, no benefit</text>
  </g>
  <text x="615" y="346" font-size="9" font-weight="600" fill="#7f8c8d">0 Social</text>
  <text x="615" y="360" font-size="9" fill="#7f8c8d">Net: 0 SP</text>

  <!-- Bottom note -->
  <text x="350" y="400" text-anchor="middle" font-size="10" fill="#7f8c8d">Higher devotion = more community benefit BUT more time, money, and responsibility stress</text>
</svg>
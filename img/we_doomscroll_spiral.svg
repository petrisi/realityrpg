<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 500 480" width="500" height="480">
  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">📱 Doomscrolling Spiral</text>
  <text x="250" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">+2 SP per hour · RES check TN 50 to stop</text>

  <!-- Spiral loop 1: Baseline -->
  <rect x="175" y="62" width="150" height="36" rx="18" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
  <text x="250" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">🕐 0h — Baseline</text>

  <!-- Arrow down -->
  <line x1="250" y1="98" x2="250" y2="118" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowG)"/>
  <defs>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#27ae60"/></marker>
    <marker id="arrowY" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#f39c12"/></marker>
    <marker id="arrowO" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#e67e22"/></marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#e74c3c"/></marker>
  </defs>

  <!-- Spiral loop 2: 1 hour -->
  <rect x="175" y="118" width="150" height="36" rx="18" fill="#d4efdf" stroke="#2ecc71" stroke-width="2"/>
  <text x="250" y="141" text-anchor="middle" font-size="12" font-weight="600" fill="#196f3d" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">🕐 1h — +2 SP</text>

  <!-- Arrow down -->
  <line x1="250" y1="154" x2="250" y2="174" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Spiral loop 3: 2 hours -->
  <rect x="175" y="174" width="150" height="36" rx="18" fill="#fef9e7" stroke="#f1c40f" stroke-width="2"/>
  <text x="250" y="197" text-anchor="middle" font-size="12" font-weight="600" fill="#7d6608" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">🕐 2h — +4 SP</text>

  <!-- RES check callout -->
  <rect x="340" y="174" width="130" height="36" rx="8" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
  <text x="405" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#d35400" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">⚠️ RES TN 50</text>
  <text x="405" y="203" text-anchor="middle" font-size="10" fill="#d35400" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">to stop</text>
  <line x1="325" y1="192" x2="340" y2="192" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Arrow down — success branch goes up, failure goes down -->
  <line x1="250" y1="210" x2="250" y2="230" stroke="#f1c40f" stroke-width="2" marker-end="url(#arrowY)"/>

  <!-- Spiral loop 4: 3 hours (failure) -->
  <rect x="175" y="230" width="150" height="36" rx="18" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
  <text x="250" y="253" text-anchor="middle" font-size="12" font-weight="600" fill="#a04000" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">🕐 3h — +6 SP</text>

  <!-- Arrow down -->
  <line x1="250" y1="266" x2="250" y2="286" stroke="#e67e22" stroke-width="2" marker-end="url(#arrowO)"/>

  <!-- Spiral loop 5: 4 hours -->
  <rect x="175" y="286" width="150" height="36" rx="18" fill="#fadbd8" stroke="#e74c3c" stroke-width="2"/>
  <text x="250" y="309" text-anchor="middle" font-size="12" font-weight="600" fill="#922b21" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">🕐 4h — +8 SP</text>

  <!-- Arrow down -->
  <line x1="250" y1="322" x2="250" y2="342" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Spiral loop 6: SP pool filled -->
  <rect x="175" y="342" width="150" height="36" rx="18" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <text x="250" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">💥 SP POOL FILLED</text>

  <!-- Feedback loop arrow (curved right side) -->
  <path d="M 325 360 Q 420 360 420 250 Q 420 140 325 140" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowR)"/>
  <text x="430" y="250" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" transform="rotate(-90,430,250)">SPIRAL</text>

  <!-- Success escape branch (left side) -->
  <path d="M 175 192 Q 100 192 100 140 Q 100 90 175 90" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowG)"/>
  <text x="85" y="140" text-anchor="middle" font-size="10" font-weight="700" fill="#27ae60" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" transform="rotate(90,85,140)">ESCAPE</text>

  <!-- Info boxes at bottom -->
  <rect x="30" y="390" width="200" height="70" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="130" y="410" text-anchor="middle" font-size="11" font-weight="700" fill="#2471a3" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">📊 SP Accumulation</text>
  <text x="130" y="428" text-anchor="middle" font-size="10" fill="#2471a3" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Each hour: +2 SP</text>
  <text x="130" y="443" text-anchor="middle" font-size="10" fill="#2471a3" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Typical SP pool: 10–15</text>
  <text x="130" y="456" text-anchor="middle" font-size="10" fill="#2471a3" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Can fill in 5–7 hours</text>

  <rect x="270" y="390" width="200" height="70" rx="8" fill="#f0faf4" stroke="#27ae60" stroke-width="1"/>
  <text x="370" y="410" text-anchor="middle" font-size="11" font-weight="700" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">🛑 Breaking the Cycle</text>
  <text x="370" y="428" text-anchor="middle" font-size="10" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Phone away; RES TN 40</text>
  <text x="370" y="443" text-anchor="middle" font-size="10" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Digital detox: 3–7 days</text>
  <text x="370" y="456" text-anchor="middle" font-size="10" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Therapy: −3 SP/session</text>
</svg>

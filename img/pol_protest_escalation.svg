<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 650 520" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowUp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrowPolice" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="650" height="520" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="325" y="28" text-anchor="middle" font-size="19" font-weight="700" fill="#2c3e50">Protest Escalation Ladder</text>
  <text x="325" y="46" text-anchor="middle" font-size="10.5" fill="#5d6d7e">Each level adds SP cost and risk — de-escalation is possible at any stage</text>

  <!-- ===== ESCALATION LADDER (center) ===== -->
  <!-- Level 1: Peaceful rally (bottom) -->
  <g filter="url(#shadow)">
    <rect x="180" y="420" width="240" height="50" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
    <text x="200" y="440" font-size="12" font-weight="700" fill="#1e8449">🕊 Peaceful rally</text>
    <text x="200" y="458" font-size="10" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+1 SP</tspan><tspan fill="#5d6d7e"> · Low risk · TN: none</tspan></text>
  </g>

  <!-- Level 2: March w/ permit -->
  <g filter="url(#shadow)">
    <rect x="165" y="358" width="270" height="50" rx="10" fill="#eafaf1" stroke="#2ecc71" stroke-width="2"/>
    <text x="185" y="378" font-size="12" font-weight="700" fill="#1e8449">🚶 March w/ permit</text>
    <text x="185" y="396" font-size="10" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+1 SP</tspan><tspan fill="#5d6d7e"> · Low-Medium · TN: <tspan font-family="Consolas, monospace" fill="#e67e22">1d10</tspan></tspan></text>
  </g>

  <!-- Level 3: Civil disobedience -->
  <g filter="url(#shadow)">
    <rect x="150" y="296" width="290" height="50" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
    <text x="170" y="316" font-size="12" font-weight="700" fill="#7e5109">✊ Civil disobedience</text>
    <text x="170" y="334" font-size="10" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+2 SP</tspan><tspan fill="#5d6d7e"> · Medium · TN: <tspan font-family="Consolas, monospace" fill="#e67e22">12</tspan></tspan></text>
  </g>

  <!-- Level 4: Unpermitted protest -->
  <g filter="url(#shadow)">
    <rect x="140" y="234" width="300" height="50" rx="10" fill="#fdebd0" stroke="#e67e22" stroke-width="2"/>
    <text x="160" y="254" font-size="12" font-weight="700" fill="#7e5109">🔥 Unpermitted protest</text>
    <text x="160" y="272" font-size="10" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+2 SP</tspan><tspan fill="#5d6d7e"> · Medium-High · TN: <tspan font-family="Consolas, monospace" fill="#e67e22">14</tspan></tspan></text>
  </g>

  <!-- Level 5: Riot / clash (top) -->
  <g filter="url(#shadow)">
    <rect x="130" y="172" width="310" height="50" rx="10" fill="#fdedec" stroke="#c0392b" stroke-width="2.5"/>
    <text x="150" y="192" font-size="12" font-weight="700" fill="#922b21">💥 Riot / clash</text>
    <text x="150" y="210" font-size="10" fill="#5d6d7e"><tspan font-family="Consolas, monospace" fill="#e67e22">+4 SP</tspan><tspan fill="#5d6d7e"> · High · TN: <tspan font-family="Consolas, monospace" fill="#e67e22">15</tspan></tspan></text>
  </g>

  <!-- Escalation arrows between levels (right side of ladder) -->
  <line x1="310" y1="420" x2="310" y2="408" stroke="#c0392b" stroke-width="2" marker-start="url(#arrowUp)"/>
  <line x1="310" y1="358" x2="310" y2="346" stroke="#c0392b" stroke-width="2" marker-start="url(#arrowUp)"/>
  <line x1="310" y1="296" x2="310" y2="284" stroke="#c0392b" stroke-width="2" marker-start="url(#arrowUp)"/>
  <line x1="310" y1="234" x2="310" y2="222" stroke="#c0392b" stroke-width="2" marker-start="url(#arrowUp)"/>
  <text x="318" y="330" font-size="9" font-weight="600" fill="#c0392b" transform="rotate(90, 318, 330)">ESCALATION</text>

  <!-- ===== POLICE RESPONSE (right side) ===== -->
  <text x="500" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#2c3e50">Police Response</text>

  <!-- P1: Minimal -->
  <g filter="url(#shadowSm)">
    <rect x="440" y="425" width="130" height="38" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.2"/>
    <text x="505" y="440" text-anchor="middle" font-size="10" font-weight="600" fill="#1e8449">Minimal</text>
    <text x="505" y="453" text-anchor="middle" font-size="8.5" fill="#5d6d7e">observe only</text>
  </g>

  <!-- P2: Visible -->
  <g filter="url(#shadowSm)">
    <rect x="440" y="363" width="130" height="38" rx="8" fill="#eafaf1" stroke="#2ecc71" stroke-width="1.2"/>
    <text x="505" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#1e8449">Visible</text>
    <text x="505" y="391" text-anchor="middle" font-size="8.5" fill="#5d6d7e">presence shown</text>
  </g>

  <!-- P3: Active -->
  <g filter="url(#shadowSm)">
    <rect x="440" y="301" width="130" height="38" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.2"/>
    <text x="505" y="316" text-anchor="middle" font-size="10" font-weight="600" fill="#7e5109">Active</text>
    <text x="505" y="329" text-anchor="middle" font-size="8.5" fill="#5d6d7e">crowd control</text>
  </g>

  <!-- P4: Mass arrests -->
  <g filter="url(#shadowSm)">
    <rect x="440" y="239" width="130" height="38" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="1.2"/>
    <text x="505" y="254" text-anchor="middle" font-size="10" font-weight="600" fill="#922b21">Mass arrests</text>
    <text x="505" y="267" text-anchor="middle" font-size="8.5" fill="#5d6d7e">tear gas · force</text>
  </g>

  <!-- Police escalation arrows -->
  <line x1="505" y1="425" x2="505" y2="401" stroke="#2c3e50" stroke-width="1.5" marker-start="url(#arrowPolice)"/>
  <line x1="505" y1="363" x2="505" y2="339" stroke="#2c3e50" stroke-width="1.5" marker-start="url(#arrowPolice)"/>
  <line x1="505" y1="301" x2="505" y2="277" stroke="#2c3e50" stroke-width="1.5" marker-start="url(#arrowPolice)"/>

  <!-- Connector lines from ladder to police -->
  <line x1="420" y1="445" x2="440" y2="445" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="435" y1="383" x2="440" y2="383" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="440" y1="321" x2="440" y2="321" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="440" y1="259" x2="440" y2="259" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== DE-ESCALATION PATH (left side) ===== -->
  <text x="110" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#27ae60">De-escalation</text>

  <!-- DE1: De-escalation team -->
  <g filter="url(#shadowSm)">
    <rect x="20" y="301" width="115" height="38" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.2"/>
    <text x="77" y="316" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e8449">🕊 De-escalation</text>
    <text x="77" y="329" text-anchor="middle" font-size="8.5" fill="#5d6d7e">team intervenes</text>
  </g>

  <!-- DE2: Permit compliance -->
  <g filter="url(#shadowSm)">
    <rect x="20" y="363" width="115" height="38" rx="8" fill="#eafaf1" stroke="#2ecc71" stroke-width="1.2"/>
    <text x="77" y="378" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e8449">📋 Permit</text>
    <text x="77" y="391" text-anchor="middle" font-size="8.5" fill="#5d6d7e">compliance</text>
  </g>

  <!-- DE3: Peaceful dispersal -->
  <g filter="url(#shadowSm)">
    <rect x="20" y="425" width="115" height="38" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.2"/>
    <text x="77" y="440" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e8449">🏠 Peaceful</text>
    <text x="77" y="453" text-anchor="middle" font-size="8.5" fill="#5d6d7e">dispersal</text>
  </g>

  <!-- De-escalation arrows (pointing down) -->
  <line x1="77" y1="301" x2="77" y2="363" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <line x1="77" y1="363" x2="77" y2="425" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowDown)"/>
  <text x="55" y="370" font-size="9" font-weight="600" fill="#27ae60" transform="rotate(-90, 55, 370)">DE-ESCALATE ↓</text>

  <!-- Connector lines from ladder to de-escalation -->
  <line x1="150" y1="321" x2="135" y2="321" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="165" y1="383" x2="135" y2="383" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="445" x2="135" y2="445" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== BOTTOM NOTE ===== -->
  <rect x="20" y="480" width="610" height="30" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#shadow)"/>
  <text x="325" y="498" text-anchor="middle" font-size="9.5" fill="#7e5109">⚡ Each level up doubles legal risk · TN = Target Number to avoid arrest · Fail TN → +2 SP + potential arrest</text>
</svg>
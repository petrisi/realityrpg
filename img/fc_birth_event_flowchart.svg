<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 850" width="700" height="850">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2c3e50"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <filter id="badge-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="700" height="850" rx="12" fill="#faf9f6"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#2c3e50">The Birth Event — GM Flowchart</text>
  <line x1="130" y1="41" x2="570" y2="41" stroke="#e67e22" stroke-width="2.5"/>

  <!-- ===== STEP 1 ===== -->
  <rect x="40" y="50" width="620" height="32" rx="8" fill="#2c3e50" filter="url(#shadow)"/>
  <circle cx="66" cy="66" r="13" fill="#e67e22" filter="url(#badge-shadow)"/>
  <text x="66" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff">1</text>
  <text x="86" y="68" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Hospital Stay Duration</text>
  <text x="630" y="68" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#bdc3c7">(2d10 roll)</text>

  <rect x="50" y="88" width="520" height="20" rx="4" fill="#27ae60" opacity="0.15" stroke="#27ae60" stroke-width="1"/>
  <rect x="50" y="88" width="5" height="20" rx="2.5" fill="#27ae60"/>
  <text x="64" y="103" font-family="system-ui, sans-serif" font-size="10.5" fill="#1e8449">1–30: 3 days — vaginal, uncomplicated</text>

  <rect x="50" y="112" width="520" height="20" rx="4" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="1"/>
  <rect x="50" y="112" width="5" height="20" rx="2.5" fill="#f39c12"/>
  <text x="64" y="127" font-family="system-ui, sans-serif" font-size="10.5" fill="#7d6608">31–60: 4 days — minor complications</text>

  <rect x="50" y="136" width="520" height="20" rx="4" fill="#e67e22" opacity="0.15" stroke="#e67e22" stroke-width="1"/>
  <rect x="50" y="136" width="5" height="20" rx="2.5" fill="#e67e22"/>
  <text x="64" y="151" font-family="system-ui, sans-serif" font-size="10.5" fill="#a04000">61–85: 5 days — complications</text>

  <rect x="50" y="160" width="520" height="20" rx="4" fill="#d35400" opacity="0.15" stroke="#d35400" stroke-width="1"/>
  <rect x="50" y="160" width="5" height="20" rx="2.5" fill="#d35400"/>
  <text x="64" y="175" font-family="system-ui, sans-serif" font-size="10.5" fill="#922b00">86–95: 7+ days — significant complications</text>

  <rect x="50" y="184" width="520" height="20" rx="4" fill="#c0392b" opacity="0.15" stroke="#c0392b" stroke-width="1"/>
  <rect x="50" y="184" width="5" height="20" rx="2.5" fill="#c0392b"/>
  <text x="64" y="199" font-family="system-ui, sans-serif" font-size="10.5" fill="#922b21">96–100: ICU transfer — critical emergency</text>

  <!-- Arrow 1→2 -->
  <line x1="350" y1="210" x2="350" y2="222" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== STEP 2 ===== -->
  <rect x="40" y="228" width="620" height="32" rx="8" fill="#2c3e50" filter="url(#shadow)"/>
  <circle cx="66" cy="244" r="13" fill="#e67e22" filter="url(#badge-shadow)"/>
  <text x="66" y="248" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff">2</text>
  <text x="86" y="246" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Birth Cost</text>
  <text x="630" y="246" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#bdc3c7">(based on delivery type)</text>

  <rect x="50" y="264" width="520" height="20" rx="4" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1"/>
  <rect x="50" y="264" width="5" height="20" rx="2.5" fill="#27ae60"/>
  <text x="64" y="279" font-family="system-ui, sans-serif" font-size="10.5" fill="#1e8449">Vaginal uncomplicated: $3K–$8K</text>

  <rect x="50" y="288" width="520" height="20" rx="4" fill="#f39c12" opacity="0.12" stroke="#f39c12" stroke-width="1"/>
  <rect x="50" y="288" width="5" height="20" rx="2.5" fill="#f39c12"/>
  <text x="64" y="303" font-family="system-ui, sans-serif" font-size="10.5" fill="#7d6608">Vaginal complications: $8K–$15K</text>

  <rect x="50" y="312" width="520" height="20" rx="4" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="1"/>
  <rect x="50" y="312" width="5" height="20" rx="2.5" fill="#e67e22"/>
  <text x="64" y="327" font-family="system-ui, sans-serif" font-size="10.5" fill="#a04000">Planned C-section: $10K–$20K</text>

  <rect x="50" y="336" width="520" height="20" rx="4" fill="#d35400" opacity="0.12" stroke="#d35400" stroke-width="1"/>
  <rect x="50" y="336" width="5" height="20" rx="2.5" fill="#d35400"/>
  <text x="64" y="351" font-family="system-ui, sans-serif" font-size="10.5" fill="#922b00">Emergency C-section: $15K–$30K</text>

  <rect x="50" y="360" width="520" height="20" rx="4" fill="#c0392b" opacity="0.12" stroke="#c0392b" stroke-width="1"/>
  <rect x="50" y="360" width="5" height="20" rx="2.5" fill="#c0392b"/>
  <text x="64" y="375" font-family="system-ui, sans-serif" font-size="10.5" fill="#922b21">Uninsured: $10K–$50K+</text>

  <!-- Arrow 2→3 -->
  <line x1="350" y1="386" x2="350" y2="398" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== STEP 3 ===== -->
  <rect x="40" y="404" width="620" height="32" rx="8" fill="#2c3e50" filter="url(#shadow)"/>
  <circle cx="66" cy="420" r="13" fill="#e67e22" filter="url(#badge-shadow)"/>
  <text x="66" y="424" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff">3</text>
  <text x="86" y="422" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Pain Management</text>
  <text x="630" y="422" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#bdc3c7">(character choice)</text>

  <rect x="50" y="440" width="520" height="20" rx="4" fill="#3498db" opacity="0.12" stroke="#3498db" stroke-width="1"/>
  <rect x="50" y="440" width="5" height="20" rx="2.5" fill="#3498db"/>
  <text x="64" y="455" font-family="system-ui, sans-serif" font-size="10.5" fill="#1a5276">Epidural: VIG TN 30 post-birth, no pain roleplay</text>

  <rect x="50" y="464" width="520" height="20" rx="4" fill="#8e44ad" opacity="0.12" stroke="#8e44ad" stroke-width="1"/>
  <rect x="50" y="464" width="5" height="20" rx="2.5" fill="#8e44ad"/>
  <text x="64" y="479" font-family="system-ui, sans-serif" font-size="10.5" fill="#6c3483">Natural: +5 SP, Tired 2 weeks</text>

  <rect x="50" y="488" width="520" height="20" rx="4" fill="#16a085" opacity="0.12" stroke="#16a085" stroke-width="1"/>
  <rect x="50" y="488" width="5" height="20" rx="2.5" fill="#16a085"/>
  <text x="64" y="503" font-family="system-ui, sans-serif" font-size="10.5" fill="#0e6655">Nitrous/other: +3 SP, VIG TN 35</text>

  <!-- Arrow 3→4 -->
  <line x1="350" y1="514" x2="350" y2="526" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== STEP 4 ===== -->
  <rect x="40" y="532" width="620" height="32" rx="8" fill="#2c3e50" filter="url(#shadow)"/>
  <circle cx="66" cy="548" r="13" fill="#e67e22" filter="url(#badge-shadow)"/>
  <text x="66" y="552" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff">4</text>
  <text x="86" y="550" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fff">Complications Roll</text>
  <text x="630" y="550" text-anchor="end" font-family="system-ui, sans-serif" font-size="10" fill="#bdc3c7">(2d10)</text>

  <rect x="50" y="568" width="520" height="18" rx="4" fill="#27ae60" opacity="0.12" stroke="#27ae60" stroke-width="1"/>
  <rect x="50" y="568" width="5" height="18" rx="2.5" fill="#27ae60"/>
  <text x="64" y="581" font-family="system-ui, sans-serif" font-size="10" fill="#1e8449">1–60: None — healthy mother &amp; baby</text>

  <rect x="50" y="590" width="520" height="18" rx="4" fill="#f39c12" opacity="0.12" stroke="#f39c12" stroke-width="1"/>
  <rect x="50" y="590" width="5" height="18" rx="2.5" fill="#f39c12"/>
  <text x="64" y="603" font-family="system-ui, sans-serif" font-size="10" fill="#7d6608">61–70: Perineal tearing — +3 SP, VIG −1</text>

  <rect x="50" y="612" width="520" height="18" rx="4" fill="#e67e22" opacity="0.12" stroke="#e67e22" stroke-width="1"/>
  <rect x="50" y="612" width="5" height="18" rx="2.5" fill="#e67e22"/>
  <text x="64" y="625" font-family="system-ui, sans-serif" font-size="10" fill="#a04000">71–78: Postpartum hemorrhage — +5 SP</text>

  <rect x="50" y="634" width="520" height="18" rx="4" fill="#d35400" opacity="0.12" stroke="#d35400" stroke-width="1"/>
  <rect x="50" y="634" width="5" height="18" rx="2.5" fill="#d35400"/>
  <text x="64" y="647" font-family="system-ui, sans-serif" font-size="10" fill="#922b00">79–85: Baby needs NICU — +10 SP</text>

  <rect x="50" y="656" width="520" height="18" rx="4" fill="#c0392b" opacity="0.12" stroke="#c0392b" stroke-width="1"/>
  <rect x="50" y="656" width="5" height="18" rx="2.5" fill="#c0392b"/>
  <text x="64" y="669" font-family="system-ui, sans-serif" font-size="10" fill="#922b21">86–92: Postpartum depression — Depressed status</text>

  <rect x="50" y="678" width="520" height="18" rx="4" fill="#922b21" opacity="0.12" stroke="#922b21" stroke-width="1"/>
  <rect x="50" y="678" width="5" height="18" rx="2.5" fill="#922b21"/>
  <text x="64" y="691" font-family="system-ui, sans-serif" font-size="10" fill="#7b241c">93–96: Preeclampsia — +8 SP</text>

  <rect x="50" y="700" width="520" height="18" rx="4" fill="#641e16" opacity="0.12" stroke="#641e16" stroke-width="1"/>
  <rect x="50" y="700" width="5" height="18" rx="2.5" fill="#641e16"/>
  <text x="64" y="713" font-family="system-ui, sans-serif" font-size="10" fill="#4a1510">97–99: Stillbirth/neonatal death — +20 SP</text>

  <rect x="50" y="722" width="520" height="18" rx="4" fill="#1a1a2e" opacity="0.12" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="50" y="722" width="5" height="18" rx="2.5" fill="#1a1a2e"/>
  <text x="64" y="735" font-family="system-ui, sans-serif" font-size="10" fill="#1a1a2e">100: Maternal emergency — +15 SP</text>

  <!-- Warning note -->
  <rect x="40" y="756" width="620" height="44" rx="8" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="774" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" fill="#7d6608" font-weight="600">⚠️ Both parents gain +2 SP from the emotional intensity of</text>
  <text x="350" y="792" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" fill="#7d6608" font-weight="600">seeing the ultrasound at week 20.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="s1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowIn" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#27ae60"/>
    </marker>
    <marker id="arrowOut" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arrowSpend" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f39c12"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#fafbfc" rx="8"/>
  <text x="400" y="28" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#2c3e50">Social Capital Flow</text>

  <!-- Central Reservoir -->
  <ellipse cx="400" cy="190" rx="130" ry="80" fill="#2c3e50" filter="url(#s1)"/>
  <ellipse cx="400" cy="190" rx="120" ry="72" fill="#34495e"/>
  <text x="400" y="180" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#ecf0f1">Social Capital</text>
  <text x="400" y="198" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" font-weight="700" fill="#ecf0f1">Pool</text>

  <!-- IN arrows from left (green) -->
  <!-- Helping Others +1 -->
  <text x="90" y="120" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#27ae60" font-weight="600">Helping Others</text>
  <text x="90" y="133" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#27ae60" font-weight="700">+1</text>
  <line x1="145" y1="126" x2="265" y2="170" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowIn)"/>

  <!-- Community +1 -->
  <text x="70" y="165" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#27ae60" font-weight="600">Community</text>
  <text x="70" y="178" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#27ae60" font-weight="700">+1</text>
  <line x1="120" y1="172" x2="265" y2="190" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowIn)"/>

  <!-- Achievement +2 -->
  <text x="80" y="210" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#27ae60" font-weight="600">Achievement</text>
  <text x="80" y="223" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#27ae60" font-weight="700">+2</text>
  <line x1="130" y1="217" x2="265" y2="210" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowIn)"/>

  <!-- Generosity +1 -->
  <text x="80" y="260" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#27ae60" font-weight="600">Generosity</text>
  <text x="80" y="273" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#27ae60" font-weight="700">+1</text>
  <line x1="130" y1="267" x2="265" y2="230" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrowIn)"/>

  <!-- IN label -->
  <text x="180" y="100" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#27ae60">▶ EARNING</text>

  <!-- OUT arrows to right (red) -->
  <!-- Public Conflict −2 -->
  <text x="680" y="115" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b" font-weight="600">Public Conflict</text>
  <text x="680" y="128" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#c0392b" font-weight="700">−2</text>
  <line x1="530" y1="165" x2="655" y2="120" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrowOut)"/>

  <!-- Broken Promises −1 -->
  <text x="700" y="160" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b" font-weight="600">Broken Promises</text>
  <text x="700" y="173" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#c0392b" font-weight="700">−1</text>
  <line x1="530" y1="185" x2="670" y2="165" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowOut)"/>

  <!-- Gossip −1 to −3 -->
  <text x="690" y="208" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b" font-weight="600">Gossip</text>
  <text x="690" y="221" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#c0392b" font-weight="700">−1 to −3</text>
  <line x1="530" y1="200" x2="660" y2="210" stroke="#c0392b" stroke-width="3" marker-end="url(#arrowOut)"/>

  <!-- Legal Trouble −3 to −5 -->
  <text x="690" y="250" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b" font-weight="600">Legal Trouble</text>
  <text x="690" y="263" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#c0392b" font-weight="700">−3 to −5</text>
  <line x1="530" y1="215" x2="655" y2="255" stroke="#c0392b" stroke-width="3.5" marker-end="url(#arrowOut)"/>

  <!-- Unreliable −1 -->
  <text x="690" y="298" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#c0392b" font-weight="600">Unreliable</text>
  <text x="690" y="311" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="11" fill="#c0392b" font-weight="700">−1</text>
  <line x1="530" y1="235" x2="650" y2="300" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowOut)"/>

  <!-- OUT label -->
  <text x="620" y="95" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#c0392b">◀ LOSING</text>

  <!-- SPENDING arrows downward (gold/orange) -->
  <text x="400" y="300" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#f39c12">▼ SPENDING</text>

  <!-- −1: Communication bonus -->
  <line x1="340" y1="270" x2="310" y2="330" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowSpend)"/>
  <rect x="220" y="330" width="180" height="34" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#s1)"/>
  <text x="310" y="345" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#2c3e50">−1: Communication bonus</text>

  <!-- −2: Favor outside network -->
  <line x1="400" y1="270" x2="400" y2="330" stroke="#f39c12" stroke-width="2.5" marker-end="url(#arrowSpend)"/>
  <rect x="310" y="330" width="180" height="34" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#s1)"/>
  <text x="400" y="345" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#2c3e50">−2: Favor outside network</text>

  <!-- −3: Bureaucratic help -->
  <line x1="460" y1="270" x2="490" y2="330" stroke="#f39c12" stroke-width="3" marker-end="url(#arrowSpend)"/>
  <rect x="490" y="330" width="180" height="34" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#s1)"/>
  <text x="580" y="345" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#2c3e50">−3: Bureaucratic help</text>

  <!-- −2: Professional vouch -->
  <line x1="400" y1="270" x2="400" y2="380" stroke="#f39c12" stroke-width="2.5" marker-end="url(#arrowSpend)"/>
  <rect x="310" y="380" width="180" height="34" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1" filter="url(#s1)"/>
  <text x="400" y="395" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" font-weight="600" fill="#2c3e50">−2: Professional vouch</text>

  <!-- Bottom note -->
  <text x="400" y="450" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="10" fill="#7f8c8d">Spend capital strategically — rebuilding takes time and effort.</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <text x="170" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#2c3e50">Sarah's Monthly Budget</text>
  <text x="170" y="46" text-anchor="middle" font-size="12" fill="#7f8c8d">Income: $4,200 · Expenses: $4,380 (104%)</text>

  <!-- Donut chart center at 170, 220, outer r=140, inner r=70 -->
  <g transform="translate(170, 220)">
    <!-- Rent 36% = 129.6 degrees -->
    <path d="M 0,-140 A 140,140 0 0,1 133.4,41.4 L 66.7,20.7 A 70,70 0 0,0 0,-70 Z" fill="#c0392b"/>
    <!-- Car total 10% (payment+insurance) = 36 degrees -->
    <path d="M 133.4,41.4 A 140,140 0 0,1 123.6,78.4 L 61.8,39.2 A 70,70 0 0,0 66.7,20.7 Z" fill="#2980b9"/>
    <!-- Groceries 8% = 28.8 degrees -->
    <path d="M 123.6,78.4 A 140,140 0 0,1 105.6,114.8 L 52.8,57.4 A 70,70 0 0,0 61.8,39.2 Z" fill="#27ae60"/>
    <!-- Health 4% = 14.4 degrees -->
    <path d="M 105.6,114.8 A 140,140 0 0,1 87.6,130.4 L 43.8,65.2 A 70,70 0 0,0 52.8,57.4 Z" fill="#2980b9"/>
    <!-- Utilities+Internet+Phone 5% = 18 degrees -->
    <path d="M 87.6,130.4 A 140,140 0 0,1 61.2,143.6 L 30.6,71.8 A 70,70 0 0,0 43.8,65.2 Z" fill="#7f8c8d"/>
    <!-- Eating out 3% = 10.8 degrees -->
    <path d="M 61.2,143.6 A 140,140 0 0,1 40,146.4 L 20,73.2 A 70,70 0 0,0 30.6,71.8 Z" fill="#e67e22"/>
    <!-- Savings 7% = 25.2 degrees -->
    <path d="M 40,146.4 A 140,140 0 0,1 10.8,147.2 L 5.4,73.6 A 70,70 0 0,0 20,73.2 Z" fill="#27ae60"/>
    <!-- Everything else (remaining ~26%) -->
    <path d="M 10.8,147.2 A 140,140 0 0,1 -140,0 L -70,0 A 70,70 0 0,0 -5.4,73.6 Z" fill="#95a5a6"/>
    <path d="M -140,0 A 140,140 0 0,1 0,-140 L 0,-70 A 70,70 0 0,0 -70,0 Z" fill="#95a5a6"/>

    <!-- Center text -->
    <text x="0" y="-5" text-anchor="middle" font-size="28" font-weight="700" fill="#2c3e50">−$180</text>
    <text x="0" y="15" text-anchor="middle" font-size="12" fill="#c0392b">monthly deficit</text>
  </g>

  <!-- Legend -->
  <g transform="translate(370, 70)" font-size="12">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#2c3e50">Breakdown</text>

    <rect x="0" y="12" width="14" height="14" rx="3" fill="#c0392b"/>
    <text x="20" y="24">🏠 Rent — $1,500 <tspan fill="#7f8c8d" font-size="11">(36%)</tspan></text>

    <rect x="0" y="36" width="14" height="14" rx="3" fill="#2980b9"/>
    <text x="20" y="48">🚗 Car (payment+insurance) — $400 <tspan fill="#7f8c8d" font-size="11">(10%)</tspan></text>

    <rect x="0" y="60" width="14" height="14" rx="3" fill="#27ae60"/>
    <text x="20" y="72">🛒 Groceries — $350 <tspan fill="#7f8c8d" font-size="11">(8%)</tspan></text>

    <rect x="0" y="84" width="14" height="14" rx="3" fill="#27ae60"/>
    <text x="20" y="96">💰 Savings — $300 <tspan fill="#7f8c8d" font-size="11">(7%)</tspan></text>

    <rect x="0" y="108" width="14" height="14" rx="3" fill="#2980b9"/>
    <text x="20" y="120">🏥 Health insurance — $180 <tspan fill="#7f8c8d" font-size="11">(4%)</tspan></text>

    <rect x="0" y="132" width="14" height="14" rx="3" fill="#7f8c8d"/>
    <text x="20" y="144">💡📶📱 Utilities/Internet/Phone — $235 <tspan fill="#7f8c8d" font-size="11">(6%)</tspan></text>

    <rect x="0" y="156" width="14" height="14" rx="3" fill="#e67e22"/>
    <text x="20" y="168">🍽️ Eating out — $120 <tspan fill="#7f8c8d" font-size="11">(3%)</tspan></text>

    <rect x="0" y="180" width="14" height="14" rx="3" fill="#95a5a6"/>
    <text x="20" y="192">📋 Other (gas, meds, toiletries, clothing, entertainment, gifts, misc) — $1,295 <tspan fill="#7f8c8d" font-size="11">(31%)</tspan></text>

    <line x1="0" y1="210" x2="260" y2="210" stroke="#dcdcdc" stroke-width="1"/>
    <text x="0" y="230" font-weight="700" fill="#c0392b" font-size="13">⚠ Rent alone eats 36% of income</text>
    <text x="0" y="250" font-size="11" fill="#7f8c8d">Financial advisors recommend ≤30% for housing</text>
    <text x="0" y="270" font-size="11" fill="#7f8c8d">Sarah is already over this threshold.</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 950 560" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <title>How Your Paycheck Gets Built</title>
  <desc>Waterfall chart showing Maya Chen's $2,500 gross pay breakdown through deductions to $1,786.25 net pay</desc>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="475" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">How Your Paycheck Gets Built</text>
  <text x="475" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Maya Chen · Full-time · Gross $2,500/mo · Texas (no state income tax 🤠)</text>

  <!-- Chart area: x = 80..850, y = 70..440 -->
  <!-- Grid lines -->
  <g stroke="#eee" stroke-width="1">
    <line x1="80" y1="70" x2="880" y2="70"/>
    <line x1="80" y1="140" x2="880" y2="140"/>
    <line x1="80" y1="210" x2="880" y2="210"/>
    <line x1="80" y1="280" x2="880" y2="280"/>
    <line x1="80" y1="350" x2="880" y2="350"/>
    <line x1="80" y1="420" x2="880" y2="420"/>
  </g>

  <!-- Y-axis labels -->
  <g font-size="11" fill="#7f8c8d" text-anchor="end">
    <text x="72" y="74">$2,500</text>
    <text x="72" y="144">$2,000</text>
    <text x="72" y="214">$1,500</text>
    <text x="72" y="284">$1,000</text>
    <text x="72" y="354">$500</text>
    <text x="72" y="424">$0</text>
  </g>

  <!-- Scale: $0 → y=440, $2500 → y=70. px per $ = (440-70)/2500 = 0.148 -->

  <!-- ════════════════════════════════════════
       BAR 1: Gross Pay $2,500 (green, full height)
       x=100, y=70, height=370
       ════════════════════════════════════════ -->
  <rect x="100" y="70" width="80" height="370" rx="6" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="140" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Gross Pay</text>
  <text x="140" y="272" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">$2,500</text>

  <!-- Connecting line from top of Gross to top of Federal -->
  <line x1="180" y1="70" x2="220" y2="70" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 2: Federal Income Tax −$312.50 (red, drops from $2500 line)
       Top: y=70, height = 312.5*0.148 ≈ 46 → bottom at y=116
       Running total: $2,187.50
       ════════════════════════════════════════ -->
  <rect x="220" y="70" width="80" height="46" rx="6" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="260" y="93" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Federal</text>
  <text x="260" y="105" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Income Tax</text>
  <!-- Amount label below the bar -->
  <text x="260" y="128" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">−$312.50</text>

  <!-- Connecting line from bottom of Federal to top of SS -->
  <line x1="300" y1="116" x2="340" y2="116" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 3: Social Security −$155.00 (red)
       Top: y=116, height = 155*0.148 ≈ 23 → bottom at y=139
       Running total: $2,032.50
       ════════════════════════════════════════ -->
  <rect x="340" y="116" width="80" height="23" rx="6" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="380" y="133" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Social Sec.</text>
  <!-- Amount label below the bar, in dark red for visibility -->
  <text x="380" y="152" text-anchor="middle" font-size="10" font-weight="700" fill="#c0392b">−$155.00</text>

  <!-- Connecting line -->
  <line x1="420" y1="139" x2="460" y2="139" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 4: Medicare −$36.25 (red, very short)
       Top: y=139, height = 36.25*0.148 ≈ 5 → minimum 10px for visibility
       Running total: $1,996.25
       ════════════════════════════════════════ -->
  <rect x="460" y="139" width="80" height="10" rx="3" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="500" y="157" text-anchor="middle" font-size="10" font-weight="600" fill="#c0392b">Medicare</text>
  <text x="500" y="172" text-anchor="middle" font-size="10" font-weight="700" fill="#c0392b">−$36.25</text>

  <!-- Connecting line -->
  <line x1="540" y1="149" x2="580" y2="149" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 5: Texas State Tax $0.00 (gray, no change)
       ════════════════════════════════════════ -->
  <rect x="580" y="142" width="80" height="14" rx="4" fill="#bdc3c7" filter="url(#shadow)"/>
  <text x="620" y="153" text-anchor="middle" font-size="10" font-weight="600" fill="#7f8c8d">Texas Tax 🤠</text>
  <text x="620" y="170" text-anchor="middle" font-size="10" font-weight="700" fill="#7f8c8d">$0.00</text>

  <!-- Connecting line -->
  <line x1="660" y1="149" x2="700" y2="149" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 6: Health Insurance −$85.00 (red)
       Top: y=149, height = 85*0.148 ≈ 13 → bottom at y=162
       Running total: $1,911.25
       ════════════════════════════════════════ -->
  <rect x="700" y="149" width="80" height="13" rx="4" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="740" y="159" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Health Ins.</text>
  <text x="740" y="176" text-anchor="middle" font-size="10" font-weight="700" fill="#e74c3c">−$85.00</text>

  <!-- Drop line from health insurance to 401k level -->
  <line x1="740" y1="162" x2="740" y2="210" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ════════════════════════════════════════
       BAR 7: 401(k) −$125.00 (orange, below the main flow)
       Top: y=210, height = 125*0.148 ≈ 19 → bottom at y=229
       Running total: $1,786.25
       ════════════════════════════════════════ -->
  <rect x="700" y="210" width="80" height="19" rx="4" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="740" y="224" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">401(k)</text>
  <text x="740" y="242" text-anchor="middle" font-size="10" font-weight="700" fill="#e67e22">−$125.00</text>
  <text x="740" y="256" text-anchor="middle" font-size="8" fill="#f0b27a">Savings!</text>

  <!-- ════════════════════════════════════════
       FINAL BAR: Net Pay $1,786.25 (green, separate position at x=820)
       y = 440 - 1786.25*0.148 = 440 - 264 ≈ 176
       Height: 264
       ════════════════════════════════════════ -->
  <!-- Dashed drop line from the running total to the final bar -->
  <line x1="260" y1="162" x2="860" y2="162" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="860" y1="162" x2="860" y2="176" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,4"/>

  <rect x="820" y="176" width="80" height="264" rx="8" fill="url(#greenGrad)" filter="url(#shadow)" stroke="#27ae60" stroke-width="2"/>
  <text x="860" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Net Pay</text>
  <text x="860" y="318" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">$1,786.25</text>
  <text x="860" y="338" text-anchor="middle" font-size="10" fill="#d5f5e3">Take-home</text>

  <!-- Running total labels on the connecting line -->
  <g font-size="9" fill="#7f8c8d">
    <text x="260" y="110" text-anchor="middle">→ $2,187.50</text>
    <text x="380" y="110" text-anchor="middle">→ $2,032.50</text>
    <text x="500" y="133" text-anchor="middle">→ $1,996.25</text>
    <text x="620" y="133" text-anchor="middle">→ $1,996.25</text>
    <text x="740" y="133" text-anchor="middle">→ $1,911.25</text>
  </g>

  <!-- ════════════════════════════════════════
       Summary panel
       ════════════════════════════════════════ -->
  <rect x="100" y="460" width="750" height="80" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="120" y="484" font-size="13" font-weight="700" fill="#2c3e50">💡 Breakdown Summary</text>

  <text x="120" y="504" font-size="11" fill="#2c3e50">Gross Pay:</text>
  <text x="220" y="504" font-size="11" font-weight="700" fill="#27ae60">$2,500.00</text>
  <text x="350" y="504" font-size="11" fill="#2c3e50">Total Deductions:</text>
  <text x="480" y="504" font-size="11" font-weight="700" fill="#e74c3c">−$713.75</text>
  <text x="610" y="504" font-size="11" fill="#2c3e50">Net Pay:</text>
  <text x="700" y="504" font-size="12" font-weight="700" fill="#27ae60">$1,786.25</text>

  <text x="120" y="524" font-size="10" fill="#7f8c8d">Effective tax rate (Fed + SS + Medicare):</text>
  <text x="370" y="524" font-size="10" font-weight="700" fill="#e74c3c">17.4%</text>
  <text x="450" y="524" font-size="10" fill="#7f8c8d">Take-home %:</text>
  <text x="560" y="524" font-size="10" font-weight="700" fill="#27ae60">71.5%</text>
  <text x="120" y="536" font-size="9" fill="#95a5a6">🤠 Texas has no state income tax · 401(k) employer match = $37.50/mo extra</text>

  <!-- Legend -->
  <g transform="translate(100, 548)" font-size="10">
    <rect x="0" y="-6" width="14" height="10" rx="2" fill="#27ae60"/>
    <text x="20" y="3">Gross / Net</text>
    <rect x="120" y="-6" width="14" height="10" rx="2" fill="#e74c3c"/>
    <text x="140" y="3">Taxes / Deductions</text>
    <rect x="280" y="-6" width="14" height="10" rx="2" fill="#e67e22"/>
    <text x="300" y="3">Savings (401k)</text>
    <rect x="420" y="-6" width="14" height="10" rx="2" fill="#bdc3c7"/>
    <text x="440" y="3">No tax (Texas)</text>
  </g>

</svg>
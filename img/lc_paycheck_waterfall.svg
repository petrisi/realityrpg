<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f39c12"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#2c3e50">How Your Paycheck Gets Built</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d">Maya Chen · Full-time · Gross $2,500/mo · Texas (no state income tax 🤠)</text>

  <!-- ════════════════════════════════════════
       Chart area: x = 100..800, bars at fixed x positions
       Y mapping: $0 → y=440, $2500 → y=70
       Scale: (440-70)/2500 = 0.148 px per dollar
       y = 440 - dollars * 0.148
       ════════════════════════════════════════ -->

  <!-- Grid lines -->
  <g stroke="#eee" stroke-width="1">
    <line x1="90" y1="70" x2="850" y2="70"/>
    <line x1="90" y1="140" x2="850" y2="140"/>
    <line x1="90" y1="210" x2="850" y2="210"/>
    <line x1="90" y1="280" x2="850" y2="280"/>
    <line x1="90" y1="350" x2="850" y2="350"/>
    <line x1="90" y1="420" x2="850" y2="420"/>
  </g>

  <!-- Y-axis labels -->
  <g font-size="11" fill="#7f8c8d" text-anchor="end">
    <text x="82" y="74">$2,500</text>
    <text x="82" y="144">$2,000</text>
    <text x="82" y="214">$1,500</text>
    <text x="82" y="284">$1,000</text>
    <text x="82" y="354">$500</text>
    <text x="82" y="424">$0</text>
  </g>

  <!-- ════════════════════════════════════════
       BAR 1: Gross Pay $2,500 (green, starts at baseline)
       y = 440 - 2500*0.148 = 440 - 370 = 70
       ════════════════════════════════════════ -->
  <rect x="100" y="70" width="80" height="370" rx="6" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="140" y="255" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Gross Pay</text>
  <text x="140" y="270" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">$2,500</text>

  <!-- Connecting line to next bar -->
  <line x1="180" y1="70" x2="220" y2="70" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 2: Federal Income Tax −$312.50 (red, goes down)
       Top: y=70, Bottom: y=70+312.5*0.148=70+46.25≈116
       Running total: $2,187.50
       ════════════════════════════════════════ -->
  <rect x="220" y="70" width="80" height="47" rx="6" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="260" y="93" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Federal</text>
  <text x="260" y="105" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Income Tax</text>
  <text x="260" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">−$312.50</text>

  <!-- Connecting line -->
  <line x1="300" y1="117" x2="340" y2="117" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 3: Social Security −$155.00 (red)
       Top: y=117, Bottom: y=117+155*0.148=117+22.94≈140
       Running total: $2,032.50
       ════════════════════════════════════════ -->
  <rect x="340" y="117" width="80" height="23" rx="6" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="380" y="133" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Social</text>
  <text x="380" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Security</text>
  <text x="380" y="163" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">−$155.00</text>

  <!-- Connecting line -->
  <line x1="420" y1="140" x2="460" y2="140" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 4: Medicare −$36.25 (red)
       Top: y=140, Bottom: y=140+36.25*0.148=140+5.37≈145
       Running total: $1,996.25
       ════════════════════════════════════════ -->
  <rect x="460" y="140" width="80" height="6" rx="3" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="500" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#c0392b">Medicare</text>
  <text x="500" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">−$36.25</text>

  <!-- Connecting line -->
  <line x1="540" y1="146" x2="580" y2="146" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 5: Texas State Tax $0.00 (gray — no state tax)
       ════════════════════════════════════════ -->
  <rect x="580" y="138" width="80" height="16" rx="6" fill="#bdc3c7" filter="url(#shadow)"/>
  <text x="620" y="150" text-anchor="middle" font-size="10" font-weight="600" fill="#7f8c8d">Texas</text>
  <text x="620" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#7f8c8d">State Tax 🤠</text>
  <text x="620" y="178" text-anchor="middle" font-size="11" font-weight="700" fill="#95a5a6">$0.00</text>

  <!-- Connecting line -->
  <line x1="660" y1="146" x2="700" y2="146" stroke="#bdc3c7" stroke-width="1.5"/>

  <!-- ════════════════════════════════════════
       BAR 6: Health Insurance −$85.00 (red)
       Top: y=146, Bottom: y=146+85*0.148=146+12.58≈159
       Running total: $1,911.25
       ════════════════════════════════════════ -->
  <rect x="700" y="146" width="80" height="13" rx="6" fill="url(#redGrad)" filter="url(#shadow)"/>
  <text x="740" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Health</text>
  <text x="740" y="165" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Insurance</text>
  <text x="740" y="182" text-anchor="middle" font-size="11" font-weight="700" fill="#e74c3c">−$85.00</text>

  <!-- Drop line from health insurance to 401k level -->
  <line x1="740" y1="159" x2="740" y2="210" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ════════════════════════════════════════
       BAR 7: 401(k) −$125.00 (orange — savings, not a loss)
       Top: y=210, Bottom: y=210+125*0.148=210+18.5≈229
       Running total: $1,786.25
       ════════════════════════════════════════ -->
  <rect x="700" y="210" width="80" height="19" rx="6" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="740" y="224" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">401(k)</text>
  <text x="740" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#e67e22">−$125.00</text>
  <text x="740" y="256" text-anchor="middle" font-size="9" fill="#f0b27a">Savings, not a loss!</text>

  <!-- ════════════════════════════════════════
       Final: Net Pay $1,786.25 (green, large highlighted box)
       y = 440 - 1786.25*0.148 = 440 - 264.4 ≈ 176
       Bar height: 264
       ════════════════════════════════════════ -->
  <!-- Drop line to net pay level -->
  <line x1="140" y1="176" x2="140" y2="176" stroke="#27ae60" stroke-width="2"/>

  <rect x="100" y="176" width="80" height="264" rx="8" fill="url(#greenGrad)" filter="url(#shadow)" stroke="#27ae60" stroke-width="2"/>
  <text x="140" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Net Pay</text>
  <text x="140" y="318" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">$1,786.25</text>
  <text x="140" y="338" text-anchor="middle" font-size="10" fill="#d5f5e3">Take-home</text>

  <!-- ════════════════════════════════════════
       Summary panel — right side
       ════════════════════════════════════════ -->
  <rect x="100" y="360" width="700" height="120" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" filter="url(#shadow)"/>
  <text x="120" y="384" font-size="13" font-weight="700" fill="#2c3e50">💡 Breakdown Summary</text>

  <!-- Row 1 -->
  <text x="120" y="406" font-size="11" fill="#2c3e50">Gross Pay:</text>
  <text x="220" y="406" font-size="11" font-weight="700" fill="#27ae60">$2,500.00</text>

  <text x="350" y="406" font-size="11" fill="#2c3e50">Total Deductions:</text>
  <text x="480" y="406" font-size="11" font-weight="700" fill="#e74c3c">−$713.75</text>

  <text x="610" y="406" font-size="11" fill="#2c3e50">Net Pay:</text>
  <text x="700" y="406" font-size="12" font-weight="700" fill="#27ae60">$1,786.25</text>

  <!-- Row 2: Effective tax rate -->
  <text x="120" y="428" font-size="10" fill="#7f8c8d">Effective tax rate (Fed + SS + Medicare):</text>
  <text x="370" y="428" font-size="10" font-weight="700" fill="#e74c3c">17.4%</text>

  <text x="120" y="446" font-size="10" fill="#7f8c8d">Savings rate (401k):</text>
  <text x="280" y="446" font-size="10" font-weight="700" fill="#e67e22">5.0% of gross</text>

  <text x="450" y="446" font-size="10" fill="#7f8c8d">Take-home %:</text>
  <text x="560" y="446" font-size="10" font-weight="700" fill="#27ae60">71.5%</text>

  <!-- Row 3: note -->
  <text x="120" y="468" font-size="10" fill="#95a5a6">🤠 Texas has no state income tax — saves ~$150-300/mo vs most states</text>

  <!-- Row 4: note -->
  <text x="120" y="478" font-size="9" fill="#bdc3c7">* Maya's 401(k) contribution earns employer 50% match up to 6% = $37.50 extra from employer</text>

  <!-- Legend -->
  <g transform="translate(100, 490)" font-size="10">
    <rect x="0" y="-6" width="14" height="10" rx="2" fill="#27ae60"/>
    <text x="20" y="3">Gross / Net (positive)</text>
    <rect x="150" y="-6" width="14" height="10" rx="2" fill="#e74c3c"/>
    <text x="170" y="3">Taxes / Deductions</text>
    <rect x="310" y="-6" width="14" height="10" rx="2" fill="#e67e22"/>
    <text x="330" y="3">Savings (401k)</text>
    <rect x="460" y="-6" width="14" height="10" rx="2" fill="#bdc3c7"/>
    <text x="480" y="3">No tax (Texas)</text>
  </g>

</svg>
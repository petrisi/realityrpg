<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 620 420" style="font-family: Segoe UI, system-ui, sans-serif;">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowIn" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowOut" markerWidth="10" markerHeight="8" refX="0" refY="4" orient="auto">
      <path d="M10,0 L0,4 L10,8 Z" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="620" height="420" rx="12" fill="#fafbfc"/>

  <!-- Title -->
  <text x="310" y="26" text-anchor="middle" font-size="17" font-weight="700" fill="#2c3e50">Daily Remote Work SP Budget</text>
  <text x="310" y="44" text-anchor="middle" font-size="11" fill="#7f8c8d">Your SP tank fills from daily stressors and drains from rest — boundary erosion is a slow leak</text>

  <!-- CENTRAL SP TANK -->
  <g transform="translate(210, 70)" filter="url(#shadow)">
    <!-- Tank body -->
    <rect width="200" height="180" rx="12" fill="#e8e8e8"/>
    <rect width="200" height="180" rx="12" fill="none" stroke="#2c3e50" stroke-width="3"/>
    <!-- Fill level (showing ~60% filled) -->
    <rect y="72" width="200" height="108" rx="0 0 12 12" fill="#f39c12" opacity="0.6"/>
    <rect y="36" width="200" height="36" rx="0 0 0 0" fill="#e74c3c" opacity="0.4"/>
    <!-- Max line -->
    <line x1="0" y1="30" x2="200" y2="30" stroke="#e74c3c" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="210" y="34" font-size="9" fill="#e74c3c" font-weight="700">MAX SP</text>
    <!-- Labels inside tank -->
    <text x="100" y="100" text-anchor="middle" font-size="28" font-weight="700" fill="#2c3e50">18</text>
    <text x="100" y="120" text-anchor="middle" font-size="12" fill="#5d6d7e">/ 25 SP</text>
    <text x="100" y="145" text-anchor="middle" font-size="10" fill="#7f8c8d">72% capacity</text>
    <text x="100" y="165" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="600">⚠️ Getting close</text>
  </g>

  <!-- INFLOW arrows (left side, going INTO tank) -->
  <!-- Video calls -->
  <line x1="120" y1="120" x2="208" y2="120" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowIn)"/>
  <g transform="translate(30, 108)" filter="url(#shadow)">
    <rect width="90" height="28" rx="6" fill="#fdedec"/>
    <text x="45" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#e74c3c">📹 Video Calls</text>
    <text x="45" y="27" text-anchor="middle" font-size="8" fill="#e74c3c">+1 SP / call</text>
  </g>

  <!-- Distractions -->
  <line x1="120" y1="155" x2="208" y2="155" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowIn)"/>
  <g transform="translate(30, 143)" filter="url(#shadow)">
    <rect width="90" height="28" rx="6" fill="#fdedec"/>
    <text x="45" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#e74c3c">📱 Distractions</text>
    <text x="45" y="27" text-anchor="middle" font-size="8" fill="#e74c3c">+1–2 SP</text>
  </g>

  <!-- Tech issues -->
  <line x1="120" y1="190" x2="208" y2="190" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowIn)"/>
  <g transform="translate(30, 178)" filter="url(#shadow)">
    <rect width="90" height="28" rx="6" fill="#fdedec"/>
    <text x="45" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#e74c3c">💻 Tech Issues</text>
    <text x="45" y="27" text-anchor="middle" font-size="8" fill="#e74c3c">+2 SP</text>
  </g>

  <!-- Manager checks -->
  <line x1="120" y1="225" x2="208" y2="225" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowIn)"/>
  <g transform="translate(30, 213)" filter="url(#shadow)">
    <rect width="90" height="28" rx="6" fill="#fdedec"/>
    <text x="45" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#e74c3c">📊 Manager</text>
    <text x="45" y="27" text-anchor="middle" font-size="8" fill="#e74c3c">+1–2 SP</text>
  </g>

  <!-- OUTFLOW arrows (right side, going OUT of tank) -->
  <!-- Rest -->
  <line x1="412" y1="130" x2="440" y2="130" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowOut)"/>
  <g transform="translate(440, 118)" filter="url(#shadow)">
    <rect width="90" height="28" rx="6" fill="#d5f5e3"/>
    <text x="45" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#27ae60">😴 Night Rest</text>
    <text x="45" y="27" text-anchor="middle" font-size="8" fill="#27ae60">−3 SP / night</text>
  </g>

  <!-- Weekend -->
  <line x1="412" y1="170" x2="440" y2="170" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowOut)"/>
  <g transform="translate(440, 158)" filter="url(#shadow)">
    <rect width="90" height="28" rx="6" fill="#d5f5e3"/>
    <text x="45" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#27ae60">🏖️ Weekend</text>
    <text x="45" y="27" text-anchor="middle" font-size="8" fill="#27ae60">−3 SP / day</text>
  </g>

  <!-- Boundary check -->
  <line x1="412" y1="210" x2="440" y2="210" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowOut)"/>
  <g transform="translate(440, 198)" filter="url(#shadow)">
    <rect width="90" height="28" rx="6" fill="#d5f5e3"/>
    <text x="45" y="18" text-anchor="middle" font-size="9" font-weight="600" fill="#27ae60">🔒 Boundary</text>
    <text x="45" y="27" text-anchor="middle" font-size="8" fill="#27ae60">Blocks +1 SP</text>
  </g>

  <!-- BOUNDARY EROSION SLOW LEAK (bottom of tank) -->
  <g transform="translate(270, 255)">
    <rect width="80" height="24" rx="6" fill="#fef9e7" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="40" y="16" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="700">⚠️ Slow Leak</text>
  </g>
  <text x="310" y="290" text-anchor="middle" font-size="9" fill="#e74c3c">+1 cumulative SP/week without boundaries</text>
  <text x="310" y="303" text-anchor="middle" font-size="9" fill="#7f8c8d">This SP does NOT resolve during normal rest</text>

  <!-- BOTTOM: SP ECONOMY SUMMARY -->
  <rect x="40" y="320" width="540" height="85" rx="8" fill="#eaf2f8" stroke="#2980b9" stroke-width="1.5"/>
  <text x="310" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#2980b9">Daily SP Economy Summary</text>

  <!-- Example calculation -->
  <g font-size="10" fill="#2c3e50">
    <text x="80" y="365">Maya's day:</text>
    <text x="170" y="365" fill="#e74c3c">+1 (stand-up) +2 (design review) +1 (Reddit) +2 (PM call) = +6 SP</text>
    <text x="80" y="382">Night rest:</text>
    <text x="170" y="382" fill="#27ae60">−3 SP</text>
    <text x="80" y="399">Net daily:</text>
    <text x="170" y="399" fill="#e74c3c" font-weight="700">+3 SP/day → reaches max in ~6 days if pattern continues</text>
  </g>

  <!-- Formula box -->
  <rect x="400" y="340" width="160" height="55" rx="6" fill="white" stroke="#d5dbe0" stroke-width="1"/>
  <text x="480" y="358" text-anchor="middle" font-size="10" font-weight="700" fill="#2c3e50">Max SP Formula</text>
  <text x="480" y="375" text-anchor="middle" font-size="11" fill="#2c3e50">20 + (RES mod × 5)</text>
  <text x="480" y="390" text-anchor="middle" font-size="9" fill="#7f8c8d">Maya: 20 + (1 × 5) = 25</text>
</svg>

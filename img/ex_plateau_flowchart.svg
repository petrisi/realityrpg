<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 520" width="100%" height="100%">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>

    <!-- Arrowhead markers -->
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#7f8c8d"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#27ae60"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#2980b9"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="620" height="520" fill="#faf9f6" rx="12"/>

  <!-- Title -->
  <text x="310" y="34" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#2c3e50">Plateau Breakthrough Flowchart</text>
  <text x="310" y="54" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#5d6d7e">How to break through when progress stalls</text>

  <!-- ==================== START NODE ==================== -->
  <g filter="url(#shadow)">
    <rect x="220" y="66" width="180" height="44" rx="8" fill="#7f8c8d"/>
    <text x="310" y="95" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Hit Plateau?</text>
  </g>

  <!-- Arrow: Start → fan-out line -->
  <line x1="310" y1="110" x2="310" y2="130" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Horizontal fan-out line -->
  <line x1="60" y1="130" x2="560" y2="130" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Vertical connectors from fan-out line to each box -->
  <line x1="60" y1="130" x2="60" y2="148" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="205" y1="130" x2="205" y2="148" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="415" y1="130" x2="415" y2="148" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="560" y1="130" x2="560" y2="148" stroke="#7f8c8d" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ==================== STRATEGY 1: Change Routine ==================== -->
  <g filter="url(#shadow)">
    <rect x="10" y="150" width="100" height="90" rx="8" fill="#27ae60"/>
    <text x="60" y="170" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">🔄 Change</text>
    <text x="60" y="184" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Routine</text>
    <text x="60" y="204" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#e8f8f5">New exercises,</text>
    <text x="60" y="216" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#e8f8f5">intensity, schedule</text>
    <text x="60" y="230" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#d5f5e3">−5 to plateau TN</text>
    <text x="60" y="242" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#d5f5e3">No time cost</text>
  </g>

  <!-- ==================== STRATEGY 2: Improve Nutrition ==================== -->
  <g filter="url(#shadow)">
    <rect x="155" y="150" width="100" height="90" rx="8" fill="#1abc9c"/>
    <text x="205" y="170" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">🍽️ Improve</text>
    <text x="205" y="184" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Nutrition</text>
    <text x="205" y="204" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#d1f2eb">Dedicated diet,</text>
    <text x="205" y="216" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#d1f2eb">supplements, meal prep</text>
    <text x="205" y="230" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#a3e4d7">−5 to plateau TN</text>
    <text x="205" y="242" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#a3e4d7">Dietary discipline</text>
  </g>

  <!-- ==================== STRATEGY 3: Deload Week ==================== -->
  <g filter="url(#shadow)">
    <rect x="300" y="150" width="100" height="90" rx="8" fill="#e67e22"/>
    <text x="350" y="170" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">😴 Deload</text>
    <text x="350" y="184" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Week</text>
    <text x="350" y="204" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#fdebd0">1 week light</text>
    <text x="350" y="216" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#fdebd0">activity only</text>
    <text x="350" y="230" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#fad7a0">−5 to plateau TN</text>
    <text x="350" y="242" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#fad7a0">Lose 1 week progress</text>
  </g>

  <!-- ==================== STRATEGY 4: Hire Trainer ==================== -->
  <g filter="url(#shadow)">
    <rect x="445" y="150" width="100" height="90" rx="8" fill="#8e44ad"/>
    <text x="495" y="170" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">👨‍🏫 Hire</text>
    <text x="495" y="184" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Trainer</text>
    <text x="495" y="204" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#e8daef">$50–$150/session</text>
    <text x="495" y="216" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#e8daef">Structured</text>
    <text x="495" y="228" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#e8daef">programming</text>
    <text x="495" y="242" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#d2b4de">−10 to plateau TN</text>
  </g>

  <!-- Converge arrows: each box → convergence point -->
  <line x1="60" y1="240" x2="60" y2="270" stroke="#7f8c8d" stroke-width="1.5"/>
  <line x1="205" y1="240" x2="205" y2="270" stroke="#7f8c8d" stroke-width="1.5"/>
  <line x1="350" y1="240" x2="350" y2="270" stroke="#7f8c8d" stroke-width="1.5"/>
  <line x1="495" y1="240" x2="495" y2="270" stroke="#7f8c8d" stroke-width="1.5"/>

  <!-- Horizontal convergence line -->
  <line x1="60" y1="270" x2="495" y2="270" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Arrow down to decision node -->
  <line x1="310" y1="270" x2="310" y2="296" stroke="#7f8c8d" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ==================== DECISION NODE ==================== -->
  <g filter="url(#shadow)">
    <rect x="180" y="298" width="260" height="44" rx="8" fill="#2980b9"/>
    <text x="310" y="327" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Attempt Breakthrough Check</text>
  </g>

  <!-- Split arrows from decision node -->
  <!-- Left: success -->
  <path d="M 260 342 C 230 355, 195 365, 170 370"
        fill="none" stroke="#27ae60" stroke-width="2"
        marker-end="url(#arrowGreen)"/>
  <!-- Right: failure -->
  <path d="M 360 342 C 390 355, 425 365, 450 370"
        fill="none" stroke="#e74c3c" stroke-width="2"
        marker-end="url(#arrowRed)"/>

  <!-- ==================== SUCCESS BOX ==================== -->
  <g filter="url(#shadow)">
    <rect x="70" y="372" width="200" height="56" rx="8" fill="#27ae60"/>
    <text x="170" y="396" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">✅ Success → +1 VIG</text>
    <text x="170" y="416" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#d5f5e3">Breakthrough achieved</text>
  </g>

  <!-- ==================== FAILURE BOX ==================== -->
  <g filter="url(#shadow)">
    <rect x="350" y="372" width="200" height="56" rx="8" fill="#e74c3c"/>
    <text x="450" y="396" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">❌ Failure → Stay Plateau</text>
    <text x="450" y="416" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#fadbd8">Try another strategy</text>
  </g>

  <!-- Loop-back arrow from failure back up to plateau start -->
  <path d="M 550 390 C 580 350, 580 200, 580 100 C 580 75, 400 60, 400 60"
        fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5 3"
        marker-end="url(#arrowRed)"/>
  <text x="575" y="230" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#e74c3c"
        transform="rotate(-90 575 230)">retry loop</text>

</svg>
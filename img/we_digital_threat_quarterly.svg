<svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 600 350" width="600" height="350">
  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#2c3e50" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">🔒 Digital Threat Quarterly Roll</text>
  <text x="300" y="46" text-anchor="middle" font-size="11" fill="#7f8c8d" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">GM rolls 1d10 each quarter per character</text>

  <!-- Row 1: 1-2 Phishing -->
  <rect x="30" y="62" width="540" height="38" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="55" y="87" font-size="14" font-weight="700" fill="#1a5276" font-family="Consolas, monospace">1–2</text>
  <text x="85" y="87" font-size="14">📧</text>
  <text x="110" y="87" font-size="12" font-weight="600" fill="#1a5276" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Phishing Email</text>
  <text x="230" y="87" font-size="11" fill="#1a5276" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">INT TN 40 to identify</text>
  <text x="380" y="87" font-size="11" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Prevention: Anti-phishing training +5</text>

  <!-- Row 2: 3 Account Breach -->
  <rect x="30" y="106" width="540" height="38" rx="6" fill="#eaf2f8" stroke="#2980b9" stroke-width="1"/>
  <text x="55" y="131" font-size="14" font-weight="700" fill="#1a5276" font-family="Consolas, monospace">3</text>
  <text x="85" y="131" font-size="14">🔓</text>
  <text x="110" y="131" font-size="12" font-weight="600" fill="#1a5276" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Account Breach</text>
  <text x="230" y="131" font-size="11" fill="#1a5276" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">INT TN 45 to contain · $100-2K</text>
  <text x="380" y="131" font-size="11" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Prevention: Password mgr + 2FA +10</text>

  <!-- Row 3: 4 Malware -->
  <rect x="30" y="150" width="540" height="38" rx="6" fill="#fdebd0" stroke="#e67e22" stroke-width="1"/>
  <text x="55" y="175" font-size="14" font-weight="700" fill="#a04000" font-family="Consolas, monospace">4</text>
  <text x="85" y="175" font-size="14">📱</text>
  <text x="110" y="175" font-size="12" font-weight="600" fill="#a04000" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Malware Infection</text>
  <text x="230" y="175" font-size="11" fill="#a04000" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">INT TN 50 to remove · $500-5K</text>
  <text x="380" y="175" font-size="11" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Prevention: Antivirus +5</text>

  <!-- Row 4: 5 Identity Theft -->
  <rect x="30" y="194" width="540" height="38" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1"/>
  <text x="55" y="219" font-size="14" font-weight="700" fill="#922b21" font-family="Consolas, monospace">5</text>
  <text x="85" y="219" font-size="14">🎭</text>
  <text x="110" y="219" font-size="12" font-weight="600" fill="#922b21" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Identity Theft</text>
  <text x="230" y="219" font-size="11" fill="#922b21" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">INT+EXP TN 55 · Credit damage</text>
  <text x="380" y="219" font-size="11" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Prevention: Credit freeze +15</text>

  <!-- Row 5: 6-7 Privacy Scare -->
  <rect x="30" y="238" width="540" height="38" rx="6" fill="#fef9e7" stroke="#f39c12" stroke-width="1"/>
  <text x="55" y="263" font-size="14" font-weight="700" fill="#7d6608" font-family="Consolas, monospace">6–7</text>
  <text x="85" y="263" font-size="14">📢</text>
  <text x="110" y="263" font-size="12" font-weight="600" fill="#7d6608" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Privacy Scare</text>
  <text x="230" y="263" font-size="11" fill="#7d6608" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">+3 SP from anxiety</text>
  <text x="380" y="263" font-size="11" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">Prevention: Privacy settings +5</text>

  <!-- Row 6: 8-10 Nothing -->
  <rect x="30" y="282" width="540" height="38" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1"/>
  <text x="55" y="307" font-size="14" font-weight="700" fill="#1e8449" font-family="Consolas, monospace">8–10</text>
  <text x="85" y="307" font-size="14">✅</text>
  <text x="110" y="307" font-size="12" font-weight="600" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">All Clear</text>
  <text x="230" y="307" font-size="11" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">No incident this quarter</text>
  <text x="380" y="307" font-size="11" fill="#1e8449" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">30% chance — nothing happens</text>

  <!-- Bottom note -->
  <text x="300" y="342" text-anchor="middle" font-size="10" fill="#7f8c8d" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-style="italic">Roll once per quarter per character · Higher INT = better at detecting/mitigating · EXP in relevant skills may apply</text>
</svg>
